<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorenia · Character Sheets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cinzel:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4ecd8;
    --paper-shade: #ebe1c8;
    --paper-deep: #d9cba5;
    --ink: #2b1810;
    --ink-soft: #4a3528;
    --ink-faint: #7a6651;
    --rule: #b8a577;
    --accent: #8b1e1e;
    --gold: #a8852b;
    --gold-pale: #d4b961;
    --shadow: 0 1px 2px rgba(43, 24, 16, 0.15), 0 2px 8px rgba(43, 24, 16, 0.08);
    --shadow-deep: 0 4px 12px rgba(43, 24, 16, 0.18), 0 8px 24px rgba(43, 24, 16, 0.1);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    min-height: 100vh;
  }
  body {
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(184, 165, 119, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(168, 133, 43, 0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 64px 32px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .header::after {
    content: '✦';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    padding: 0 16px;
    color: var(--gold);
    font-size: 18px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 0.12em;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-faint);
  }

  .character-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .char-card {
    background: var(--paper-shade);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 24px;
    box-shadow: var(--shadow);
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .char-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-deep);
    border-color: var(--gold);
  }
  .char-card.inactive {
    opacity: 0.55;
  }
  .char-card.inactive::before {
    content: 'RETIRED';
    position: absolute;
    top: 12px;
    right: -28px;
    background: var(--ink-faint);
    color: var(--paper);
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 2px 32px;
    transform: rotate(35deg);
  }

  .char-card h2 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    margin: 0 0 6px;
    color: var(--ink);
    letter-spacing: 0.05em;
  }
  .char-card .summary {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 15px;
    margin-bottom: 12px;
  }
  .char-card .player {
    font-size: 12px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .char-card .arrow {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    margin-top: 14px;
    font-size: 14px;
    letter-spacing: 0.1em;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>DORENIA</h1>
    <div class="subtitle">Character Sheets · Aeloria</div>
  </div>

  <div id="char-list">
    <div class="empty-state">Loading character roster...</div>
  </div>

  <div class="footer">
    Maintained from the DM's vault · Always consult the table before changes
  </div>
</div>

<script>
async function loadCharacters() {
  try {
    const response = await fetch('characters/index.json');
    if (!response.ok) throw new Error('Could not load roster');
    const data = await response.json();
    renderList(data.characters);
  } catch (err) {
    document.getElementById('char-list').innerHTML = `
      <div class="empty-state">
        Could not load the character roster.<br>
        <small>${err.message}</small>
      </div>
    `;
  }
}

function renderList(chars) {
  if (!chars || chars.length === 0) {
    document.getElementById('char-list').innerHTML = `
      <div class="empty-state">No characters in the roster yet.</div>
    `;
    return;
  }

  const html = `
    <div class="character-grid">
      ${chars.map(c => `
        <a class="char-card ${c.active === false ? 'inactive' : ''}"
           href="sheet.html?char=${encodeURIComponent(c.id)}">
          <h2>${escapeHTML(c.name)}</h2>
          <div class="summary">${escapeHTML(c.summary || '')}</div>
          ${c.player ? `<div class="player">${escapeHTML(c.player)}</div>` : ''}
          <div class="arrow">OPEN SHEET ›</div>
        </a>
      `).join('')}
    </div>
  `;
  document.getElementById('char-list').innerHTML = html;
}

function escapeHTML(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

loadCharacters();
</script>

</body>
</html>
