<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorenia — Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #090e0c;
  --surface:    #0e1612;
  --raised:     #141f19;
  --border:     #1e3328;
  --gold:       #4dcc85;
  --gold-dim:   #2a7a4e;
  --gold-faint: #1a3325;
  --text:       #b0d4c0;
  --text-dim:   #607a6a;
  --text-hi:    #d0ede0;
  --red:        #a04040;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; overflow: hidden; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; }

/* Slim top bar */
#header { height: 36px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 10px; flex-shrink: 0; position: relative; z-index: 1000; overflow: hidden; }
#header::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); }
.header-title { font-family:'Cinzel',serif; font-size:12px; font-weight:700; color:var(--gold); letter-spacing:0.1em; }
.header-sep { width:1px; height:18px; background:var(--border); }
#mapLabel { font-family:'Cinzel',serif; font-size:10px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; }
.header-spacer { flex:1; }
#loadStatus { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.06em; color:var(--text-dim); }

#map-wrap { position:relative; min-height:0; flex:1; width:100%; }
#map { position:absolute; top:0; left:0; width:100% !important; height:100% !important; overflow:hidden !important; background:var(--bg); }

/* Controls overlay — sits above map, never clipped */
#mapControls { position:absolute; top:0; left:0; right:0; z-index:2000; display:flex; justify-content:space-between; align-items:flex-start; padding:8px; pointer-events:none; }
#controlsLeft { display:flex; flex-direction:column; gap:4px; pointer-events:all; align-items:flex-start; }
#controlsRight { pointer-events:all; }
/* Hide Leaflet zoom control and attribution bar */
.leaflet-control-zoom { display:none !important; }
.leaflet-top.leaflet-left { display:none !important; }
.leaflet-bottom { display:none !important; }
/* Buttons must not stretch full width */
#layersToggleBtn, #measureBtn, #legendToggle { width:auto !important; display:inline-block !important; }
.leaflet-container { position:relative !important; overflow:hidden !important; }
.leaflet-map-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-tile-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-overlay-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-overlay-pane svg { position:absolute !important; top:0 !important; left:0 !important; pointer-events:auto !important; }
.leaflet-overlay-pane svg path { pointer-events:auto !important; }
.leaflet-image-layer { pointer-events:none !important; }
.leaflet-marker-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-tooltip-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-popup-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-pane { position:absolute !important; top:0 !important; left:0 !important; }
.leaflet-popup { position:absolute !important; }
/* Marker tooltip on hover */
.marker-tooltip {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  color: var(--text) !important;
  font-family: 'Cinzel', serif !important;
  font-size: 11px !important;
  letter-spacing: 0.06em !important;
  padding: 4px 9px !important;
  border-radius: 3px !important;
  white-space: nowrap !important;
  pointer-events: none !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
}
.marker-tooltip::before { display:none !important; }

/* Zoom control — keep inside container, hide bottom bar */
.leaflet-bottom { display:none !important; }
.leaflet-control-zoom { margin:0 !important; border:1px solid var(--border) !important; border-radius:3px !important; overflow:hidden; }
.leaflet-top { z-index:1000 !important; }
.leaflet-bottom { z-index:1000 !important; }
.leaflet-control { z-index:1000 !important; }
.leaflet-top.leaflet-left { top:8px !important; left:8px !important; }
.leaflet-top.leaflet-right { top:8px !important; right:8px !important; }
.leaflet-control-zoom a { background:var(--surface) !important; color:var(--text-dim) !important; border-color:var(--border) !important; font-size:16px !important; line-height:26px !important; width:26px !important; height:26px !important; }
.leaflet-control-zoom a:hover { background:var(--raised) !important; color:var(--gold) !important; }

/* Map container */
.leaflet-container { background:var(--bg) !important; cursor:grab !important; }
.leaflet-container:active { cursor:grabbing !important; }

/* Popups */
.leaflet-popup-content-wrapper { background:rgba(9,14,12,0.97) !important; border:1px solid var(--border) !important; border-radius:4px !important; box-shadow:0 4px 20px rgba(0,0,0,0.8) !important; color:#e8dcc4 !important; padding:0 !important; }
.leaflet-popup-tip-container { display:none !important; }
.leaflet-popup-content { margin:0 !important; min-width:160px !important; max-width:260px !important; }
.popup-inner { padding:12px 14px; }
.popup-name { font-family:'Cinzel',serif; font-size:13px; font-weight:600; color:var(--gold); margin-bottom:3px; }
.popup-type { font-size:10px; color:var(--text-dim); font-family:'Cinzel',serif; letter-spacing:0.06em; margin-bottom:6px; }
.popup-notes { font-size:14px; color:var(--text); line-height:1.6; border-top:1px solid var(--border); padding-top:8px; font-family:'Crimson Pro',serif; }

/* Route tooltips */
.route-tooltip { background:rgba(9,14,12,0.92) !important; border:1px solid var(--border) !important; color:#e8dcc4 !important; font-family:'Cinzel',serif !important; font-size:11px !important; letter-spacing:0.04em !important; padding:5px 10px !important; border-radius:3px !important; box-shadow:0 2px 12px rgba(0,0,0,0.8) !important; white-space:nowrap !important; pointer-events:none !important; }
.route-tooltip::before { display:none !important; }
.route-tooltip strong, .route-tooltip b { color:var(--gold) !important; font-weight:600; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }

/* Annotations */
.annotation-label { background:transparent !important; border:none !important; box-shadow:none !important; }
.annotation-text { font-family:'Cinzel',serif; text-shadow:0 1px 4px rgba(9,14,12,0.95),0 0 10px rgba(9,14,12,0.9); white-space:nowrap; }

/* Loading */
#loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:14px; }
.loading-title { font-family:'Cinzel',serif; font-size:20px; color:var(--gold); letter-spacing:0.15em; text-shadow:0 0 30px rgba(77,204,133,0.2); }
.loading-sub { font-size:14px; color:var(--text-dim); font-style:italic; }
.loading-bar-wrap { width:180px; height:2px; background:var(--border); border-radius:1px; overflow:hidden; }
.loading-bar { height:100%; background:var(--gold-dim); animation:lp 1.2s ease-in-out infinite; }
@keyframes lp { 0%,100%{width:15%} 50%{width:75%} }
#errorMsg { position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:9999; }
.error-title { font-family:'Cinzel',serif; font-size:16px; color:var(--red); letter-spacing:0.1em; }
.error-sub { font-size:14px; color:var(--text-dim); font-style:italic; }

/* Legend */
#downloadBtn { z-index:810; background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:5px 10px; border-radius:3px; cursor:pointer; transition:all 0.15s; display:block; width:auto !important; }
#downloadBtn:hover { border-color:var(--gold-dim); color:var(--gold); } background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:5px 10px; border-radius:3px; cursor:pointer; transition:all 0.15s; display:block; }
#legendToggle:hover { border-color:var(--gold-dim); color:var(--gold); }
.legend-header { padding:12px 14px 8px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; color:var(--text-dim); border-bottom:1px solid var(--border); text-transform:uppercase; }
.legend-body { flex:1; overflow-y:auto; padding:8px 0; }
.legend-body::-webkit-scrollbar { width:5px; }
.legend-body::-webkit-scrollbar-track { background:var(--surface); }
.legend-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.legend-body::-webkit-scrollbar-thumb:hover { background:var(--gold-dim); }
.legend-section { padding:5px 14px 3px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-top:6px; border-top:1px solid var(--border); }
.legend-section:first-child { border-top:none; margin-top:0; }
.legend-item { display:flex; align-items:center; gap:7px; padding:6px 14px; font-size:14px; color:var(--text); cursor:pointer; transition:background 0.1s; font-family:'Crimson Pro',serif; }
.legend-item:hover { background:var(--raised); color:var(--text-hi); }
.legend-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

/* Layer toggles panel */
#layersPanel { position:absolute; left:0; top:0; bottom:0; width:220px; background:var(--surface); border-right:1px solid var(--border); z-index:800; transform:translateX(-100%); transition:transform 0.25s ease; display:flex; flex-direction:column; }
#layersPanel.open { transform:translateX(0); }
#layersToggleBtn { z-index:810; background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:5px 10px; border-radius:3px; cursor:pointer; transition:border-color 0.15s, color 0.15s, background 0.15s; display:block; }
#layersToggleBtn:hover, #layersToggleBtn.open { border-color:var(--gold-dim); color:var(--gold); background:var(--gold-faint); }
.layers-header { padding:12px 14px 8px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; color:var(--text-dim); border-bottom:1px solid var(--border); text-transform:uppercase; }
.layers-body { flex:1; overflow-y:auto; padding:8px 0; }
.layer-toggle-row { display:flex; align-items:center; gap:8px; padding:7px 14px; cursor:pointer; transition:background 0.1s; }
.layer-toggle-row:hover { background:var(--raised); }
.layer-toggle-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
.layer-toggle-name { font-size:13px; color:var(--text); flex:1; font-family:'Crimson Pro',serif; }
.pub-toggle { width:26px; height:14px; background:var(--border); border-radius:7px; position:relative; flex-shrink:0; transition:background 0.2s; }
.pub-toggle::after { content:''; position:absolute; top:2px; left:2px; width:10px; height:10px; background:var(--text-dim); border-radius:5px; transition:all 0.2s; }
.pub-toggle.on { background:var(--gold-dim); }
.pub-toggle.on::after { left:14px; background:var(--gold); }
.layers-section { padding:5px 14px 3px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-top:4px; border-top:1px solid var(--border); }
.layers-section:first-child { border-top:none; margin-top:0; }

/* Measure tool */
#measureBtn { z-index:810; background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:5px 10px; border-radius:3px; cursor:pointer; transition:border-color 0.15s, color 0.15s, background 0.15s; display:block; }
#measureBtn:hover { border-color:var(--gold-dim); color:var(--gold); }
#measureBtn.active { border-color:var(--gold) !important; color:var(--gold) !important; background:var(--gold-faint) !important; opacity:1 !important; }
#measureResult { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:2000; background:var(--surface); border:1px solid var(--gold-dim); border-radius:4px; padding:10px 16px; display:none; align-items:center; gap:16px; box-shadow:0 4px 16px rgba(0,0,0,0.5); pointer-events:all; }
.meas-val { text-align:center; }
.meas-num { font-family:'Cinzel',serif; font-size:16px; color:var(--gold); display:block; }
.meas-unit { font-size:10px; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; }
.meas-sep { width:1px; height:32px; background:var(--border); }
#measureClose { background:transparent; border:none; color:var(--text-dim); font-size:16px; cursor:pointer; padding:0 0 0 8px; line-height:1; }
#measureClose:hover { color:var(--gold); }
#layersPanel { position:absolute; left:0; top:0; bottom:0; width:220px; background:var(--surface); border-right:1px solid var(--border); z-index:1900; transform:translateX(-100%); transition:transform 0.25s ease; display:flex; flex-direction:column; }
#layersPanel.open { transform:translateX(0); }
#legend { position:absolute; right:0; top:0; bottom:0; width:240px; background:var(--surface); border-left:1px solid var(--border); z-index:1900; transform:translateX(100%); transition:transform 0.25s ease; display:flex; flex-direction:column; }
#legend.open { transform:translateX(0); }
#regionsToggleBtn { z-index:810; background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.1em; padding:5px 10px; border-radius:3px; cursor:pointer; transition:border-color 0.15s, color 0.15s, background 0.15s; display:block; width:auto !important; }
#regionsToggleBtn:hover, #regionsToggleBtn.open { border-color:var(--gold-dim); color:var(--gold); background:var(--gold-faint); }
#regionsPanel { position:absolute; left:0; top:0; bottom:0; width:220px; background:var(--surface); border-right:1px solid var(--border); z-index:1800; transform:translateX(-100%); transition:transform 0.25s ease; display:flex; flex-direction:column; }
#regionsPanel.open { transform:translateX(0); }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-title">⚔ DORENIA</div>
  <div class="loading-sub">Loading map…</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>
<div id="errorMsg">
  <div class="error-title">Map data unavailable</div>
  <div class="error-sub">Could not load map-data.json from the repository.</div>
</div>

<div id="app" style="display:none">
  <div id="header">
    <span class="header-title">⚔ DORENIA</span>
    <div class="header-sep"></div>
    <span id="mapLabel">—</span>
    <div class="header-spacer"></div>
    <span id="loadStatus"></span>
  </div>
  <div id="map-wrap">
    <div id="map"></div>
    <!-- Panels slide in from sides -->
    <div id="layersPanel">
      <div class="layers-header">Layers</div>
      <div class="layers-body" id="layersBody"></div>
    </div>
    <div id="legend">
      <div class="legend-header">Locations</div>
      <div class="legend-body" id="legendBody"></div>
    </div>
    <!-- Floating controls overlay - above everything -->
    <div id="mapControls">
      <div id="controlsLeft">
        <button id="layersToggleBtn">LAYERS ▸</button>
        <button id="measureBtn">⟷ MEASURE</button>
        <button id="regionsToggleBtn">⚔ POLITICAL MODE</button>
        <div id="measureHint" style="display:none;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.08em;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:4px 8px;pointer-events:none;white-space:nowrap;">Click to place · Enter or Right-click to finish · Esc to cancel</div>
      </div>
      <div id="controlsRight">
        <button id="legendToggle">LOCATIONS ▸</button>
      </div>
    </div>
    <div id="regionsPanel">
      <div class="layers-header">Regions</div>
      <div class="layers-body" id="regionsBody"></div>
    </div>
    <div id="measureResult">
      <div class="meas-val"><span class="meas-num" id="measHex">—</span><span class="meas-unit">Hexes</span></div>
      <div class="meas-sep"></div>
      <div class="meas-val"><span class="meas-num" id="measMi">—</span><span class="meas-unit">Miles</span></div>
      <div class="meas-sep"></div>
      <div class="meas-val"><span class="meas-num" id="measKm">—</span><span class="meas-unit">km</span></div>
      <div class="meas-sep"></div>
      <div class="meas-val" style="flex-direction:column;align-items:center;gap:2px">
        <select id="measSpeedSelect" style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.06em;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);border-radius:2px;padding:2px 4px;cursor:pointer;text-align:center">
          <optgroup label="— Land —" style="font-family:'Cinzel',serif">
            <option value="walk">🚶 Walking</option>
            <option value="carriage">🐴 Carriage</option>
          </optgroup>
          <optgroup label="— Waterborne —" style="font-family:'Cinzel',serif">
            <option value="rowboat">🚣 Rowboat (1.5mph)</option>
            <option value="keelboat">⚓ Keelboat (1mph)</option>
            <option value="sailing">⛵ Sailing Ship (2mph)</option>
            <option value="warship">⚔ Warship (2.5mph)</option>
            <option value="longship">🛶 Longship (3mph)</option>
            <option value="galley">🚢 Galley (4mph)</option>
          </optgroup>
          <optgroup label="— Airborne —" style="font-family:'Cinzel',serif">
            <option value="airship">✦ Airship (8mph)</option>
          </optgroup>
        </select>
        <span class="meas-num" id="measTravel" style="font-size:13px">—</span>
        <span class="meas-unit" id="measTravelUnit" style="font-size:8px;letter-spacing:0.08em;">Walking</span>
      </div>
      <button id="measureClose" title="Clear">✕</button>
    </div>
  </div>
</div>

<script>
const GH_BASE = 'https://raw.githubusercontent.com/dewwwwwws-stack/dnd-aeloria-wiki/main/';
const MAP_PARAM = new URLSearchParams(window.location.search).get('map') || 'dorenia';
const GH_FILE_MAP = {
  dorenia: 'map-data.json',
  aeloria: 'map-data-aeloria.json'
};
const DATA_URL = GH_BASE + (GH_FILE_MAP[MAP_PARAM] || 'map-data-' + MAP_PARAM + '.json');
const CACHE_BUST = '?t=' + Math.floor(Date.now() / 30000);
const DASH_MAP = { solid: null, dashed: '8,5', dotted: '2,5' };

let map, data;
let layerGroups = {};
let layerVis = {};
let measureMode = false, measPoints = [], measLayers = [], measMouseLine = null;
let H = 4000;
function toLL(p) { return [p.lat, p.lng]; }

// ── Loader ────────────────────────────────────────────
(function(){
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload = loadMapData;
  s.onerror = function(){
    var s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js';
    s2.onload = loadMapData;
    s2.onerror = function(){ showError('Could not load Leaflet.'); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
})();

function loadMapData() {
  fetch(DATA_URL + CACHE_BUST)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(d => { data = d; initViewer(); })
    .catch(e => showError('Could not fetch map-data.json: ' + e.message));
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('errorMsg');
  el.style.display = 'flex';
  el.querySelector('.error-sub').textContent = msg;
}

// ── Init ──────────────────────────────────────────────
function initViewer() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const md = data.mapMeta;
  document.getElementById('mapLabel').textContent = md.label;
  document.title = 'Dorenia \u2014 ' + md.label;
  document.getElementById('loadStatus').textContent =
    'Updated ' + new Date(data.publishedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  H = md.h;

  // Use CSS 100% sizing — no manual pixel calculation needed
  // The #map CSS is already width:100% height:100%

  map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -4, maxZoom: 3,
    zoomSnap: 0.1, zoomDelta: 0.5,
    attributionControl: false, zoomControl: false,
    zoomAnimation: false, fadeAnimation: false, markerZoomAnimation: false
  });

  const bounds = [[0,0],[md.h, md.w]];
  L.imageOverlay(md.githubUrl, bounds).addTo(map);

  function fitWidth() {
    map.invalidateSize({animate:false});
    const s = map.getSize();
    if (s.x > 0) {
      const z = Math.log2(s.x / md.w);
      map.setView([md.h / 2, md.w / 2], z, {animate:false});
    }
  }

  fitWidth();
  setTimeout(fitWidth, 100);
  setTimeout(fitWidth, 500);
  window.addEventListener('resize', fitWidth);

  map.once('moveend', function() {
  Object.keys(data.markerCats||{}).forEach(k => {
    layerVis['m_'+k] = (data.layerVisibility?.[k]) !== false;
  });
  Object.keys(data.routeCats||{}).forEach(k => {
    layerVis['r_'+k] = (data.layerVisibility?.['route_'+k]) !== false;
  });
    renderRoutes();
    renderMarkers();
    renderAnnotations();
    regionLayerGroup = L.layerGroup();
    // Create region pane: above overlay (z400) but below markers (z600)
    if (!map.getPane('regionPane')) {
      map.createPane('regionPane');
      map.getPane('regionPane').style.zIndex = 450;
      map.getPane('regionPane').style.pointerEvents = 'none';
    }
    // Create regionHit pane: above SVG flags (z450) to receive clicks
    if (!map.getPane('regionHitPane')) {
      map.createPane('regionHitPane');
      map.getPane('regionHitPane').style.zIndex = 455;
    }
    renderRegions();
    buildLegend();
    buildLayersPanel();
    initMeasure();
    map.on('click', onMapClick);
    map.on('mousemove', onMapMouseMove);
    map.on('contextmenu', onMapRightClick);
  });

}

// ── Render layers ─────────────────────────────────────
function renderMarkers() {
  const cats = data.markerCats || {};
  layerGroups.markers = {};
  Object.keys(cats).forEach(cat => {
    const grp = L.layerGroup();
    if (layerVis['m_'+cat] !== false) grp.addTo(map);
    layerGroups.markers[cat] = grp;
  });
  (data.markers||[]).forEach(m => {
    const cat = cats[m.cat] || {label:m.cat, color:'#4dcc85', shape:'circle'};
    const icon = makeIcon(cat);
    let markerPopup = `<div class="popup-inner"><div class="popup-name">${esc(m.name)}</div><div class="popup-type" style="color:${cat.color}">${esc(cat.label)}</div>${m.notes?`<div class="popup-notes">${esc(m.notes)}</div>`:''}</div>`;
    markerPopup += wikiLinkHtmlPub(m.wikiLink, m.name);
    const lm = L.marker(toLL(m),{icon,title:m.name})
      .bindTooltip(esc(m.name), {
        className: 'marker-tooltip',
        direction: 'top',
        offset: [0, -14],
        sticky: false,
        permanent: false
      })
      .bindPopup(markerPopup, {maxWidth:260});
    const grp = layerGroups.markers[m.cat];
    if (grp) grp.addLayer(lm); else lm.addTo(map);
  });
}

function renderRoutes() {
  const cats = data.routeCats || {};
  layerGroups.routes = {};
  Object.keys(cats).forEach(cat => {
    const grp = L.layerGroup();
    if (layerVis['r_'+cat] !== false) grp.addTo(map);
    layerGroups.routes[cat] = grp;
  });
  (data.routes||[]).forEach(r => {
    const rc = cats[r.cat] || {label:r.cat, color:'#4dcc85', dash:'solid'};
    const dashVal = DASH_MAP[rc.dash] !== undefined ? DASH_MAP[rc.dash] : null;
    const pts = r.points.map(p => toLL(p));
    const line = L.polyline(pts, {color:rc.color, weight:2.5, dashArray:dashVal, opacity:0.85, interactive:false});

    let tt = `<strong>${esc(r.name)}</strong><br><span style="color:${rc.color}">${esc(rc.label)}</span>`;
    if (r.dist) tt += `<br><span style="color:var(--text-dim);font-size:11px">${r.dist.hexes} hex · ${r.dist.miles} mi · ${r.dist.km} km</span>`;

    let popupHtml = `<div class="popup-inner">
      <div class="popup-name">${esc(r.name)}</div>
      <div class="popup-type" style="color:${rc.color}">${esc(rc.label)}</div>`;
    if (r.dist) popupHtml += `<div style="font-size:12px;color:var(--text-dim);margin-top:4px">${r.dist.hexes} hex · ${r.dist.miles} mi · ${r.dist.km} km</div>`;
    if (r.notes) popupHtml += `<div class="popup-notes">${esc(r.notes)}</div>`;
    popupHtml += '</div>';
    popupHtml += wikiLinkHtmlPub(r.wikiLink, r.name);

    const hitLine = L.polyline(pts, {
      color: 'transparent',
      weight: 20,
      opacity: 0.001, // near-zero but not zero — zero opacity can disable events in some browsers
      interactive: true,
      bubblingMouseEvents: false
    });
    hitLine.bindTooltip(tt, {className:'route-tooltip', sticky:true, direction:'top'});
    hitLine.bindPopup(popupHtml, {maxWidth:260});

    const grp = layerGroups.routes[r.cat];
    if (grp) { grp.addLayer(line); grp.addLayer(hitLine); }
    else { line.addTo(map); hitLine.addTo(map); }
  });
}

function renderAnnotations() {
  (data.annotations||[]).forEach(a => {
    const icon = L.divIcon({
      html:`<div class="annotation-text" style="font-size:${a.size}px;color:${a.color}">${esc(a.text)}</div>`,
      className:'annotation-label', iconAnchor:[0,0]
    });
    L.marker(toLL(a),{icon,interactive:false}).addTo(map);
  });
}

function layerRouteIcon(def) {
  const dashAttr = { solid: '', dashed: 'stroke-dasharray="6,3"', dotted: 'stroke-dasharray="2,3"' }[def.dash] || '';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="14" viewBox="0 0 24 14" style="flex-shrink:0">
    <path d="M2 12 L8 4 L14 9 L22 2" fill="none" stroke="${def.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${dashAttr}/>
  </svg>`;
}

function buildLayersPanel() {
  const cats = data.markerCats || {};
  const rcats = data.routeCats || {};
  let html = '';
  if (Object.keys(cats).length) {
    html += `<div class="layers-section">Markers</div>`;
    html += Object.entries(cats).map(([cat,def]) =>
      `<div class="layer-toggle-row" onclick="togglePubLayer('m_${cat}','${cat}','marker')">
        ${layerMarkerIcon(def)}
        <span class="layer-toggle-name">${esc(def.label)}</span>
        <div class="pub-toggle ${layerVis['m_'+cat]!==false?'on':''}" id="ptog_m_${cat}"></div>
      </div>`
    ).join('');
  }
  if (Object.keys(rcats).length) {
    html += `<div class="layers-section">Routes</div>`;
    html += Object.entries(rcats).map(([cat,def]) =>
      `<div class="layer-toggle-row" onclick="togglePubLayer('r_${cat}','${cat}','route')">
        ${layerRouteIcon(def)}
        <span class="layer-toggle-name">${esc(def.label)}</span>
        <div class="pub-toggle ${layerVis['r_'+cat]!==false?'on':''}" id="ptog_r_${cat}"></div>
      </div>`
    ).join('');
  }
  document.getElementById('layersBody').innerHTML = html ||
    '<div style="padding:12px 14px;font-size:12px;color:var(--text-dim);font-style:italic">No layers</div>';
}

window.togglePubLayer = function(visKey, cat, kind) {
  layerVis[visKey] = !layerVis[visKey];
  const tog = document.getElementById('ptog_' + visKey);
  if (tog) tog.classList.toggle('on', layerVis[visKey]);
  const grp = kind === 'marker' ? layerGroups.markers?.[cat] : layerGroups.routes?.[cat];
  if (grp) {
    if (layerVis[visKey]) { if (!map.hasLayer(grp)) map.addLayer(grp); }
    else { if (map.hasLayer(grp)) map.removeLayer(grp); }
  }
  buildLegend();
};

let layersOpen = false;
document.getElementById('layersToggleBtn').addEventListener('click', () => {
  layersOpen = !layersOpen;
  document.getElementById('layersPanel').classList.toggle('open', layersOpen);
  document.getElementById('layersToggleBtn').classList.toggle('open', layersOpen);
  document.getElementById('layersToggleBtn').textContent = layersOpen ? 'LAYERS \u2715' : 'LAYERS \u25b8';
});

// ── Legend ────────────────────────────────────────────
function buildLegend() {
  const cats = data.markerCats || {};
  const markers = (data.markers||[]).filter(m => layerVis['m_' + m.cat] !== false);
  if (!markers.length) {
    document.getElementById('legendBody').innerHTML =
      '<div style="padding:12px 14px;font-size:12px;color:var(--text-dim);font-style:italic">No visible markers</div>';
    return;
  }
  const grouped = {};
  markers.forEach(m => { (grouped[m.cat]=grouped[m.cat]||[]).push(m); });
  document.getElementById('legendBody').innerHTML = Object.entries(grouped).map(([cat,ms]) => {
    const def = cats[cat] || {label:cat, color:'#4dcc85'};
    return `<div class="legend-section">${esc(def.label)}</div>` +
      ms.map(m => `<div class="legend-item" onclick="flyTo(${m.lat},${m.lng})">
        <div class="legend-dot" style="background:${def.color}"></div>${esc(m.name)}
      </div>`).join('');
  }).join('');
}

window.flyTo = function(lat,lng) {
  map.flyTo([lat, lng], 1, {duration:0.6, animate:true});
  if (window.innerWidth < 600) toggleLegend();
};

let legendOpen = false;
function toggleLegend() {
  legendOpen = !legendOpen;
  document.getElementById('legend').classList.toggle('open', legendOpen);
  document.getElementById('legendToggle').textContent = legendOpen ? 'LOCATIONS \u2715' : 'LOCATIONS \u25b8';
}
document.getElementById('legendToggle').addEventListener('click', toggleLegend);

// ── Measure tool ──────────────────────────────────────
function initMeasure() {
  document.getElementById('measureBtn').addEventListener('click', () => {
    if (measureMode) {
      // If already measuring, finish if we have points, else cancel
      if (measPoints.length >= 2) finishMeasure();
      else {
        clearMeasure();
        measureMode = false;
        document.getElementById('measureBtn').classList.remove('active');
        document.getElementById('measureBtn').textContent = '\u27f7 MEASURE';
      }
    } else {
      clearMeasure();
      measureMode = true;
      document.getElementById('measureBtn').classList.add('active');
      document.getElementById('measureBtn').textContent = '\u23ce FINISH MEASURE';
      document.getElementById('measureHint').style.display = 'block';
    }
  });
  document.getElementById('measureClose').addEventListener('click', () => {
    clearMeasure();
    measureMode = false;
    document.getElementById('measureBtn').classList.remove('active');
    document.getElementById('measureBtn').textContent = '\u27f7 MEASURE';
    document.getElementById('measureHint').style.display = 'none';
  });
}

function clearMeasure() {
  measPoints = [];
  measLayers.forEach(l => map.removeLayer(l));
  measLayers = [];
  if (measMouseLine) { map.removeLayer(measMouseLine); measMouseLine = null; }
  document.getElementById('measureResult').style.display = 'none';
}

function makeMeasureWaypoint(latlng, index) {
  const icon = L.divIcon({
    html: `<div style="
      width:22px;height:22px;border-radius:50%;
      background:#1a1a2e;border:2px solid #ffffff;
      display:flex;align-items:center;justify-content:center;
      font-family:'Cinzel',serif;font-size:9px;color:#ffffff;
      box-shadow:0 0 8px rgba(255,255,255,0.6),0 2px 6px rgba(0,0,0,0.8);
      transform:translate(-11px,-11px);
    ">${index + 1}</div>`,
    className: '',
    iconSize: [0, 0],
    iconAnchor: [0, 0]
  });
  return L.marker(latlng, { icon, interactive: false, zIndexOffset: 1000 });
}

function calcMeasureDist(pts) {
  const cal = data.calibration;
  if (!cal || !cal.pixPerHex || pts.length < 2) return null;
  let px = 0;
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i-1], b = pts[i];
    px += Math.sqrt((b.lat - a.lat)**2 + (b.lng - a.lng)**2);
  }
  const hexes = px / cal.pixPerHex;
  return { hexes: +hexes.toFixed(1), miles: +(hexes*3).toFixed(1), km: +(hexes*5).toFixed(1) };
}

// 2024 PHB travel speeds — land uses 8hr day, water/air travel 24hr
const TRAVEL_SPEEDS = {
  walk:     { label:'Walking',      milesPerDay: 24,   hoursPerDay: 8  },
  carriage: { label:'Carriage',     milesPerDay: 36,   hoursPerDay: 12 },
  // Waterborne (continuous travel, 24hr day)
  rowboat:  { label:'Rowboat',      milesPerDay: 36,   hoursPerDay: 24 }, // 1.5mph
  keelboat: { label:'Keelboat',     milesPerDay: 24,   hoursPerDay: 24 }, // 1mph
  sailing:  { label:'Sailing Ship', milesPerDay: 48,   hoursPerDay: 24 }, // 2mph
  warship:  { label:'Warship',      milesPerDay: 60,   hoursPerDay: 24 }, // 2.5mph
  longship: { label:'Longship',     milesPerDay: 72,   hoursPerDay: 24 }, // 3mph
  galley:   { label:'Galley',       milesPerDay: 96,   hoursPerDay: 24 }, // 4mph
  // Airborne (continuous travel, 24hr day)
  airship:  { label:'Airship',      milesPerDay: 144,  hoursPerDay: 24 }, // ~6mph
};

function calcTravelTime(miles) {
  const key = document.getElementById('measSpeedSelect').value || 'walk';
  const s = TRAVEL_SPEEDS[key] || TRAVEL_SPEEDS.walk;
  const totalDays = miles / s.milesPerDay;
  const days  = Math.floor(totalDays);
  const hours = Math.round((totalDays - days) * s.hoursPerDay);
  let text = '';
  if (days === 0 && hours === 0) text = '< 1h';
  else if (days === 0) text = `${hours}h`;
  else if (hours === 0) text = `${days}d`;
  else text = `${days}d ${hours}h`;
  return { text, unit: s.label };
}

function updateMeasureResult() {
  const dist = calcMeasureDist(measPoints);
  if (!dist) { document.getElementById('measureResult').style.display = 'none'; return; }
  document.getElementById('measHex').textContent = dist.hexes;
  document.getElementById('measMi').textContent  = dist.miles;
  document.getElementById('measKm').textContent  = dist.km;
  const travel = calcTravelTime(parseFloat(dist.miles));
  document.getElementById('measTravel').textContent     = travel.text;
  document.getElementById('measTravelUnit').textContent = travel.unit;
  document.getElementById('measureResult').style.display = 'flex';
}

document.getElementById('measSpeedSelect').addEventListener('change', updateMeasureResult);

function onMapClick(e) {
  if (!measureMode) return;
  const pt = e.latlng; // already in Leaflet coords, store directly
  measPoints.push(pt);

  // Place numbered waypoint marker
  const wm = makeMeasureWaypoint(pt, measPoints.length - 1);
  wm.addTo(map);
  measLayers.push(wm);

  // Draw segment from previous point
  if (measPoints.length >= 2) {
    if (measMouseLine) { map.removeLayer(measMouseLine); measMouseLine = null; }
    const prev = measPoints[measPoints.length - 2];
    const seg = L.polyline([prev, pt], {
      color: '#ffffff', weight: 2.5, opacity: 0.9, interactive: false
    }).addTo(map);
    measLayers.push(seg);
  }

  updateMeasureResult();
}

function onMapMouseMove(e) {
  if (!measureMode || measPoints.length === 0) return;
  if (measMouseLine) map.removeLayer(measMouseLine);
  const last = measPoints[measPoints.length - 1];
  measMouseLine = L.polyline([last, e.latlng], {
    color: '#ffffff', weight: 1.5, dashArray: '5,5', opacity: 0.5, interactive: false
  }).addTo(map);
}

function onMapRightClick(e) {
  if (!measureMode) return;
  L.DomEvent.stop(e);
  finishMeasure();
}

function finishMeasure() {
  if (measMouseLine) { map.removeLayer(measMouseLine); measMouseLine = null; }
  measureMode = false;
  document.getElementById('measureBtn').classList.remove('active');
  document.getElementById('measureBtn').textContent = '\u27f7 MEASURE';
  document.getElementById('measureHint').style.display = 'none';
  updateMeasureResult();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && measureMode && measPoints.length >= 2) finishMeasure();
  if (e.key === 'Escape' && measureMode) {
    clearMeasure();
    measureMode = false;
    document.getElementById('measureBtn').classList.remove('active');
    document.getElementById('measureBtn').textContent = '\u27f7 MEASURE';
    document.getElementById('measureHint').style.display = 'none';
  }
});

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function wikiLinkHtmlPub(url, fallbackName) {
  if (!url) return '';
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/').filter(Boolean);
    const label = decodeURIComponent(parts[parts.length-1] || fallbackName || 'Read more').replace(/-/g,' ');
    // Use id-based click handler to avoid inline JS escaping issues
    const id = 'wl_' + Math.random().toString(36).slice(2,8);
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('click', function(e) {
        e.stopPropagation();
        e.preventDefault();
        try { window.top.location.href = url; } catch(err) {
          window.open(url, '_blank');
        }
      });
    }, 50);
    return `<div class="popup-wiki">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--gold-dim);flex-shrink:0"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      <a id="${id}" href="${esc(url)}" style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.06em;color:var(--gold);text-decoration:none;border-bottom:1px solid var(--gold-dim);cursor:pointer;">${esc(label)}</a>
    </div>`;
  } catch(e) { return ''; }
}

// ── Regions ───────────────────────────────────────────
let regionsVisible = false;
let regionLayerGroup = null;
let politicalMode = false;
let regionSvgOverlays = []; // track SVG overlays for cleanup

function latLngToSvgPct(latlng, bounds) {
  const ne = bounds.getNorthEast(), sw = bounds.getSouthWest();
  const x = (latlng.lng - sw.lng) / (ne.lng - sw.lng) * 100;
  const y = (ne.lat - latlng.lat) / (ne.lat - sw.lat) * 100;
  return [x, y];
}

function renderRegions() {
  regionLayerGroup.clearLayers();
  regionSvgOverlays.forEach(o => {
    if (o.svg && o.svg.parentNode) o.svg.parentNode.removeChild(o.svg);
    if (o.reposition) map.off('zoomend moveend', o.reposition);
  });
  regionSvgOverlays = [];

  (data.regions||[]).forEach(r => {
    const pts = r.points.map(p => toLL(p));
    const color = r.color || '#7c3aed';

    const polygon = L.polygon(pts, {
      color, weight:2.5, opacity:0.9,
      fillColor:color, fillOpacity:0.35,
      interactive:true, bubblingMouseEvents:false
    });
    polygon.on('add', function() {
      const el = polygon.getElement();
      if (el) el.querySelectorAll('path').forEach(p => { p.style.pointerEvents = 'stroke'; });
    });

    const tt = '<strong>' + esc(r.name) + '</strong>' + (r.faction ? '<br><span style="color:' + color + '">' + esc(r.faction) + '</span>' : '');
    polygon.bindTooltip(tt, {className:'route-tooltip', sticky:true});

    let popupHtml = '<div class="popup-inner"><div class="popup-name">' + esc(r.name) + '</div>';
    if (r.faction) popupHtml += '<div class="popup-type" style="color:' + color + '">' + esc(r.faction) + '</div>';
    popupHtml += '</div>';
    popupHtml += wikiLinkHtmlPub(r.wikiLink, r.name);
    if (r.flag) popupHtml += '<div style="padding:8px 14px"><img src="' + esc(r.flag) + '" style="max-width:100%;max-height:80px;border-radius:3px;border:1px solid var(--border)"></div>';
    polygon.bindPopup(popupHtml, {maxWidth:280});
    regionLayerGroup.addLayer(polygon);

    if (!r.flag) return;

    // SVG overlay: flag clipped to polygon shape, no text labels
    const bounds = polygon.getBounds();
    const ne = bounds.getNorthEast(), sw = bounds.getSouthWest();
    const uid = 'r' + Math.random().toString(36).slice(2,8);
    const VW = 1000, VH = 1000;
    function toVB(ll) {
      const x = (ll[1] - sw.lng) / (ne.lng - sw.lng) * VW;
      const y = (1 - (ll[0] - sw.lat) / (ne.lat - sw.lat)) * VH;
      return x.toFixed(1) + ',' + y.toFixed(1);
    }
    const clipPts = pts.map(ll => toVB(ll)).join(' ');
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('xmlns', ns);
    svg.setAttribute('viewBox', '0 0 ' + VW + ' ' + VH);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.pointerEvents = 'none';
    svg.style.position = 'absolute';
    svg.innerHTML = '<defs><clipPath id="clip_' + uid + '"><polygon points="' + clipPts + '"/></clipPath></defs>' +
      '<image href="' + esc(r.flag) + '" x="0" y="0" width="' + VW + '" height="' + VH + '" preserveAspectRatio="xMidYMid slice" opacity="0.65" clip-path="url(#clip_' + uid + ')" style="pointer-events:none"/>';

    // Track for repositioning on zoom/pan
    const svgData = { svg, bounds, r };

    function positionSvg() {
      const topLeft = map.latLngToLayerPoint(bounds.getNorthWest());
      const bottomRight = map.latLngToLayerPoint(bounds.getSouthEast());
      const w = bottomRight.x - topLeft.x;
      const h = bottomRight.y - topLeft.y;
      svg.style.left = topLeft.x + 'px';
      svg.style.top  = topLeft.y + 'px';
      svg.style.width  = w + 'px';
      svg.style.height = h + 'px';
    }

    map.getPanes().tilePane.appendChild(svg);
    positionSvg();
    svg.style.display = 'none'; // hidden until political mode activated
    svgData.reposition = positionSvg;
    map.on('zoomend moveend', positionSvg);
    regionSvgOverlays.push(svgData);
  });
  buildRegionsPanel();
}

function buildRegionsPanel() {
  const regions = data.regions||[];
  document.getElementById('regionsBody').innerHTML = regions.length
    ? regions.map(r=>`<div class="layer-toggle-row" style="cursor:default">
        <div style="width:12px;height:12px;border-radius:2px;background:${r.color||'#7c3aed'};flex-shrink:0"></div>
        <span class="layer-toggle-name">${esc(r.name)}</span>
        ${r.faction?`<span style="font-size:11px;color:var(--text-dim)">${esc(r.faction)}</span>`:''}
      </div>`).join('')
    : '<div style="padding:12px 14px;font-size:12px;color:var(--text-dim);font-style:italic">No regions published</div>';
}

document.getElementById('regionsToggleBtn').addEventListener('click', () => {
  politicalMode = !politicalMode;
  document.getElementById('regionsToggleBtn').classList.toggle('open', politicalMode);
  document.getElementById('regionsToggleBtn').textContent = politicalMode ? '\u2694 POLITICAL MODE \u2715' : '\u2694 POLITICAL MODE';
  if (politicalMode) {
    if (!map.hasLayer(regionLayerGroup)) regionLayerGroup.addTo(map);
    regionSvgOverlays.forEach(d => { d.svg.style.display = ''; d.reposition(); });
  } else {
    if (map.hasLayer(regionLayerGroup)) map.removeLayer(regionLayerGroup);
    regionSvgOverlays.forEach(d => { d.svg.style.display = 'none'; });
  }
});
</script>
