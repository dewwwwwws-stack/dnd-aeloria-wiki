ature, and wind. It takes 1d4 × 10 minutes for the new conditions to take effect. Once they do so, you can change the conditions again. When the spell ends, the weather gradually returns to normal.\n\nWhen you change the weather conditions, find a current condition on the following tables and change its stage by one, up or down. When changing the wind, you can change its direction.\n\nPrecipitationStageCondition1Clear2Light clouds3Overcast or ground fog4Rain, hail, or snow5Torrential rain, driving hail, or blizzardTemperatureStageCondition1Heat wave2Hot3Warm4Cool5Cold6FreezingWindStageCondition1Calm2Moderate wind3Strong wind4Gale5Storm", "higher": "", "color": "#40e890"}, {"name": "Control Winds", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "152", "classes": "", "notation": "Tr:1 > Co:2 > Ab:3 > Di:4 > Ev:5 > En:1 > Tr:4", "tags": "aoe, barrier, concentration, damage, movement, reveal", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "300 feet", "components": "V, S", "description": "You take control of the air in a 100-foot cube that you can see within range. Choose one of the following effects when you cast the spell. The effect lasts for the spell's duration, unless you use your action on a later turn to switch to a different effect. You can also use your action to temporarily halt the effect or to restart one you've halted.\n\nGusts. A wind picks up within the cube, continually blowing in a horizontal direction you designate. You choose the intensity of the wind: calm, moderate, or strong. If the wind is moderate or strong, ranged weapon attacks that pass through it or that are made against targets within the cube have disadvantage on their attack rolls. If the wind is strong, any creature moving against the wind must spend 1 extra foot of movement for each foot moved.\n\nDowndraft. You cause a sustained blast of strong wind to blow downward from the top of the cube. Ranged weapon attacks that pass through the cube or that are made against targets within it have disadvantage on their attack rolls. A creature must make a Strength saving throw if it flies into the cube for the first time on a turn or starts its turn there flying. On a failed save, the creature is knocked prone.\n\nUpdraft. You cause a sustained updraft within the cube, rising upward from the cube's bottom side. Creatures that end a fall within the cube take only half damage from the fall. When a creature in the cube makes a vertical jump, the creature can jump up to 10 feet higher than normal.", "higher": "", "color": "#40e890"}, {"name": "Cordon of Arrows", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "258", "classes": "Ranger", "notation": "Tr:3 > Ev:2 > En:3 > Tr:5", "tags": "damage, single_target", "duration": "8 hours", "cast_time": "Action", "range": "Touch", "components": "V, S, M (four or more arrows or bolts)", "description": "You touch up to four nonmagical Arrows or Bolts and plant them in the ground in your space. Until the spell ends, the ammunition can't be physically uprooted, and whenever a creature other than you enters a space within 30 feet of the ammunition for the first time on a turn or ends its turn there, one piece of ammunition flies up to strike it. The creature must succeed on a Dexterity saving throw or take 2d4 Piercing damage. The piece of ammunition is then destroyed. The spell ends when none of the ammunition remains planted in the ground.\n\nWhen you cast this spell, you can designate any creatures you choose, and the spell ignores them.", "higher": "Using a Higher-Level Spell Slot. The amount of ammunition that can be affected increases by two for each spell slot level above 2.", "color": "#40e890"}, {"name": "Counterspell", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "258", "classes": "Sorcerer, Warlock, Wizard", "notation": "Ab:4 > En:2 > Di:3 > Ev:4 > Ab:5", "tags": "single_target", "duration": "Instantaneous", "cast_time": "Reaction", "range": "60 feet", "components": "S", "description": "You attempt to interrupt a creature in the process of casting a spell. The creature makes a Constitution saving throw. On a failed save, the spell dissipates with no effect, and the action, Bonus Action, or Reaction used to cast it is wasted. If that spell was cast with a spell slot, the slot isn't expended.", "higher": "", "color": "#40c8e0"}, {"name": "Create Bonfire", "level": "Cantrip", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "152", "classes": "", "notation": "Co:1 > Co:2", "tags": "aoe, concentration, damage, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You create a bonfire on ground that you can see within range. Until the spell ends, the magic bonfire fills a 5-foot cube. Any creature in the bonfire's space when you cast the spell must succeed on a Dexterity saving throw or take 1d8 fire damage. A creature must also make the saving throw when it moves into the bonfire's space for the first time on a turn or ends its turn there.\n\nThe bonfire ignites flammable objects in its area that aren't being worn or carried.\n\nThe spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).", "higher": "", "color": "#e8a040"}, {"name": "Create Food and Water", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "258", "classes": "Artificer, Cleric, Paladin, Tamer", "notation": "Co:4 > Tr:2 > Ev:3 > Di:4 > Co:5", "tags": "summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You create 45 pounds of food and 30 gallons of fresh water on the ground or in containers within range—both useful in fending off the hazards of malnutrition and dehydration. The food is bland but nourishing and looks like a food of your choice, and the water is clean. The food spoils after 24 hours if uneaten.", "higher": "", "color": "#e8a040"}, {"name": "Create Homunculus", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "152", "classes": "", "notation": "Tr:2 > Il:2 > Ev:3 > Ab:4 > Co:5 > Di:1 > En:2 > Tr:1", "tags": "alter_form, damage, healing, movement", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (clay, ash, and mandrake root, all of which the spell consumes, and a jewel-encrusted dagger worth at least 1,000 gp)", "description": "While speaking an intricate incantation, you cut yourself with a jewel-encrusted dagger, taking 2d4 piercing damage that can't be reduced in any way. You then drip your blood on the spell's other components and touch them, transforming them into a special construct called a homunculus.\n\nThe statistics of the homunculus are in the Monster Manual. It is your faithful companion, and it dies if you die. Whenever you finish a long rest, you can spend up to half your Hit Dice if the homunculus is on the same plane of existence as you. When you do so, roll each die and add your Constitution modifier to it. Your hit point maximum is reduced by the total, and the homunculus's hit point maximum and current hit points are both increased by it. This process can reduce you to no lower than 1 hit point, and the change to your and the homunculus's hit points ends when you finish your next long rest. The reduction to your hit point maximum can't be removed by any means before then, except by the homunculus's death.\n\nYou can have only one homunculus at a time. If you cast this spell while your homunculus lives, the spell fails.", "higher": "", "color": "#40e890"}, {"name": "Create Spelljamming Helm", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "AAG", "page": "22", "classes": "Artificer, Wizard", "notation": "Tr:1 > Il:2 > Co:3 > Ev:4 > Di:5 > Ab:1 > Tr:2", "tags": "alter_form, illusion_tag, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a crystal rod worth at least 5,000 gp, which the spell consumes)", "description": "Holding the rod used in the casting of the spell, you touch a Large or smaller chair that is unoccupied. The rod disappears, and the chair is transformed into a spelljamming helm.", "higher": "", "color": "#40e890"}, {"name": "Create Undead", "level": "Level 6", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "258", "classes": "Apothecary, Cleric, Warlock, Wizard", "notation": "Ne:2 > Di:2 > Tr:3 > Co:4 > Ev:5 > Ab:1 > En:2 > Ne:1", "tags": "movement, reveal, undead", "duration": "Instantaneous", "cast_time": "1 Min.", "range": "10 feet", "components": "V, S, M (one 150+ GP black onyx stone for each corpse)", "description": "You can cast this spell only at night. Choose up to three corpses of Medium or Small Humanoids within range. Each one becomes a Ghoul under your control (see the Monster Manual for its stat block).\n\nAs a Bonus Action on each of your turns, you can mentally command any creature you animated with this spell if the creature is within 120 feet of you (if you control multiple creatures, you can command any of them at the same time, issuing the same command to them). You decide what action the creature will take and where it will move on its next turn, or you can issue a general command, such as to guard a particular place. If you issue no commands, the creature takes the Dodge action and moves only to avoid harm. Once given an order, the creature continues to follow the order until its task is complete.\n\nThe creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature before the current 24-hour period ends. This use of the spell reasserts your control over up to three creatures you have animated with this spell rather than animating new ones.", "higher": "Using a Higher-Level Spell Slot. If you use a level 7 spell slot, you can animate or reassert control over four Ghouls. If you use a level 8 spell slot, you can animate or reassert control over five Ghouls or two Ghasts or Wights. If you use a level 9 spell slot, you can animate or reassert control over six Ghouls, three Ghasts or Wights, or two Mummies. See the Monster Manual for these stat blocks.", "color": "#a0a0a0"}, {"name": "Create or Destroy Water", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "258", "classes": "Apothecary, Cleric, Druid", "notation": "Tr:2 > Il:2 > Tr:3", "tags": "alter_form, aoe, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a mix of water and sand)", "description": "You do one of the following:\n\nCreate Water. You create up to 10 gallons of clean water within range in an open container. Alternatively, the water falls as rain in a 30-foot Cube within range, extinguishing exposed flames there.\n\nDestroy Water. You destroy up to 10 gallons of water in an open container within range. Alternatively, you destroy fog in a 30-foot Cube within range.", "higher": "Using a Higher-Level Spell Slot. You create or destroy 10 additional gallons of water, or the size of the Cube increases by 5 feet, for each spell slot level above 1.", "color": "#40e890"}, {"name": "Creation", "level": "Level 5", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "259", "classes": "Artificer, Sorcerer, Wizard", "notation": "Il:1 > Di:2 > Ev:3 > Co:4 > Tr:5 > Ab:1 > Il:3", "tags": "aoe, reveal, summon", "duration": "Special", "cast_time": "1 Min.", "range": "30 feet", "components": "V, S, M (a paintbrush)", "description": "You pull wisps of shadow material from the Shadowfell to create an object within range. It is either an object of vegetable matter (soft goods, rope, wood, and the like) or mineral matter (stone, crystal, metal, and the like). The object must be no larger than a 5-foot Cube, and the object must be of a form and material that you have seen.\n\nThe spell's duration depends on the object's material, as shown in the Materials table. If the object is composed of multiple materials, use the shortest duration. Using any object created by this spell as another spell's Material component causes the other spell to fail.\n\nMaterialsMaterialDurationVegetable matter24 hoursStone or crystal12 hoursPrecious metals1 hourGems10 minutesAdamantine or mithral1 minute", "higher": "Using a Higher-Level Spell Slot. The Cube increases by 5 feet for each spell slot level above 5.", "color": "#4060e8"}, {"name": "Crown of Madness", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "259", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:3 > Il:2 > Di:3 > En:1", "tags": "concentration, illusion_tag, mind, reveal, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "One creature that you can see within range must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The creature succeeds automatically if it isn't Humanoid.\n\nA spectral crown appears on the Charmed target's head, and it must use its action before moving on each of its turns to make a melee attack against a creature other than itself that you mentally choose. The target can act normally on its turn if you choose no creature or if no creature is within its reach. The target repeats the save at the end of each of its turns, ending the spell on itself on a success.\n\nOn your later turns, you must take the Magic action to maintain control of the target, or the spell ends.", "higher": "", "color": "#c040e8"}, {"name": "Crown of Stars", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "152", "classes": "", "notation": "Ev:3 > Il:2 > Ab:3 > Co:4 > Tr:5 > Di:1 > En:2 > Ne:3 > Ev:4", "tags": "aoe, barrier, damage, illusion_tag, summon", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Seven star-like motes of light appear and orbit your head until the spell ends. You can use a bonus action to send one of the motes streaking toward one creature or object within 120 feet of you. When you do so, make a ranged spell attack. On a hit, the target takes 4d12 radiant damage. Whether you hit or miss, the mote is expended. The spell ends early if you expend the last mote.\n\nIf you have four or more motes remaining, they shed bright light in a 30-foot radius and dim light for an additional 30 feet. If you have one to three motes remaining, they shed dim light in a 30-foot radius.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 8th level or higher, the number of motes created increases by two for each slot level above 7th.", "color": "#e84040"}, {"name": "Crusader's Mantle", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "259", "classes": "Paladin", "notation": "Ev:4 > Tr:2 > Ab:3 > Co:4 > Ev:5", "tags": "concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V", "description": "You radiate a magical aura in a 30-foot Emanation. While in the aura, you and your allies each deal an extra 1d4 Radiant damage when hitting with a weapon or an Unarmed Strike.", "higher": "", "color": "#e84040"}, {"name": "Cure Wounds", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "259", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Paladin, Ranger, Tamer", "notation": "Ab:2 > Co:2 > Ab:1", "tags": "healing", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "A creature you touch regains a number of Hit Points equal to 2d8 plus your spellcasting ability modifier.", "higher": "Using a Higher-Level Spell Slot. The healing increases by 2d8 for each spell slot level above 1.", "color": "#40c8e0"}, {"name": "Dancing Lights", "level": "Cantrip", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "259", "classes": "Artificer, Bard, Psion, Sorcerer, Wizard", "notation": "Il:1 > Il:2", "tags": "alter_form, aoe, concentration, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a bit of phosphorus)", "description": "You create up to four torch-size lights within range, making them appear as torches, lanterns, or glowing orbs that hover for the duration. Alternatively, you combine the four lights into one glowing Medium form that is vaguely humanlike. Whichever form you choose, each light sheds Dim Light in a 10-foot radius.\n\nAs a Bonus Action, you can move the lights up to 60 feet to a space within range. A light must be within 20 feet of another light created by this spell, and a light vanishes if it exceeds the spell's range.", "higher": "", "color": "#4060e8"}, {"name": "Danse Macabre", "level": "Level 5", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "153", "classes": "", "notation": "Ne:1 > Tr:2 > Co:3 > Di:4 > Ev:5 > Ab:1 > Ne:2", "tags": "concentration, damage, movement, reveal, undead", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "Threads of dark power leap from your fingers to pierce up to five Small or Medium corpses you can see within range. Each corpse immediately stands up and becomes undead. You decide whether it is a zombie or a skeleton (the statistics for zombies and skeletons are in the Monster Manual), and it gains a bonus to its attack and damage rolls equal to your spellcasting ability modifier.\n\nYou can use a bonus action to mentally command the creatures you make with this spell, issuing the same command to all of them. To receive the command, a creature must be within 60 feet of you. You decide what action the creatures will take and where they will move during their next turn, or you can issue a general command, such as to guard a chamber or passageway against your foes. If you issue no commands, the creatures do nothing except defend themselves against hostile creatures. Once given an order, the creatures continue to follow it until their task is complete.\n\nThe creatures are under your control until the spell ends, after which they become inanimate once more.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 6th level or higher, you animate up to two additional corpses for each slot level above 5th.", "color": "#a0a0a0"}, {"name": "Dark Star", "level": "Level 8", "school": "Evocation", "ritual": "No", "source": "EGW", "page": "186", "classes": "", "notation": "Ev:4 > Ab:2 > Co:3 > Tr:4 > Di:5 > Il:1 > En:2 > Ne:3 > Ab:4 > Ev:1", "tags": "alter_form, aoe, barrier, concentration, damage, healing, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a shard of onyx and a drop of the caster's blood, both of which the spell consumes)", "description": "This spell creates a sphere centered on a point you choose within range. The sphere can have a radius of up to 40 feet. The area within this sphere is filled with magical darkness and crushing gravitational force.\n\nFor the duration, the spell's area is difficult terrain. A creature with darkvision can't see through the magical darkness, and nonmagical light can't illuminate it. No sound can be created within or pass through the area. Any creature or object entirely inside the sphere is immune to thunder damage, and creatures are deafened while entirely inside it. Casting a spell that includes a verbal component is impossible there.\n\nAny creature that enters the spell's area for the first time on a turn or starts its turn there must make a Constitution saving throw. The creature takes 8d10 force damage on a failed save, or half as much damage on a successful one. A creature reduced to 0 hit points by this damage is disintegrated. A disintegrated creature and everything it is wearing and carrying, except magic items, are reduced to a pile of fine gray dust.", "higher": "", "color": "#e84040"}, {"name": "Darkness", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "260", "classes": "Sorcerer, Warlock, Wizard", "notation": "Ev:3 > Ab:2 > Co:3 > Ev:2", "tags": "alter_form, aoe, barrier, concentration, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, M (bat fur and a piece of coal)", "description": "For the duration, magical Darkness spreads from a point within range and fills a 15-foot-radius Sphere. Darkvision can't see through it, and nonmagical light can't illuminate it.\n\nAlternatively, you cast the spell on an object that isn't being worn or carried, causing the Darkness to fill a 15-foot Emanation originating from that object. Covering that object with something opaque, such as a bowl or helm, blocks the Darkness.\n\nIf any of this spell's area overlaps with an area of Bright Light or Dim Light created by a spell of level 2 or lower, that other spell is dispelled.", "higher": "", "color": "#e84040"}, {"name": "Darkvision", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "260", "classes": "Artificer, Druid, Ranger, Sorcerer, Tamer, Wizard", "notation": "Tr:3 > Co:2 > Ev:3 > Tr:4", "tags": "utility", "duration": "8 hours", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a dried carrot)", "description": "For the duration, a willing creature you touch has Darkvision with a range of 150 feet.", "higher": "", "color": "#40e890"}, {"name": "Dawn", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "153", "classes": "", "notation": "Ev:1 > Il:2 > Co:3 > Tr:4 > Ab:5 > Di:1 > Ev:3", "tags": "aoe, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a sunburst pendant worth at least 100 gp)", "description": "The light of dawn shines down on a location you specify within range. Until the spell ends, a 30-foot-radius, 40-foot-high cylinder of bright light glimmers there. This light is sunlight.\n\nWhen the cylinder appears, each creature in it must make a Constitution saving throw, taking 4d10 radiant damage on a failed save, or half as much damage on a successful one. A creature must also make this saving throw whenever it ends its turn in the cylinder.\n\nIf you're within 60 feet of the cylinder, you can move it up to 60 feet as a bonus action on your turn.", "higher": "", "color": "#e84040"}, {"name": "Daylight", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "260", "classes": "Cleric, Druid, Paladin, Ranger, Sorcerer, Tamer", "notation": "Ev:4 > Tr:2 > Il:3 > Co:4 > Ev:5", "tags": "alter_form, aoe, barrier, summon", "duration": "1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "For the duration, sunlight spreads from a point within range and fills a 60-foot-radius Sphere. The sunlight's area is Bright Light and sheds Dim Light for an additional 60 feet.\n\nAlternatively, you cast the spell on an object that isn't being worn or carried, causing the sunlight to fill a 60-foot Emanation originating from that object. Covering that object with something opaque, such as a bowl or helm, blocks the sunlight.\n\nIf any of this spell's area overlaps with an area of Darkness created by a spell of level 3 or lower, that other spell is dispelled.", "higher": "", "color": "#e84040"}, {"name": "Death Armor", "level": "Level 2", "school": "Necromancy", "ritual": "No", "source": "FRHoF", "page": "143", "classes": "Sorcerer, Wizard", "notation": "Ne:3 > Ev:2 > Tr:3 > Ne:4", "tags": "damage, single_target", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (an onyx worth 50+ GP, which the spell consumes)", "description": "For the duration, an inky aura surrounds one creature you touch. The target has Advantage on Death Saving Throws, and once per turn, when a creature within 5 feet of the target hits it with a melee attack roll, the attacker takes 2d4 Necrotic damage.", "higher": "", "color": "#a0a0a0"}, {"name": "Death Ward", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "261", "classes": "Apothecary, Cleric, Paladin, Tamer", "notation": "Ab:5 > Ev:2 > Tr:3 > Co:4 > Di:5 > Ab:2", "tags": "barrier, damage, healing", "duration": "8 hours", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You touch a creature and grant it a measure of protection from death. The first time the target would drop to 0 Hit Points before the spell ends, the target instead drops to 1 Hit Point, and the spell ends.\n\nIf the spell is still in effect when the target is subjected to an effect that would kill it instantly without dealing damage, that effect is negated against the target, and the spell ends.", "higher": "", "color": "#40c8e0"}, {"name": "Delayed Blast Fireball", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "261", "classes": "Sorcerer, Wizard", "notation": "Ev:3 > Tr:2 > Co:3 > Ab:4 > Di:5 > En:1 > Il:2 > Ne:3 > Ev:5", "tags": "aoe, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a ball of bat guano and sulfur)", "description": "A beam of yellow light flashes from you, then condenses at a chosen point within range as a glowing bead for the duration. When the spell ends, the bead explodes, and each creature in a 20-foot-radius Sphere centered on that point makes a Dexterity saving throw. A creature takes Fire damage equal to the total accumulated damage on a failed save or half as much damage on a successful one.\n\nThe spell's base damage is 12d6, and the damage increases by 1d6 whenever your turn ends and the spell hasn't ended.\n\nIf a creature touches the glowing bead before the spell ends, that creature makes a Dexterity saving throw. On a failed save, the spell ends, causing the bead to explode. On a successful save, the creature can throw the bead up to 40 feet. If the thrown bead enters a creature's space or collides with a solid object, the spell ends, and the bead explodes.\n\nWhen the bead explodes, flammable objects in the explosion that aren't being worn or carried start burning.", "higher": "Using a Higher-Level Spell Slot. The base damage increases by 1d6 for each spell slot level above 7.", "color": "#e84040"}, {"name": "Demiplane", "level": "Level 8", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "261", "classes": "Sorcerer, Warlock, Wizard", "notation": "Co:4 > Di:2 > Tr:3 > Ev:4 > Ab:5 > En:1 > Il:2 > Ne:3 > Di:4 > Co:5", "tags": "reveal, summon", "duration": "1 hour", "cast_time": "Action", "range": "60 feet", "components": "S", "description": "You create a shadowy Medium door on a flat solid surface that you can see within range. This door can be opened and closed, and it leads to a demiplane that is an empty room 30 feet in each dimension, made of wood or stone (your choice).\n\nWhen the spell ends, the door vanishes, and any objects inside the demiplane remain there. Any creatures inside also remain unless they opt to be shunted through the door as it vanishes, landing with the Prone condition in the unoccupied spaces closest to the door's former space.\n\nEach time you cast this spell, you can create a new demiplane or connect the shadowy door to a demiplane you created with a previous casting of this spell. Additionally, if you know the nature and contents of a demiplane created by a casting of this spell by another creature, you can connect the shadowy door to that demiplane instead.", "higher": "", "color": "#e8a040"}, {"name": "Deryan's Helpful Homunculi", "level": "Level 2", "school": "Conjuration", "ritual": "Yes", "source": "FRHoF", "page": "143", "classes": "Cleric, Wizard", "notation": "Co:3 > Il:2 > Tr:3 > Co:1", "tags": "illusion_tag, summon, utility", "duration": "8 hours", "cast_time": "Action", "range": "Self", "components": "V, S, M (powdered gemstones worth 100+ GP, which the spell consumes, and one set of Artisan's Tools with which you have proficiency)", "description": "You summon a group of helpful spirits, which lasts for the duration. The spirits appear as homunculi or as another Construct of your choice but are intangible and invulnerable, and they are considered to have proficiency in the Arcana skill and with the set of Artisan's Tools used in the spell's casting.\n\nIf you are crafting an item, the spirits function as a single assistant for your crafting, halving the crafting time.", "higher": "", "color": "#e8a040"}, {"name": "Destructive Wave", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "261", "classes": "Paladin", "notation": "Ev:1 > Tr:2 > Co:3 > Ab:4 > Di:5 > En:1 > Ev:2", "tags": "aoe, barrier, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V", "description": "Destructive energy ripples outward from you in a 30-foot Emanation. Each creature you choose in the Emanation makes a Constitution saving throw. On a failed save, a target takes 5d6 Thunder damage and 5d6 Radiant or Necrotic damage (your choice) and has the Prone condition. On a successful save, a target takes half as much damage only.", "higher": "", "color": "#e84040"}, {"name": "Detect Evil and Good", "level": "Level 1", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "261", "classes": "Apothecary, Cleric, Paladin", "notation": "Di:2 > Ne:2 > Di:1", "tags": "concentration, reveal, undead", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "For the duration, you sense the location of any Aberration, Celestial, Elemental, Fey, Fiend, or Undead within 30 feet of yourself. You also sense whether the Hallow spell is active there and, if so, where.\n\nThe spell is blocked by 1 foot of stone, dirt, or wood; 1 inch of metal; or a thin sheet of lead.", "higher": "", "color": "#c8e040"}, {"name": "Detect Magic", "level": "Level 1", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "262", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Paladin, Psion, Ranger, Sorcerer, Tamer, Warlock, Wizard", "notation": "Di:2 > Tr:2 > Di:3", "tags": "aoe, concentration, reveal, summon, utility", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "For the duration, you sense the presence of magical effects within 30 feet of yourself. If you sense such effects, you can take the Magic action to see a faint aura around any visible creature or object in the area that bears the magic, and if an effect was created by a spell, you learn the spell's school of magic.\n\nThe spell is blocked by 1 foot of stone, dirt, or wood; 1 inch of metal; or a thin sheet of lead.", "higher": "", "color": "#c8e040"}, {"name": "Detect Poison and Disease", "level": "Level 1", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "262", "classes": "Apothecary, Cleric, Druid, Paladin, Ranger", "notation": "Di:2 > Ev:2 > Di:3", "tags": "concentration, damage, reveal, utility", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (a yew leaf)", "description": "For the duration, you sense the location of poisons, poisonous or venomous creatures, and magical contagions within 30 feet of yourself. You sense the kind of poison, creature, or contagion in each case.\n\nThe spell is blocked by 1 foot of stone, dirt, or wood; 1 inch of metal; or a thin sheet of lead.", "higher": "", "color": "#c8e040"}, {"name": "Detect Thoughts", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "262", "classes": "Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "Di:3 > En:2 > Il:3 > Di:4", "tags": "concentration, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (1 Copper Piece)", "description": "You activate one of the effects below. Until the spell ends, you can activate either effect as a Magic action on your later turns.\n\nSense Thoughts. You sense the presence of thoughts within 30 feet of yourself that belong to creatures that know languages or are telepathic. You don't read the thoughts, but you know that a thinking creature is present.\n\nThe spell is blocked by 1 foot of stone, dirt, or wood; 1 inch of metal; or a thin sheet of lead.\n\nRead Thoughts. Target one creature you can see within 30 feet of yourself or one creature within 30 feet of yourself that you detected with the Sense Thoughts option. You learn what is most on the target's mind right now. If the target doesn't know any languages and isn't telepathic, you learn nothing.\n\nAs a Magic action on your next turn, you can try to probe deeper into the target's mind. If you probe deeper, the target makes a Wisdom saving throw. On a failed save, you discern the target's reasoning, emotions, and something that looms large in its mind (such as a worry, love, or hate). On a successful save, the spell ends. Either way, the target knows that you are probing into its mind, and until you shift your attention away from the target's mind, the target can take an action on its turn to make an Intelligence (Arcana) check against your spell save DC, ending the spell on a success.", "higher": "", "color": "#c8e040"}, {"name": "Dimension Door", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "262", "classes": "Bard, Psion, Sorcerer, Tamer, Warlock, Wizard", "notation": "Co:5 > Di:2 > Ev:3 > Tr:4 > Ab:5 > Co:2", "tags": "barrier, damage, movement, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "500 feet", "components": "V", "description": "You teleport to a location within range. You arrive at exactly the spot desired. It can be a place you can see, one you can visualize, or one you can describe by stating distance and direction, such as \"200 feet straight downward\" or \"300 feet upward to the northwest at a 45-degree angle.\"\n\nYou can also teleport one willing creature. The creature must be within 5 feet of you when you teleport, and it teleports to a space within 5 feet of your destination space.\n\nIf you, the other creature, or both would arrive in a space occupied by a creature or completely filled by one or more objects, you and any creature traveling with you each take 4d6 Force damage, and the teleportation fails.", "higher": "", "color": "#e8a040"}, {"name": "Dirge", "level": "Level 6", "school": "Enchantment", "ritual": "No", "source": "FRHoF", "page": "144", "classes": "Bard, Cleric", "notation": "En:2 > Co:2 > Tr:3 > Ab:4 > Di:5 > Ev:1 > Il:2 > En:3", "tags": "alter_form, concentration, damage, healing, movement, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V", "description": "Deathly power fills a 60-foot Emanation originating from you for the duration.\n\nWhen you cast this spell, you can designate creatures to be unaffected by it. Any other creature can't regain Hit Points while in the Emanation. Whenever the Emanation enters a creature's space and whenever a creature enters the Emanation or ends its turn there, the creature makes a Constitution saving throw. On a failed save, the creature takes 3d10 Necrotic damage and has the Prone condition. On a successful save, the creature takes half as much damage and its Speed is halved. A creature makes this save only once per turn.\n\nCasting as a Circle Spell. Casting this as a Circle spell requires a minimum of two secondary casters. If the spell is cast as a Circle spell, its duration becomes Concentration, up to 10 minutes.\n\nA creature that fails its save against the spell's effect also gains 1 Exhaustion level. While the creature has Exhaustion levels, finishing a Long Rest neither restores lost Hit Points nor reduces the creature's Exhaustion level.\n\nWhen the spell is cast, each secondary caster must expend a level 4+ spell slot; otherwise, the spell fails.", "higher": "", "color": "#c040e8"}, {"name": "Disguise Self", "level": "Level 1", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "262", "classes": "Artificer, Bard, Sorcerer, Wizard", "notation": "Il:2 > Tr:2 > Il:5", "tags": "alter_form, illusion_tag, reveal, summon", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You make yourself—including your clothing, armor, weapons, and other belongings on your person—look different until the spell ends. You can seem 1 foot shorter or taller and can appear heavier or lighter. You must adopt a form that has the same basic arrangement of limbs as you have. Otherwise, the extent of the illusion is up to you.\n\nThe changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to your outfit, objects pass through the hat, and anyone who touches it would feel nothing.\n\nTo discern that you are disguised, a creature must take the Study action to inspect your appearance and succeed on an Intelligence (Investigation) check against your spell save DC.", "higher": "", "color": "#4060e8"}, {"name": "Disintegrate", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "263", "classes": "Apothecary, Psion, Sorcerer, Wizard", "notation": "Tr:2 > Ne:2 > Ab:3 > Co:4 > Di:5 > Ev:1 > Il:2 > Tr:5", "tags": "alter_form, aoe, barrier, damage, healing, reveal, summon, undead", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a lodestone and dust)", "description": "You launch a green ray at a target you can see within range. The target can be a creature, a nonmagical object, or a creation of magical force, such as the wall created by Wall of Force.\n\nA creature targeted by this spell makes a Dexterity saving throw. On a failed save, the target takes 10d6 + 40 Force damage. If this damage reduces it to 0 Hit Points, it and everything nonmagical it is wearing and carrying are disintegrated into gray dust. The target can be revived only by a True Resurrection or a Wish spell.\n\nThis spell automatically disintegrates a Large or smaller nonmagical object or a creation of magical force. If such a target is Huge or larger, this spell disintegrates a 10-foot-Cube portion of it.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 3d6 for each spell slot level above 6.", "color": "#40e890"}, {"name": "Dispel Evil and Good", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "263", "classes": "Cleric, Paladin, Tamer", "notation": "Ab:1 > Ne:2 > Tr:3 > En:4 > Di:5 > Il:1 > Ab:3", "tags": "concentration, mind, reveal, single_target, undead", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (powdered silver and iron)", "description": "For the duration, Celestials, Elementals, Fey, Fiends, and Undead have Disadvantage on attack rolls against you. You can end the spell early by using either of the following special functions.\n\nBreak Enchantment. As a Magic action, you touch a creature that is possessed by or has the Charmed or Frightened condition from one or more creatures of the types above. The target is no longer possessed, Charmed, or Frightened by such creatures.\n\nDismissal. As a Magic action, you target one creature you can see within 5 feet of you that has one of the creature types above. The target must succeed on a Charisma saving throw or be sent back to its home plane if it isn't there already. If they aren't on their home plane, Undead are sent to the Shadowfell, and Fey are sent to the Feywild.", "higher": "", "color": "#40c8e0"}, {"name": "Dispel Magic", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "264", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Paladin, Psion, Ranger, Sorcerer, Tamer, Warlock, Wizard", "notation": "Ab:4 > Tr:2 > Co:3 > Ev:4 > Ab:5", "tags": "utility", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "Choose one creature, object, or magical effect within range. Any ongoing spell of level 3 or lower on the target ends. For each ongoing spell of level 4 or higher on the target, make an ability check using your spellcasting ability (DC 10 plus that spell's level). On a successful check, the spell ends.", "higher": "Using a Higher-Level Spell Slot. You automatically end a spell on the target if the spell's level is equal to or less than the level of the spell slot you use.", "color": "#40c8e0"}, {"name": "Dissonant Whispers", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "264", "classes": "Bard, Psion", "notation": "En:2 > Co:2 > En:5", "tags": "damage, mind, movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "One creature of your choice that you can see within range hears a discordant melody in its mind. The target makes a Wisdom saving throw. On a failed save, it takes 3d6 Psychic damage and must immediately use its Reaction, if available, to move as far away from you as it can, using the safest route. On a successful save, the target takes half as much damage only.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Divination", "level": "Level 4", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "264", "classes": "Cleric, Druid, Wizard", "notation": "Di:5 > Tr:2 > Il:3 > Co:4 > Ev:5 > Di:1", "tags": "alter_form, utility", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (incense worth 25+ GP, which the spell consumes)", "description": "This spell puts you in contact with a god or a god's servants. You ask one question about a specific goal, event, or activity to occur within 7 days. The DM offers a truthful reply, which might be a short phrase or cryptic rhyme. The spell doesn't account for circumstances that might change the answer, such as the casting of other spells.\n\nIf you cast the spell more than once before finishing a Long Rest, there is a cumulative 25 percent chance for each casting after the first that you get no answer.", "higher": "", "color": "#c8e040"}, {"name": "Divine Favor", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "265", "classes": "Paladin", "notation": "Tr:2 > Ev:2 > Tr:1", "tags": "damage", "duration": "1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "Until the spell ends, your attacks with weapons deal an extra 1d4 Radiant damage on a hit.", "higher": "", "color": "#40e890"}, {"name": "Divine Smite", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "265", "classes": "Paladin", "notation": "Ev:2 > Tr:2 > Ev:4", "tags": "damage, undead", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "The target takes an extra 2d8 Radiant damage from the attack. The damage increases by 1d8 if the target is a Fiend or an Undead.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Divine Word", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "265", "classes": "Cleric", "notation": "Ev:3 > Ab:2 > Co:3 > Di:4 > En:5 > Il:1 > Tr:2 > Ne:3 > Ev:4", "tags": "aoe, damage, healing, mind, reveal", "duration": "Instantaneous", "cast_time": "Bonus", "range": "30 feet", "components": "V", "description": "You utter a word imbued with power from the Upper Planes. Each creature of your choice in range makes a Charisma saving throw. On a failed save, a target that has 50 Hit Points or fewer suffers an effect based on its current Hit Points, as shown in the Divine Word Effects table. Regardless of its Hit Points, a Celestial, an Elemental, a Fey, or a Fiend target that fails its save is forced back to its plane of origin (if it isn't there already) and can't return to the current plane for 24 hours by any means short of a Wish spell.\n\nDivine Word EffectsHit PointsEffect0-20The target dies.21-30The target has the Blinded, Deafened, and Stunned conditions for 1 hour.31-40The target has the Blinded and Deafened conditions for 10 minutes.41-50The target has the Deafened condition for 1 minute.", "higher": "", "color": "#e84040"}, {"name": "Dominate Beast", "level": "Level 4", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "265", "classes": "Druid, Ranger, Sorcerer, Tamer", "notation": "En:5 > Co:2 > Tr:3 > Ab:4 > Di:5 > En:4", "tags": "barrier, concentration, damage, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "One Beast you can see within range must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The target has Advantage on the save if you or your allies are fighting it. Whenever the target takes damage, it repeats the save, ending the spell on itself on a success.\n\nYou have a telepathic link with the Charmed target while the two of you are on the same plane of existence. On your turn, you can use this link to issue commands to the target (no action required), such as \"Attack that creature,\" \"Move over there,\" or \"Fetch that object.\" The target does its best to obey on its turn. If it completes an order and doesn't receive further direction from you, it acts and moves as it likes, focusing on protecting itself.\n\nYou can command the target to take a Reaction but must take your own Reaction to do so.", "higher": "Using a Higher-Level Spell Slot. Your Concentration can last longer with a spell slot of level 5 (up to 10 minutes), 6 (up to 1 hour), or 7+ (up to 8 hours).", "color": "#c040e8"}, {"name": "Dominate Monster", "level": "Level 8", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "265", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:4 > Co:2 > Tr:3 > Ab:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Co:4 > En:1", "tags": "barrier, concentration, damage, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "One creature you can see within range must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The target has Advantage on the save if you or your allies are fighting it. Whenever the target takes damage, it repeats the save, ending the spell on itself on a success.\n\nYou have a telepathic link with the Charmed target while the two of you are on the same plane of existence. On your turn, you can use this link to issue commands to the target (no action required), such as \"Attack that creature,\" \"Move over there,\" or \"Fetch that object.\" The target does its best to obey on its turn. If it completes an order and doesn't receive further direction from you, it acts and moves as it likes, focusing on protecting itself.\n\nYou can command the target to take a Reaction but must take your own Reaction to do so.", "higher": "Using a Higher-Level Spell Slot. Your Concentration can last longer with a level 9 spell slot (up to 8 hours).", "color": "#c040e8"}, {"name": "Dominate Person", "level": "Level 5", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "266", "classes": "Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "En:1 > Co:2 > Tr:3 > Ab:4 > Di:5 > Il:1 > En:2", "tags": "barrier, concentration, damage, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "One Humanoid you can see within range must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The target has Advantage on the save if you or your allies are fighting it. Whenever the target takes damage, it repeats the save, ending the spell on itself on a success.\n\nYou have a telepathic link with the Charmed target while the two of you are on the same plane of existence. On your turn, you can use this link to issue commands to the target (no action required), such as \"Attack that creature,\" \"Move over there,\" or \"Fetch that object.\" The target does its best to obey on its turn. If it completes an order and doesn't receive further direction from you, it acts and moves as it likes, focusing on protecting itself.\n\nYou can command the target to take a Reaction but must take your own Reaction to do so.", "higher": "Using a Higher-Level Spell Slot. Your Concentration can last longer with a spell slot of level 6 (up to 10 minutes), 7 (up to 1 hour), or 8+ (up to 8 hours).", "color": "#c040e8"}, {"name": "Doomtide", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "FRHoF", "page": "144", "classes": "Bard, Cleric, Warlock", "notation": "Co:5 > Il:2 > Tr:3 > Ab:4 > En:5 > Co:3", "tags": "aoe, barrier, concentration, damage, illusion_tag, mind, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (soot and a dried eel)", "description": "You create a 20-foot-radius Sphere of inky fog within range. The fog is magical Darkness and lasts for the duration or until a strong wind (such as the one created by the Gust of Wind spell) disperses it, ending the spell.\n\nEach creature in the Sphere when it appears makes a Wisdom saving throw. On a failed save, a creature takes 5d6 Psychic damage and subtracts 1d6 from its saving throws until the end of its next turn. On a successful save, a creature takes half as much damage only. A creature also makes this save when the Sphere moves into its space, when it enters the Sphere, or when it ends its turn inside the Sphere. A creature makes this save only once per turn.\n\nThe Sphere moves 10 feet away from you at the start of each of your turns.\n\nCasting as a Circle Spell. Casting this as a Circle spell requires a minimum of five secondary casters. In addition to the spell's usual components, you must provide a special component (a string of three black pearls from Pandemonium), which the spell consumes. The spell's range increases to 1 mile, and its duration increases to until dispelled (no Concentration required). The spell ends early if any caster who participated in this casting contributes to another casting of Doomtide as a Circle spell.\n\nWhen the spell is cast, each secondary caster must expend a level 3+ spell slot; otherwise, the spell fails.", "higher": "", "color": "#e8a040"}, {"name": "Draconic Transformation", "level": "Level 7", "school": "Transmutation", "ritual": "No", "source": "FTD", "page": "19", "classes": "", "notation": "Tr:3 > Il:2 > Co:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Tr:2", "tags": "alter_form, aoe, concentration, damage, illusion_tag, movement, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (a statuette of a dragon, worth at least 500 gp)", "description": "With a roar, you draw on the magic of dragons to transform yourself, taking on draconic features. You gain the following benefits until the spell ends:\n\nBlindsight. You have blindsight with a range of 30 feet. Within that range, you can effectively see anything that isn't behind total cover, even if you're blinded or in darkness. Moreover, you can see an invisible creature, unless the creature successfully hides from you.\n\nBreath Weapon. When you cast this spell, and as a bonus action on subsequent turns for the duration, you can exhale shimmering energy in a 60-foot cone. Each creature in that area must make a Dexterity saving throw, taking 6d8 force damage on a failed save, or half as much damage on a successful one.\n\nWings. Incorporeal wings sprout from your back, giving you a flying speed of 60 feet.", "higher": "", "color": "#40e890"}, {"name": "Dragon's Breath", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "266", "classes": "Artificer, Sorcerer, Wizard", "notation": "Tr:3 > Ev:2 > Co:3 > Tr:4", "tags": "aoe, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Touch", "components": "V, S, M (a hot pepper)", "description": "You touch one willing creature, and choose Acid, Cold, Fire, Lightning, or Poison. Until the spell ends, the target can take a Magic action to exhale a 15-foot Cone. Each creature in that area makes a Dexterity saving throw, taking 3d6 damage of the chosen type on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 2.", "color": "#40e890"}, {"name": "Drawmij's Instant Summons", "level": "Level 6", "school": "Conjuration", "ritual": "Yes", "source": "PHB'24", "page": "266", "classes": "Wizard", "notation": "Co:2 > Di:2 > Il:3 > Tr:4 > Ev:5 > Ab:1 > En:2 > Co:4", "tags": "illusion_tag, reveal, summon, utility", "duration": "Until dispelled", "cast_time": "1 Min.", "range": "Touch", "components": "V, S, M (a sapphire worth 1,000+ GP)", "description": "You touch the sapphire used in the casting and an object weighing 10 pounds or less whose longest dimension is 6 feet or less. The spell leaves an Invisible mark on that object and invisibly inscribes the object's name on the sapphire. Each time you cast this spell, you must use a different sapphire.\n\nThereafter, you can take a Magic action to speak the object's name and crush the sapphire. The object instantly appears in your hand regardless of physical or planar distances, and the spell ends.\n\nIf another creature is holding or carrying the object, crushing the sapphire doesn't transport it, but instead you learn who that creature is and where that creature is currently located.", "higher": "", "color": "#e8a040"}, {"name": "Dream", "level": "Level 5", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "266", "classes": "Bard, Psion, Warlock, Wizard", "notation": "Il:1 > Co:2 > Tr:3 > En:4 > Di:5 > Ev:1 > Il:2", "tags": "alter_form, damage, illusion_tag, mind, movement, reveal, single_target, summon", "duration": "8 hours", "cast_time": "1 Min.", "range": "Self", "components": "V, S, M (a handful of sand)", "description": "You target a creature you know on the same plane of existence. You or a willing creature you touch enters a trance state to act as a dream messenger. While in the trance, the messenger is Incapacitated and has a Speed of 0.\n\nIf the target is asleep, the messenger appears in the target's dreams and can converse with the target as long as it remains asleep, through the spell's duration. The messenger can also shape the dream's environment, creating landscapes, objects, and other images. The messenger can emerge from the trance at any time, ending the spell. The target recalls the dream perfectly upon waking.\n\nIf the target is awake when you cast the spell, the messenger knows it and can either end the trance (and the spell) or wait for the target to sleep, at which point the messenger enters its dreams.\n\nYou can make the messenger terrifying to the target. If you do so, the messenger can deliver a message of no more than ten words, and then the target makes a Wisdom saving throw. On a failed save, the target gains no benefit from its rest, and it takes 3d6 Psychic damage when it wakes up.", "higher": "", "color": "#4060e8"}, {"name": "Dream of the Blue Veil", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "TCE", "page": "106", "classes": "", "notation": "Co:3 > Tr:2 > Il:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Co:5", "tags": "alter_form, damage, reveal, summon", "duration": "6 hours", "cast_time": "10 Min.", "range": "20 feet", "components": "V, S, M (a magic item or a willing creature from the destination world)", "description": "You and up to eight willing creatures within range fall unconscious for the spell's duration and experience visions of another world on the Material Plane, such as Oerth, Toril, Krynn, or Eberron. If the spell reaches its full duration, the visions conclude with each of you encountering and pulling back a mysterious blue curtain. The spell then ends with you mentally and physically transported to the world that was in the visions.\n\nTo cast this spell, you must have a magic item that originated on the world you wish to reach, and you must be aware of the world's existence, even if you don't know the world's name. Your destination in the other world is a safe location within 1 mile of where the magic item was created. Alternatively, you can cast the spell if one of the affected creatures was born on the other world, which causes your destination to be a safe location within 1 mile of where that creature was born.\n\nThe spell ends early on a creature if that creature takes any damage, and the creature isn't transported. If you take any damage, the spell ends for you and all the other creatures, with none of you being transported.", "higher": "", "color": "#e8a040"}, {"name": "Druid Grove", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "XGE", "page": "154", "classes": "", "notation": "Ab:2 > Il:2 > Co:3 > Tr:4 > Ev:5 > Di:1 > En:2 > Ab:5", "tags": "alter_form, aoe, barrier, illusion_tag, movement, summon", "duration": "24 hours", "cast_time": "10 Min.", "range": "Touch", "components": "V, S, M (mistletoe, which the spell consumes, that was harvested with a golden sickle under the light of a full moon)", "description": "You invoke the spirits of nature to protect an area outdoors or underground. The area can be as small as a 30-foot cube or as large as a 90-foot cube. Buildings and other structures are excluded from the affected area. If you cast this spell in the same area every day for a year, the spell lasts until dispelled.\n\nThe spell creates the following effects within the area. When you cast this spell, you can specify creatures as friends who are immune to the effects. You can also specify a password that, when spoken aloud, makes the speaker immune to these effects.\n\nThe entire warded area radiates magic. A dispel magic cast on the area, if successful, removes only one of the following effects, not the entire area. That spell's caster chooses which effect to end. Only when all its effects are gone is this spell dispelled.\n\nSolid Fog. You can fill any number of 5-foot squares on the ground with thick fog, making them heavily obscured. The fog reaches 10 feet high. In addition, every foot of movement through the fog costs 2 extra feet. To a creature immune to this effect, the fog obscures nothing and looks like soft mist, with motes of green light floating in the air.\n\nGrasping Undergrowth. You can fill any number of 5-foot squares on the ground that aren't filled with fog with grasping weeds and vines, as if they were affected by an entangle spell. To a creature immune to this effect, the weeds and vines feel soft and reshape themselves to serve as temporary seats or beds.\n\nGrove Guardians. You can animate up to four trees in the area, causing them to uproot themselves from the ground. These trees have the same statistics as an awakened tree, which appears in the Monster Manual, except they can't speak, and their bark is covered with druidic symbols. If any creature not immune to this effect enters the warded area, the grove guardians fight until they have driven off or slain the intruders. The grove guardians also obey your spoken commands (no action required by you) that you issue while in the area. If you don't give them commands and no intruders are present, the grove guardians do nothing. The grove guardians can't leave the warded area. When the spell ends, the magic animating them disappears, and the trees take root again if possible.\n\nAdditional Spell Effect. You can place your choice of one of the following magical effects within the warded area:\n\nA constant gust of wind in two locations of your choiceSpike growth in one location of your choiceWind wall in two locations of your choiceTo a creature immune to this effect, the winds are a fragrant, gentle breeze, and the area of spike growth is harmless.", "higher": "", "color": "#40c8e0"}, {"name": "Druidcraft", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "266", "classes": "Druid", "notation": "Tr:1 > Tr:3", "tags": "aoe, damage, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "Whispering to the spirits of nature, you create one of the following effects within range.\n\nWeather Sensor. You create a Tiny, harmless sensory effect that predicts what the weather will be at your location for the next 24 hours. The effect might manifest as a golden orb for clear skies, a cloud for rain, falling snowflakes for snow, and so on. This effect persists for 1 round.\n\nBloom. You instantly make a flower blossom, a seed pod open, or a leaf bud bloom.\n\nSensory Effect. You create a harmless sensory effect, such as falling leaves, spectral dancing fairies, a gentle breeze, the sound of an animal, or the faint odor of skunk. The effect must fit in a 5-foot Cube.\n\nFire Play. You light or snuff out a candle, a torch, or a campfire.", "higher": "", "color": "#40e890"}, {"name": "Dust Devil", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "154", "classes": "", "notation": "Co:3 > Il:2 > Tr:3 > Co:2", "tags": "aoe, concentration, damage, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a pinch of dust)", "description": "Choose an unoccupied 5-foot cube of air that you can see within range. An elemental force that resembles a dust devil appears in the cube and lasts for the spell's duration.\n\nAny creature that ends its turn within 5 feet of the dust devil must make a Strength saving throw. On a failed save, the creature takes 1d8 bludgeoning damage and is pushed 10 feet away from the dust devil. On a successful save, the creature takes half as much damage and isn't pushed.\n\nAs a bonus action, you can move the dust devil up to 30 feet in any direction. If the dust devil moves over sand, dust, loose dirt, or light gravel, it sucks up the material and forms a 10-foot-radius cloud of debris around itself that lasts until the start of your next turn. The cloud heavily obscures its area.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd.", "color": "#e8a040"}, {"name": "Earth Tremor", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "155", "classes": "", "notation": "Ev:2 > Co:2 > Ev:5", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "10 feet", "components": "V, S", "description": "You cause a tremor in the ground within range. Each creature other than you in that area must make a Dexterity saving throw. On a failed save, a creature takes 1d6 bludgeoning damage and is knocked prone. If the ground in that area is loose earth or stone, it becomes difficult terrain until cleared, with each 5-foot-diameter portion requiring at least 1 minute to clear by hand.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.", "color": "#e84040"}, {"name": "Earthbind", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "154", "classes": "", "notation": "Tr:3 > Co:2 > En:3 > Tr:5", "tags": "alter_form, concentration, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "300 feet", "components": "V", "description": "Choose one creature you can see within range. Yellow strips of magical energy loop around the creature. The target must succeed on a Strength saving throw, or its flying speed (if any) is reduced to 0 feet for the spell's duration. An airborne creature affected by this spell safely descends at 60 feet per round until it reaches the ground or the spell ends.", "higher": "", "color": "#40e890"}, {"name": "Earthquake", "level": "Level 8", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "267", "classes": "Cleric, Druid, Sorcerer", "notation": "Tr:4 > Co:2 > Ab:3 > Di:4 > Ev:5 > En:1 > Il:2 > Ne:3 > Co:4 > Tr:1", "tags": "aoe, concentration, damage, healing, movement, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "500 feet", "components": "V, S, M (a fractured rock)", "description": "Choose a point on the ground that you can see within range. For the duration, an intense tremor rips through the ground in a 100-foot-radius circle centered on that point. The ground there is Difficult Terrain.\n\nWhen you cast this spell and at the end of each of your turns for the duration, each creature on the ground in the area makes a Dexterity saving throw. On a failed save, a creature has the Prone condition, and its Concentration is broken.\n\nYou can also cause the effects below.\n\nFissures. A total of 1d6 fissures open in the spell's area at the end of the turn you cast it. You choose the fissures' locations, which can't be under structures. Each fissure is 1d10 × 10 feet deep and 10 feet wide, and it extends from one edge of the spell's area to another edge. A creature in the same space as a fissure must succeed on a Dexterity saving throw or fall in. A creature that successfully saves moves with the fissure's edge as it opens.\n\nStructures. The tremor deals 50 Bludgeoning damage to any structure in contact with the ground in the area when you cast the spell and at the end of each of your turns until the spell ends. If a structure drops to 0 Hit Points, it collapses.\n\nA creature within a distance from a collapsing structure equal to half the structure's height makes a Dexterity saving throw. On a failed save, the creature takes 12d6 Bludgeoning damage, has the Prone condition, and is buried in the rubble, requiring a DC 20 Strength (Athletics) check as an action to escape. On a successful save, the creature takes half as much damage only.", "higher": "", "color": "#40e890"}, {"name": "Eldritch Blast", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "267", "classes": "Warlock", "notation": "Ev:1 > Ev:4", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You hurl a beam of crackling energy. Make a ranged spell attack against one creature or object in range. On a hit, the target takes 1d10 Force damage.", "higher": "Cantrip Upgrade. The spell creates two beams at level 5, three beams at level 11, and four beams at level 17. You can direct the beams at the same target or at different ones. Make a separate attack roll for each beam.", "color": "#e84040"}, {"name": "Elemental Bane", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "155", "classes": "", "notation": "Tr:5 > Ab:2 > Co:3 > En:4 > Di:5 > Tr:2", "tags": "barrier, concentration, damage, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S", "description": "Choose one creature you can see within range, and choose one of the following damage types: acid, cold, fire, lightning, or thunder. The target must succeed on a Constitution saving throw or be affected by the spell for its duration. The first time each turn the affected target takes damage of the chosen type, the target takes an extra 2d6 damage of that type. Moreover, the target loses any resistance to that damage type until the spell ends.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 5th level or higher, you can target one additional creature for each slot level above 4th. The creatures must be within 30 feet of each other when you target them.", "color": "#40e890"}, {"name": "Elemental Weapon", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "267", "classes": "Artificer, Druid, Paladin, Ranger", "notation": "Tr:4 > Ev:2 > En:3 > Di:4 > Tr:3", "tags": "concentration, damage, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "A nonmagical weapon you touch becomes a magic weapon. Choose one of the following damage types: Acid, Cold, Fire, Lightning, or Thunder. For the duration, the weapon has a +1 bonus to attack rolls and deals an extra 1d4 damage of the chosen type when it hits.", "higher": "Using a Higher-Level Spell Slot. If you use a level 5-6 spell slot, the bonus to attack rolls increases to +2, and the extra damage increases to 2d4. If you use a level 7+ spell slot, the bonus increases to +3, and the extra damage increases to 3d4.", "color": "#40e890"}, {"name": "Elementalism", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "267", "classes": "Artificer, Druid, Sorcerer, Wizard", "notation": "Tr:1 > Tr:4", "tags": "alter_form, aoe, damage, illusion_tag, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You exert control over the elements, creating one of the following effects within range.\n\nBeckon Air. You create a breeze strong enough to ripple cloth, stir dust, rustle leaves, and close open doors and shutters, all in a 5-foot Cube. Doors and shutters being held open by someone or something aren't affected.\n\nBeckon Earth. You create a thin shroud of dust or sand that covers surfaces in a 5-foot-square area, or you cause a single word to appear in your handwriting in a patch of dirt or sand.\n\nBeckon Fire. You create a thin cloud of harmless embers and colored, scented smoke in a 5-foot Cube. You choose the color and scent, and the embers can light candles, torches, or lamps in that area. The smoke's scent lingers for 1 minute.\n\nBeckon Water. You create a spray of cool mist that lightly dampens creatures and objects in a 5-foot Cube. Alternatively, you create 1 cup of clean water either in an open container or on a surface, and the water evaporates in 1 minute.\n\nSculpt Element. You cause dirt, sand, fire, smoke, mist, or water that can fit in a 1-foot Cube to assume a crude shape (such as that of a creature) for 1 hour.", "higher": "", "color": "#40e890"}, {"name": "Elminster's Effulgent Spheres", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "FRHoF", "page": "144", "classes": "Druid, Sorcerer, Wizard", "notation": "Ev:2 > Tr:2 > Co:3 > Ab:4 > Di:5 > En:1 > Il:2 > Ev:1", "tags": "aoe, barrier, damage, summon", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (an opal worth 1,000 GP+)", "description": "Six chromatic spheres orbit you for the duration.\n\nWhile the spheres are present, you can expend spheres to create the following effects:\n\nAbsorb Energy. When you take Acid, Cold, Fire, Lightning, or Thunder damage, you can take a Reaction to expend one sphere and give yourself Resistance to the triggering damage type until the start of your next turn.\n\nEnergy Blast. As a Bonus Action, you send one sphere hurtling toward a target within 120 feet of yourself. Make a ranged spell attack. On a hit, the target takes 3d6 Acid, Cold, Fire, Lightning, or Thunder damage (your choice). Regardless of whether you hit, the sphere is expended.\n\nThe spell ends early if you have no more spheres remaining.", "higher": "Using a Higher-Level Spell Slot. The number of spheres increases by 1 for every spell slot level above 6.", "color": "#e84040"}, {"name": "Elminster's Elusion", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "FRHoF", "page": "144", "classes": "Wizard", "notation": "Ab:3 > Ev:2 > Tr:3 > Ab:1", "tags": "barrier, concentration, damage, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "Arcane wards protect you against magic for the duration. You have Advantage on saving throws against spells and magical effects. Additionally, if you succeed on a saving throw against a spell or magical effect and would normally take half as much damage, you instead take no damage.", "higher": "", "color": "#40c8e0"}, {"name": "Enemies Abound", "level": "Level 3", "school": "Enchantment", "ritual": "No", "source": "XGE", "page": "155", "classes": "", "notation": "En:4 > Ab:2 > Co:3 > Di:4 > En:2", "tags": "aoe, barrier, concentration, damage, mind, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You reach into the mind of one creature you can see and force it to make an Intelligence saving throw. A creature automatically succeeds if it is immune to being frightened. On a failed save, the target loses the ability to distinguish friend from foe, regarding all creatures it can see as enemies until the spell ends. Each time the target takes damage, it can repeat the saving throw, ending the effect on itself on a success.\n\nWhenever the affected creature chooses another creature as a target, it must choose the target at random from among the creatures it can see within range of the attack, spell, or other ability it's using. If an enemy provokes an opportunity attack from the affected creature, the creature must make that attack if it is able to.", "higher": "", "color": "#c040e8"}, {"name": "Enervation", "level": "Level 5", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "155", "classes": "", "notation": "Ne:1 > Ab:2 > Co:3 > En:4 > Di:5 > Ev:1 > Ne:4", "tags": "concentration, damage, healing, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A tendril of inky darkness reaches out from you, touching a creature you can see within range to drain life from it. The target must make a Dexterity saving throw. On a successful save, the target takes 2d8 necrotic damage, and the spell ends. On a failed save, the target takes 4d8 necrotic damage, and until the spell ends, you can use your action on each of your turns to automatically deal 4d8 necrotic damage to the target. The spell ends if you use your action to do anything else, if the target is ever outside the spell's range, or if the target has total cover from you.\n\nWhenever the spell deals damage to a target, you regain hit points equal to half the amount of necrotic damage the target takes.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.", "color": "#a0a0a0"}, {"name": "Enhance Ability", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "268", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Psion, Ranger, Sorcerer, Tamer, Wizard", "notation": "Tr:3 > Ab:2 > Ev:3 > Tr:5", "tags": "concentration", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (fur or a feather)", "description": "You touch a creature and choose Strength, Dexterity, Intelligence, Wisdom, or Charisma. For the duration, the target has Advantage on ability checks using the chosen ability.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 2. You can choose a different ability for each target.", "color": "#40e890"}, {"name": "Enlarge/Reduce", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "268", "classes": "Apothecary, Artificer, Bard, Druid, Sorcerer, Tamer, Wizard", "notation": "Tr:3 > En:2 > Di:3 > Tr:1", "tags": "alter_form, concentration, damage, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a pinch of powdered iron)", "description": "For the duration, the spell enlarges or reduces a creature or an object you can see within range (see the chosen effect below). A targeted object must be neither worn nor carried. If the target is an unwilling creature, it can make a Constitution saving throw. On a successful save, the spell has no effect.\n\nEverything that a targeted creature is wearing and carrying changes size with it. Any item it drops returns to normal size at once. A thrown weapon or piece of ammunition returns to normal size immediately after it hits or misses a target.\n\nEnlarge. The target's size increases by one category—from Medium to Large, for example. The target also has Advantage on Strength checks and Strength saving throws. The target's attacks with its enlarged weapons or Unarmed Strikes deal an extra 1d4 damage on a hit.\n\nReduce. The target's size decreases by one category—from Medium to Small, for example. The target also has Disadvantage on Strength checks and Strength saving throws. The target's attacks with its reduced weapons or Unarmed Strikes deal 1d4 less damage on a hit (this can't reduce the damage below 1).", "higher": "", "color": "#40e890"}, {"name": "Ensnaring Strike", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "268", "classes": "Ranger", "notation": "Co:2 > Il:2 > Co:3", "tags": "concentration, damage, illusion_tag, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "As you hit the target, grasping vines appear on it, and it makes a Strength saving throw. A Large or larger creature has Advantage on this save. On a failed save, the target has the Restrained condition until the spell ends. On a successful save, the vines shrivel away, and the spell ends.\n\nWhile Restrained, the target takes 1d6 Piercing damage at the start of each of its turns. The target or a creature within reach of it can take an action to make a Strength (Athletics) check against your spell save DC. On a success, the spell ends.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#e8a040"}, {"name": "Entangle", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "268", "classes": "Druid, Ranger", "notatio
