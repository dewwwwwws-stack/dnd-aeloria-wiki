Conjuration", "ritual": "No", "source": "PHB'24", "page": "284", "classes": "Bard, Cleric, Druid", "notation": "Co:2 > Il:2 > Ab:3 > Tr:4 > En:5 > Ev:1 > Di:2 > Co:5", "tags": "aoe, barrier, damage, healing, illusion_tag, mind, summon", "duration": "Instantaneous", "cast_time": "10 Min.", "range": "Self", "components": "V, S, M (a gem-encrusted bowl worth 1,000+ GP, which the spell consumes)", "description": "You conjure a feast that appears on a surface in an unoccupied 10-foot Cube next to you. The feast takes 1 hour to consume and disappears at the end of that time, and the beneficial effects don't set in until this hour is over. Up to twelve creatures can partake of the feast.\n\nA creature that partakes gains several benefits, which last for 24 hours. The creature has Resistance to Poison damage, and it has Immunity to the Frightened and Poisoned conditions. Its Hit Point maximum also increases by 2d10, and it gains the same number of Hit Points.", "higher": "", "color": "#e8a040"}, {"name": "Heroism", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "285", "classes": "Bard, Paladin, Tamer", "notation": "En:2 > Ev:2 > En:4", "tags": "barrier, concentration, healing, mind", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "A willing creature you touch is imbued with bravery. Until the spell ends, the creature is immune to the Frightened condition and gains Temporary Hit Points equal to your spellcasting ability modifier at the start of each of its turns.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Hex", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "285", "classes": "Warlock", "notation": "En:2 > Ab:2 > En:3", "tags": "concentration, damage, healing, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Bonus", "range": "90 feet", "components": "V, S, M (the petrified eye of a newt)", "description": "You place a curse on a creature that you can see within range. Until the spell ends, you deal an extra 1d6 Necrotic damage to the target whenever you hit it with an attack roll. Also, choose one ability when you cast the spell. The target has Disadvantage on ability checks made with the chosen ability.\n\nIf the target drops to 0 Hit Points before this spell ends, you can take a Bonus Action on a later turn to curse a new creature.", "higher": "Using a Higher-Level Spell Slot. Your Concentration can last longer with a spell slot of level 2 (up to 4 hours), 3-4 (up to 8 hours), or 5+ (24 hours).", "color": "#c040e8"}, {"name": "Hold Monster", "level": "Level 5", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "285", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:1 > Di:2 > Il:3 > Ab:4 > Ev:5 > Co:1 > En:4", "tags": "concentration, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a straight piece of iron)", "description": "Choose a creature that you can see within range. The target must succeed on a Wisdom saving throw or have the Paralyzed condition for the duration. At the end of each of its turns, the target repeats the save, ending the spell on itself on a success.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 5.", "color": "#c040e8"}, {"name": "Hold Person", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "286", "classes": "Apothecary, Bard, Cleric, Druid, Psion, Sorcerer, Warlock, Wizard", "notation": "En:3 > Di:2 > Il:3 > En:5", "tags": "concentration, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a straight piece of iron)", "description": "Choose a Humanoid that you can see within range. The target must succeed on a Wisdom saving throw or have the Paralyzed condition for the duration. At the end of each of its turns, the target repeats the save, ending the spell on itself on a success.", "higher": "Using a Higher-Level Spell Slot. You can target one additional Humanoid for each spell slot level above 2.", "color": "#c040e8"}, {"name": "Holy Aura", "level": "Level 8", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "286", "classes": "Cleric", "notation": "Ab:4 > Ne:2 > Tr:3 > En:4 > Di:5 > Ev:1 > Co:2 > Il:3 > Ne:4 > Ab:2", "tags": "concentration, single_target, undead", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a reliquary worth 1,000+ GP)", "description": "For the duration, you emit an aura in a 30-foot Emanation. While in the aura, creatures of your choice have Advantage on all saving throws, and other creatures have Disadvantage on attack rolls against them. In addition, when a Fiend or an Undead hits an affected creature with a melee attack roll, the attacker must succeed on a Constitution saving throw or have the Blinded condition until the end of its next turn.", "higher": "", "color": "#40c8e0"}, {"name": "Holy Star of Mystra", "level": "Level 8", "school": "Evocation", "ritual": "No", "source": "FRHoF", "page": "145", "classes": "Cleric, Wizard", "notation": "Ev:4 > Tr:2 > Ab:3 > Co:4 > Di:5 > En:1 > Il:2 > Ne:3 > Tr:4 > Ev:3", "tags": "aoe, concentration, damage, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "You create a glowing mote of energy that hovers above you for the duration. The mote sheds Bright Light in a 5-foot radius and Dim Light for an additional 5 feet.\n\nWhen you cast this spell and as a Bonus Action on later turns, you can unleash a shining bolt from the mote, targeting one creature within 120 feet of yourself. Make a ranged spell attack. On a hit, the target takes Force or Radiant damage (your choice) equal to 4d10 plus your spellcasting ability modifier.\n\nIn addition, while the mote is present, you have Three-Quarters Cover, and if you succeed on a saving throw against a spell of level 7 or lower that targeted only you and didn't create an area of effect, you can take a Reaction to deflect that spell back at the spell's caster; the caster makes a saving throw against that spell using that caster's own spell save DC.", "higher": "", "color": "#e84040"}, {"name": "Holy Weapon", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "157", "classes": "", "notation": "Ev:1 > Di:2 > Tr:3 > Co:4 > Ab:5 > En:1 > Ev:4", "tags": "aoe, concentration, damage, reveal", "duration": "Concentration, up to 1 hour", "cast_time": "Bonus", "range": "Touch", "components": "V, S", "description": "You imbue a weapon you touch with holy power. Until the spell ends, the weapon emits bright light in a 30-foot radius and dim light for an additional 30 feet. In addition, weapon attacks made with it deal an extra 2d8 radiant damage on a hit. If the weapon isn't already a magic weapon, it becomes one for the duration.\n\nAs a bonus action on your turn, you can dismiss this spell and cause the weapon to emit a burst of radiance. Each creature of your choice that you can see within 30 feet of the weapon must make a Constitution saving throw. On a failed save, a creature takes 4d8 radiant damage, and it is blinded for 1 minute. On a successful save, a creature takes half as much damage and isn't blinded. At the end of each of its turns, a blinded creature can make a Constitution saving throw, ending the effect on itself on a success.", "higher": "", "color": "#e84040"}, {"name": "Hunger of Hadar", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "286", "classes": "Warlock", "notation": "Co:4 > Il:2 > Tr:3 > Ev:4 > Co:1", "tags": "aoe, concentration, damage, illusion_tag, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a pickled tentacle)", "description": "You open a gateway to the Far Realm, a region infested with unspeakable horrors. A 20-foot-radius Sphere of Darkness appears, centered on a point within range and lasting for the duration. The Sphere is Difficult Terrain, and it is filled with strange whispers and slurping noises, which can be heard up to 30 feet away. No light, magical or otherwise, can illuminate the area, and creatures fully within it have the Blinded condition.\n\nAny creature that starts its turn in the area takes 2d6 Cold damage. Any creature that ends its turn there must succeed on a Dexterity saving throw or take 2d6 Acid damage from otherworldly tentacles.", "higher": "Using a Higher-Level Spell Slot. The Cold or Acid damage (your choice) increases by 1d6 for each spell slot level above 3.", "color": "#e8a040"}, {"name": "Hunter's Mark", "level": "Level 1", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "287", "classes": "Ranger", "notation": "Di:2 > Co:2 > Di:3", "tags": "concentration, damage, healing, movement, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Bonus", "range": "90 feet", "components": "V", "description": "You magically mark one creature you can see within range as your quarry. Until the spell ends, you deal an extra 1d6 Force damage to the target whenever you hit it with an attack roll. You also have Advantage on any Wisdom (Perception or Survival) check you make to find it.\n\nIf the target drops to 0 Hit Points before this spell ends, you can take a Bonus Action to move the mark to a new creature you can see within range.", "higher": "Using a Higher-Level Spell Slot. Your Concentration can last longer with a spell slot of level 3-4 (up to 8 hours) or 5+ (up to 24 hours).", "color": "#c8e040"}, {"name": "Hypnotic Pattern", "level": "Level 3", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "287", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Il:4 > Co:2 > Tr:3 > Di:4 > Il:5", "tags": "aoe, concentration, damage, illusion_tag, mind, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "S, M (a pinch of confetti)", "description": "You create a twisting pattern of colors in a 30-foot Cube within range. The pattern appears for a moment and vanishes. Each creature in the area who can see the pattern must succeed on a Wisdom saving throw or have the Charmed condition for the duration. While Charmed, the creature has the Incapacitated condition and a Speed of 0.\n\nThe spell ends for an affected creature if it takes any damage or if someone else uses an action to shake the creature out of its stupor.", "higher": "", "color": "#4060e8"}, {"name": "Ice Knife", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "287", "classes": "Druid, Sorcerer, Wizard", "notation": "Co:2 > Di:2 > Co:1", "tags": "aoe, damage, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "S, M (a drop of water or a piece of ice)", "description": "You create a shard of ice and fling it at one creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 Piercing damage. Hit or miss, the shard then explodes. The target and each creature within 5 feet of it must succeed on a Dexterity saving throw or take 2d6 Cold damage.", "higher": "Using a Higher-Level Spell Slot. The Cold damage increases by 1d6 for each spell slot level above 1.", "color": "#e8a040"}, {"name": "Ice Storm", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "287", "classes": "Druid, Sorcerer, Wizard", "notation": "Ev:5 > Tr:2 > Co:3 > Di:4 > Ab:5 > Ev:1", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "300 feet", "components": "V, S, M (a mitten)", "description": "Hail falls in a 20-foot-radius, 40-foot-high Cylinder centered on a point within range. Each creature in the Cylinder makes a Dexterity saving throw. A creature takes 2d10 Bludgeoning damage and 4d6 Cold damage on a failed save or half as much damage on a successful one.\n\nHailstones turn ground in the Cylinder into Difficult Terrain until the end of your next turn.", "higher": "Using a Higher-Level Spell Slot. The Bludgeoning damage increases by 1d10 for each spell slot level above 4.", "color": "#e84040"}, {"name": "Identify", "level": "Level 1", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "287", "classes": "Apothecary, Artificer, Bard, Psion, Tamer, Wizard", "notation": "Di:2 > Ev:2 > Di:5", "tags": "summon, utility", "duration": "Instantaneous", "cast_time": "1 Min.", "range": "Touch", "components": "V, S, M (a pearl worth 100+ GP)", "description": "You touch an object throughout the spell's casting. If the object is a magic item or some other magical object, you learn its properties and how to use them, whether it requires Attunement, and how many charges it has, if any. You learn whether any ongoing spells are affecting the item and what they are. If the item was created by a spell, you learn that spell's name.\n\nIf you instead touch a creature throughout the casting, you learn which ongoing spells, if any, are currently affecting it.", "higher": "", "color": "#c8e040"}, {"name": "Illusory Dragon", "level": "Level 8", "school": "Illusion", "ritual": "No", "source": "XGE", "page": "157", "classes": "", "notation": "Il:4 > Co:2 > Tr:3 > Ab:4 > Di:5 > En:1 > Ev:2 > Ne:3 > Co:4 > Il:1", "tags": "aoe, barrier, concentration, damage, illusion_tag, mind, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "S", "description": "By gathering threads of shadow material from the Shadowfell, you create a Huge shadowy dragon in an unoccupied space that you can see within range. The illusion lasts for the spell's duration and occupies its space, as if it were a creature.\n\nWhen the illusion appears, any of your enemies that can see it must succeed on a Wisdom saving throw or become frightened of it for 1 minute. If a frightened creature ends its turn in a location where it doesn't have line of sight to the illusion, it can repeat the saving throw, ending the effect on itself on a success.\n\nAs a bonus action on your turn, you can move the illusion up to 60 feet. At any point during its movement, you can cause it to exhale a blast of energy in a 60-foot cone originating from its space. When you create the dragon, choose a damage type: acid, cold, fire, lightning, necrotic, or poison. Each creature in the cone must make an Intelligence saving throw, taking 7d6 damage of the chosen damage type on a failed save, or half as much damage on a successful one.\n\nThe illusion is tangible because of the shadow stuff used to create it, but attacks miss it automatically, it succeeds on all saving throws, and it is immune to all damage and conditions. A creature that uses an action to examine the dragon can determine that it is an illusion by succeeding on an Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through it and has advantage on saving throws against its breath.", "higher": "", "color": "#4060e8"}, {"name": "Illusory Script", "level": "Level 1", "school": "Illusion", "ritual": "Yes", "source": "PHB'24", "page": "288", "classes": "Apothecary, Bard, Warlock, Wizard", "notation": "Il:2 > Ab:2 > Il:3", "tags": "alter_form, barrier, illusion_tag, reveal, summon, utility", "duration": "10 days", "cast_time": "1 Min.", "range": "Touch", "components": "S, M (ink worth 10+ GP, which the spell consumes)", "description": "You write on parchment, paper, or another suitable material and imbue it with an illusion that lasts for the duration. To you and any creatures you designate when you cast the spell, the writing appears normal, seems to be written in your hand, and conveys whatever meaning you intended when you wrote the text. To all others, the writing appears as if it were written in an unknown or magical script that is unintelligible. Alternatively, the illusion can alter the meaning, handwriting, and language of the text, though the language must be one you know.\n\nIf the spell is dispelled, the original script and the illusion both disappear.\n\nA creature that has Truesight can read the hidden message.", "higher": "", "color": "#4060e8"}, {"name": "Immolation", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "158", "classes": "", "notation": "Ev:1 > Di:2 > Tr:3 > Co:4 > Ab:5 > En:1 > Ev:2", "tags": "aoe, concentration, damage, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V", "description": "Flames wreathe one creature you can see within range. The target must make a Dexterity saving throw. It takes 8d6 fire damage on a failed save, or half as much damage on a successful one. On a failed save, the target also burns for the spell's duration. The burning target sheds bright light in a 30-foot radius and dim light for an additional 30 feet. At the end of each of its turns, the target repeats the saving throw. It takes 4d6 fire damage on a failed save, and the spell ends on a successful one. These magical flames can't be extinguished by nonmagical means.\n\nIf damage from this spell kills a target, the target is turned to ash.", "higher": "", "color": "#e84040"}, {"name": "Immovable Object", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "EGW", "page": "187", "classes": "", "notation": "Tr:3 > Co:2 > Ev:3 > Tr:5", "tags": "movement", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (gold dust worth at least 25 gp, which the spell consumes)", "description": "You touch an object that weighs no more than 10 pounds and cause it to become magically fixed in place. You and the creatures you designate when you cast this spell can move the object normally. You can also set a password that, when spoken within 5 feet of the object, suppresses this spell for 1 minute.\n\nIf the object is fixed in the air, it can hold up to 4,000 pounds of weight. More weight causes the object to fall. Otherwise, a creature can use an action to make a Strength check against your spell save DC. On a success, the creature can move the object up to 10 feet.", "higher": "At Higher Levels. If you cast this spell using a spell slot of 4th or 5th level, the DC to move the object increases by 5, it can carry up to 8,000 pounds of weight, and the duration increases to 24 hours. If you cast this spell using a spell slot of 6th level or higher, the DC to move the object increases by 10, it can carry up to 20,000 pounds of weight, and the effect is permanent until dispelled.", "color": "#40e890"}, {"name": "Imprisonment", "level": "Level 9", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "288", "classes": "Warlock, Wizard", "notation": "Ab:5 > Co:2 > Tr:3 > En:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Co:4 > Tr:5 > Ab:3", "tags": "barrier, damage, mind, movement, reveal, single_target, summon", "duration": "Until dispelled", "cast_time": "1 Min.", "range": "30 feet", "components": "V, S, M (a statuette of the target worth 5,000+ GP)", "description": "You create a magical restraint to hold a creature that you can see within range. The target must make a Wisdom saving throw. On a successful save, the target is unaffected, and it is immune to this spell for the next 24 hours. On a failed save, the target is imprisoned. While imprisoned, the target doesn't need to breathe, eat, or drink, and it doesn't age. Divination spells can't locate or perceive the imprisoned target, and the target can't teleport.\n\nUntil the spell ends, the target is also affected by one of the following effects of your choice:\n\nBurial. The target is entombed beneath the earth in a hollow globe of magical force that is just large enough to contain the target. Nothing can pass into or out of the globe.\n\nChaining. Chains firmly rooted in the ground hold the target in place. The target has the Restrained condition and can't be moved by any means.\n\nHedged Prison. The target is trapped in a demiplane that is warded against teleportation and planar travel. The demiplane is your choice of a labyrinth, a cage, a tower, or the like.\n\nMinimus Containment. The target becomes 1 inch tall and is trapped inside an indestructible gemstone or a similar object. Light can pass through the gemstone (allowing the target to see out and other creatures to see in), but nothing else can pass through by any means.\n\nSlumber. The target has the Unconscious condition and can't be awoken.\n\nEnding the Spell. When you cast the spell, specify a trigger that will end it. The trigger can be as simple or as elaborate as you choose, but the DM must agree that it has a high likelihood of happening within the next decade. The trigger must be an observable action, such as someone making a particular offering at the temple of your god, saving your true love, or defeating a specific monster.\n\nA Dispel Magic spell can end the spell only if it is cast with a level 9 spell slot, targeting either the prison or the component used to create it.", "higher": "", "color": "#40c8e0"}, {"name": "Incendiary Cloud", "level": "Level 8", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "288", "classes": "Druid, Sorcerer, Wizard", "notation": "Co:4 > Il:2 > Tr:3 > Ev:4 > Ab:5 > Di:1 > En:2 > Ne:3 > Il:4 > Co:3", "tags": "aoe, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "150 feet", "components": "V, S", "description": "A swirling cloud of embers and smoke fills a 20-foot-radius Sphere centered on a point within range. The cloud's area is Heavily Obscured. It lasts for the duration or until a strong wind (like that created by Gust of Wind) disperses it.\n\nWhen the cloud appears, each creature in it makes a Dexterity saving throw, taking 10d8 Fire damage on a failed save or half as much damage on a successful one. A creature must also make this save when the Sphere moves into its space and when it enters the Sphere or ends its turn there. A creature makes this save only once per turn.\n\nThe cloud moves 10 feet away from you in a direction you choose at the start of each of your turns.", "higher": "", "color": "#e8a040"}, {"name": "Infernal Calling", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "158", "classes": "", "notation": "Co:1 > Il:2 > Ab:3 > Tr:4 > Di:5 > Ev:1 > Co:4", "tags": "alter_form, barrier, concentration, healing, illusion_tag, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "1 Min.", "range": "90 feet", "components": "V, S, M (a ruby worth at least 999 gp)", "description": "Uttering a dark incantation, you summon a devil from the Nine Hells. You choose the devil's type, which must be one of challenge rating 6 or lower, such as a barbed devil or a bearded devil. The devil appears in an unoccupied space that you can see within range. The devil disappears when it drops to 0 hit points or when the spell ends.\n\nThe devil is unfriendly toward you and your companions. Roll initiative for the devil, which has its own turns. It is under the Dungeon Master's control and acts according to its nature on each of its turns, which might result in its attacking you if it thinks it can prevail, or trying to tempt you to undertake an evil act in exchange for limited service. The DM has the creature's statistics.\n\nOn each of your turns, you can try to issue a verbal command to the devil (no action required by you). It obeys the command if the likely outcome is in accordance with its desires, especially if the result would draw you toward evil. Otherwise, you must make a Charisma (Deception, Intimidation, or Persuasion) check contested by its Wisdom (Insight) check. You make the check with advantage if you say the devil's true name. If your check fails, the devil becomes immune to your verbal commands for the duration of the spell, though it can still carry out your commands if it chooses. If your check succeeds, the devil carries out your command—such as \"attack my enemies,\" \"explore the room ahead,\" or \"bear this message to the queen\"—until it completes the activity, at which point it returns to you to report having done so.\n\nIf your concentration ends before the spell reaches its full duration, the devil doesn't disappear if it has become immune to your verbal commands. Instead, it acts in whatever manner it chooses for 3d6 minutes, and then it disappears.\n\nIf you possess an individual devil's talisman, you can summon that devil if it is of the appropriate challenge rating plus 1, and it obeys all your commands, with no Charisma checks required.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 6th level or higher, the challenge rating increases by 1 for each slot level above 5th.", "color": "#e8a040"}, {"name": "Infestation", "level": "Cantrip", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "158", "classes": "", "notation": "Co:1 > Co:3", "tags": "damage, illusion_tag, movement, reveal, single_target, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a living flea)", "description": "You cause a cloud of mites, fleas, and other parasites to appear momentarily on one creature you can see within range. The target must succeed on a Constitution saving throw, or it takes 1d6 poison damage and moves 5 feet in a random direction if it can move and its speed is at least 5 feet. Roll a d4 for the direction: 1, north; 2, south; 3, east; or 4, west. This movement doesn't provoke opportunity attacks, and if the direction rolled is blocked, the target doesn't move.\n\nThe spell's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).", "higher": "", "color": "#e8a040"}, {"name": "Inflict Wounds", "level": "Level 1", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "288", "classes": "Cleric", "notation": "Ne:2 > Ev:2 > Ne:1", "tags": "damage, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "A creature you touch makes a Constitution saving throw, taking 2d10 Necrotic damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 1.", "color": "#a0a0a0"}, {"name": "Insect Plague", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "289", "classes": "Cleric, Druid, Sorcerer", "notation": "Co:1 > Il:2 > Tr:3 > Ev:4 > Ab:5 > Di:1 > Co:2", "tags": "aoe, concentration, damage, illusion_tag, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "300 feet", "components": "V, S, M (a locust)", "description": "Swarming locusts fill a 20-foot-radius Sphere centered on a point you choose within range. The Sphere remains for the duration, and its area is Lightly Obscured and Difficult Terrain.\n\nWhen the swarm appears, each creature in it makes a Constitution saving throw, taking 4d10 Piercing damage on a failed save or half as much damage on a successful one. A creature also makes this save when it enters the spell's area for the first time on a turn or ends its turn there. A creature makes this save only once per turn.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 5.", "color": "#e8a040"}, {"name": "Intellect Fortress", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "TCE", "page": "107", "classes": "Artificer", "notation": "Ab:4 > Co:2 > En:3 > Di:4 > Ab:5", "tags": "barrier, concentration, damage, mind, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "30 feet", "components": "V", "description": "For the duration, you or one willing creature you can see within range has resistance to psychic damage, as well as advantage on Intelligence, Wisdom, and Charisma saving throws.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, you can target one additional creature for each slot level above 3rd. The creatures must be within 30 feet of each other when you target them.", "color": "#40c8e0"}, {"name": "Investiture of Flame", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "159", "classes": "", "notation": "Tr:2 > Co:2 > Ab:3 > Ev:4 > Di:5 > En:1 > Il:2 > Tr:5", "tags": "aoe, barrier, concentration, damage, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Flames race across your body, shedding bright light in a 30-foot radius and dim light for an additional 30 feet for the spell's duration. The flames don't harm you. Until the spell ends, you gain the following benefits:\n\nYou are immune to fire damage and have resistance to cold damage.Any creature that moves within 5 feet of you for the first time on a turn or ends its turn there takes 1d10 fire damage.You can use your action to create a line of fire 15 feet long and 5 feet wide extending from you in a direction you choose. Each creature in the line must make a Dexterity saving throw. A creature takes 4d8 fire damage on a failed save, or half as much damage on a successful one.", "higher": "", "color": "#40e890"}, {"name": "Investiture of Ice", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "159", "classes": "", "notation": "Tr:2 > Co:2 > Ab:3 > Ev:4 > Di:5 > En:1 > Il:2 > Tr:1", "tags": "aoe, barrier, concentration, damage, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Until the spell ends, ice rimes your body, and you gain the following benefits:\n\nYou are immune to cold damage and have resistance to fire damage.You can move across difficult terrain created by ice or snow without spending extra movement.The ground in a 10-foot radius around you is icy and is difficult terrain for creatures other than you. The radius moves with you.You can use your action to create a 15-foot cone of freezing wind extending from your outstretched hand in a direction you choose. Each creature in the cone must make a Constitution saving throw. A creature takes 4d6 cold damage on a failed save, or half as much damage on a successful one. A creature that fails its save against this effect has its speed halved until the start of your next turn.", "higher": "", "color": "#40e890"}, {"name": "Investiture of Stone", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "159", "classes": "", "notation": "Tr:2 > Co:2 > Ab:3 > En:4 > Il:5 > Ev:1 > Di:2 > Tr:3", "tags": "aoe, barrier, concentration, damage, mind, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Until the spell ends, bits of rock spread across your body, and you gain the following benefits:\n\nYou have resistance to bludgeoning, piercing, and slashing damage from nonmagical attacks.You can use your action to create a small earthquake on the ground in a 15-foot radius centered on you. Other creatures on that ground must succeed on a Dexterity saving throw or be knocked prone.You can move across difficult terrain made of earth or stone without spending extra movement. You can move through solid earth or stone as if it was air and without destabilizing it, but you can't end your movement there. If you do so, you are ejected to the nearest unoccupied space, this spell ends, and you are stunned until the end of your next turn.", "higher": "", "color": "#40e890"}, {"name": "Investiture of Wind", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Tr:2 > Co:2 > Di:3 > Ev:4 > Ab:5 > En:1 > Il:2 > Tr:3", "tags": "aoe, concentration, damage, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Until the spell ends, wind whirls around you, and you gain the following benefits:\n\nRanged weapon attacks made against you have disadvantage on the attack roll.You gain a flying speed of 60 feet. If you are still flying when the spell ends, you fall, unless you can somehow prevent it.You can use your action to create a 15-foot cube of swirling wind centered on a point you can see within 60 feet of you. Each creature in that area must make a Constitution saving throw. A creature takes 2d10 bludgeoning damage on a failed save, or half as much damage on a successful one. If a Large or smaller creature fails the save, that creature is also pushed up to 10 feet away from the center of the cube.", "higher": "", "color": "#40e890"}, {"name": "Invisibility", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "289", "classes": "Artificer, Bard, Psion, Sorcerer, Tamer, Warlock, Wizard", "notation": "Il:3 > Ev:2 > Tr:3 > Il:4", "tags": "concentration, damage, illusion_tag, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (an eyelash in gum arabic)", "description": "A creature you touch has the Invisible condition until the spell ends. The spell ends early immediately after the target makes an attack roll, deals damage, or casts a spell.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 2.", "color": "#4060e8"}, {"name": "Invulnerability", "level": "Level 9", "school": "Abjuration", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Ab:5 > Ev:2 > Tr:3 > Co:4 > Di:5 > En:1 > Il:2 > Ne:3 > Ev:4 > Tr:5 > Ab:1", "tags": "barrier, concentration, damage", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (a small piece of adamantine worth at least 500 gp, which the spell consumes)", "description": "You are immune to all damage until the spell ends.", "higher": "", "color": "#40c8e0"}, {"name": "Jallarzi's Storm of Radiance", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "289", "classes": "Warlock, Wizard", "notation": "Ev:1 > Il:2 > Co:3 > Tr:4 > Di:5 > Ab:1 > Ev:2", "tags": "aoe, concentration, damage, illusion_tag, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a pinch of phosphorus)", "description": "You unleash a storm of flashing light and raging thunder in a 10-foot-radius, 40-foot-high Cylinder centered on a point you can see within range. While in this area, creatures have the Blinded and Deafened conditions, and they can't cast spells with a Verbal component.\n\nWhen the storm appears, each creature in it makes a Constitution saving throw, taking 2d10 Radiant damage and 2d10 Thunder damage on a failed save or half as much damage on a successful one. A creature also makes this save when it enters the spell's area for the first time on a turn or ends its turn there. A creature makes this save only once per turn.", "higher": "Using a Higher-Level Spell Slot. The Radiant and Thunder damage increase by 1d10 for each spell slot level above 5.", "color": "#e84040"}, {"name": "Jump", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "290", "classes": "Apothecary, Artificer, Druid, Psion, Ranger, Sorcerer, Tamer, Wizard", "notation": "Tr:2 > Co:2 > Tr:4", "tags": "movement", "duration": "1 minute", "cast_time": "Bonus", "range": "Touch", "components": "V, S, M (a grasshopper's hind leg)", "description": "You touch a willing creature. Once on each of its turns until the spell ends, that creature can jump up to 30 feet by spending 10 feet of movement.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#40e890"}, {"name": "Kinetic Jaunt", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "SCC", "page": "37", "classes": "Artificer, Bard, Sorcerer, Wizard", "notation": "Tr:3 > Ev:2 > Co:3 > Tr:5", "tags": "concentration, damage, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "S", "description": "You magically empower your movement with dance-like steps, giving yourself the following benefits for the duration.\n\nYour walking speed increases by 10 feet.You don't provoke opportunity attacks.You can move through the space of another creature, and it doesn't count as difficult terrain. If you end your turn in another creature's space, you are shunted to the last unoccupied space you occupied, and you take 1d8 force damage.", "higher": "", "color": "#40e890"}, {"name": "Knock", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "290", "classes": "Bard, Psion, Sorcerer, Wizard", "notation": "Tr:3 > Di:2 > Ev:3 > Tr:1", "tags": "reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "Choose an object that you can see within range. The object can be a door, a box, a chest, a set of manacles, a padlock, or another object that contains a mundane or magical means that prevents access.\n\nA target that is held shut by a mundane lock or that is stuck or barred becomes unlocked, unstuck, or unbarred. If the object has multiple locks, only one of them is unlocked.\n\nIf the target is held shut by Arcane Lock, that spell is suppressed for 10 minutes, during which time the target can be opened and closed.\n\nWhen you cast the spell, a loud knock, audible up to 300 feet away, emanates from the target.", "higher": "", "color": "#40e890"}, {"name": "Laeral's Silver Lance", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "FRHoF", "page": "145", "classes": "Cleric, Sorcerer, Wizard", "notation": "Ev:4 > Tr:2 > Co:3 > Di:4 > Ev:3", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a silver pin worth 250+ GP)", "description": "Silver energy bursts out from you in a 120-foot-long, 5-foot-wide Line. Each creature of your choice in the Line makes a Strength saving throw. On a failed save, a creature takes 3d10 Force damage and has the Prone condition. On a successful save, a creature takes half as much damage only.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for every spell slot level above 3.", "color": "#e84040"}, {"name": "Legend Lore", "level": "Level 5", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "290", "classes": "Bard, Cleric, Psion, Tamer, Wizard", "notation": "Di:1 > Ev:2 > Co:3 > Ab:4 > En:5 > Tr:1 > Di:4", "tags": "reveal", "duration": "Instantaneous", "cast_time": "10 Min.", "range": "Self", "components": "V, S, M (incense worth 250+ GP, which the spell consumes, and four ivory strips worth 50+ GP each)", "description": "Name or describe a famous person, place, or object. The spell brings to your mind a brief summary of the significant lore about that famous thing, as described by the DM.\n\nThe lore might consist of important details, amusing revelations, or even secret lore that has never been widely known. The more information you already know about the thing, the more precise and detailed the information you receive is. That information is accurate but might be couched in figurative language or poetry, as determined by the DM.\n\nIf the famous thing you chose isn't actually famous, you hear sad musical notes played on a trombone, and the spell fails.", "higher": "", "color": "#c8e040"}, {"name": "Leomund's Secret Chest", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "290", "classes": "Artificer, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > Ev:4 > Di:5 > Co:2", "tags": "illusion_tag, summon", "duration": "Until dispelled", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a chest, 3 feet by 2 feet by 2 feet, constructed from rare materials worth 5,000+ GP, and a Tiny replica of the chest made from the same materials worth 50+ GP)", "description": "You hide a chest and all its contents on the Ethereal Plane. You must touch the chest and the miniature replica that serve as Material components for the spell. The chest can contain up to 12 cubic feet of nonliving material (3 feet by 2 feet by 2 feet).\n\nWhile the chest remains on the Ethereal Plane, you can take a Magic action and touch the replica to recall the chest. It appears in an unoccupied space on the ground within 5 feet of you. You can send the chest back to the Ethereal Plane by taking a Magic action to touch the chest and the replica.\n\nAfter 60 days, there is a cumulative 5 percent chance at the end of each day that the spell ends. The spell also ends if you cast this spell again or if the Tiny replica chest is destroyed. If the spell ends and the larger chest is on the Ethereal Plane, the chest remains there for you or someone else to find.", "higher": "", "color": "#e8a040"}, {"name": "Leomund's Tiny Hut", "level": "Level 3", "school": "Evocation", "ritual": "Yes", "source": "PHB'24", "page": "291", "classes": "Bard, Wizard", "notation": "Ev:4 > Co:2 > Tr:3 > Di:4 > Ev:5", "tags": "aoe, movement, utility", "duration": "8 hours", "cast_time": "1 Min.", "range": "Self", "components": "V, S, M (a crystal bead)", "description": "A 10-foot Emanation springs into existence around you and remains stationary for the duration. The spell fails when you cast it if the Emanation isn't big enough to fully encapsulate all creatures in its area.\n\nCreatures and objects within the Emanation when you cast the spell can move through it freely. All other creatures and objects are barred from passing through it. Spells of level 3 or lower can't be cast through it, and the effects of such spells can't extend into it.\n\nThe atmosphere inside the Emanation is comfortable and dry, regardless of the weather outside. Until the spell ends, you can command the interior to have Dim Light or Darkness (no action required). The Emanation is opaque from the outside and of any color you choose, but it's transparent from the inside.\n\nThe spell ends early if you leave the Emanation or if you cast it again.", "higher": "", "color": "#e84040"}, {"name": "Lesser Restoration", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "291", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Paladin, Ranger, Tamer", "notation": "Ab:3 > Ev:2 > Tr:3 > Ab:2", "tags": "damage", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Touch", "components": "V, S", "description": "You touch a creature and end one condition on it: Blinded, Deafened, Paralyzed, or Poisoned.", "higher": "", "color": "#40c8e0"}, {"name": "Levitate", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "291", "classes": "Artificer, Psion, Sorcerer, Tamer, Wizard", "notation": "Tr:3 > Co:2 > Ab:3 > Tr:2", "tags": "alter_form, barrier, concentration, movement, reveal, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a metal spring)", "description": "One creature or loose object of your choice that you can see within range rises vertically up to 20 feet and remains suspended there for the duration. The spell can levitate an object that weighs up to 500 pounds. An unwilling creature that succeeds on a Constitution saving throw is unaffected.\n\nThe target can move only by pushing or pulling against a fixed object or surface within reach (such as a wall or a ceiling), which allows it to move as if it were climbing. You can change the target's altitude by up to 20 feet in either direction on your turn. If you are the target, you can move up or down as part of your move. Otherwise, you can take a Magic action to move the target, which must remain within the spell's range.\n\nWhen the spell ends, the target floats gently to the ground if it is still aloft.", "higher": "", "color": "#40e890"}, {"name": "Life Transference", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Ne:4 > Tr:2 > Il:3 > Di:4 > Ne:2", "tags": "alter_form, damage, healing, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You sacrifice some of your health to mend another creature's injuries. You take 4d8 necrotic damage, which can't be reduced in any way, and one creature of your choice that you can see within range regains a number of hit points equal to twice the necrotic damage you take.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd.", "color": "#a0a0a0"}, {"name": "Light", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "292", "classes": "Apothecary, Artificer, Bard, Cleric, Psion, Sorcerer, Tamer, Wizard", "notation": "Ev:2 > Ev:4", "tags": "aoe", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, M (a firefly or phosphorescent moss)", "description": "You touch one Large or smaller object that isn't being worn or carried by someone else. Until the spell ends, the object sheds Bright Light in a 20-foot radius and Dim Light for an additional 20 feet. The light can be colored as you like.\n\nCovering the object with something opaque blocks the light. The spell ends if you cast it again.", "higher": "", "color": "#e84040"}, {"name": "Lightning Arrow", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "292", "classes": "Ranger", "notation": "Tr:4 > Il:2 > Ev:3 > Co:4 > Tr:3", "tags": "alter_form, aoe, damage", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "As your attack hits or misses the target, the weapon or ammunition you're using transforms into a lightning bolt. Instead of taking any damage or other effects from the attack, the target takes 4d8 Lightning damage on a hit or half as much damage on a miss. Each creature within 10 feet of the target then makes a Dexterity saving throw, taking 2d8 Lightning damage on a failed save or half as much damage on a successful one.\n\nThe weapon or ammunition then returns to its normal form.", "higher": "Using a Higher-Level Spell Slot. The damage for both effects of the spell increases by 1d8 for each spell slot level above 3.", "color": "#40e890"}, {"name": "Lightning Bolt", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "292", "classes": "Sorcerer, Wizard", "notation": "Ev:4 > Tr:2 > Co:3 > Di:4 > Ev:2", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a bit of fur and a crystal rod)", "description": "A stroke of lightning forming a 100-foot-long, 5-foot-wide Line blasts out from you in a direction you choose. Each creature in the Line makes a Dexterity saving throw, taking 8d6 Lightning damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 3.", "color": "#e84040"}, {"name": "Lightning Lure", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "TCE", "page": "107", "classes": "Artificer, Sorcerer, Warlock, Wizard", "notation": "Ev:2 > Ev:5", "tags": "aoe, barrier, damage, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V", "description": "You create a lash of lightning energy that strikes at one creature of your choice that you can see within 15 feet of you. The target must succeed on a Strength saving throw or be pulled up to 10 feet in a straight line toward you and then take 1d8 lightning damage if it is within 5 feet of you.\n\nThis spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).", "higher": "", "color": "#e84040"}, {"name": "Locate Animals or Plants", "level": "Level 2", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "292", "classes": "Bard, Druid, Psion, Ranger, Tamer", "notation": "Di:3 > Tr:2 > Co:3 > Di:5", "tags": "utility", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (fur from a bloodhound)", "description": "Describe or name a specific kind of Beast, Plant creature, or nonmagical plant. You learn the direction and distance to the closest creature or plant of that kind within 5 miles, if any are present.", "higher": "", "color": "#c8e040"}, {"name": "Locate Creature", "level": "Level 4", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "292", "classes": "Bard, Cleric, Druid, Paladin, Psion, Ranger, Tamer, Wizard", "notation": "Di:5 > Tr:2 > Il:3 > Co:4 > Ab:5 > Di:1", "tags": "alter_form, concentration, movement, reveal", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (fur from a bloodhound)", "description": "Describe or name a creature that is familiar to you. You sense the direction to the creature's location if that creature is within 1,000 feet of you. If the creature is moving, you know the direction of its movement.\n\nThe spell can locate a specific creature known to you or the nearest creature of a specific kind (such as a human or a unicorn) if you have seen such a creature up close—within 30 feet—at least once. If the creature you described or named is in a different form, such as under the effects of a Flesh to Stone or Polymorph spell, this spell doesn't locate the creature.\n\nThis spell can't locate a creature if any thickness of lead blocks a direct path between you and the creature.", "higher": "", "color": "#c8e040"}, {"name": "Locate Object", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "293", "classes": "Bard, Cleric, Druid, Paladin, Psion, Ranger, Tamer, Wizard", "notation": "Di:3 > Tr:2 > Ev:3 > Di:5", "tags": "alter_form, concentration, movement, reveal", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (a forked twig)", "description": "Describe or name an object that is familiar to you. You sense the direction to the object's location if that object is within 1,000 feet of you. If the object is in motion, you know the direction of its movement.\n\nThe spell can locate a specific object known to you if you have seen it up close—within 30 feet—at least once. Alternatively, the spell can locate the nearest object of a particular kind, such as a certain kind of apparel, jewelry, furniture, tool, or weapon.\n\nThis spell can't locate an object if any thickness of lead blocks a direct path between you and the object.", "higher": "", "color": "#c8e040"}, {"name": "Longstrider", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "293", "classes": "Artificer, Bard, Druid, Psion, Ranger, Tamer, Wizard", "notation": "Tr:2 > Co:2 > Tr:5", "tags": "movement", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a pinch of dirt)", "description": "You touch a creature. The target's Speed increases by 10 feet until the spell ends.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#40e890"}, {"name": "Maddening Darkness", "level": "Level 8", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Ev:4 > Co:2 > Tr:3 > Di:4 > En:5 > Il:1 > Ab:2 > Ne:3 > Co:4 > Ev:3", "tags": "aoe, concentration, damage, mind, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "150 feet", "components": "V, M (a drop of pitch mixed with a drop of mercury)", "description": "Magical darkness spreads from a point you choose within range to fill a 60-foot-radius sphere until the spell ends. The darkness spreads around corners. A creature with darkvision can't see through this darkness. Non-magical light, as well as light created by spells of 8th level or lower, can't illuminate the area.\n\nShrieks, gibbering, and mad laughter can be heard within the sphere. Whenever a creature starts its turn in the sphere, it must make a Wisdom saving throw, taking 8d8 psychic damage on a failed save, or half as much damage on a successful one.", "higher": "", "color": "#e84040"}, {"name": "Maelstrom", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Ev:1 > Il:2 > Ab:3 > Co:4 > Tr:5 > Di:1 > Ev:4", "tags": "aoe, barrier, concentration, damage, illusion_tag, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (paper or leaf in the shape of a funnel)", "description": "A swirling mass of 5-foot-deep water appears in a 30-foot radius centered on a point you can see within range. The point must be on the ground or in a body of water. Until the spell ends, that area is difficult terrain, and any creature that starts its turn there must succeed on a Strength saving throw or take 6d6 bludgeoning damage and be pulled 10 feet toward the center.", "higher": "", "color": "#e84040"}, {"name": "Mage Armor", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "293", "classes": "Psion, Sorcerer, Wizard", "notation": "Ab:2 > Tr:2 > Ab:4", "tags": "utility", "duration": "8 hours", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a piece of cured leather)", "description": "You touch a willing creature who isn't wearing armor. Until the spell ends, the target's base AC becomes 13 plus its Dexterity modifier. The spell ends early if the target dons armor.", "higher": "", "color": "#40c8e0"}, {"name": "Mage Hand", "level": "Cantrip", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "293", "classes": "Artificer, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Co:1 > Co:4", "tags": "illusion_tag, movement, summon", "duration": "1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "A spectral, floating hand appears at a point you choose within range. The hand lasts for the duration. The hand vanishes if it is ever more than 30 feet away from you or if you cast this spell again.\n\nWhen you cast the spell, you can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a vial.\n\nAs a Magic action on your later turns, you can control the hand thus again. As part of that action, you can move the hand up to 30 feet.\n\nThe hand can't attack, activate magic items, or carry more than 10 pounds.", "higher": "", "color": "#e8a040"}, {"name": "Magic Circle", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "293", "classes": "Apothecary, Cleric, Paladin, Warlock, Wizard", "notation": "Ab:4 > Il:2 > Ne:3 > Tr:4 > Ab:3", "tags": "aoe, barrier, illusion_tag, mind, movement, reveal, summon, undead", "duration": "1 hour", "cast_time": "1 Min.", "range": "10 feet", "components": "V, S, M (salt and powdered silver worth 100+ GP, which the spell consumes)", "description": "You create a 10-foot-radius, 20-foot-tall Cylinder of magical energy centered on a point on the ground that you can see within range. Glowing runes appear wherever the Cylinder intersects with the floor or other surface.\n\nChoose one or more of the following types of creatures: Celestials, Elementals, Fey, Fiends, or Undead. The circle affects a creature of the chosen type in the following ways:\n\nThe creature can't willingly enter the Cylinder by nonmagical means. If the creature tries to use teleportation or interplanar travel to do so, it must first succeed on a Charisma saving throw.The creature has Disadvantage on attack rolls against targets within the Cylinder.Targets within the Cylinder can't be possessed by or gain the Charmed or Frightened condition from the creature.Each time you cast this spell, you can cause its magic to operate in the reverse direction, preventing a creature of the specified type from leaving the Cylinder and protecting targets outside it.", "higher": "Using a Higher-Level Spell Slot. The duration increases by 1 hour for each spell slot level above 3.", "color": "#40c8e0"}, {"name": "Magic Jar", "level": "Level 6", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "294", "classes": "Wizard", "notation": "Ne:2 > Co:2 > Tr:3 > Ab:4 > En:5 > Di:1 > Il:2 > Ne:3", "tags": "barrier, healing, mind, movement, reveal, single_target", "duration": "Until dispelled", "cast_time": "1 Min.", "range": "Self", "components": "V, S, M (a gem, crystal, or reliquary worth 500+ GP)", "description": "Your body falls into a catatonic state as your soul leaves it and enters the container you used for the spell's Material component. While your soul inhabits the container, you are aware of your surroundings as if you were in the container's space. You can't move or take Reactions. The only action you can take is to project your soul up to 100 feet out of the container, either returning to your living body (and ending the spell) or attempting to possess a Humanoid's body.\n\nYou can attempt to possess any Humanoid within 100 feet of you that you can see (creatures warded by a Protection from Evil and Good or Magic Circle spell can't be possessed). The target makes a Charisma saving throw. On a failed save, your soul enters the target's body, and the target's soul becomes trapped in the container. On a successful save, the target resists your efforts to possess it, and you can't attempt to possess it again for 24 hours.\n\nOnce you possess a creature's body, you control it. Your Hit Points, Hit Point Dice, Strength, Dexterity, Constitution, Speed, and senses are replaced by the creature's. You otherwise keep your game statistics.\n\nMeanwhile, the possessed creature's soul can perceive from the container using its own senses, but it can't move and it is Incapacitated.\n\nWhile possessing a body, you can take a Magic action to return from the host body to the container if it is within 100 feet of you, returning the host creature's soul to its body. If the host body dies while you're in it, the creature dies, and you make a Charisma saving throw against your own spellcasting DC. On a success, you return to the container if it is within 100 feet of you. Otherwise, you die.\n\nIf the container is destroyed or the spell ends, your soul returns to your body. If your body is more than 100 feet away from you or if your body is dead, you die. If another creature's soul is in the container when it is destroyed, the creature's soul returns to its body if the body is alive and within 100 feet. Otherwise, that creature dies.\n\nWhen the spell ends, the container is destroyed.", "higher": "", "color": "#a0a0a0"}, {"name": "Magic Missile", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "295", "classes": "Sorcerer, Wizard", "notation": "Ev:2 > Di:2 > Ev:5", "tags": "damage, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You create three glowing darts of magical force. Each dart strikes a creature of your choice that you can see within range. A dart deals 1d4 + 1 Force damage to its target. The darts all strike simultaneously, and you can direct them to hit one creature or several.", "higher": "Using a Higher-Level Spell Slot. The spell creates one more dart for each spell slot level above 1.", "color": "#e84040"}, {"name": "Magic Mouth", "level": "Level 2", "school": "Illusion", "ritual": "Yes", "source": "PHB'24", "page": "295", "classes": "Artificer, Bard, Psion, Wizard", "notation": "Il:3 > Co:2 > Tr:3 > Il:4", "tags": "illusion_tag, movement, reveal, summon, utility", "duration": "Until dispelled", "cast_time": "1 Min.", "range": "30 feet", "components": "V, S, M (jade dust worth 10+ GP, which the spell consumes)", "description": "You implant a message within an object in range—a message that is uttered when a trigger condition is met. Choose an object that you can see and that isn't being worn or carried by another creature. Then speak the message, which must be 25 words or fewer, though it can be delivered over as long as 10 minutes. Finally, determine the circumstance that will trigger the spell to deliver your message.\n\nWhen that trigger occurs, a magical mouth appears on the object and recites the message in your voice and at the same volume you spoke. If the object you chose has a mouth or something that looks like a mouth (for example, the mouth of a statue), the magical mouth appears there, so the words appear to come from the object's mouth. When you cast this spell, you can have the spell end after it delivers its message, or it can remain and repeat its message whenever the trigger occurs.\n\nThe trigger can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the object. For example, you could instruct the mouth to speak when any creature moves within 30 feet of the object or when a silver bell rings within 30 feet of it.", "higher": "", "color": "#4060e8"}, {"name": "Magic Stone", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Tr:2 > Tr:1", "tags": "damage, single_target", "duration": "1 minute", "cast_time": "Bonus", "range": "Touch", "components": "V, S", "description": "You touch one to three pebbles and imbue them with magic. You or someone else can make a ranged spell attack with one of the pebbles by throwing it or hurling it with a sling. If thrown, a pebble has a range of 60 feet. If someone else attacks with a pebble, that attacker adds your spellcasting ability modifier, not the attacker's, to the attack roll. On a hit, the target takes bludgeoning damage equal to 1d6 + your spellcasting ability modifier. Whether the attack hits or misses, the spell then ends on the stone.\n\nIf you cast this spell again, the spell ends on any pebbles still affected by your previous casting.", "higher": "", "color": "#40e890"}, {"name": "Magic Weapon", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "295", "classes": "Artificer, Paladin, Ranger, Sorcerer, Wizard", "notation": "Tr:3 > Ev:2 > En:3 > Tr:1", "tags": "damage, single_target", "duration": "1 hour", "cast_time": "Bonus", "range": "Touch", "components": "V, S", "description": "You touch a nonmagical weapon. Until the spell ends, that weapon becomes a magic weapon with a +1 bonus to attack rolls and damage rolls. The spell ends early if you cast it again.", "higher": "Using a Higher-Level Spell Slot. The bonus increases to +2 with a level 3-5 spell slot. The bonus increases to +3 with a level 6+ spell slot.", "color": "#40e890"}, {"name": "Magnify Gravity", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "EGW", "page": "188", "classes": "", "notation": "Tr:2 > Di:2 > Tr:3", "tags": "aoe, damage, movement, reveal", "duration": "1 round", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "The gravity in a 10-foot-radius sphere centered on a point you can see within range increases for a moment. Each creature in the sphere on the turn when you cast the spell must make a Constitution saving throw. On a failed save, a creature takes 2d8 force damage, and its speed is halved until the end of its next turn. On a successful save, a creature takes half as much damage and suffers no reduction to its speed.\n\nUntil the start of your next turn, any object that isn't being worn or carried in the sphere requires a successful Strength check against your spell save DC to pick up or move.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st.", "color": "#40e890"}, {"name": "Major Image", "level": "Level 3", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "295", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Il:4 > Co:2 > Tr:3 > Di:4 > Il:1", "tags": "alter_form, aoe, concentration, damage, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a bit of fleece)", "description": "You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 20-foot Cube. The image appears at a spot that you can see within range and lasts for the duration. It seems real, including sounds, smells, and temperature appropriate to the thing depicted, but it can't deal damage or cause conditions.\n\nIf you are within range of the illusion, you can take a Magic action to cause the image to move to any other spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking. Similarly, you can cause the illusion to make different sounds at different times, even making it carry on a conversation, for example.\n\nPhysical interaction with the image reveals it to be an illusion, for things can pass through it. A creature that takes a Study action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and its other sensory qualities become faint to the creature.", "higher": "Using a Higher-Level Spell Slot. The spell lasts until dispelled, without requiring Concentration, if cast with a level 4+ spell slot.", "color": "#4060e8"}, {"name": "Mass Cure Wounds", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "296", "classes": "Apothecary, Bard, Cleric, Druid", "notation": "Ab:1 > Di:2 > Co:3 > Ev:4 > En:5 > Tr:1 > Ab:4", "tags": "aoe, healing, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A wave of healing energy washes out from a point you can see within range. Choose up to six creatures in a 30-foot-radius Sphere centered on that point. Each target regains Hit Points equal to 5d8 plus your spellcasting ability modifier.", "higher": "Using a Higher-Level Spell Slot. The healing increases by 1d8 for each spell slot level above 5.", "color": "#40c8e0"}, {"name": "Mass Heal", "level": "Level 9", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "296", "classes": "Apothecary, Cleric", "notation": "Ab:5 > Di:2 > Ev:3 > Tr:4 > Co:5 > En:1 > Il:2 > Ne:3 > Di:4 > Ev:5 > Ab:1", "tags": "damage, healing, movement, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A flood of healing energy flows from you into creatures around you. You restore up to 700 Hit Points, divided as you choose among any number of creatures that you can see within range. Creatures healed by this spell also have the Blinded, Deafened, and Poisoned conditions removed from them.", "higher": "", "color": "#40c8e0"}, {"name": "Mass Healing Word", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "296", "classes": "Apothecary, Bard, Cleric", "notation": "Ab:4 > Di:2 > Co:3 > Ev:4 > Ab:1", "tags": "healing, reveal", "duration": "Instantaneous", "cast_time": "Bonus", "range": "60 feet", "components": "V", "description": "Up to six creatures of your choice that you can see within range regain Hit Points equal to 2d4 plus your spellcasting ability modifier.", "higher": "Using a Higher-Level Spell Slot. The healing increases by 1d4 for each spell slot level above 3.", "color": "#40c8e0"}, {"name": "Mass Polymorph", "level": "Level 9", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "160", "classes": "", "notation": "Tr:5 > Ab:2 > Co:3 > En:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Ab:4 > Co:5 > Tr:3", "tags": "alter_form, barrier, concentration, healing, mind, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a caterpillar cocoon)", "description": "You transform up to ten creatures of your choice that you can see within range. An unwilling target must succeed on a Wisdom saving throw to resist the transformation. An unwilling shapechanger automatically succeeds on the save.\n\nEach target assumes a beast form of your choice, and you can choose the same form or different ones for each target. The new form can be any beast you have seen whose challenge rating is equal to or less than the target's (or half the target's level, if the target doesn't have a challenge rating). The target's game statistics, including mental ability scores, are replaced by the statistics of the chosen beast, but the target retains its hit points, alignment, and personality.\n\nEach target gains a number of temporary hit points equal to the hit points of its new form. These temporary hit points can't be replaced by temporary hit points from another source. A target reverts to its normal form when it has no more temporary hit points or it dies. If the spell ends before then, the creature loses all its temporary hit points and reverts to its normal form.\n\nThe creature is limited in the actions it can perform by the nature of its new form. It can't speak, cast spells, or do anything else that requires hands or speech.\n\nThe target's gear melds into the new form. The target can't activate, use, wield, or otherwise benefit from any of its equipment.", "higher": "", "color": "#40e890"}, {"name": "Mass Suggestion", "level": "Level 6", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "296", "classes": "Bard, Psion, Sorcerer, Wizard", "notation": "En:2 > Il:2 > Ev:3 > Tr:4 > Di:5 > Co:1 > Ab:2 > En:1", "tags": "damage, mind, reveal, single_target", "duration": "24 hours", "cast_time": "Action", "range": "60 feet", "components": "V, M (a snake's tongue)", "description": "You suggest a course of activity—described in no more than 25 words—to twelve or fewer creatures you can see within range that can hear and understand you. The suggestion must sound achievable and not involve anything that would obviously deal damage to any of the targets or their allies. For example, you could say, \"Walk to the village down that road, and help the villagers there harvest crops until sunset.\" Or you could say, \"Now is not the time for violence. Drop your weapons, and dance! Stop in an hour.\"\n\nEach target must succeed on a Wisdom saving throw or have the Charmed condition for the duration or until you or your allies deal damage to the target. Each Charmed target pursues the suggestion to the best of its ability. The suggested activity can continue for the entire duration, but if the suggested activity can be completed in a shorter time, the spell ends for a target upon completing it.", "higher": "Using a Higher-Level Spell Slot. The duration is longer with a spell slot of level 7 (10 days), 8 (30 days), or 9 (366 days).", "color": "#c040e8"}, {"name": "Maximilian's Earthen Grasp", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "161", "classes": "", "notation": "Tr:3 > Co:2 > En:3 > Tr:4", "tags": "concentration, damage, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a miniature hand sculpted from clay)", "description": "You choose a 5-foot-square unoccupied space on the ground that you can see within range. A Medium hand made from compacted soil rises there and reaches for one creature you can see within 5 feet of it. The target must make a Strength saving throw. On a failed save, the target takes 2d6 bludgeoning damage and is restrained for the spell's duration.\n\nAs an action, you can cause the hand to crush the restrained target, which must make a Strength saving throw. The target takes 2d6 bludgeoning damage on a failed save, or half as much damage on a successful one.\n\nTo break out, the restrained target can use its action to make a Strength check against your spell save DC. On a success, the target escapes and is no longer restrained by the hand.\n\nAs an action, you can cause the hand to reach for a different creature or to move to a different unoccupied space within range. The hand releases a restrained target if you do either.", "higher": "", "color": "#40e890"}, {"name": "Maze", "level": "Level 8", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "296", "classes": "Psion, Wizard", "notation": "Co:4 > Di:2 > Ab:3 > Il:4 > Tr:5 > Ev:1 > En:2 > Ne:3 > Di:4 > Co:5", "tags": "concentration, illusion_tag, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You banish a creature that you can see within range into a labyrinthine demiplane. The target remains there for the duration or until it escapes the maze.\n\nThe target can take a Study action to try to escape. When it does so, it makes a DC 20 Intelligence (Investigation) check. If it succeeds, it escapes, and the spell ends.\n\nWhen the spell ends, the target reappears in the space it left or, if that space is occupied, in the nearest unoccupied space.", "higher": "", "color": "#e8a040"}, {"name": "Meld into Stone", "level": "Level 3", "school": "Transmutation", "ritual": "Yes", "source": "PHB'24", "page": "296", "classes": "Cleric, Druid, Ranger", "notation": "Tr:4 > Co:2 > Di:3 > Ev:4 > Tr:5", "tags": "alter_form, damage, movement, reveal, utility", "duration": "8 hours", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You step into a stone object or surface large enough to fully contain your body, merging yourself and your equipment with the stone for the duration. You must touch the stone to do so. Nothing of your presence remains visible or otherwise detectable by nonmagical senses.\n\nWhile merged with the stone, you can't see what occurs outside it, and any Wisdom (Perception) checks you make to hear sounds outside it are made with Disadvantage. You remain aware of the passage of time and can cast spells on yourself while merged in the stone. You can use 5 feet of movement to leave the stone where you entered it, which ends the spell. You otherwise can't move.\n\nMinor physical damage to the stone doesn't harm you, but its partial destruction or a change in its shape (to the extent that you no longer fit within it) expels you and deals 6d6 Force damage to you. The stone's complete destruction (or transmutation into a different substance) expels you and deals 50 Force damage to you. If expelled, you move into an unoccupied space closest to where you first entered and have the Prone condition.", "higher": "", "color": "#40e890"}, {"name": "Melf's Acid Arrow", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "297", "classes": "Apothecary, Wizard", "notation": "Ev:3 > Tr:2 > Co:3 > Ev:1", "tags": "aoe, barrier, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (powdered rhubarb leaf)", "description": "A shimmering green arrow streaks toward a target within range and bursts in a spray of acid. Make a ranged spell attack against the target. On a hit, the target takes 4d4 Acid damage and 2d4 Acid damage at the end of its next turn. On a miss, the arrow splashes the target with acid for half as much of the initial damage only.", "higher": "Using a Higher-Level Spell Slot. The damage (both initial and later) increases by 1d4 for each spell slot level above 2.", "color": "#e84040"}, {"name": "Melf's Minute Meteors", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "161", "classes": "", "notation": "Ev:4 > Ab:2 > Co:3 > Tr:4 > Ev:2", "tags": "aoe, barrier, concentration, damage, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (niter, sulfur, and pine tar formed into a bead)", "description": "You create six tiny meteors in your space. They float in the air and orbit you for the spell's duration. When you cast the spell—and as a bonus action on each of your turns thereafter—you can expend one or two of the meteors, sending them streaking toward a point or points you choose within 120 feet of you. Once a meteor reaches its destination or impacts against a solid surface, the meteor explodes. Each creature within 5 feet of the point where the meteor explodes must make a Dexterity saving throw. A creature takes 2d6 fire damage on a failed save, or half as much damage on a successful one.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the number of meteors created increases by two for each slot level above 3rd.", "color": "#e84040"}, {"name": "Mending", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "297", "classes": "Apothecary, Bard, Cleric, Druid, Psion, Sorcerer, Wizard", "notation": "Tr:2 > Tr:3", "tags": "damage, healing", "duration": "Instantaneous", "cast_time": "1 Min.", "range": "Touch", "components": "V, S, M (two lodestones)", "description": "This spell repairs a single break or tear in an object you touch, such as a broken chain link, two halves of a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no larger than 1 foot in any dimension, you mend it, leaving no trace of the former damage.\n\nThis spell can physically repair a magic item, but it can't restore magic to such an object.", "higher": "", "color": "#40e890"}, {"name": "Mental Prison", "level": "Level 6", "school": "Illusion", "ritual": "No", "source": "XGE", "page": "161", "classes": "", "notation": "Il:2 > Co:2 > Tr:3 > Ab:4 > Di:5 > En:1 > Ev:2 > Il:1", "tags": "aoe, barrier, concentration, damage, illusion_tag, mind, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "S", "description": "You attempt to bind a creature within an illusory cell that only it perce
