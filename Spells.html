ives. One creature you can see within range must make an Intelligence saving throw. The target succeeds automatically if it is immune to being charmed. On a successful save, the target takes 5d10 psychic damage, and the spell ends. On a failed save, the target takes 5d10 psychic damage, and you make the area immediately around the target's space appear dangerous to it in some way. You might cause the target to perceive itself as being surrounded by fire, floating razors, or hideous maws filled with dripping teeth. Whatever form the illusion takes, the target can't see or hear anything beyond it and is restrained for the spell's duration. If the target is moved out of the illusion, makes a melee attack through it, or reaches any part of its body through it, the target takes 10d10 psychic damage, and the spell ends.", "higher": "", "color": "#4060e8"}, {"name": "Message", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "298", "classes": "Apothecary, Artificer, Bard, Druid, Psion, Sorcerer, Wizard", "notation": "Tr:2 > Tr:4", "tags": "barrier, reveal", "duration": "1 round", "cast_time": "Action", "range": "120 feet", "components": "S, M (a copper wire)", "description": "You point toward a creature within range and whisper a message. The target (and only the target) hears the message and can reply in a whisper that only you can hear.\n\nYou can cast this spell through solid objects if you are familiar with the target and know it is beyond the barrier. Magical silence; 1 foot of stone, metal, or wood; or a thin sheet of lead blocks the spell.", "higher": "", "color": "#40e890"}, {"name": "Meteor Swarm", "level": "Level 9", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "298", "classes": "Sorcerer, Wizard", "notation": "Ev:5 > Di:2 > Tr:3 > Co:4 > Ab:5 > En:1 > Il:2 > Ne:3 > Di:4 > Tr:5 > Ev:3", "tags": "aoe, damage, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "1 mile", "components": "V, S", "description": "Blazing orbs of fire plummet to the ground at four different points you can see within range. Each creature in a 40-foot-radius Sphere centered on each of those points makes a Dexterity saving throw. A creature takes 20d6 Fire damage and 20d6 Bludgeoning damage on a failed save or half as much damage on a successful one. A creature in the area of more than one fiery Sphere is affected only once.\n\nA nonmagical object that isn't being worn or carried also takes the damage if it's in the spell's area, and the object starts burning if it's flammable.", "higher": "", "color": "#e84040"}, {"name": "Mighty Fortress", "level": "Level 8", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "161", "classes": "", "notation": "Co:4 > Il:2 > Tr:3 > Ab:4 > Di:5 > En:1 > Ev:2 > Ne:3 > Il:4 > Co:5", "tags": "aoe, barrier, damage, healing, illusion_tag, mind, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "1 Min.", "range": "1 mile", "components": "V, S, M (a diamond worth at least 500 gp, which the spell consumes)", "description": "A fortress of stone erupts from a square area of ground of your choice that you can see within range. The area is 120 feet on each side, and it must not have any buildings or other structures on it. Any creatures in the area are harmlessly lifted up as the fortress rises.\n\nThe fortress has four turrets with square bases, each one 20 feet on a side and 30 feet tall, with one turret on each corner. The turrets are connected to each other by stone walls that are each 80 feet long, creating an enclosed area. Each wall is 1 foot thick and is composed of panels that are 10 feet wide and 20 feet tall. Each panel is contiguous with two other panels or one other panel and a turret. You can place up to four stone doors in the fortress's outer wall.\n\nA small keep stands inside the enclosed area. The keep has a square base that is 50 feet on each side, and it has three floors with 10-foot-high ceilings. Each of the floors can be divided into as many rooms as you like, provided each room is at least 5 feet on each side. The floors of the keep are connected by stone staircases, its walls are 6 inches thick, and interior rooms can have stone doors or open archways as you choose. The keep is furnished and decorated however you like, and it contains sufficient food to serve a nine-course banquet for up to 100 people each day. Furnishings, food, and other objects created by this spell crumble to dust if removed from the fortress.\n\nA staff of one hundred invisible servants obeys any command given to them by creatures you designate when you cast the spell. Each servant functions as if created by the unseen servant spell.\n\nThe walls, turrets, and keep are all made of stone that can be damaged. Each 10-foot-by-10-foot section of stone has AC 15 and 30 hit points per inch of thickness. It is immune to poison and psychic damage. Reducing a section of stone to 0 hit points destroys it and might cause connected sections to buckle and collapse at the DM's discretion.\n\nAfter 7 days or when you cast this spell somewhere else, the fortress harmlessly crumbles and sinks back into the ground, leaving any creatures that were inside it safely on the ground.\n\nCasting this spell on the same spot once every 7 days for a year makes the fortress permanent.", "higher": "", "color": "#e8a040"}, {"name": "Mind Blank", "level": "Level 8", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "298", "classes": "Apothecary, Bard, Psion, Wizard", "notation": "Ab:4 > En:2 > Il:3 > Ev:4 > Tr:5 > Di:1 > Co:2 > Ne:3 > En:4 > Ab:2", "tags": "damage, mind, reveal", "duration": "24 hours", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "Until the spell ends, one willing creature you touch has Immunity to Psychic damage and the Charmed condition. The target is also unaffected by anything that would sense its emotions or alignment, read its thoughts, or magically detect its location, and no spell—not even Wish—can gather information about the target, observe it remotely, or control its mind.", "higher": "", "color": "#40c8e0"}, {"name": "Mind Sliver", "level": "Cantrip", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "298", "classes": "Psion, Sorcerer, Warlock, Wizard", "notation": "En:1 > En:3", "tags": "damage, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You try to temporarily sliver the mind of one creature you can see within range. The target must succeed on an Intelligence saving throw or take 1d6 Psychic damage and subtract 1d4 from the next saving throw it makes before the end of your next turn.", "higher": "Cantrip Upgrade. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).", "color": "#c040e8"}, {"name": "Mind Spike", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "298", "classes": "Psion, Sorcerer, Warlock, Wizard", "notation": "Di:3 > Il:2 > En:3 > Di:4", "tags": "concentration, damage, illusion_tag, mind, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "120 feet", "components": "S", "description": "You drive a spike of psionic energy into the mind of one creature you can see within range. The target makes a Wisdom saving throw, taking 3d8 Psychic damage on a failed save or half as much damage on a successful one. On a failed save, you also always know the target's location until the spell ends, but only while the two of you are on the same plane of existence. While you have this knowledge, the target can't become hidden from you, and if it has the Invisible condition, it gains no benefit from that condition against you.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 2.", "color": "#c8e040"}, {"name": "Minor Illusion", "level": "Cantrip", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "298", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Il:1 > Il:3", "tags": "aoe, illusion_tag, reveal, summon", "duration": "1 minute", "cast_time": "Action", "range": "30 feet", "components": "S, M (a bit of fleece)", "description": "You create a sound or an image of an object within range that lasts for the duration. See the descriptions below for the effects of each. The illusion ends if you cast this spell again.\n\nIf a creature takes a Study action to examine the sound or image, the creature can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the illusion becomes faint to the creature.\n\nSound. If you create a sound, its volume can range from a whisper to a scream. It can be your voice, someone else's voice, a lion's roar, a beating of drums, or any other sound you choose. The sound continues unabated throughout the duration, or you can make discrete sounds at different times before the spell ends.\n\nImage. If you create an image of an object—such as a chair, muddy footprints, or a small chest—it must be no larger than a 5-foot Cube. The image can't create sound, light, smell, or any other sensory effect. Physical interaction with the image reveals it to be an illusion, since things can pass through it.", "higher": "", "color": "#4060e8"}, {"name": "Mirage Arcane", "level": "Level 7", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "299", "classes": "Bard, Druid, Psion, Wizard", "notation": "Il:3 > Co:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Il:4", "tags": "alter_form, aoe, illusion_tag, movement, reveal, summon", "duration": "10 days", "cast_time": "10 Min.", "range": "Sight", "components": "V, S", "description": "You make terrain in an area up to 1 mile square look, sound, smell, and even feel like some other sort of terrain. Open fields or a road could be made to resemble a swamp, hill, crevasse, or some other rough or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a rock-strewn gully like a wide and smooth road.\n\nSimilarly, you can alter the appearance of structures or add them where none are present. The spell doesn't disguise, conceal, or add creatures.\n\nThe illusion includes audible, visual, tactile, and olfactory elements, so it can turn clear ground into Difficult Terrain (or vice versa) or otherwise impede movement through the area. Any piece of the illusory terrain (such as a rock or stick) that is removed from the spell's area disappears immediately.\n\nCreatures with Truesight can see through the illusion to the terrain's true form; however, all other elements of the illusion remain, so while the creature is aware of the illusion's presence, the creature can still physically interact with the illusion.", "higher": "", "color": "#4060e8"}, {"name": "Mirror Image", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "299", "classes": "Bard, Psion, Sorcerer, Tamer, Warlock, Wizard", "notation": "Il:3 > Co:2 > Tr:3 > Il:5", "tags": "damage, illusion_tag, movement, reveal, single_target, summon", "duration": "1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Three illusory duplicates of yourself appear in your space. Until the spell ends, the duplicates move with you and mimic your actions, shifting position so it's impossible to track which image is real.\n\nEach time a creature hits you with an attack roll during the spell's duration, roll a d6 for each of your remaining duplicates. If any of the d6s rolls a 3 or higher, one of the duplicates is hit instead of you, and the duplicate is destroyed. The duplicates otherwise ignore all other damage and effects. The spell ends when all three duplicates are destroyed.\n\nA creature is unaffected by this spell if it has the Blinded condition, Blindsight, or Truesight.", "higher": "", "color": "#4060e8"}, {"name": "Mislead", "level": "Level 5", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "299", "classes": "Bard, Psion, Tamer, Warlock, Wizard", "notation": "Il:1 > Co:2 > Tr:3 > En:4 > Di:5 > Ev:1 > Il:5", "tags": "concentration, damage, illusion_tag, movement, reveal, single_target, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "S", "description": "You gain the Invisible condition at the same time that an illusory double of you appears where you are standing. The double lasts for the duration, but the invisibility ends immediately after you make an attack roll, deal damage, or cast a spell.\n\nAs a Magic action, you can move the illusory double up to twice your Speed and make it gesture, speak, and behave in whatever way you choose. It is intangible and invulnerable.\n\nYou can see through its eyes and hear through its ears as if you were located where it is.", "higher": "", "color": "#4060e8"}, {"name": "Misty Step", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "299", "classes": "Sorcerer, Warlock, Wizard", "notation": "Co:3 > Di:2 > Tr:3 > Co:1", "tags": "movement, reveal", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "Briefly surrounded by silvery mist, you teleport up to 30 feet to an unoccupied space you can see.", "higher": "", "color": "#e8a040"}, {"name": "Modify Memory", "level": "Level 5", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "299", "classes": "Bard, Psion, Wizard", "notation": "En:1 > Co:2 > Tr:3 > Ab:4 > Di:5 > Il:1 > En:3", "tags": "alter_form, concentration, damage, healing, mind, movement, reveal, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You attempt to reshape another creature's memories. One creature that you can see within range makes a Wisdom saving throw. If you are fighting the creature, it has Advantage on the save. On a failed save, the target has the Charmed condition for the duration. While Charmed in this way, the target also has the Incapacitated condition and is unaware of its surroundings, though it can hear you. If it takes any damage or is targeted by another spell, this spell ends, and no memories are modified.\n\nWhile this charm lasts, you can affect the target's memory of an event that it experienced within the last 24 hours and that lasted no more than 10 minutes. You can permanently eliminate all memory of the event, allow the target to recall the event with perfect clarity, change its memory of the event's details, or create a memory of some other event.\n\nYou must speak to the target to describe how its memories are affected, and it must be able to understand your language for the modified memories to take root. Its mind fills in any gaps in the details of your description. If the spell ends before you finish describing the modified memories, the creature's memory isn't altered. Otherwise, the modified memories take hold when the spell ends.\n\nA modified memory doesn't necessarily affect how a creature behaves, particularly if the memory contradicts the creature's natural inclinations, alignment, or beliefs. An illogical modified memory, such as a false memory of how much the creature enjoyed swimming in acid, is dismissed as a bad dream. The DM might deem a modified memory too nonsensical to affect a creature.\n\nA Remove Curse or Greater Restoration spell cast on the target restores the creature's true memory.", "higher": "Using a Higher-Level Spell Slot. You can alter the target's memories of an event that took place up to 7 days ago (level 6 spell slot), 30 days ago (level 7 spell slot), 365 days ago (level 8 spell slot), or any time in the creature's past (level 9 spell slot).", "color": "#c040e8"}, {"name": "Mold Earth", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "162", "classes": "", "notation": "Tr:2 > Tr:5", "tags": "alter_form, aoe, damage, illusion_tag, movement, reveal, summon", "duration": "Instantaneous or 1 hour (see below)", "cast_time": "Action", "range": "30 feet", "components": "S", "description": "You choose a portion of dirt or stone that you can see within range and that fits within a 5-foot cube. You manipulate it in one of the following ways:\n\nIf you target an area of loose earth, you can instantaneously excavate it, move it along the ground, and deposit it up to 5 feet away. This movement doesn't involve enough force to cause damage.You cause shapes, colors, or both to appear on the dirt or stone, spelling out words, creating images, or shaping patterns. The changes last for 1 hour.If the dirt or stone you target is on the ground, you cause it to become difficult terrain. Alternatively, you can cause the ground to become normal terrain if it is already difficult terrain. This change lasts for 1 hour.If you cast this spell multiple times, you can have no more than two of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action.", "higher": "", "color": "#40e890"}, {"name": "Moonbeam", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "300", "classes": "Druid", "notation": "Ev:3 > Il:2 > Co:3 > Ev:4", "tags": "alter_form, aoe, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a moonseed leaf)", "description": "A silvery beam of pale light shines down in a 5-foot-radius, 40-foot-high Cylinder centered on a point within range. Until the spell ends, Dim Light fills the Cylinder, and you can take a Magic action on later turns to move the Cylinder up to 60 feet.\n\nWhen the Cylinder appears, each creature in it makes a Constitution saving throw. On a failed save, a creature takes 2d10 Radiant damage, and if the creature is shape-shifted (as a result of the Polymorph spell, for example), it reverts to its true form and can't shape-shift until it leaves the Cylinder. On a successful save, a creature takes half as much damage only. A creature also makes this save when the spell's area moves into its space and when it enters the spell's area or ends its turn there. A creature makes this save only once per turn.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 2.", "color": "#e84040"}, {"name": "Mordenkainen's Faithful Hound", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "300", "classes": "Artificer, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > En:4 > Di:5 > Co:3", "tags": "damage, illusion_tag, movement, reveal, single_target, summon", "duration": "8 hours", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a silver whistle)", "description": "You conjure a phantom watchdog in an unoccupied space that you can see within range. The hound remains for the duration or until the two of you are more than 300 feet apart from each other.\n\nNo one but you can see the hound, and it is intangible and invulnerable. When a Small or larger creature comes within 30 feet of it without first speaking the password that you specify when you cast this spell, the hound starts barking loudly. The hound has Truesight with a range of 30 feet.\n\nAt the start of each of your turns, the hound attempts to bite one enemy within 5 feet of it. That enemy must succeed on a Dexterity saving throw or take 4d8 Force damage.\n\nOn your later turns, you can take a Magic action to move the hound up to 30 feet.", "higher": "", "color": "#e8a040"}, {"name": "Mordenkainen's Magnificent Mansion", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "300", "classes": "Bard, Wizard", "notation": "Co:3 > Il:2 > Tr:3 > Ev:4 > Di:5 > Ab:1 > En:2 > Ne:3 > Co:4", "tags": "aoe, damage, illusion_tag, movement, summon", "duration": "24 hours", "cast_time": "1 Min.", "range": "300 feet", "components": "V, S, M (a miniature door worth 15+ GP)", "description": "You conjure a shimmering door in range that lasts for the duration. The door leads to an extradimensional dwelling and is 5 feet wide and 10 feet tall. You and any creature you designate when you cast the spell can enter the extradimensional dwelling as long as the door remains open. You can open or close it (no action required) if you are within 30 feet of it. While closed, the door is imperceptible.\n\nBeyond the door is a magnificent foyer with numerous chambers beyond. The dwelling's atmosphere is clean, fresh, and warm.\n\nYou can create any floor plan you like for the dwelling, but it can't exceed 50 contiguous 10-foot Cubes. The place is furnished and decorated as you choose. It contains sufficient food to serve a nine-course banquet for up to 100 people. Furnishings and other objects created by this spell dissipate into smoke if removed from it.\n\nA staff of 100 near-transparent servants attends all who enter. You determine the appearance of these servants and their attire. They are invulnerable and obey your commands. Each servant can perform tasks that a human could perform, but they can't attack or take any action that would directly harm another creature. Thus the servants can fetch things, clean, mend, fold clothes, light fires, serve food, pour wine, and so on. The servants can't leave the dwelling.\n\nWhen the spell ends, any creatures or objects left inside the extradimensional space are expelled into the unoccupied spaces nearest to the entrance.", "higher": "", "color": "#e8a040"}, {"name": "Mordenkainen's Private Sanctum", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "301", "classes": "Artificer, Wizard", "notation": "Ab:5 > Il:2 > Co:3 > Tr:4 > Ev:5 > Ab:3", "tags": "aoe, barrier, illusion_tag, movement, summon", "duration": "24 hours", "cast_time": "10 Min.", "range": "120 feet", "components": "V, S, M (a thin sheet of lead)", "description": "You make an area within range magically secure. The area is a Cube that can be as small as 5 feet to as large as 100 feet on each side. The spell lasts for the duration.\n\nWhen you cast the spell, you decide what sort of security the spell provides, choosing any of the following properties:\n\nSound can't pass through the barrier at the edge of the warded area.The barrier of the warded area appears dark and foggy, preventing vision (including Darkvision) through it.Sensors created by Divination spells can't appear inside the protected area or pass through the barrier at its perimeter.Creatures in the area can't be targeted by Divination spells.Nothing can teleport into or out of the warded area.Planar travel is blocked within the warded area.Casting this spell on the same spot every day for 365 days makes the spell last until dispelled.", "higher": "Using a Higher-Level Spell Slot. You can increase the size of the Cube by 100 feet for each spell slot level above 4.", "color": "#40c8e0"}, {"name": "Mordenkainen's Sword", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "302", "classes": "Bard, Wizard", "notation": "Ev:3 > Il:2 > Co:3 > Tr:4 > Di:5 > Ab:1 > En:2 > Ne:3 > Ev:5", "tags": "concentration, damage, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a miniature sword worth 250+ GP)", "description": "You create a spectral sword that hovers within range. It lasts for the duration.\n\nWhen the sword appears, you make a melee spell attack against a target within 5 feet of the sword. On a hit, the target takes Force damage equal to 4d12 plus your spellcasting ability modifier.\n\nOn your later turns, you can take a Bonus Action to move the sword up to 30 feet to a spot you can see and repeat the attack against the same target or a different one.", "higher": "", "color": "#e84040"}, {"name": "Move Earth", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "302", "classes": "Druid, Psion, Sorcerer, Wizard", "notation": "Tr:2 > Ne:2 > Co:3 > Ab:4 > Il:5 > Ev:1 > Di:2 > Tr:4", "tags": "alter_form, aoe, barrier, concentration, movement, summon, undead", "duration": "Concentration, up to 2 hours", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a miniature shovel)", "description": "Choose an area of terrain no larger than 40 feet on a side within range. You can reshape dirt, sand, or clay in the area in any manner you choose for the duration. You can raise or lower the area's elevation, create or fill in a trench, erect or flatten a wall, or form a pillar. The extent of any such changes can't exceed half the area's largest dimension. For example, if you affect a 40-foot square, you can create a pillar up to 20 feet high, raise or lower the square's elevation by up to 20 feet, dig a trench up to 20 feet deep, and so on. It takes 10 minutes for these changes to complete. Because the terrain's transformation occurs slowly, creatures in the area can't usually be trapped or injured by the ground's movement.\n\nAt the end of every 10 minutes you spend Concentrating on the spell, you can choose a new area of terrain to affect within range.\n\nThis spell can't manipulate natural stone or stone construction. Rocks and structures shift to accommodate the new terrain. If the way you shape the terrain would make a structure unstable, it might collapse.\n\nSimilarly, this spell doesn't directly affect plant growth. The moved earth carries any plants along with it.", "higher": "", "color": "#40e890"}, {"name": "Nathair's Mischief", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "FTD", "page": "20", "classes": "", "notation": "Il:3 > Co:2 > Tr:3 > Il:1", "tags": "aoe, concentration, illusion_tag, mind, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "S, M (a piece of crust from an apple pie)", "description": "You fill a 20-foot cube you can see within range with fey and draconic magic. Roll on the Mischievous Surge table to determine the magical effect produced, and roll again at the start of each of your turns until the spell ends. You can move the cube up to 10 feet before you roll.\n\nMischievous Surged4Effect1The smell of apple pie fills the air, and each creature in the cube must succeed on a Wisdom saving throw or become charmed by you until the start of your next turn.2Bouquets of flowers appear all around, and each creature in the cube must succeed on a Dexterity saving throw or be blinded until the start of your next turn as the flowers spray water in their faces.3Each creature in the cube must succeed on a Wisdom saving throw or begin giggling until the start of your next turn. A giggling creature is incapacitated and uses all its movement to move in a random direction.4Drops of molasses hover in the cube, making it difficult terrain until the start of your next turn.", "higher": "", "color": "#4060e8"}, {"name": "Negative Energy Flood", "level": "Level 5", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "163", "classes": "", "notation": "Ne:1 > Tr:2 > Ab:3 > Co:4 > En:5 > Di:1 > Ne:4", "tags": "damage, healing, reveal, single_target, undead", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, M (a broken bone and a square of black silk)", "description": "You send ribbons of negative energy at one creature you can see within range. Unless the target is undead, it must make a Constitution saving throw, taking 5d12 necrotic damage on a failed save, or half as much damage on a successful one. A target killed by this damage rises up as a zombie at the start of your next turn. The zombie pursues whatever creature it can see that is closest to it. Statistics for the zombie are in the Monster Manual.\n\nIf you target an undead with this spell, the target doesn't make a saving throw. Instead, roll 5d12. The target gains half the total as temporary hit points.", "higher": "", "color": "#a0a0a0"}, {"name": "Nondetection", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "302", "classes": "Bard, Psion, Ranger, Tamer, Wizard", "notation": "Ab:4 > Di:2 > Ev:3 > Co:4 > Ab:5", "tags": "reveal", "duration": "8 hours", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a pinch of diamond dust worth 25+ GP, which the spell consumes)", "description": "For the duration, you hide a target that you touch from Divination spells. The target can be a willing creature, or it can be a place or an object no larger than 10 feet in any dimension. The target can't be targeted by any Divination spell or perceived through magical scrying sensors.", "higher": "", "color": "#40c8e0"}, {"name": "Nystul's Magic Aura", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "302", "classes": "Wizard", "notation": "Il:3 > Ab:2 > Co:3 > Il:2", "tags": "alter_form, barrier, illusion_tag, reveal, summon", "duration": "24 hours", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a small square of silk)", "description": "With a touch, you place an illusion on a willing creature or an object that isn't being worn or carried. A creature gains the Mask effect below, and an object gains the False Aura effect below. The effect lasts for the duration. If you cast the spell on the same target every day for 30 days, the illusion lasts until dispelled.\n\nMask (Creature). Choose a creature type other than the target's actual type. Spells and other magical effects treat the target as if it were a creature of the chosen type.\n\nFalse Aura (Object). You change the way the target appears to spells and magical effects that detect magical auras, such as Detect Magic. You can make a nonmagical object appear magical, make a magic item appear nonmagical, or change the object's aura so that it appears to belong to a school of magic you choose.", "higher": "", "color": "#4060e8"}, {"name": "Otiluke's Freezing Sphere", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "302", "classes": "Sorcerer, Wizard", "notation": "Ev:2 > Il:2 > Tr:3 > Co:4 > Di:5 > Ab:1 > En:2 > Ev:1", "tags": "aoe, damage, illusion_tag, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "300 feet", "components": "V, S, M (a miniature crystal sphere)", "description": "A frigid globe streaks from you to a point of your choice within range, where it explodes in a 60-foot-radius Sphere. Each creature in that area makes a Constitution saving throw, taking 10d6 Cold damage on failed save or half as much damage on a successful one.\n\nIf the globe strikes a body of water, it freezes the water to a depth of 6 inches over an area 30 feet square. This ice lasts for 1 minute. Creatures that were swimming on the surface of frozen water are trapped in the ice and have the Restrained condition. A trapped creature can take an action to make a Strength (Athletics) check against your spell save DC to break free.\n\nYou can refrain from firing the globe after completing the spell's casting. If you do so, a globe about the size of a sling bullet, cool to the touch, appears in your hand. At any time, you or a creature you give the globe to can throw the globe (to a range of 40 feet) or hurl it with a sling (to the sling's normal range). It shatters on impact, with the same effect as a normal casting of the spell. You can also set the globe down without shattering it. After 1 minute, if the globe hasn't already shattered, it explodes.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 6.", "color": "#e84040"}, {"name": "Otiluke's Resilient Sphere", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "303", "classes": "Artificer, Tamer, Wizard", "notation": "Ab:5 > Co:2 > Tr:3 > Ev:4 > Di:5 > Ab:1", "tags": "aoe, barrier, concentration, damage, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a glass sphere)", "description": "A shimmering sphere encloses a Large or smaller creature or object within range. An unwilling creature must succeed on a Dexterity saving throw or be enclosed for the duration.\n\nNothing—not physical objects, energy, or other spell effects—can pass through the barrier, in or out, though a creature in the sphere can breathe there. The sphere is immune to all damage, and a creature or object inside can't be damaged by attacks or effects originating from outside, nor can a creature inside the sphere damage anything outside it.\n\nThe sphere is weightless and just large enough to contain the creature or object inside. An enclosed creature can take an action to push against the sphere's walls and thus roll the sphere at up to half the creature's Speed. Similarly, the globe can be picked up and moved by other creatures.\n\nA Disintegrate spell targeting the globe destroys it without harming anything inside.", "higher": "", "color": "#40c8e0"}, {"name": "Otto's Irresistible Dance", "level": "Level 6", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "303", "classes": "Bard, Psion, Wizard", "notation": "En:2 > Co:2 > Tr:3 > Di:4 > Il:5 > Ab:1 > Ev:2 > En:4", "tags": "concentration, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V", "description": "One creature that you can see within range must make a Wisdom saving throw. On a successful save, the target dances comically until the end of its next turn, during which it must spend all its movement to dance in place.\n\nOn a failed save, the target has the Charmed condition for the duration. While Charmed, the target dances comically, must use all its movement to dance in place, and has Disadvantage on Dexterity saving throws and attack rolls, and other creatures have Advantage on attack rolls against it. On each of its turns, the target can take an action to collect itself and repeat the save, ending the spell on itself on a success.", "higher": "", "color": "#c040e8"}, {"name": "Pass without Trace", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "303", "classes": "Druid, Ranger, Tamer", "notation": "Ab:3 > Ev:2 > Co:3 > Ab:1", "tags": "aoe, concentration", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (ashes from burned mistletoe)", "description": "You radiate a concealing aura in a 30-foot Emanation for the duration. While in the aura, you and each creature you choose have a +10 bonus to Dexterity (Stealth) checks and leave no tracks.", "higher": "", "color": "#40c8e0"}, {"name": "Passwall", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "304", "classes": "Wizard", "notation": "Tr:1 > Di:2 > Il:3 > Ab:4 > Co:5 > Ev:1 > Tr:5", "tags": "barrier, illusion_tag, reveal, summon", "duration": "1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a pinch of sesame seeds)", "description": "A passage appears at a point that you can see on a wooden, plaster, or stone surface (such as a wall, ceiling, or floor) within range and lasts for the duration. You choose the opening's dimensions: up to 5 feet wide, 8 feet tall, and 20 feet deep. The passage creates no instability in a structure surrounding it.\n\nWhen the opening disappears, any creatures or objects still in the passage created by the spell are safely ejected to an unoccupied space nearest to the surface on which you cast the spell.", "higher": "", "color": "#40e890"}, {"name": "Phantasmal Force", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "304", "classes": "Bard, Psion, Sorcerer, Wizard", "notation": "Il:3 > Co:2 > Ev:3 > Il:2", "tags": "aoe, concentration, damage, illusion_tag, mind, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a bit of fleece)", "description": "You attempt to craft an illusion in the mind of a creature you can see within range. The target makes an Intelligence saving throw. On a failed save, you create a phantasmal object, creature, or other phenomenon that is no larger than a 10-foot Cube and that is perceivable only to the target for the duration. The phantasm includes sound, temperature, and other stimuli.\n\nThe target can take a Study action to examine the phantasm with an Intelligence (Investigation) check against your spell save DC. If the check succeeds, the target realizes that the phantasm is an illusion, and the spell ends.\n\nWhile affected by the spell, the target treats the phantasm as if it were real and rationalizes any illogical outcomes from interacting with it. For example, if the target steps through a phantasmal bridge and survives the fall, it believes the bridge exists and something else caused it to fall.\n\nAn affected target can even take damage from the illusion if the phantasm represents a dangerous creature or hazard. On each of your turns, such a phantasm can deal 2d8 Psychic damage to the target if it is in the phantasm's area or within 5 feet of the phantasm. The target perceives the damage as a type appropriate to the illusion.", "higher": "", "color": "#4060e8"}, {"name": "Phantasmal Killer", "level": "Level 4", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "304", "classes": "Bard, Psion, Wizard", "notation": "Il:5 > En:2 > Di:3 > Co:4 > Tr:5 > Il:4", "tags": "concentration, damage, illusion_tag, mind, reveal, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You tap into the nightmares of a creature you can see within range and create an illusion of its deepest fears, visible only to that creature. The target makes a Wisdom saving throw. On a failed save, the target takes 4d10 Psychic damage and has Disadvantage on ability checks and attack rolls for the duration. On a successful save, the target takes half as much damage, and the spell ends.\n\nFor the duration, the target makes a Wisdom saving throw at the end of each of its turns. On a failed save, it takes the Psychic damage again. On a successful save, the spell ends.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 4.", "color": "#4060e8"}, {"name": "Phantom Steed", "level": "Level 3", "school": "Illusion", "ritual": "Yes", "source": "PHB'24", "page": "304", "classes": "Wizard", "notation": "Il:4 > Co:2 > Tr:3 > Ev:4 > Il:5", "tags": "damage, illusion_tag, movement, summon, utility", "duration": "1 hour", "cast_time": "1 Min.", "range": "30 feet", "components": "V, S", "description": "A Large, quasi-real, horselike creature appears on the ground in an unoccupied space of your choice within range. You decide the creature's appearance, and it is equipped with a saddle, bit, and bridle. Any of the equipment created by the spell vanishes in a puff of smoke if it is carried more than 10 feet away from the steed.\n\nFor the duration, you or a creature you choose can ride the steed. The steed uses the Riding Horse stat block, except it has a Speed of 100 feet and can travel 13 miles in an hour. When the spell ends, the steed gradually fades, giving the rider 1 minute to dismount. The spell ends early if the steed takes any damage.", "higher": "", "color": "#4060e8"}, {"name": "Planar Ally", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "304", "classes": "Cleric", "notation": "Co:2 > Il:2 > Tr:3 > Ab:4 > Di:5 > Ev:1 > En:2 > Co:4", "tags": "alter_form, barrier, illusion_tag, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "10 Min.", "range": "60 feet", "components": "V, S", "description": "You beseech an otherworldly entity for aid. The being must be known to you: a god, a demon prince, or some other being of cosmic power. That entity sends a Celestial, an Elemental, or a Fiend loyal to it to aid you, making the creature appear in an unoccupied space within range. If you know a specific creature's name, you can speak that name when you cast this spell to request that creature, though you might get a different creature anyway (DM's choice).\n\nWhen the creature appears, it is under no compulsion to behave a particular way. You can ask it to perform a service in exchange for payment, but it isn't obliged to do so. The requested task could range from simple (fly us across the chasm, or help us fight a battle) to complex (spy on our enemies, or protect us during our foray into the dungeon). You must be able to communicate with the creature to bargain for its services.\n\nPayment can take a variety of forms. A Celestial might require a sizable donation of gold or magic items to an allied temple, while a Fiend might demand a living sacrifice or a gift of treasure. Some creatures might exchange their service for a quest undertaken by you.\n\nA task that can be measured in minutes requires a payment worth 100 GP per minute. A task measured in hours requires 1,000 GP per hour. And a task measured in days (up to 10 days) requires 10,000 GP per day. The DM can adjust these payments based on the circumstances under which you cast the spell. If the task is aligned with the creature's ethos, the payment might be halved or even waived. Nonhazardous tasks typically require only half the suggested payment, while especially dangerous tasks might require a greater gift. Creatures rarely accept tasks that seem suicidal.\n\nAfter the creature completes the task, or when the agreed-upon duration of service expires, the creature returns to its home plane after reporting back to you if possible. If you are unable to agree on a price for the creature's service, the creature immediately returns to its home plane.", "higher": "", "color": "#e8a040"}, {"name": "Planar Binding", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "305", "classes": "Bard, Cleric, Druid, Warlock, Wizard", "notation": "Ab:1 > En:2 > Il:3 > Co:4 > Tr:5 > Di:1 > Ab:2", "tags": "mind, movement, single_target, summon", "duration": "24 hours", "cast_time": "1 Hr.", "range": "60 feet", "components": "V, S, M (a jewel worth 1,000+ GP, which the spell consumes)", "description": "You attempt to bind a Celestial, an Elemental, a Fey, or a Fiend to your service. The creature must be within range for the entire casting of the spell. (Typically, the creature is first summoned into the center of the inverted version of the Magic Circle spell to trap it while this spell is cast.) At the completion of the casting, the target must succeed on a Charisma saving throw or be bound to serve you for the duration. If the creature was summoned or created by another spell, that spell's duration is extended to match the duration of this spell.\n\nA bound creature must follow your commands to the best of its ability. You might command the creature to accompany you on an adventure, to guard a location, or to deliver a message. If the creature is Hostile, it strives to twist your commands to achieve its own objectives. If the creature carries out your commands completely before the spell ends, it travels to you to report this fact if you are on the same plane of existence. If you are on a different plane, it returns to the place where you bound it and remains there until the spell ends.", "higher": "Using a Higher-Level Spell Slot. The duration increases with a spell slot of level 6 (10 days), 7 (30 days), 8 (180 days), and 9 (366 days).", "color": "#40c8e0"}, {"name": "Plane Shift", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "305", "classes": "Apothecary, Cleric, Druid, Psion, Sorcerer, Warlock, Wizard", "notation": "Co:3 > Il:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Co:5", "tags": "alter_form, damage, illusion_tag, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a forked, metal rod worth 250+ GP and attuned to a plane of existence)", "description": "You and up to eight willing creatures who link hands in a circle are transported to a different plane of existence. You can specify a target destination in general terms, such as the City of Brass on the Elemental Plane of Fire or the palace of Dispater on the second level of the Nine Hells, and you appear in or near that destination, as determined by the DM.\n\nAlternatively, if you know the sigil sequence of a teleportation circle on another plane of existence, this spell can take you to that circle. If the teleportation circle is too small to hold all the creatures you transported, they appear in the closest unoccupied spaces next to the circle.", "higher": "", "color": "#e8a040"}, {"name": "Plant Growth", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "305", "classes": "Bard, Druid, Ranger", "notation": "Tr:4 > Co:2 > Ev:3 > Di:4 > Tr:1", "tags": "aoe, movement", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S", "description": "This spell channels vitality into plants. The casting time you use determines whether the spell has the Overgrowth or the Enrichment effect below.\n\nOvergrowth. Choose a point within range. All normal plants in a 100-foot-radius Sphere centered on that point become thick and overgrown. A creature moving through that area must spend 4 feet of movement for every 1 foot it moves. You can exclude one or more areas of any size within the spell's area from being affected.\n\nEnrichment. All plants in a half-mile radius centered on a point within range become enriched for 365 days. The plants yield twice the normal amount of food when harvested. They can benefit from only one Plant Growth per year.", "higher": "", "color": "#40e890"}, {"name": "Poison Spray", "level": "Cantrip", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "306", "classes": "Apothecary, Artificer, Druid, Sorcerer, Warlock, Wizard", "notation": "Ne:1 > Ne:3", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You spray toxic mist at a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d12 Poison damage.", "higher": "Cantrip Upgrade. The damage increases by 1d12 when you reach levels 5 (2d12), 11 (3d12), and 17 (4d12).", "color": "#a0a0a0"}, {"name": "Polymorph", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "306", "classes": "Apothecary, Bard, Druid, Psion, Sorcerer, Wizard", "notation": "Tr:5 > Ab:2 > Co:3 > En:4 > Di:5 > Tr:3", "tags": "alter_form, concentration, healing, mind, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a caterpillar cocoon)", "description": "You attempt to transform a creature that you can see within range into a Beast. The target must succeed on a Wisdom saving throw or shape-shift into Beast form for the duration. That form can be any Beast you choose that has a Challenge Rating equal to or less than the target's (or the target's level if it doesn't have a Challenge Rating). The target's game statistics are replaced by the stat block of the chosen Beast, but the target retains its alignment, personality, creature type, Hit Points, and Hit Point Dice.\n\nThe target gains a number of Temporary Hit Points equal to the Hit Points of the Beast form. These Temporary Hit Points vanish if any remain when the spell ends. The spell ends early on the target if it has no Temporary Hit Points left.\n\nThe target is limited in the actions it can perform by the anatomy of its new form, and it can't speak or cast spells.\n\nThe target's gear melds into the new form. The creature can't use or otherwise benefit from any of that equipment.", "higher": "", "color": "#40e890"}, {"name": "Power Word Fortify", "level": "Level 7", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "306", "classes": "Bard, Cleric, Psion", "notation": "En:3 > Di:2 > Ab:3 > Co:4 > Ev:5 > Tr:1 > Il:2 > Ne:3 > En:5", "tags": "healing, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You fortify up to six creatures you can see within range. The spell bestows 120 Temporary Hit Points, which you divide among the spell's recipients.", "higher": "", "color": "#c040e8"}, {"name": "Power Word Heal", "level": "Level 9", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "306", "classes": "Bard, Cleric, Psion", "notation": "En:5 > Il:2 > Ev:3 > Tr:4 > Ab:5 > Co:1 > Di:2 > Ne:3 > Il:4 > Ev:5 > En:1", "tags": "damage, healing, mind, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A wave of healing energy washes over one creature you can see within range. The target regains all its Hit Points. If the creature has the Charmed, Frightened, Paralyzed, Poisoned, or Stunned condition, the condition ends. If the creature has the Prone condition, it can use its Reaction to stand up.", "higher": "", "color": "#c040e8"}, {"name": "Power Word Kill", "level": "Level 9", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "306", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:5 > Il:2 > Ev:3 > Tr:4 > Ab:5 > Co:1 > Di:2 > Ne:3 > Il:4 > Ev:5 > En:2", "tags": "damage, healing, mind, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You compel one creature you can see within range to die. If the target has 100 Hit Points or fewer, it dies. Otherwise, it takes 12d12 Psychic damage.", "higher": "", "color": "#c040e8"}, {"name": "Power Word Pain", "level": "Level 7", "school": "Enchantment", "ritual": "No", "source": "XGE", "page": "163", "classes": "", "notation": "En:3 > Co:2 > Tr:3 > Ab:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > En:4", "tags": "barrier, healing, mind, movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You speak a word of power that causes waves of intense pain to assail one creature you can see within range. If the target has 100 hit points or fewer, it is subject to crippling pain. Otherwise, the spell has no effect on it. A target is also unaffected if it is immune to being charmed.\n\nWhile the target is affected by crippling pain, any speed it has can be no higher than 10 feet. The target also has disadvantage on attack rolls, ability checks, and saving throws, other than Constitution saving throws. Finally, if the target tries to cast a spell, it must first succeed on a Constitution saving throw, or the casting fails and the spell is wasted.\n\nA target suffering this pain can make a Constitution saving throw at the end of each of its turns. On a successful save, the pain ends.", "higher": "", "color": "#c040e8"}, {"name": "Power Word Stun", "level": "Level 8", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "306", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:4 > Co:2 > Tr:3 > Ab:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Co:4 > En:2", "tags": "healing, mind, movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You overwhelm the mind of one creature you can see within range. If the target has 150 Hit Points or fewer, it has the Stunned condition. Otherwise, its Speed is 0 until the start of your next turn.\n\nThe Stunned target makes a Constitution saving throw at the end of each of its turns, ending the condition on itself on a success.", "higher": "", "color": "#c040e8"}, {"name": "Prayer of Healing", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "307", "classes": "Cleric, Paladin", "notation": "Ab:3 > Co:2 > Ev:3 > Ab:4", "tags": "healing", "duration": "Instantaneous", "cast_time": "10 Min.", "range": "30 feet", "components": "V", "description": "Up to five creatures of your choice who remain within range for the spell's entire casting gain the benefits of a Short Rest and also regain 2d8 Hit Points. A creature can't be affected by this spell again until that creature finishes a Long Rest.", "higher": "Using a Higher-Level Spell Slot. The healing increases by 1d8 for each spell slot level above 2.", "color": "#40c8e0"}, {"name": "Prestidigitation", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "307", "classes": "Artificer, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Tr:3 > Tr:1", "tags": "damage, illusion_tag, summon", "duration": "1 hour", "cast_time": "Action", "range": "10 feet", "components": "V, S", "description": "You create a magical effect within range. Choose the effect from the options below. If you cast this spell multiple times, you can have up to three of its non-instantaneous effects active at a time.\n\nSensory Effect. You create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor.\n\nFire Play. You instantaneously light or snuff out a candle, a torch, or a small campfire.\n\nClean or Soil. You instantaneously clean or soil an object no larger than 1 cubic foot.\n\nMinor Sensation. You chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour.\n\nMagic Mark. You make a color, a small mark, or a symbol appear on an object or a surface for 1 hour.\n\nMinor Creation. You create a nonmagical trinket or an illusory image that can fit in your hand. It lasts until the end of your next turn. A trinket can deal no damage and has no monetary worth.", "higher": "", "color": "#40e890"}, {"name": "Primal Savagery", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "163", "classes": "", "notation": "Tr:3 > Tr:2", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "S", "description": "You channel primal magic to cause your teeth or fingernails to sharpen, ready to deliver a corrosive attack. Make a melee spell attack against one creature within 5 feet of you. On a hit, the target takes 1d10 acid damage. After you make the attack, your teeth or fingernails return to normal.\n\nThe spell's damage increases by 1d10 when you reach 5th level (2d10), 11th level (3d10), and 17th level (4d10).", "higher": "", "color": "#40e890"}, {"name": "Primordial Ward", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "XGE", "page": "163", "classes": "", "notation": "Ab:2 > Ev:2 > Tr:3 > Co:4 > Di:5 > En:1 > Il:2 > Ab:4", "tags": "barrier, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You have resistance to acid, cold, fire, lightning, and thunder damage for the spell's duration.\n\nWhen you take damage of one of those types, you can use your reaction to gain immunity to that type of damage, including against the triggering damage. If you do so, the resistances end, and you have the immunity until the end of your next turn, at which time the spell ends.", "higher": "", "color": "#40c8e0"}, {"name": "Prismatic Spray", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "307", "classes": "Apothecary, Bard, Sorcerer, Wizard", "notation": "Ev:3 > Co:2 > Tr:3 > En:4 > Il:5 > Di:1 > Ab:2 > Ne:3 > Ev:2", "tags": "alter_form, aoe, damage, mind, movement", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Eight rays of light flash from you in a 60-foot Cone. Each creature in the Cone makes a Dexterity saving throw. For each target, roll 1d8 to determine which color ray affects it, consulting the Prismatic Rays table.\n\nPrismatic Rays1d8Ray1Red. Failed Save: 12d6 Fire damage. Successful Save: Half as much damage.2Orange. Failed Save: 12d6 Acid damage. Successful Save: Half as much damage.3Yellow. Failed Save: 12d6 Lightning damage. Successful Save: Half as much damage.4Green. Failed Save: 12d6 Poison damage. Successful Save: Half as much damage.5Blue. Failed Save: 12d6 Cold damage. Successful Save: Half as much damage.6Indigo. Failed Save: The target has the Restrained condition and makes a Constitution saving throw at the end of each of its turns. If it successfully saves three times, the condition ends. If it fails three times, it has the Petrified condition until it is freed by an effect like the Greater Restoration spell. The successes and failures needn't be consecutive; keep track of both until the target collects three of a kind.7Violet. Failed Save: The target has the Blinded condition and makes a Wisdom saving throw at the start of your next turn. On a successful save, the condition ends. On a failed save, the condition ends, and the creature teleports to another plane of existence (DM's choice).8Special. The target is struck by two rays. Roll twice, rerolling any 8.", "higher": "", "color": "#e84040"}, {"name": "Prismatic Wall", "level": "Level 9", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "308", "classes": "Bard, Wizard", "notation": "Ab:5 > Co:2 > Tr:3 > En:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Co:4 > Tr:5 > Ab:1", "tags": "alter_form, barrier, damage, mind, movement, reveal, single_target, summon", "duration": "10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A shimmering, multicolored plane of light forms a vertical opaque wall—up to 90 feet long, 30 feet high, and 1 inch thick—centered on a point within range. Alternatively, you shape the wall into a globe up to 30 feet in diameter centered on a point within range. The wall lasts for the duration. If you position the wall in a space occupied by a creature, the spell ends instantly without effect.\n\nThe wall sheds Bright Light within 100 feet and Dim Light for an additional 100 feet. You and creatures you designate when you cast the spell can pass through and be near the wall without harm. If another creature that can see the wall moves within 20 feet of it or starts its turn there, the creature must succeed on a Constitution saving throw or have the Blinded condition for 1 minute.\n\nThe wall consists of seven layers, each with a different color. When a creature reaches into or passes through the wall, it does so one layer at a time through all the layers. Each layer forces the creature to make a Dexterity saving throw or be affected by that layer's properties as described in the Prismatic Layers table.\n\nThe wall, which has AC 10, can be destroyed one layer at a time, in order from red to violet, by means specific to each layer. If a layer is destroyed, it is gone for the duration. Antimagic Field has no effect on the wall, and Dispel Magic can affect only the violet layer.\n\nPrismatic LayersOrderEffects1Red. Failed Save: 12d6 Fire damage. Successful Save: Half as much damage. Additional Effects: Nonmagical ranged attacks can't pass through this layer, which is destroyed if it takes at least 25 Cold damage.2Orange. Failed Save: 12d6 Acid damage. Successful Save: Half as much damage. Additional Effects: Magical ranged attacks can't pass through this layer, which is destroyed by a strong wind (such as the one created by Gust of Wind).3Yellow. Failed Save: 12d6 Lightning damage. Successful Save: Half as much damage. Additional Effects: The layer is destroyed if it takes at least 60 Force damage.4Green. Failed Save: 12d6 Poison damage. Successful Save: Half as much damage. Additional Effects: A Passwall spell, or another spell of equal or greater level that can open a portal on a solid surface, destroys this layer.5Blue. Failed Save: 12d6 Cold damage. Successful Save: Half as much damage. Additional Effects: The layer is destroyed if it takes at least 25 Fire damage.6Indigo. Failed Save: The target has the Restrained condition and makes a Constitution saving throw at the end of each of its turns. If it successfully saves three times, the condition ends. If it fails three times, it has the Petrified condition until it is freed by an effect like the Greater Restoration spell. The successes and failures needn't be consecutive; keep track of both until the target collects three of a kind. Additional Effects: Spells can't be cast through this layer, which is destroyed by Bright Light shed by the Daylight spell.7Violet. Failed Save: The target has the Blinded condition and makes a Wisdom saving throw at the start of your next turn. On a successful save, the condition ends. On a failed save, the condition ends, and the creature teleports to another plane of existence (DM's choice). Additional Effects: This layer is destroyed by Dispel Magic.", "higher": "", "color": "#40c8e0"}, {"name": "Produce Flame", "level": "Cantrip", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "308", "classes": "Druid", "notation": "Co:1 > Co:5", "tags": "aoe, damage, illusion_tag, summon", "duration": "10 minutes", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "A flickering flame appears in your hand and remains there for the duration. While there, the flame emits no heat and ignites nothing, and it sheds Bright Light in a 20-foot radius and Dim Light for an additional 20 feet. The spell ends if you cast it again.\n\nUntil the spell ends, you can take a Magic action to hurl fire at a creature or an object within 60 feet of you. Make a ranged spell attack. On a hit, the target takes 1d8 Fire damage.", "higher": "Cantrip Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).", "color": "#e8a040"}, {"name": "Programmed Illusion", "level": "Level 6", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "309", "classes": "Bard, Psion, Wizard", "notation": "Il:2 > Di:2 > Ev:3 > Co:4 > Tr:5 > Ab:1 > En:2 > Il:1", "tags": "aoe, illusion_tag, reveal, summon", "duration": "Until dispelled", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (jade dust worth 25+ GP)", "description": "You create an illusion of an object, a creature, or some other visible phenomenon within range that activates when a specific trigger occurs. The illusion is imperceptible until then. It must be no larger than a 30-foot Cube, and you decide when you cast the spell how the illusion behaves and what sounds it makes. This scripted performance can last up to 5 minutes.\n\nWhen the trigger you specify occurs, the illusion springs into existence and performs in the manner you described. Once the illusion finishes performing, it disappears and remains dormant for 10 minutes, after which the illusion can be activated again.\n\nThe trigger can be as general or as detailed as you like, though it must be based on visual or audible phenomena that occur within 30 feet of the area. For example, you could create an illusion of yourself to appear and warn off others who attempt to open a trapped door.\n\nPhysical interaction with the image reveals it to be illusory, since things can pass through it. A creature that takes the Study action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.", "higher": "", "color": "#4060e8"}, {"name": "Project Image", "level": "Level 7", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "309", "classes": "Bard, Psion, Wizard", "notation": "Il:3 > Co:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Il:2", "tags": "concentration, damage, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 day", "cast_time": "Action", "range": "500 miles", "components": "V, S, M (a statuette of yourself worth 5+ GP)", "description": "You create an illusory copy of yourself that lasts for the duration. The copy can appear at any location within range that you have seen before, regardless of intervening obstacles. The illusion looks and sounds like you, but it is intangible. If the illusion takes any damage, it disappears, and the spell ends.\n\nYou can see through the illusion's eyes and hear through its ears as if you were in its space. As a Magic action, you can move it up to 60 feet and make it gesture, speak, and behave in whatever way you choose. It mimics your mannerisms perfectly.\n\nPhysical interaction with the image reveals it to be illusory, since things can pass through it. A creature that takes the Study action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.", "higher": "", "color": "#4060e8"}, {"name": "Protection from Energy", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "309", "classes": "Apothecary, Artificer, Cleric, Druid, Ranger, Sorcerer, Tamer, Wizard", "notation": "Ab:4 > Ev:2 > Tr:3 > Co:4 > Ab:1", "tags": "barrier, concentration, damage", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "For the duration, the willing creature you touch has Resistance to one damage type of your choice: Acid, Cold, Fire, Lightning, or Thunder.", "higher": "", "color": "#40c8e0"}, {"name": "Protection from Evil and Good", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "309", "classes": "Cleric, Druid, Paladin, Tamer, Warlock, Wizard", "notation": "Ab:2 > Ne:2 > Ab:4", "tags": "barrier, concentration, mind, single_target, undead", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a flask of Holy Water worth 25+ GP, which the spell consumes)", "description": "Until the spell ends, one willing creature you touch is protected against creatures that are Aberrations, Celestials, Elementals, Fey, Fiends, or Undead. The protection grants several benefits. Creatures of those types have Disadvantage on attack rolls against the target. The target also can't be possessed by or gain the Charmed or Frightened conditions from them. If the target is already possessed, Charmed, or Frightened by such a creature, the target has Advantage on any new saving throw against the relevant effect.", "higher": "", "color": "#40c8e0"}, {"name": "Protection from Poison", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "310", "classes": "Apothecary, Artificer, Cleric, Druid, Paladin, Ranger, Tamer", "notation": "Ab:3 > Ev:2 > Tr:3 > Ab:5", "tags": "barrier, damage, single_target", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You touch a creature and end the Poisoned condition on it. For the duration, the target has Advantage on saving throws to avoid or end the Poisoned condition, and it has Resistance to Poison damage.", "higher": "", "color": "#40c8e0"}, {"name": "Psychic Scream", "level": "Level 9", "school": "Enchantment", "ritual": "No", "source": "XGE", "page": "163", "classes": "", "notation": "En:5 > Il:2 > Ev:3 > Tr:4 > Di:5 > Co:1 > Ab:2 > Ne:3 > Il:4 > Ev:5 > En:1", "tags": "damage, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "S", "description": "You unleash the power of your mind to blast the intellect of up to ten creatures of your choice that you can see within range. Creatures that have an Intelligence score of 2 or lower are unaffected.\n\nEach target must make an Intelligence saving throw. On a failed save, a target takes 14d6 psychic damage and is stunned. On a successful save, a target takes half as much damage and isn't stunned. If a target is killed by this damage, its head explodes, assuming it has one.\n\nA stunned target can make an Intelligence saving throw at the end of each of its turns. On a successful save, the stunning effect ends.", "higher": "", "color": "#c040e8"}, {"name": "Pulse Wave", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "EGW", "page": "188", "classes": "", "notation": "Ev:4 > Tr:2 > Co:3 > Ab:4 > Ev:3", "tags": "aoe, barrier, damage, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You create intense pressure, unleash it in a 30-foot cone, and decide whether the pressure pulls or pushes creatures and objects. Each creature in that cone must make a Constitution saving throw. A creature takes 6d6 force damage on a failed save, or half as much damage on a successful one. And every creature that fails the save is either pulled 15 feet toward you or pushed 15 feet away from you, depending on the choice you made for the spell.\n\nIn addition, unsecured objects that are completely within the cone are likewise pulled or pushed 15 feet.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 and the distance pulled or pushed increases by 5 feet for each slot level above 3rd.", "color": "#e84040"}, {"name": "Purge Contamination", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "MoDk", "page": "367", "classes": "Bard, Cleric, Druid, Paladin, Ranger, Sorcerer, Warlock, Wizard", "notation": "Ab:4 > Co:2 > Tr:3 > Ev:4 > Ab:5", "tags": "movement", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (100 gp of alchemical fluids or holy water, which the spell consumes)", "description": "You apply alchemical fluids or holy water to a Contaminated Humanoid creature while reciting an exacting magical chant which expels eldritch contaminants from its body. When you finish casting the spell, all Contamination levels and mutations are removed from the creature. It then gains 1 level of Exhaustion for each Contamination level removed with this spell.", "higher": "", "color": "#40c8e0"}, {"name": "Purify Food and Drink", "level": "Level 1", "school": "Transmutation", "ritual": "Yes", "source": "PHB'24", "page": "310", "classes": "Apothecary, Artificer, Cleric, Druid, Paladin, Tamer", "notation": "Tr:2 > Ev:2 > Tr:3", "tags": "aoe, damage, movement, utility", "duration": "Instantaneous", "cast_time": "Action", "range": "10 feet", "components": "V, S", "description": "You remove poison and rot from nonmagical food and drink in a 5-foot-radius Sphere centered on a point within range.", "higher": "", "color": "#40e890"}, {"name": "Pyrotechnics", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "163", "classes": "", "notation": "Tr:3 > Di:2 > Ev:3 > Tr:2", "tags": "aoe, damage, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "Choose an area of nonmagical flame that you can see and that fits within a 5-foot cube within range. You can extinguish the fire in that area, and you create either fireworks or smoke when you do so.\n\nFireworks. The target explodes with a dazzling display of colors. Each creature within 10 feet of the target must succeed on a Constitution saving throw or become blinded until the end of your next turn.\n\nSmoke. Thick black smoke spreads out from the target in a 20-foot radius, moving around corners. The area of the smoke is heavily obscured. The smoke persists for 1 minute or until a strong wind disperses it.", "higher": "", "color": "#40e890"}, {"name": "Raise Dead", "level": "Level 5", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "310", "classes": "Apothecary, Bard, Cleric, Paladin", "notation": "Ne:1 > Ab:2 > Co:3 > Tr:4 > Il:5 > Ev:1 > Ne:2", "tags": "alter_form, damage, healing, undead", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (a diamond worth 500+ GP, which the spell consumes)", "description": "With a touch, you revive a dead creature if it has been dead no longer than 10 days and it wasn't Undead when it died.\n\nThe creature returns to life with 1 Hit Point. This spell also neutralizes any poisons that affected the creature at the time of death.\n\nThis spell closes all mortal wounds, but it doesn't restore missing body parts. If the creature is lacking body parts or organs integral for its survival—its head, for instance—the spell automatically fails.\n\nComing back from the dead is an ordeal. The target takes a -4 penalty to D20 Tests. Every time the target finishes a Long Rest, the penalty is reduced by 1 until it becomes 0.", "higher": "", "color": "#a0a0a0"}, {"name": "Rary's Telepathic Bond", "level": "Level 5", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "311", "classes": "Apothecary, Bard, Psion, Tamer, Wizard", "notation": "Di:1 > En:2 > Il:3 > Ev:4 > Tr:5 > Co:1 > Di:4", "tags": "aoe, damage, mind, utility", "duration": "1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (two eggs)", "description": "You forge a telepathic link among up to eight willing creatures of your choice within range, psychically linking each creature to all the others for the duration. Creatures that can't communicate in any languages aren't affected by this spell.\n\nUntil the spell ends, the targets can communicate telepathically through the bond whether or not they share a language. The communication is possible over any distance, though it can't extend to other planes of existence.", "higher": "", "color": "#c8e040"}, {"name": "Raulothim's Psychic Lance", "level": "Level 4", "school": "Enchantment", "ritual": "No", "source": "FTD", "page": "21", "classes": "", "notation": "En:5 > Di:2 > Il:3 > Ev:4 > Tr:5 > En:1", "tags": "alter_form, damage, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V", "description": "You unleash a shimmering lance of psychic power from your forehead at a creature that you can see within range. Alternatively, you can utter a creature's name. If the named target is within range, it becomes the spell's target even if you can't see it. If the named target isn't within range, the lance dissipates without effect.\n\nThe target must make an Intelligence saving throw. On a failed save, the target takes 7d6 psychic damage and is incapacitated until the start of your next turn. On a successful save, the creature takes half as much damage and isn't incapacitated.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 5th level or higher, the damage increases by 1d6 for each slot level above 4th.", "color": "#c040e8"}, {"name": "Ravenous Void", "level": "Level 9", "school": "Evocation", "ritual": "No", "source": "EGW", "page": "188", "classes": "", "notation": "Ev:5 > Il:2 > Ab:3 > Co:4 > Tr:5 > Di:1 > En:2 > Ne:3 > Il:4 > Ab:5 > Ev:4", "tags": "alter_form, aoe, barrier, concentration, damage, healing, illusion_tag, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "1000 feet", "components": "V, S, M (a small, nine-pointed star made of iron)", "description": "You create a 20-foot-radius sphere of destructive gravitational force centered on a point you can see within range. For the spell's duration, the sphere and any space within 100 feet of it are difficult terrain, and nonmagical objects fully inside the sphere are destroyed if they aren't being worn or carried.\n\nWhen the sphere appears and at the start of each of your turns until the spell ends, unsecured objects within 100 feet of the sphere are pulled toward the sphere's center, ending in an unoccupied space as close to the center as possible.\n\nA creature that starts its turn within 100 feet of the sphere must succeed on a Strength saving throw or be pulled straight toward the sphere's center, ending in an unoccupied space as close to the center as possible. A creature that enters the sphere for the first time on a turn or starts its turn there takes 5d10 force damage and is restrained until it is no longer in the sphere. If the sphere is in the air, the restrained creature hovers inside the sphere. A creature can use its action to make a Strength check against your spell save DC, ending this restrained condition on itself or another creature in the sphere that it can reach. A creature reduced to 0 hit points by this spell is annihilated, along with any nonmagical items it is wearing or carrying.", "higher": "", "color": "#e84040"}, {"name": "Ray of Enfeeblement", "level": "Level 2", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "311", "classes": "Apothecary, Warlock, Wizard", "notation": "Ne:3 > Ev:2 > Tr:3 > Ne:2", "tags": "barrier, concentration, damage, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A beam of enervating energy shoots from you toward a creature within range. The target must make a Constitution saving throw. On a successful save, the target has Disadvantage on the next attack roll it makes until the start of your next turn.\n\nOn a failed save, the target has Disadvantage on Strength-based D20 Tests for the duration. During that time, it also subtracts 1d8 from all its damage rolls. The target repeats the save at the end of each of its turns, ending the spell on a success.", "higher": "", "color": "#a0a0a0"}, {"name": "Ray of Frost", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "311", "classes": "Artificer, Sorcerer, Wizard", "notation": "Ev:3 > Ev:1", "tags": "alter_form, barrier, damage, movement", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "A frigid beam of blue-white light streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, it takes 1d8 Cold damage, and its Speed is reduced by 10 feet until the start of your next turn.", "higher": "Cantrip Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).", "color": "#e84040"}, {"name": "Ray of Sickness", "level": "Level 1", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "311", "classes": "Sorcerer, Wizard", "notation": "Ne:2 > Ev:2 > Ne:3", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You shoot a greenish ray at a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 2d8 Poison damage and has the Poisoned condition until the end of your next turn.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 1.", "colo
