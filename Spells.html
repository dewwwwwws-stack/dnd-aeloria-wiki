<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spell List</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080812;font-family:Georgia,serif;color:#ccc;min-height:100vh}
header{background:#0d0d20;border-bottom:1px solid #1a1a3a;padding:12px 18px;position:sticky;top:0;z-index:100}
h1{font-style:italic;color:#aaa;font-size:30px;margin-bottom:10px}
.controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.controls input,.controls select{background:#0a0a1a;border:1px solid #2a2a4a;color:#ccc;
  padding:5px 8px;border-radius:5px;font-size:18px;font-family:Georgia,serif}
.controls input{width:180px}
.controls select{min-width:104px}
.btn-row{display:flex;gap:3px;flex-wrap:wrap}
.section-label{flex-basis:100%;width:100%;font-size:12px;color:#557;
  letter-spacing:.18em;text-transform:uppercase;
  margin:14px 0 2px 0;font-family:Georgia,serif;font-style:italic;
  padding-bottom:3px;border-bottom:1px solid #1a1a2e}
.section-label:first-of-type{margin-top:8px}
.tbtn{background:#0d0d20;border:1px solid #2a2a4a;color:#666;padding:4px 9px;
  border-radius:5px;cursor:pointer;font-size:18px;font-family:Georgia,serif;white-space:nowrap}
.tbtn.active{border-color:#6060aa;color:#aac;background:#15152a}
.count{color:#3a3a5a;font-size:18px;margin-left:auto;white-space:nowrap}
.grid{position:relative;padding:14px 18px;min-height:200px}
.card{background:#0d0d1a;border:1px solid #1a1a30;border-radius:9px;padding:8px;
  cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.card:hover{border-color:#3a3a6a}
.arcane-card{width:200px}
.divine-card{width:150px}
.pact-card{width:200px}
.octagon-card{width:200px}
.linear-card{width:560px}
.dring-card{width:200px}
.spokes-card{width:200px}
.spiral-card{width:200px}
.venn-card{width:200px}
.card .glyph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.linear-card .glyph{aspect-ratio:1.667}
.card .glyph svg{width:100%;height:auto;display:block;border-radius:5px}
.glyph-placeholder{width:100%;aspect-ratio:1;background:#0a0a18;border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:#2a2a4a;font-style:italic}
.spell-name{font-size:17px;color:#bbb;font-style:italic;text-align:center;margin-top:6px}
.spell-meta{font-size:15px;color:#4a4a6a;text-align:center;margin-top:3px}
.school-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle}
.notation-small{font-size:12px;color:#1e1e3a;text-align:center;margin-top:2px;font-family:monospace;word-break:break-all}
.modal-bg{display:none;position:absolute;left:0;right:0;background:#000c;z-index:9999;
  align-items:center;justify-content:center;padding:12px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#0d0d1a;border:1px solid #2a2a4a;border-radius:12px;padding:18px;
  max-width:960px;width:100%;margin:auto;
  display:flex;flex-direction:row;gap:18px;align-items:stretch;
  max-height:calc(100vh - 24px);overflow:hidden}
/* modal-left width is set dynamically by JS based on glyph aspect ratio */
.modal-left{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  min-width:120px}
.modal-glyph{width:100%;height:100%;display:flex;align-items:center}
.modal-glyph svg{width:100%;height:100%;max-height:calc(100vh - 60px);
  object-fit:contain;display:block}
.modal-right{flex:1 1 0;min-width:220px;overflow-y:auto;
  max-height:calc(100vh - 60px);padding-right:4px}
.modal-right::-webkit-scrollbar{width:3px}
.modal-right::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
/* Controls: two labelled sections, buttons never truncate */
.mc-section-label{font-size:10px;color:#444;letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:3px;margin-top:6px}
.mc-section-label:first-child{margin-top:0}
.mc-style-row,.mc-fmt-row{display:flex;flex-wrap:wrap;gap:4px;overflow:visible}
.mc-style-row .mbtn,.mc-fmt-row .mbtn{
  flex:0 0 auto;white-space:nowrap;min-width:0 !important;
  font-size:13px;padding:3px 8px}
/* Narrow viewports: stack vertically */
@media(max-width:560px){
  .modal{flex-direction:column;max-height:none;overflow:visible}
  .modal-left{width:100% !important;height:auto}
  .modal-glyph svg{max-height:50vh}
  .modal-right{max-height:none;overflow-y:visible}
}
.modal h2{font-style:italic;color:#ccc;font-size:28px;margin-bottom:4px}
.modal-meta{font-size:16px;color:#555;margin-bottom:10px;line-height:1.6}
.modal-meta span{display:inline-block;margin-right:14px}
.mc{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.mc-row{display:flex;gap:4px;flex-wrap:wrap}
.mbtn{flex:0 0 auto;background:#080812;border:1px solid #2a2a4a;color:#555;
  padding:4px 8px;border-radius:5px;cursor:pointer;font-size:14px;
  font-family:Georgia,serif;text-align:center;white-space:nowrap}
.mbtn.active{border-color:#6060aa;color:#aac}
.notation-big{font-family:monospace;font-size:15px;color:#445;background:#080812;
  padding:6px 10px;border-radius:5px;margin-bottom:10px;word-break:break-all}
.spell-desc{font-size:16px;color:#889;line-height:1.65;margin-bottom:10px;padding-right:4px}
.higher-levels{font-size:15px;color:#556;font-style:italic;margin-bottom:8px;line-height:1.5}
.detail-row{font-size:15px;color:#334;margin-bottom:3px}
.section-title{font-size:15px;color:#556;text-transform:uppercase;letter-spacing:.08em;
  margin:10px 0 4px;border-top:1px solid #1a1a2a;padding-top:8px}
.close-btn{float:right;background:none;border:none;color:#444;font-size:28px;cursor:pointer;line-height:1}
.export-btn{display:block;width:100%;margin-top:12px;padding:6px 8px;
  background:#080812;border:1px solid #2a2a4a;border-radius:6px;
  color:#556;font-size:12px;cursor:pointer;font-family:Georgia,serif;
  letter-spacing:.08em;text-align:center}
.export-btn:hover{border-color:#4a4a7a;color:#99b}
.export-btn.copied{border-color:#4a7a5a;color:#8bc}
.panel h2{font-style:italic;color:#8bc;font-size:23px;margin-bottom:14px}
.cb-label input{width:auto}
.err{color:#e86;font-size:15px;margin-top:4px}
</style>
</head>
<body>
<header>
  <h1>Spell List</h1>
  <div class="controls">
    <input type="text" id="search" placeholder="Search spell…" oninput="filter()">
    <select id="fSchool" onchange="filter()"><option value="">All Schools</option><option value="Evocation">Evocation</option><option value="Conjuration">Conjuration</option><option value="Divination">Divination</option><option value="Abjuration">Abjuration</option><option value="Enchantment">Enchantment</option><option value="Transmutation">Transmutation</option><option value="Illusion">Illusion</option><option value="Necromancy">Necromancy</option></select>
    <select id="fLevel"  onchange="filter()"><option value="">All Levels</option><option value="Cantrip">Cantrip</option><option value="Level 1">Level 1</option><option value="Level 2">Level 2</option><option value="Level 3">Level 3</option><option value="Level 4">Level 4</option><option value="Level 5">Level 5</option><option value="Level 6">Level 6</option><option value="Level 7">Level 7</option><option value="Level 8">Level 8</option><option value="Level 9">Level 9</option></select>
    <select id="fSource" onchange="filter()"><option value="">All Sources</option><option value="AAG">AAG</option><option value="BMT">BMT</option><option value="EGW">EGW</option><option value="FRHoF">FRHoF</option><option value="FTD">FTD</option><option value="MoDk">MoDk</option><option value="PHB'24">PHB'24</option><option value="SCC">SCC</option><option value="TCE">TCE</option><option value="XGE">XGE</option></select>
    <select id="fClass"  onchange="filter()"><option value="">All Classes</option><option value="Artificer">Artificer</option><option value="Bard">Bard</option><option value="Cleric">Cleric</option><option value="Druid">Druid</option><option value="Paladin">Paladin</option><option value="Psion">Psion</option><option value="Ranger">Ranger</option><option value="Sorcerer">Sorcerer</option><option value="Warlock">Warlock</option><option value="Wizard">Wizard</option></select>
    <div class="section-label">Line Style</div>
    <div class="btn-row" id="styleBtns"><button class="tbtn active" onclick="setStyle('skilled',this)">Skilled</button>
<button class="tbtn" onclick="setStyle('novice',this)">Novice</button>
<button class="tbtn" onclick="setStyle('chaotic',this)">Chaotic</button>
<button class="tbtn" onclick="setStyle('psionic',this)">Psionic</button>
<button class="tbtn" onclick="setStyle('natural',this)">Natural</button>
<button class="tbtn" onclick="setStyle('scriptural',this)">Scriptural</button>
<button class="tbtn" onclick="setStyle('calligraphic',this)">Calligraphic</button>
<button class="tbtn" onclick="setStyle('dancing',this)">Dancing</button>
<button class="tbtn" onclick="setStyle('constellation',this)">Constellation</button>
<button class="tbtn" onclick="setStyle('pulse',this)">Pulse</button></div>
    <div class="section-label">Render Style</div>
    <div class="btn-row" id="fmtBtns"><button class="tbtn active" onclick="setFmt('arcane',this)">Arcane</button>
<button class="tbtn" onclick="setFmt('linear',this)">Arcane (Short.)</button>
<button class="tbtn" onclick="setFmt('venn',this)">Arcane (Alt.)</button>
<button class="tbtn" onclick="setFmt('divine',this)">Divine</button>
<button class="tbtn" onclick="setFmt('pact',this)">Pact Magic</button>
<button class="tbtn" onclick="setFmt('octagon',this)">Glyphic</button>
<button class="tbtn" onclick="setFmt('dring',this)">Orbital</button>
<button class="tbtn" onclick="setFmt('spokes',this)">Planar</button>
<button class="tbtn" onclick="setFmt('spiral',this)">Vortex</button></div>
  </div>
</header>

<div class="grid" id="grid"></div>

<div class="modal-bg" id="modalBg" onclick="closeOutside(event)">
  <div class="modal">
    <div class="modal-left">
      <div class="modal-glyph" id="mGlyph"></div>
    </div>
    <div class="modal-right">
      <button class="close-btn" onclick="closeModal()">×</button>
      <h2 id="mName"></h2>
      <div class="modal-meta" id="mMeta"></div>
      <div class="mc" id="mControls"></div>
      <div class="notation-big" id="mNotation"></div>
      <div class="section-title">Description</div>
      <div class="spell-desc" id="mDesc"></div>
      <div class="higher-levels" id="mHigher"></div>
      <div class="section-title">Details</div>
      <div class="detail-row" id="mClasses"></div>
      <div class="detail-row" id="mComponents"></div>
      <div class="detail-row" id="mTags"></div>
    <button class="export-btn" id="exportBtn" onclick="exportGlyph()">⬇ Export PNG</button>
    </div>
  </div>
</div>


<script>
// ── PERFORMANCE VARS (declared before init) ──────────────────────
let _filterTimer  = null;
let _currentCards = [];
const CARD_W = { arcane: 212, divine: 162, pact: 212, octagon: 212, linear: 572, dring: 212, spokes: 212, spiral: 212, venn: 212 };


// ═══════════════════════════════════════════════════════════════════
// DORENIA GLYPH RENDERER — JavaScript port of Python renderers
// Three formats: arcane (circle), divine (columns), pact (pentagon+triangle)
// Six styles: skilled, novice, chaotic, psionic, natural, scriptural
// ═══════════════════════════════════════════════════════════════════

// ── SHARED ──────────────────────────────────────────────────────────
const _SC = {
  Evocation:'#FF2600', Conjuration:'#0080FF', Divination:'#FFF800',
  Abjuration:'#F0F0F0', Enchantment:'#6DFF61', Transmutation:'#FF9500',
  Illusion:'#ED00FF', Necromancy:'#54A173',
};
const _SAR = {
  Ev:'Evocation', Co:'Conjuration', Di:'Divination', Ab:'Abjuration',
  En:'Enchantment', Tr:'Transmutation', Il:'Illusion', Ne:'Necromancy',
};
const _SO = ['Evocation','Conjuration','Divination','Abjuration',
                      'Enchantment','Transmutation','Illusion','Necromancy'];

function parseNotation(notation) {
  return notation.split('>').map(p => {
    p = p.trim();
    const [ab, d] = p.split(':');
    return { school: _SAR[ab.trim()], dot: d.trim() === '*' ? null : parseInt(d) };
  });
}

// ── SEEDED PRNG (Mulberry32 — matches Python random.Random behaviour closely) ──
function seededRng(seed) {
  let s = seed >>> 0;
  return {
    next() { s += 0x6D2B79F5; let t = s; t = Math.imul(t ^ t>>>15, t|1);
             t ^= t + Math.imul(t ^ t>>>7, t|61); return ((t ^ t>>>14) >>> 0) / 4294967296; },
    uniform(a, b) { return a + this.next() * (b - a); },
    randint(a, b) { return a + Math.floor(this.next() * (b - a + 1)); },
  };
}

// ── LINE STYLES ──────────────────────────────────────────────────────

function lineSkilled(x1,y1,x2,y2, color, _seed, cx,cy) {
  const cpx0 = (x1+x2)/2, cpy0 = (y1+y2)/2;
  const dx = cpx0-cx, dy = cpy0-cy, dist = Math.hypot(dx,dy);
  const cpx = dist>0 ? cpx0 - dx*0.35 : cpx0;
  const cpy = dist>0 ? cpy0 - dy*0.35 : cpy0;
  const pd = `M${f(x1)},${f(y1)} Q${f(cpx)},${f(cpy)} ${f(x2)},${f(y2)}`;
  return `<path d="${pd}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
<path d="${pd}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" opacity="0.92"/>`;
}

function lineNovice(x1,y1,x2,y2, color) {
  return `<line x1="${f(x1)}" y1="${f(y1)}" x2="${f(x2)}" y2="${f(y2)}" stroke="${color}" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
<line x1="${f(x1)}" y1="${f(y1)}" x2="${f(x2)}" y2="${f(y2)}" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.85"/>`;
}

function lineChaotic(x1,y1,x2,y2, color, seed) {
  const rng = seededRng(seed);
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  const L = dist; if(L===0) return '';
  const n = Math.max(7, Math.floor(dist/26));
  const ux=dx/L, uy=dy/L;
  const px=-uy, py=ux;
  const pts = [[x1,y1]];
  for(let i=1;i<n;i++) {
    const t=i/n;
    const e = Math.pow(Math.sin(t*Math.PI), 0.4);
    // Dialled back: spike chance 12% (was 18%), multiplier 1.4-2.0 (was 1.7-2.6), amp ±72 (was ±95)
    const spike = rng.next() < 0.12 ? rng.uniform(1.4, 2.0) : 1;
    const perpAmp = rng.uniform(-72, 72) * e * spike;
    const paraAmp = rng.uniform(-14, 14) * e;
    pts.push([
      x1 + t*dx + px*perpAmp + ux*paraAmp,
      y1 + t*dy + py*perpAmp + uy*paraAmp,
    ]);
  }
  pts.push([x2,y2]);
  const pd = 'M'+pts.map(p=>`${f(p[0])},${f(p[1])}`).join(' L');
  return `<path d="${pd}" fill="none" stroke="${color}55" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
<path d="${pd}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`;
}

function linePsionic(x1,y1,x2,y2, color, seed, cx,cy) {
  // Orthogonal (Manhattan) routing: H-then-V or V-then-H, hard 90° corner.
  // For each segment, test both corner candidates and pick the one whose
  // corner point is farther from the chart centre (most outward).
  // Segments alternate priority so repeated same-distance cases still vary.
  const segIdx = Math.round(seed / 137);  // recovers i from i*137+level

  // Two candidate corners:
  // cornerA = horizontal first: (x2, y1)
  // cornerB = vertical first:   (x1, y2)
  const dA = Math.hypot(x2 - cx, y1 - cy);
  const dB = Math.hypot(x1 - cx, y2 - cy);

  // Pick the more-outward corner. If equal, alternate by segment index.
  let kx, ky;
  if (dA > dB) { kx = x2; ky = y1; }
  else if (dB > dA) { kx = x1; ky = y2; }
  else if (segIdx % 2 === 0) { kx = x2; ky = y1; }
  else { kx = x1; ky = y2; }

  // Build path with a small radius fillet on the corner (stroke-linejoin="round"
  // + a tiny quadratic nudge gives a soft but crisp 90° feel).
  // We pull the corner point back slightly on each leg to create the fillet.
  const R = 8;  // fillet radius in SVG units
  const leg1len = Math.hypot(kx - x1, ky - y1);
  const leg2len = Math.hypot(x2 - kx, y2 - ky);
  const r1 = leg1len > 0 ? Math.min(R, leg1len * 0.4) : 0;
  const r2 = leg2len > 0 ? Math.min(R, leg2len * 0.4) : 0;
  // Unit vectors along each leg
  const u1x = leg1len > 0 ? (kx-x1)/leg1len : 0, u1y = leg1len > 0 ? (ky-y1)/leg1len : 0;
  const u2x = leg2len > 0 ? (x2-kx)/leg2len : 0, u2y = leg2len > 0 ? (y2-ky)/leg2len : 0;
  // Fillet entry and exit points
  const f1x = kx - u1x*r1, f1y = ky - u1y*r1;  // end of leg 1, before corner
  const f2x = kx + u2x*r2, f2y = ky + u2y*r2;  // start of leg 2, after corner

  const pd = `M${f(x1)},${f(y1)} L${f(f1x)},${f(f1y)} Q${f(kx)},${f(ky)} ${f(f2x)},${f(f2y)} L${f(x2)},${f(y2)}`;

  // Glow layer + solid line (no dotted echo — the right-angle shape reads clearly)
  return `<path d="${pd}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.22"/>
<path d="${pd}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`;
}

function lineNatural(x1,y1,x2,y2, color, seed) {
  const rng = seededRng(seed + 31337);
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  if(dist===0) return lineNovice(x1,y1,x2,y2,color);
  const ux=dx/dist, uy=dy/dist;
  const px=-uy, py=ux; // perpendicular

  // Build a gently meandering spine through 4-6 control points
  const nSegs = Math.max(3, Math.min(6, Math.floor(dist/120)));
  const spine = [[x1,y1]];
  for(let i=1;i<nSegs;i++){
    const t=i/nSegs;
    // Gentle organic wander — smaller amp than chaotic, biased to stay near the line
    const wander = rng.uniform(-dist*0.12, dist*0.12);
    spine.push([x1+t*dx + px*wander, y1+t*dy + py*wander]);
  }
  spine.push([x2,y2]);

  // Build smooth cubic bezier path through the spine using Catmull-Rom → cubic conversion
  let d = `M${f(spine[0][0])},${f(spine[0][1])}`;
  for(let i=0;i<spine.length-1;i++){
    const p0 = spine[Math.max(0,i-1)];
    const p1 = spine[i];
    const p2 = spine[i+1];
    const p3 = spine[Math.min(spine.length-1,i+2)];
    const tension = 0.4;
    const cp1x = p1[0] + (p2[0]-p0[0])*tension/2;
    const cp1y = p1[1] + (p2[1]-p0[1])*tension/2;
    const cp2x = p2[0] - (p3[0]-p1[0])*tension/2;
    const cp2y = p2[1] - (p3[1]-p1[1])*tension/2;
    d += ` C${f(cp1x)},${f(cp1y)} ${f(cp2x)},${f(cp2y)} ${f(p2[0])},${f(p2[1])}`;
  }

  // Tapered stroke: thin at ends, thicker in middle — like a real ink/brush stroke
  // We simulate this by rendering the same path three times at different widths/opacities
  const maxW = Math.min(5.5, dist * 0.022); // thicker for longer strokes

  return [
    // Soft outer glow following the curve
    `<path d="${d}" fill="none" stroke="${color}" stroke-width="${f(maxW*4)}" stroke-linecap="round" stroke-linejoin="round" opacity="0.12"/>`,
    // Mid body — slightly feathered
    `<path d="${d}" fill="none" stroke="${color}" stroke-width="${f(maxW*1.8)}" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>`,
    // Core ink line
    `<path d="${d}" fill="none" stroke="${color}" stroke-width="${f(maxW)}" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`,
    // Fine highlight along the spine — simulates ink sheen
    `<path d="${d}" fill="none" stroke="white" stroke-width="${f(maxW*0.25)}" stroke-linecap="round" stroke-linejoin="round" opacity="0.12"/>`,
  ].join('\n');
}

function lineScriptural(x1,y1,x2,y2, color, seed) {
  const rng = seededRng(seed + 77777);
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  if(dist===0) return '';
  const ux=dx/dist, uy=dy/dist, px=-uy, py=ux;

  // Slightly wobbled main line
  const nSegs=Math.max(3,Math.floor(dist/80));
  const pts=[];
  for(let i=0;i<=nSegs;i++) {
    const t=i/nSegs;
    let bx=x1+t*dx, by=y1+t*dy;
    if(i>0&&i<nSegs){ const w=rng.uniform(-1.8,1.8); bx+=px*w; by+=py*w; }
    pts.push([bx,by]);
  }
  const mainD='M'+pts.map(p=>`${f(p[0])},${f(p[1])}`).join(' L');
  let out=`<path d="${mainD}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" opacity="0.18"/>`;
  out+=`<path d="${mainD}" fill="none" stroke="${color}" stroke-width="2.0" stroke-linecap="round" opacity="0.88"/>`;

  // Parallel dashed margin
  const off=6, ox=px*off, oy=py*off;
  out+=`<line x1="${f(x1+ox)}" y1="${f(y1+oy)}" x2="${f(x2+ox)}" y2="${f(y2+oy)}" stroke="${color}" stroke-width="0.7" stroke-dasharray="3,5" opacity="0.28"/>`;

  // Tick marks
  const tlBase=11, majorGap=50;
  const nMajor=Math.max(1,Math.floor(dist/majorGap));
  for(let i=1;i<=nMajor;i++){
    const t=i/(nMajor+1);
    if(t>=0.97) continue;
    const tx=x1+t*dx, ty=y1+t*dy;
    const wobble=rng.uniform(-8,8);
    const theta=wobble*Math.PI/180;
    const ct=Math.cos(theta), st=Math.sin(theta);
    const rpx=px*ct-py*st, rpy=px*st+py*ct;
    const kind=rng.next();

    if(kind<0.22){
      // Double tick
      for(const off2 of [-2.8,2.8]){
        const w2=wobble+rng.uniform(-3,3), t2=w2*Math.PI/180;
        const ct2=Math.cos(t2),st2=Math.sin(t2);
        const rpx2=px*ct2-py*st2, rpy2=px*st2+py*ct2;
        const ax=tx+ux*off2+rpx2*tlBase, ay=ty+uy*off2+rpy2*tlBase;
        const bx=tx+ux*off2-rpx2*tlBase, by=ty+uy*off2-rpy2*tlBase;
        out+=`<line x1="${f(ax)}" y1="${f(ay)}" x2="${f(bx)}" y2="${f(by)}" stroke="${color}" stroke-width="1.4" stroke-linecap="square" opacity="0.7"/>`;
      }
    } else if(kind<0.48){
      const longS=tlBase*rng.uniform(1.4,2.2), shortS=tlBase*rng.uniform(0.3,0.65);
      const ax=tx+rpx*longS, ay=ty+rpy*longS, bx=tx-rpx*shortS, by=ty-rpy*shortS;
      out+=`<line x1="${f(ax)}" y1="${f(ay)}" x2="${f(bx)}" y2="${f(by)}" stroke="${color}" stroke-width="1.6" stroke-linecap="square" opacity="0.75"/>`;
    } else {
      const ax=tx+rpx*tlBase, ay=ty+rpy*tlBase, bx=tx-rpx*tlBase, by=ty-rpy*tlBase;
      out+=`<line x1="${f(ax)}" y1="${f(ay)}" x2="${f(bx)}" y2="${f(by)}" stroke="${color}" stroke-width="1.6" stroke-linecap="square" opacity="0.75"/>`;
    }
    // Half-tick subdivision
    const t2=t+0.5/(nMajor+1);
    if(t2<0.96){
      const tx2=x1+t2*dx, ty2=y1+t2*dy;
      const side=rng.next()>0.5?1:-1, half=tlBase*0.52;
      const w2=rng.uniform(-10,10), th2=w2*Math.PI/180;
      const ct2=Math.cos(th2),st2=Math.sin(th2);
      const rpx2=px*ct2-py*st2, rpy2=px*st2+py*ct2;
      const ax=tx2+rpx2*half*side, ay=ty2+rpy2*half*side;
      out+=`<line x1="${f(tx2)}" y1="${f(ty2)}" x2="${f(ax)}" y2="${f(ay)}" stroke="${color}" stroke-width="1.1" stroke-linecap="square" opacity="0.5"/>`;
    }
  }
  return out;
}

// ── SHARED DOT RENDERER ──────────────────────────────────────────────
function renderDot(x,y, color, isEndpoint, dotR) {
  const r = dotR + (isEndpoint?3:1);
  const fill = isEndpoint ? color : '#ffffff33';
  let out = '';
  if(isEndpoint){
    // Three-layer glow: wide soft halo, medium bloom, tight bright ring
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r+18}" fill="${color}18" stroke="none"/>`;
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r+10}" fill="${color}30" stroke="none"/>`;
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r+5}"  fill="${color}44" stroke="none"/>`;
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r}"    fill="${fill}" stroke="${color}" stroke-width="2.5" opacity="0.98"/>`;
    // Bright centre highlight
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r*0.45}" fill="white" opacity="0.35"/>`;
  } else {
    // Empty slot: faint coloured ring glow so it's visible against dark bg
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r+4}" fill="${color}12" stroke="none"/>`;
    out+=`<circle cx="${f(x)}" cy="${f(y)}" r="${r}"   fill="${fill}" stroke="${color}" stroke-width="1.5" opacity="0.7"/>`;
  }
  return out;
}

function f(n) { return Math.round(n*10)/10; }

// ── ARCANE RENDERER ──────────────────────────────────────────────────
const ARC = {
  CX:500, CY:500, R:420, DOT_R:10, W:1000,
  ANGLES: { Evocation:337.5, Conjuration:22.5, Divination:67.5, Abjuration:112.5,
            Enchantment:157.5, Transmutation:202.5, Illusion:247.5, Necromancy:292.5 },
  getDot(school, dot) {
    const ca=this.ANGLES[school], ah=22.5;
    const t=(dot-1)/4;
    const adeg=(ca-ah+4)+t*((ca+ah-4)-(ca-ah+4));
    const ar=adeg*Math.PI/180;
    return [this.CX+this.R*Math.sin(ar), this.CY-this.R*Math.cos(ar)];
  },
  getPassthrough(school, i) { return this.getDot(school,(i%5)+1); },
  base(spellColor) {
    const tc = spellColor || '#ffffff';
    let s=`<rect width="${this.W}" height="${this.W}" fill="#0d0d1a"/>`;
    s+=`<defs><radialGradient id="arcBgTint" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${tc}" stop-opacity="0.07"/><stop offset="100%" stop-color="${tc}" stop-opacity="0"/></radialGradient></defs>`;
    s+=`<rect width="${this.W}" height="${this.W}" fill="url(#arcBgTint)"/>`;
    s+=`<circle cx="${this.CX}" cy="${this.CY}" r="${this.R+20}" fill="#1a1a2e" stroke="${tc}44" stroke-width="2"/>`;
    s+=`<circle cx="${this.CX}" cy="${this.CY}" r="${this.R-30}" fill="#12122a" stroke="${tc}22" stroke-width="1"/>`;
    for(const [school,angle] of Object.entries(this.ANGLES)){
      for(const off of [-22.5,22.5]){
        const a=(angle+off)*Math.PI/180;
        const x2=this.CX+(this.R+20)*Math.sin(a), y2=this.CY-(this.R+20)*Math.cos(a);
        s+=`<line x1="${this.CX}" y1="${this.CY}" x2="${f(x2)}" y2="${f(y2)}" stroke="#2a2a4a" stroke-width="1"/>`;
      }
    }
    for(const school of _SO){
      const sc = _SC[school];
      for(let d=1;d<=5;d++){
        const [x,y]=this.getDot(school,d);
        s+=`<circle cx="${f(x)}" cy="${f(y)}" r="${this.DOT_R+3}" fill="${sc}15" stroke="none"/>`;
        s+=`<circle cx="${f(x)}" cy="${f(y)}" r="${this.DOT_R}" fill="#1e1e3a" stroke="${sc}88" stroke-width="1.5"/>`;
      }
      const lr=this.R+52, ar=this.ANGLES[school]*Math.PI/180;
      const lx=this.CX+lr*Math.sin(ar), ly=this.CY-lr*Math.cos(ar);
      const rot=this.ANGLES[school];
      s+=`<text x="${f(lx)}" y="${f(ly)}" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="32" fill="#888" font-style="italic" transform="rotate(${rot},${f(lx)},${f(ly)})">${school}</text>`;
    }
    return s;
  },
  render(name, level, school, notation, style) {
    const parsed=parseNotation(notation);
    const color=_SC[school];
    const pts=parsed.map((p,i)=>{ const [x,y]=p.dot?this.getDot(p.school,p.dot):this.getPassthrough(p.school,i); return {x,y,school:p.school,dot:p.dot}; });
    let s=this.base(color);
    for(let i=0;i<pts.length-1;i++){
      const {x:x1,y:y1}=pts[i], {x:x2,y:y2}=pts[i+1];
      s+=applyLineStyle(style,x1,y1,x2,y2,segColor(name,color,pts[i+1].school),i*137+level,this.CX,this.CY);
    }
    for(const p of pts) s+=renderDot(p.x,p.y,_SC[p.school],p.dot!==null,this.DOT_R);
    s+=labels(name,level,school,style,this.W);
    return svg(s,this.W,this.W);
  }
};

// ── DIVINE RENDERER ──────────────────────────────────────────────────
const DIV = {
  W:800, H:1000, MX:60, MY:75, DOT_R:11, N:8,
  get CS() { return (this.W-2*this.MX)/(this.N-1); },
  get RS() { return (this.H-2*this.MY)/4; },
  colX(i) { return this.MX+i*this.CS; },
  dotY(d) { return this.MY+(d-1)*this.RS; },
  getDot(school,dot) { return [this.colX(_SO.indexOf(school)), this.dotY(dot)]; },
  getPassthrough(school,i) { return this.getDot(school,(i%5)+1); },
  base() {
    let s=`<rect width="${this.W}" height="${this.H}" fill="#0d0d1a"/>`;
    s+=`<rect x="${this.MX-20}" y="${this.MY-20}" width="${this.W-2*(this.MX-20)}" height="${this.H-2*(this.MY-20)}" fill="#10101e" rx="4"/>`;
    const cy=this.dotY(3);
    s+=`<line x1="${this.MX-25}" y1="${f(cy)}" x2="${this.W-this.MX+25}" y2="${f(cy)}" stroke="#3a3a5a" stroke-width="2" opacity="0.9"/>`;
    for(let i=0;i<this.N;i++){
      const x=this.colX(i);
      const heavy=(i===0||i===this.N-1||i===3||i===4);
      s+=`<line x1="${f(x)}" y1="${this.MY-25}" x2="${f(x)}" y2="${this.H-this.MY+25}" stroke="${heavy?'#3a3a5a':'#252540'}" stroke-width="${heavy?2.5:1.2}" opacity="0.9"/>`;
    }
    for(const xb of [this.MX-25, this.W-this.MX+25])
      s+=`<line x1="${xb}" y1="${this.MY-25}" x2="${xb}" y2="${this.H-this.MY+25}" stroke="#4a4a6a" stroke-width="3" opacity="0.8"/>`;
    for(const yb of [this.MY-25, this.H-this.MY+25])
      s+=`<line x1="${this.MX-25}" y1="${yb}" x2="${this.W-this.MX+25}" y2="${yb}" stroke="#4a4a6a" stroke-width="3" opacity="0.8"/>`;
    for(let i=0;i<this.N;i++){
      const x=this.colX(i);
      for(let d=1;d<=5;d++){
        const y=this.dotY(d);
        s+=`<circle cx="${f(x)}" cy="${f(y)}" r="${this.DOT_R}" fill="#1a1a30" stroke="#3a3a5a" stroke-width="1.5"/>`;
      }
      // Labels rotated -90 with text-anchor="start" so they extend upward.
      // The viewBox is extended above y=0 in render() to give room.
      const ly=this.MY-10;
      s+=`<text x="${f(x)}" y="${f(ly)}" text-anchor="start" dominant-baseline="middle" font-family="Georgia,serif" font-size="28" fill="#888" font-style="italic" transform="rotate(-90,${f(x)},${f(ly)})">${_SO[i]}</text>`;
    }
    return s;
  },
  render(name,level,school,notation,style){
    const parsed=parseNotation(notation), color=_SC[school];
    const CX_DIV=this.W/2, CY_DIV=this.H/2;
    const pts=parsed.map((p,i)=>{ const [x,y]=p.dot?this.getDot(p.school,p.dot):this.getPassthrough(p.school,i); return {x,y,school:p.school,dot:p.dot}; });
    let s=this.base();
    for(let i=0;i<pts.length-1;i++){
      const {x:x1,y:y1}=pts[i], {x:x2,y:y2}=pts[i+1];
      s+=applyLineStyle(style,x1,y1,x2,y2,segColor(name,color,pts[i+1].school),i*137+level,CX_DIV,CY_DIV);
    }
    for(const p of pts) s+=renderDot(p.x,p.y,_SC[p.school],p.dot!==null,this.DOT_R);
    s+=labels(name,level,school,style,this.W,this.H);
    // Extend viewBox upward to give rotated school labels room (they extend
    // from y=MY-10 upward into negative-y space).
    const top = -180;
    return `<svg viewBox="0 ${top} ${this.W} ${this.H - top}" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
  }
};

// ── PACT RENDERER ────────────────────────────────────────────────────
const PACT = (() => {
  const W=1000, CX=500, CY=500, DOT_R=11, R_PENT=390, R_TRI=175, INSET=0.07;
  const pv=i=>{ const a=(-90+i*72)*Math.PI/180; return [CX+R_PENT*Math.cos(a),CY+R_PENT*Math.sin(a)]; };
  const PV=[0,1,2,3,4].map(pv);
  const tv=deg=>{ const a=deg*Math.PI/180; return [CX+R_TRI*Math.cos(a),CY+R_TRI*Math.sin(a)]; };
  const TV={tl:tv(210),tr:tv(330),bt:tv(90)};
  const SIDES={
    Evocation:[PV[4],PV[0],false], Conjuration:[PV[0],PV[1],false],
    Abjuration:[PV[1],PV[2],false], Enchantment:[PV[2],PV[3],false],
    Transmutation:[PV[3],PV[4],false],
    Divination:[TV.tl,TV.tr,true], Necromancy:[TV.tr,TV.bt,true], Illusion:[TV.bt,TV.tl,true],
  };
  function getDot(school,dot){
    const [sv,ev]=SIDES[school];
    const t=INSET+(dot-1)/4*(1-2*INSET);
    return [sv[0]+t*(ev[0]-sv[0]), sv[1]+t*(ev[1]-sv[1])];
  }
  function getPassthrough(school,i){ return getDot(school,(i%5)+1); }
  function base(){
    let s=`<rect width="${W}" height="${W}" fill="#0d0d1a"/>`;
    const pp=PV.map(v=>`${f(v[0])},${f(v[1])}`).join(' ');
    s+=`<polygon points="${pp}" fill="#131325" stroke="#3a3a5a" stroke-width="2.5"/>`;
    const r2=R_PENT-28;
    const ip=[0,1,2,3,4].map(i=>{const a=(-90+i*72)*Math.PI/180;return `${f(CX+r2*Math.cos(a))},${f(CY+r2*Math.sin(a))}`;}).join(' ');
    s+=`<polygon points="${ip}" fill="#0f0f22" stroke="#2a2a4a" stroke-width="1"/>`;
    const tp=`${f(TV.tl[0])},${f(TV.tl[1])} ${f(TV.tr[0])},${f(TV.tr[1])} ${f(TV.bt[0])},${f(TV.bt[1])}`;
    s+=`<polygon points="${tp}" fill="#161628" stroke="#3a3a5a" stroke-width="2"/>`;
    for(const [school,[sv,ev,inner]] of Object.entries(SIDES)){
      s+=`<line x1="${f(sv[0])}" y1="${f(sv[1])}" x2="${f(ev[0])}" y2="${f(ev[1])}" stroke="${inner?'#2a2a48':'#252540'}" stroke-width="1.5"/>`;
      for(let d=1;d<=5;d++){
        const [x,y]=getDot(school,d);
        s+=`<circle cx="${f(x)}" cy="${f(y)}" r="${DOT_R}" fill="#1a1a30" stroke="#3a3a5a" stroke-width="1.5"/>`;
      }
      const [sv2,ev2]=SIDES[school];
      const mx=(sv2[0]+ev2[0])/2, my=(sv2[1]+ev2[1])/2;
      const ddx=ev2[0]-sv2[0], ddy=ev2[1]-sv2[1];
      let angle=Math.atan2(ddy,ddx)*180/Math.PI;
      const ln=Math.hypot(ddx,ddy);
      let lx=mx, ly=my;
      if(ln>0){ const off=inner?20:-22; lx+=(-ddy/ln)*off; ly+=(ddx/ln)*off; }
      if(angle>90||angle<-90) angle+=180;
      s+=`<text x="${f(lx)}" y="${f(ly)}" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="${inner?28:34}" fill="${inner?'#888':'#aaa'}" font-style="italic" transform="rotate(${f(angle)},${f(lx)},${f(ly)})">${school}</text>`;
    }
    return s;
  }
  return {
    render(name,level,school,notation,style){
      const parsed=parseNotation(notation), color=_SC[school];
      const pts=parsed.map((p,i)=>{ const [x,y]=p.dot?getDot(p.school,p.dot):getPassthrough(p.school,i); return {x,y,school:p.school,dot:p.dot}; });
      let s=base();
      for(let i=0;i<pts.length-1;i++){
        const {x:x1,y:y1}=pts[i], {x:x2,y:y2}=pts[i+1];
        s+=applyLineStyle(style,x1,y1,x2,y2,segColor(name,color,pts[i+1].school),i*137+level,CX,CY);
      }
      for(const p of pts) s+=renderDot(p.x,p.y,_SC[p.school],p.dot!==null,DOT_R);
      s+=labels(name,level,school,style,W,W);
      return svg(s,W,W);
    }
  };
})();

// ── OCTAGON RENDERER ─────────────────────────────────────────────────
const OCT = (() => {
  const W=1000, CX=500, CY=500, R=390, DOT_R=10;

  // Vertex positions: _SO[i] sits at angle i*45 - 90 deg (Evocation at top)
  function vertex(i) {
    const a = (i * 45 - 90) * Math.PI / 180;
    return [CX + R * Math.cos(a), CY + R * Math.sin(a)];
  }
  const VERTS = _SO.map((_,i) => vertex(i));

  // Each school's 5 dots spread radially along its vertex spoke.
  // Dot 1 = innermost, dot 5 = slightly beyond the ring vertex.
  function getDot(school, dot) {
    const idx = _SO.indexOf(school);
    const a = (idx * 45 - 90) * Math.PI / 180;
    const radii = [R*0.45, R*0.60, R*0.75, R*0.90, R*1.05];
    const r = radii[dot - 1];
    return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
  }

  function getPassthrough(school, i) { return getDot(school, (i % 5) + 1); }

  // Diamond (rotated square) renderer — replaces renderDot for OCT
  function renderDiamond(x, y, color, isEndpoint, r) {
    const s = r + (isEndpoint ? 3 : 1);
    // rotated-square points: top, right, bottom, left
    const pts = `${f(x)},${f(y-s)} ${f(x+s)},${f(y)} ${f(x)},${f(y+s)} ${f(x-s)},${f(y)}`;
    const fill = isEndpoint ? color : '#ffffff33';
    let out = '';
    if (isEndpoint) {
      const gs = s + 5;
      const gpts = `${f(x)},${f(y-gs)} ${f(x+gs)},${f(y)} ${f(x)},${f(y+gs)} ${f(x-gs)},${f(y)}`;
      out += `<polygon points="${gpts}" fill="${color}33" stroke="none"/>`;
    }
    out += `<polygon points="${pts}" fill="${fill}" stroke="${color}" stroke-width="2" opacity="0.95"/>`;
    return out;
  }

  function octPoints(r) {
    return _SO.map((_,i) => {
      const a = (i * 45 - 90) * Math.PI / 180;
      return `${f(CX + r * Math.cos(a))},${f(CY + r * Math.sin(a))}`;
    }).join(' ');
  }

  function base(spellColor) {
    const tc = spellColor || '#ffffff';
    let s = `<rect width="${W}" height="${W}" fill="#0d0d1a"/>`;
    s += `<defs><radialGradient id="octBgTint" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${tc}" stop-opacity="0.07"/><stop offset="100%" stop-color="${tc}" stop-opacity="0"/></radialGradient></defs>`;
    s += `<rect width="${W}" height="${W}" fill="url(#octBgTint)"/>`;

    // Concentric octagons (background dressing)
    s += `<polygon points="${octPoints(R+22)}" fill="#1a1a2e" stroke="${tc}44" stroke-width="2"/>`;
    s += `<polygon points="${octPoints(R-2)}"  fill="#141428" stroke="${tc}22" stroke-width="1.2"/>`;
    s += `<polygon points="${octPoints(R*0.66)}" fill="#111122" stroke="#222236" stroke-width="1"/>`;
    s += `<polygon points="${octPoints(R*0.33)}" fill="#0f0f1e" stroke="#1e1e32" stroke-width="0.8"/>`;

    // Spokes: vertex spokes + edge-midpoint spokes
    for (let i = 0; i < 8; i++) {
      // vertex spoke
      const av = (i * 45 - 90) * Math.PI / 180;
      const vx = CX + (R+22) * Math.cos(av), vy = CY + (R+22) * Math.sin(av);
      s += `<line x1="${CX}" y1="${CY}" x2="${f(vx)}" y2="${f(vy)}" stroke="#2a2a4a" stroke-width="1"/>`;
      // edge-midpoint spoke
      const am = ((i + 0.5) * 45 - 90) * Math.PI / 180;
      const mx2 = CX + (R+22) * Math.cos(am), my2 = CY + (R+22) * Math.sin(am);
      s += `<line x1="${CX}" y1="${CY}" x2="${f(mx2)}" y2="${f(my2)}" stroke="#1e1e3a" stroke-width="0.7"/>`;
    }

    // Empty dot slots (diamonds) and labels for each school
    for (let i = 0; i < 8; i++) {
      const school = _SO[i];
      const sc = _SC[school];
      for (let d = 1; d <= 5; d++) {
        const [x, y] = getDot(school, d);
        const sz = DOT_R;
        const gsz = sz + 3;
        const gpts = `${f(x)},${f(y-gsz)} ${f(x+gsz)},${f(y)} ${f(x)},${f(y+gsz)} ${f(x-gsz)},${f(y)}`;
        const pts = `${f(x)},${f(y-sz)} ${f(x+sz)},${f(y)} ${f(x)},${f(y+sz)} ${f(x-sz)},${f(y)}`;
        s += `<polygon points="${gpts}" fill="${sc}15" stroke="none"/>`;
        s += `<polygon points="${pts}" fill="#1e1e3a" stroke="${sc}88" stroke-width="1.5"/>`;
      }
      // Label: just outside the ring, rotated to follow the edge tangent
      const lr = R + 54;
      const ar = (i * 45 - 90) * Math.PI / 180;
      const lx = CX + lr * Math.cos(ar), ly = CY + lr * Math.sin(ar);
      // rotation: angle from centre outward, in degrees
      let rot = i * 45;  // 0=top → label reads upward; adjust for readability
      // Keep text readable: flip if pointing generally downward
      if (rot > 90 && rot < 270) rot += 180;
      s += `<text x="${f(lx)}" y="${f(ly)}" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="32" fill="#888" font-style="italic" transform="rotate(${f(rot)},${f(lx)},${f(ly)})">${school}</text>`;
    }
    return s;
  }

  return {
    render(name, level, school, notation, style) {
      const parsed = parseNotation(notation);
      const color = _SC[school];
      const pts = parsed.map((p, i) => {
        const [x, y] = p.dot ? getDot(p.school, p.dot) : getPassthrough(p.school, i);
        return { x, y, school: p.school, dot: p.dot };
      });
      let s = base(color);
      for (let i = 0; i < pts.length - 1; i++) {
        const { x: x1, y: y1 } = pts[i], { x: x2, y: y2 } = pts[i + 1];
        s += applyLineStyle(style, x1, y1, x2, y2, segColor(name,color,pts[i+1].school), i * 137 + level, CX, CY);
      }
      for (const p of pts) s += renderDiamond(p.x, p.y, _SC[p.school], p.dot !== null, DOT_R);
      s += labels(name, level, school, style, W);
      return svg(s, W, W);
    }
  };
})();
// ── LINEAR RENDERER ───────────────────────────────────────────────────
// One long horizontal line: 8 schools left→right, 5 dots each.
// Forward hops (left→right) arc above the track; backward hops arc below.
// Arc height scales with horizontal distance.
const LIN = (() => {
  const W=2000, H=1200, DOT_R=11;
  const MX=90, CY=H/2;   // track dead centre — equal space above and below
  const TOTAL = 40;
  const STEP  = (W - 2*MX) / (TOTAL - 1);
  const MAX_ARC = CY - 60;  // tallest arc stops 60px from canvas edge

  function dotIndex(school, dot) {
    return _SO.indexOf(school) * 5 + (dot - 1);
  }
  function getDot(school, dot) {
    const x = MX + dotIndex(school, dot) * STEP;
    return [x, CY];
  }
  function getPassthrough(school, i) { return getDot(school, (i % 5) + 1); }

  // dir: +1 = arc above (forward hop), -1 = arc below (backward hop)
  function arcSegment(style, x1, x2, color, seed) {
    const span = Math.abs(x2 - x1);
    const arcH = Math.min(MAX_ARC, span * 0.45);
    const dir  = x2 >= x1 ? -1 : 1;   // -1 = above (y decreases upward), +1 = below
    const mx   = (x1 + x2) / 2;
    const my   = CY + dir * arcH;      // apex
    const fakeCX = mx, fakeCY = CY - dir * arcH * 4;

    switch(style) {
      case 'novice':
        return `<path d="M${f(x1)},${f(CY)} Q${f(mx)},${f(my)} ${f(x2)},${f(CY)}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.85"/>`;

      case 'skilled':
        return lineSkilled(x1,CY,x2,CY,color,seed,fakeCX,fakeCY);

      case 'psionic': {
        // Diagonal spread: go diagonally to a peak point then diagonally back.
        // Peak sits at the arc apex, displaced in dir direction.
        const pd = `M${f(x1)},${f(CY)} L${f(mx)},${f(my)} L${f(x2)},${f(CY)}`;
        return `<path d="${pd}" fill="none" stroke="${color}40" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
<path d="${pd}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`;
      }

      case 'chaotic': {
        // Spectrograph / heartline monitor: continuous waveform centred on CY.
        // Points are clamped to canvas so spikes never fly off-edge, and the
        // first/last points are snapped to CY so the line connects to the dots.
        const rng = seededRng(seed);
        const n = Math.max(12, Math.floor(span / 20));
        const amp = Math.min(MAX_ARC * 0.52, span * 0.26);
        const maxDev = MAX_ARC * 0.88;   // hard clamp — stays inside canvas
        let prev = 0;
        const pts2 = [];
        for (let k = 0; k <= n + 1; k++) {
          const t = k / (n + 1);
          const e = Math.min(1, Math.pow(Math.sin(t * Math.PI), 0.25));
          const target = rng.uniform(-amp, amp) * e;
          const spike = rng.next() < 0.08 ? rng.uniform(1.5, 2.2) * (rng.next() > 0.5 ? 1 : -1) : 0;
          prev = prev * 0.45 + target * 0.55 + spike * amp * 0.4 * e;
          // Clamp so the line never leaves the canvas area
          prev = Math.max(-maxDev, Math.min(maxDev, prev));
          // Snap first and last point onto the baseline so lines connect to dots
          const y = (k === 0 || k === n + 1) ? CY : CY + prev;
          pts2.push([x1 + t * (x2 - x1), y]);  // use signed delta so backward hops go left
        }
        const d2 = 'M' + pts2.map(p => `${f(p[0])},${f(p[1])}`).join(' L');
        return `<path d="${d2}" fill="none" stroke="${color}55" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
<path d="${d2}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`;
      }

      case 'scriptural': {
        // Two diagonal legs forming a chevron (like psionic), but with
        // scriptural tick marks drawn perpendicular to each leg — matching
        // the intersecting-mark character of the global scriptural style.
        const peak = [mx, my];
        const legs = [[x1, CY, mx, my], [mx, my, x2, CY]];
        let out = '';
        for (const [lx1, ly1, lx2, ly2] of legs) {
          const rng3 = seededRng(seed + 77777 + Math.round(lx1));
          const ldx = lx2-lx1, ldy = ly2-ly1, ldist = Math.hypot(ldx, ldy);
          if (ldist === 0) continue;
          const lux = ldx/ldist, luy = ldy/ldist;
          const lpx = -luy, lpy = lux;  // perpendicular unit
          // Slightly wobbled main leg
          const nSegs = Math.max(2, Math.floor(ldist/80));
          const lpts = [];
          for (let i = 0; i <= nSegs; i++) {
            const t = i/nSegs;
            let bx = lx1+t*ldx, by = ly1+t*ldy;
            if (i>0 && i<nSegs) { const w=rng3.uniform(-1.8,1.8); bx+=lpx*w; by+=lpy*w; }
            lpts.push([bx,by]);
          }
          const mainD = 'M'+lpts.map(p=>`${f(p[0])},${f(p[1])}`).join(' L');
          out += `<path d="${mainD}" fill="none" stroke="${color}" stroke-width="2.0" stroke-linecap="round" opacity="0.88"/>`;
          // Parallel dashed margin
          const off2 = 6, ox2 = lpx*off2, oy2 = lpy*off2;
          out += `<line x1="${f(lx1+ox2)}" y1="${f(ly1+oy2)}" x2="${f(lx2+ox2)}" y2="${f(ly2+oy2)}" stroke="${color}" stroke-width="0.7" stroke-dasharray="3,5" opacity="0.28"/>`;
          // Tick marks perpendicular to the leg
          const tlBase = 11, majorGap = 50;
          const nMajor = Math.max(1, Math.floor(ldist/majorGap));
          for (let i = 1; i <= nMajor; i++) {
            const t = i/(nMajor+1);
            if (t >= 0.97) continue;
            const tx = lx1+t*ldx, ty = ly1+t*ldy;
            const wobble = rng3.uniform(-8,8);
            const theta = wobble*Math.PI/180;
            const ct = Math.cos(theta), st = Math.sin(theta);
            const rpx = lpx*ct - lpy*st, rpy = lpx*st + lpy*ct;
            const kind = rng3.next();
            if (kind < 0.22) {
              for (const off3 of [-2.8, 2.8]) {
                const w2 = wobble+rng3.uniform(-3,3), t2 = w2*Math.PI/180;
                const ct2=Math.cos(t2),st2=Math.sin(t2);
                const rpx2=lpx*ct2-lpy*st2, rpy2=lpx*st2+lpy*ct2;
                const ax=tx+lux*off3+rpx2*tlBase, ay=ty+luy*off3+rpy2*tlBase;
                const bx=tx+lux*off3-rpx2*tlBase, by2=ty+luy*off3-rpy2*tlBase;
                out += `<line x1="${f(ax)}" y1="${f(ay)}" x2="${f(bx)}" y2="${f(by2)}" stroke="${color}" stroke-width="1.4" stroke-linecap="square" opacity="0.7"/>`;
              }
            } else if (kind < 0.48) {
              const longS=tlBase*rng3.uniform(1.4,2.2), shortS=tlBase*rng3.uniform(0.3,0.65);
              const ax=tx+rpx*longS, ay=ty+rpy*longS, bx=tx-rpx*shortS, by2=ty-rpy*shortS;
              out += `<line x1="${f(ax)}" y1="${f(ay)}" x2="${f(bx)}" y2="${f(by2)}" stroke="${color}" stroke-width="1.6" stroke-linecap="square" opacity="0.75"/>`;
            } else {
              const ax=tx+rpx*tlBase, ay=ty+rpy*tlBase, bx=tx-rpx*tlBase, by2=ty-rpy*tlBase;
              out += `<line x1="${f(ax)}" y1="${f(ay)}" x2="${f(bx)}" y2="${f(by2)}" stroke="${color}" stroke-width="1.6" stroke-linecap="square" opacity="0.75"/>`;
            }
            // Half-tick subdivision
            const t2h = t + 0.5/(nMajor+1);
            if (t2h < 0.96) {
              const tx2=lx1+t2h*ldx, ty2=ly1+t2h*ldy;
              const side=rng3.next()>0.5?1:-1, half=tlBase*0.52;
              const w2=rng3.uniform(-10,10), th2=w2*Math.PI/180;
              const ct2=Math.cos(th2),st2=Math.sin(th2);
              const rpx2=lpx*ct2-lpy*st2, rpy2=lpx*st2+lpy*ct2;
              const ax=tx2+rpx2*half*side, ay=ty2+rpy2*half*side;
              out += `<line x1="${f(tx2)}" y1="${f(ty2)}" x2="${f(ax)}" y2="${f(ay)}" stroke="${color}" stroke-width="1.1" stroke-linecap="square" opacity="0.5"/>`;
            }
          }
        }
        return out;
      }

      case 'natural':
        return lineNatural(x1,CY,x2,CY,color,seed+99999);

      case 'calligraphic': {
        // Two interweaving strands along the arc, alternating over/under at crossings
        const cycles=Math.max(1,Math.round(span/160));
        const amp=Math.min(22,span*0.10);
        const n=Math.max(60,Math.floor(span/3));
        const strandA=[], strandB=[];
        for(let k=0;k<=n;k++){
          const t=k/n;
          const bx=(1-t)*(1-t)*x1+2*(1-t)*t*mx+t*t*x2;
          const by=(1-t)*(1-t)*CY+2*(1-t)*t*my+t*t*CY;
          const tdx=2*(1-t)*(mx-x1)+2*t*(x2-mx);
          const tdy=2*(1-t)*(my-CY)+2*t*(CY-my);
          const tl=Math.hypot(tdx,tdy)||1;
          const ppx=-tdy/tl, ppy=tdx/tl;
          const taper=Math.pow(Math.sin(t*Math.PI),0.6);
          const wave=Math.sin(t*Math.PI*2*cycles)*amp*taper;
          strandA.push([bx+ppx*wave, by+ppy*wave]);
          strandB.push([bx-ppx*wave, by-ppy*wave]);
        }
        function sp(pts){
          let d=`M${f(pts[0][0])},${f(pts[0][1])}`;
          for(let i=0;i<pts.length-1;i++){
            const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
            const ten=0.4;
            const cp1x=p1[0]+(p2[0]-p0[0])*ten/2,cp1y=p1[1]+(p2[1]-p0[1])*ten/2;
            const cp2x=p2[0]-(p3[0]-p1[0])*ten/2,cp2y=p2[1]-(p3[1]-p1[1])*ten/2;
            d+=` C${f(cp1x)},${f(cp1y)} ${f(cp2x)},${f(cp2y)} ${f(p2[0])},${f(p2[1])}`;
          }
          return d;
        }
        const crossings=[];
        for(let k=1;k<2*cycles;k++) crossings.push(k/(2*cycles));
        const splits=[0,...crossings,1];
        let out=`<path d="${sp(strandA)}" fill="none" stroke="${color}" stroke-width="18" stroke-linecap="round" opacity="0.14"/>`;
        out+=`<path d="${sp(strandB)}" fill="none" stroke="${color}" stroke-width="18" stroke-linecap="round" opacity="0.14"/>`;
        for(let seg=0;seg<splits.length-1;seg++){
          const i0=Math.round(splits[seg]*n), i1=Math.round(splits[seg+1]*n);
          if(i1<=i0) continue;
          const pA=sp(strandA.slice(i0,i1+1)), pB=sp(strandB.slice(i0,i1+1));
          if(seg%2===0){
            out+=`<path d="${pB}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.72"/>`;
            out+=`<path d="${pA}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>`;
          } else {
            out+=`<path d="${pA}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.72"/>`;
            out+=`<path d="${pB}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>`;
          }
        }
        return out;
      }

      case 'dancing': {
        // Sinusoidal wave along the arc — taper at endpoints
        const steps=Math.max(40,Math.floor(span/4));
        const cycles=Math.max(2,Math.floor(span/60));
        const amp=Math.min(14,span*0.06);
        const rng=seededRng(seed);
        const phase=rng.uniform(0,Math.PI*2);
        const pts=[];
        for(let k=0;k<=steps;k++){
          const t=k/steps;
          const bx=(1-t)*(1-t)*x1 + 2*(1-t)*t*mx + t*t*x2;
          const by=(1-t)*(1-t)*CY + 2*(1-t)*t*my + t*t*CY;
          const tdx=2*(1-t)*(mx-x1)+2*t*(x2-mx);
          const tdy=2*(1-t)*(my-CY)+2*t*(CY-my);
          const tl=Math.hypot(tdx,tdy)||1;
          const px=-tdy/tl, py=tdx/tl;
          const taper=Math.sin(t*Math.PI);
          const wave=Math.sin(t*Math.PI*2*cycles+phase)*amp*taper;
          pts.push([bx+px*wave,by+py*wave]);
        }
        const pd='M'+pts.map(p=>`${f(p[0])},${f(p[1])}`).join(' L');
        return `<path d="${pd}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
<path d="${pd}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>`;
      }

      case 'constellation': {
        // Dots scattered along the arc, no continuous stroke
        const arcPath=`M${f(x1)},${f(CY)} Q${f(mx)},${f(my)} ${f(x2)},${f(CY)}`;
        let out=`<path d="${arcPath}" fill="none" stroke="${color}" stroke-width="1" stroke-dasharray="1,4" opacity="0.18"/>`;
        const n=Math.max(5,Math.floor(span/22));
        const rng=seededRng(seed);
        for(let k=1;k<n;k++){
          const t=k/n;
          const bx=(1-t)*(1-t)*x1 + 2*(1-t)*t*mx + t*t*x2;
          const by=(1-t)*(1-t)*CY + 2*(1-t)*t*my + t*t*CY;
          const r=rng.uniform(1.4,2.6);
          out+=`<circle cx="${f(bx)}" cy="${f(by)}" r="${f(r*2.4)}" fill="${color}" opacity="0.18"/>`;
          out+=`<circle cx="${f(bx)}" cy="${f(by)}" r="${f(r)}" fill="${color}" opacity="0.95"/>`;
          if(rng.next()<0.18){
            const sp=r*3;
            out+=`<line x1="${f(bx-sp)}" y1="${f(by)}" x2="${f(bx+sp)}" y2="${f(by)}" stroke="${color}" stroke-width="0.6" opacity="0.5"/>`;
            out+=`<line x1="${f(bx)}" y1="${f(by-sp)}" x2="${f(bx)}" y2="${f(by+sp)}" stroke="${color}" stroke-width="0.6" opacity="0.5"/>`;
          }
        }
        return out;
      }

      case 'pulse': {
        // Ripple dots along the arc — grow from x1, peak at midpoint, shrink into x2
        const n=Math.max(4,Math.floor(span/14));
        const rMin=1.2, rMax=7.5;
        let out='';
        for(let k=0;k<=n;k++){
          const t=k/n;
          const bx=(1-t)*(1-t)*x1 + 2*(1-t)*t*mx + t*t*x2;
          const by=(1-t)*(1-t)*CY + 2*(1-t)*t*my + t*t*CY;
          const envelope=Math.sin(t*Math.PI);
          const r=rMin+envelope*(rMax-rMin);
          const opacity=0.35+envelope*0.6;
          out+=`<circle cx="${f(bx)}" cy="${f(by)}" r="${f(r*2.2)}" fill="${color}" opacity="${f(opacity*0.22)}"/>`;
          out+=`<circle cx="${f(bx)}" cy="${f(by)}" r="${f(r)}" fill="${color}" opacity="${f(opacity)}"/>`;
        }
        return out;
      }

      default: {
        const steps = Math.max(6, Math.floor(span / 60));
        let d = `M${f(x1)},${f(CY)}`;
        for (let k = 1; k <= steps; k++) {
          const t = k / steps;
          const bx = (1-t)*(1-t)*x1 + 2*(1-t)*t*mx + t*t*x2;
          const by = (1-t)*(1-t)*CY + 2*(1-t)*t*my + t*t*CY;
          d += ` L${f(bx)},${f(by)}`;
        }
        return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.9"/>`;
      }
    }
  }

  function base(spellColor) {
    const tc = spellColor || '#ffffff';
    let s = `<rect width="${W}" height="${H}" fill="#0d0d1a"/>`;
    // Faint horizontal tint strip along the track
    s += `<rect x="${MX}" y="${CY-MAX_ARC}" width="${W-2*MX}" height="${MAX_ARC*2}" fill="${tc}" opacity="0.03" rx="4"/>`;
    s += `<line x1="${MX}" y1="${CY}" x2="${W-MX}" y2="${CY}" stroke="${tc}33" stroke-width="2"/>`;
    for (let i = 1; i < 8; i++) {
      const x = MX + (i * 5 - 0.5) * STEP;
      s += `<line x1="${f(x)}" y1="${CY-28}" x2="${f(x)}" y2="${CY+28}" stroke="#1e1e38" stroke-width="1.2"/>`;
    }
    for (let si = 0; si < 8; si++) {
      const school = _SO[si];
      const sc = _SC[school];
      for (let d = 1; d <= 5; d++) {
        const [x, y] = getDot(school, d);
        s += `<circle cx="${f(x)}" cy="${f(y)}" r="${DOT_R+3}" fill="${sc}18" stroke="none"/>`;
        s += `<circle cx="${f(x)}" cy="${f(y)}" r="${DOT_R}" fill="#1e1e3a" stroke="${sc}88" stroke-width="1.5"/>`;
      }
      const gx = MX + (si * 5 + 2) * STEP;
      s += `<text x="${f(gx)}" y="${CY + 42}" text-anchor="middle" dominant-baseline="auto" font-family="Georgia,serif" font-size="32" fill="#888" font-style="italic">${school}</text>`;
    }
    return s;
  }

  return {
    render(name, level, school, notation, style) {
      const parsed = parseNotation(notation);
      const color  = _SC[school];
      const pts = parsed.map((p, i) => {
        const [x, y] = p.dot ? getDot(p.school, p.dot) : getPassthrough(p.school, i);
        return { x, y, school: p.school, dot: p.dot };
      });
      let s = base(color);
      for (let i = 0; i < pts.length - 1; i++) {
        const { x: x1 } = pts[i], { x: x2 } = pts[i + 1];
        s += arcSegment(style, x1, x2, segColor(name, color, pts[i+1].school), i * 137 + level);
      }
      for (const p of pts) s += renderDot(p.x, p.y, _SC[p.school], p.dot !== null, DOT_R);
      s += labels(name, level, school, style, W, H);
      return svg(s, W, H);
    }
  };
})();


// Wish exception: each segment uses the destination node's school color.
function segColor(spellName, defaultColor, destSchool) {
  return spellName === 'Wish' ? _SC[destSchool] : defaultColor;
}

function applyLineStyle(style,x1,y1,x2,y2,color,seed,cx,cy){
  return _applyLineStyleInner(style,x1,y1,x2,y2,color,seed,cx,cy);
}
function _applyLineStyleInner(style,x1,y1,x2,y2,color,seed,cx,cy){
  switch(style){
    case 'skilled':      return lineSkilled(x1,y1,x2,y2,color,seed,cx,cy);
    case 'novice':       return lineNovice(x1,y1,x2,y2,color);
    case 'chaotic':      return lineChaotic(x1,y1,x2,y2,color,seed);
    case 'psionic':      return linePsionic(x1,y1,x2,y2,color,seed,cx,cy);
    case 'natural':      return lineNatural(x1,y1,x2,y2,color,seed);
    case 'scriptural':   return lineScriptural(x1,y1,x2,y2,color,seed);
    case 'calligraphic': return lineCalligraphic(x1,y1,x2,y2,color,seed);
    case 'dancing':      return lineDancing(x1,y1,x2,y2,color,seed);
    case 'constellation':return lineConstellation(x1,y1,x2,y2,color,seed);
    case 'pulse':        return linePulse(x1,y1,x2,y2,color,seed);
    default:             return lineSkilled(x1,y1,x2,y2,color,seed,cx,cy);
  }
}

// ── CALLIGRAPHIC ─────────────────────────────────────────────────────
// Brush-stroke effect: line is built from many small slices whose
// width varies along the length (thin at ends, thick mid-stroke).
function lineCalligraphic(x1,y1,x2,y2, color, seed) {
  const rng = seededRng(seed);
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  if(dist===0) return '';
  const ux=dx/dist, uy=dy/dist, px=-uy, py=ux;

  // Two strands that weave over/under each other along the line.
  // Each strand follows a sinusoidal path offset by half a wavelength.
  // Where they cross, one strand is drawn "over" (rendered after) the other.
  const cycles = Math.max(1, Math.round(dist / 160)); // one crossing per ~160px — slow, lazy
  const amp = Math.min(22, dist * 0.10);              // wide amplitude — thick pen feel
  const n = Math.max(60, Math.floor(dist / 3));

  // Build point arrays for both strands
  const strandA = [], strandB = [];
  for(let i=0;i<=n;i++){
    const t = i/n;
    // Taper amplitude to 0 at endpoints so strands meet cleanly at nodes
    const taper = Math.pow(Math.sin(t * Math.PI), 0.6);
    const wave = Math.sin(t * Math.PI * 2 * cycles) * amp * taper;
    const bx = x1+t*dx, by = y1+t*dy;
    strandA.push([bx + px*wave,  by + py*wave]);
    strandB.push([bx - px*wave,  by - py*wave]);
  }

  // Helper: build smooth SVG path from point array using catmull-rom
  function smoothPath(pts) {
    let d = `M${f(pts[0][0])},${f(pts[0][1])}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
      const ten=0.4;
      const cp1x=p1[0]+(p2[0]-p0[0])*ten/2, cp1y=p1[1]+(p2[1]-p0[1])*ten/2;
      const cp2x=p2[0]-(p3[0]-p1[0])*ten/2, cp2y=p2[1]-(p3[1]-p1[1])*ten/2;
      d+=` C${f(cp1x)},${f(cp1y)} ${f(cp2x)},${f(cp2y)} ${f(p2[0])},${f(p2[1])}`;
    }
    return d;
  }

  // Split strands into segments between crossings, alternating which is "on top".
  // Crossings happen every half-cycle — at t = k/(2*cycles) for k=1..2*cycles-1
  const crossings = [];
  for(let k=1;k<2*cycles;k++) crossings.push(k/(2*cycles));
  const splits = [0, ...crossings, 1];

  let out = '';
  // Soft glow underlayer for both strands
  const pdA = smoothPath(strandA), pdB = smoothPath(strandB);
  out += `<path d="${pdA}" fill="none" stroke="${color}" stroke-width="18" stroke-linecap="round" opacity="0.14"/>`;
  out += `<path d="${pdB}" fill="none" stroke="${color}" stroke-width="18" stroke-linecap="round" opacity="0.14"/>`;

  // Draw segments alternating which strand is on top
  for(let seg=0;seg<splits.length-1;seg++){
    const t0 = splits[seg], t1 = splits[seg+1];
    const i0 = Math.round(t0*n), i1 = Math.round(t1*n);
    if(i1<=i0) continue;
    const sliceA = strandA.slice(i0, i1+1);
    const sliceB = strandB.slice(i0, i1+1);
    const pA = smoothPath(sliceA), pB = smoothPath(sliceB);
    // Alternate: even segments have A on top, odd have B on top
    if(seg % 2 === 0){
      // B drawn first (underneath), then A on top
      out += `<path d="${pB}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.72"/>`;
      out += `<path d="${pA}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>`;
    } else {
      // A drawn first (underneath), then B on top
      out += `<path d="${pA}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.72"/>`;
      out += `<path d="${pB}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>`;
    }
  }
  return out;
}

// ── DANCING ──────────────────────────────────────────────────────────
// Smooth sinusoidal wave along the line axis with regular wavelength.
// Tapers at the endpoints so connections to dots are clean.
function lineDancing(x1,y1,x2,y2, color, seed) {
  const rng = seededRng(seed);
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  if(dist===0) return '';
  const ux=dx/dist, uy=dy/dist, px=-uy, py=ux;
  const n = Math.max(40, Math.floor(dist/4));
  const cycles = Math.max(2, Math.floor(dist/60));  // wavelength scales with length
  const amp = Math.min(16, dist*0.08);
  const phase = rng.uniform(0, Math.PI*2);
  const pts = [];
  for(let i=0;i<=n;i++){
    const t = i/n;
    // Taper amplitude to zero at endpoints
    const taper = Math.sin(t*Math.PI);
    const wave = Math.sin(t*Math.PI*2*cycles + phase) * amp * taper;
    pts.push([x1+t*dx+px*wave, y1+t*dy+py*wave]);
  }
  const pd = 'M'+pts.map(p=>`${f(p[0])},${f(p[1])}`).join(' L');
  return `<path d="${pd}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
<path d="${pd}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>`;
}

// ── CONSTELLATION ────────────────────────────────────────────────────
// No continuous stroke — just bright dots at regular intervals along
// the line axis, like connecting stars.
function lineConstellation(x1,y1,x2,y2, color, seed) {
  const rng = seededRng(seed);
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  if(dist===0) return '';
  // Faint guide line so the path is still readable
  let s = `<line x1="${f(x1)}" y1="${f(y1)}" x2="${f(x2)}" y2="${f(y2)}" stroke="${color}" stroke-width="1" stroke-dasharray="1,4" opacity="0.18"/>`;
  // Dots along the path — denser near middle, sparser at ends
  const n = Math.max(5, Math.floor(dist/22));
  for(let i=1;i<n;i++){
    const t = i/n;
    const dx2 = x1+t*dx, dy2 = y1+t*dy;
    // Vary dot size to feel star-like
    const r = rng.uniform(1.4, 2.6);
    const glow = r * 2.4;
    s += `<circle cx="${f(dx2)}" cy="${f(dy2)}" r="${f(glow)}" fill="${color}" opacity="0.18"/>`;
    s += `<circle cx="${f(dx2)}" cy="${f(dy2)}" r="${f(r)}" fill="${color}" opacity="0.95"/>`;
    // Occasional twinkle (cross sparkle)
    if(rng.next() < 0.18){
      const sp = r * 3;
      s += `<line x1="${f(dx2-sp)}" y1="${f(dy2)}" x2="${f(dx2+sp)}" y2="${f(dy2)}" stroke="${color}" stroke-width="0.6" opacity="0.5"/>`;
      s += `<line x1="${f(dx2)}" y1="${f(dy2-sp)}" x2="${f(dx2)}" y2="${f(dy2+sp)}" stroke="${color}" stroke-width="0.6" opacity="0.5"/>`;
    }
  }
  return s;
}

// ── PULSE ────────────────────────────────────────────────────────────
// Thin line with periodic thick "beats" — like a heartbeat trace.
// Beats are evenly spaced bulges along the line.
function linePulse(x1,y1,x2,y2, color, seed) {
  const dx=x2-x1, dy=y2-y1, dist=Math.hypot(dx,dy);
  if(dist===0) return '';
  // Propagating ripple: evenly-spaced dots whose radius follows a sine wave
  // that's pinned to zero at both endpoints and peaks in the middle —
  // like a ripple expanding from x1 and contracting into x2.
  const spacing = 14;
  const n = Math.max(4, Math.floor(dist / spacing));
  const rMin = 1.2;   // dot radius at endpoints
  const rMax = 7.5;   // dot radius at midpoint
  let s = '';
  for(let i=0;i<=n;i++){
    const t = i/n;
    const bx = x1+t*dx, by = y1+t*dy;
    // Sine envelope: 0 at t=0 and t=1, peak at t=0.5
    const envelope = Math.sin(t * Math.PI);
    const r = rMin + envelope * (rMax - rMin);
    const glow = r * 2.2;
    const opacity = 0.35 + envelope * 0.6;  // also fade in/out with the ripple
    s += `<circle cx="${f(bx)}" cy="${f(by)}" r="${f(glow)}" fill="${color}" opacity="${f(opacity*0.22)}"/>`;
    s += `<circle cx="${f(bx)}" cy="${f(by)}" r="${f(r)}" fill="${color}" opacity="${f(opacity)}"/>`;
  }
  return s;
}

function renderSpokes(name,level,school,notation,style){

function renderInwardSpiral(name,level,school,notation,style){

function renderVenn(name,level,school,notation,style){

function renderGlyph(name,level,school,notation,style,fmt){
  const lv=typeof level==='string'?(level==='Cantrip'?0:parseInt(level.replace('Level ',''))) : level;
  // Wish touches every node in a seeded-random order — looks like a chaotic web
  if(name==='Wish'){
    const allNodes = _SO.flatMap(s=>[1,2,3,4,5].map(d=>(`${SCHOOL_ABBREV[s]}:${d}`)));
    // Seed from style+fmt so each combination looks different but stays consistent
    let seed = 0;
    for(const c of (style+fmt)) seed = (seed*31 + c.charCodeAt(0)) >>> 0;
    const rng = seededRng(seed);
    // Fisher-Yates shuffle
    for(let i=allNodes.length-1;i>0;i--){
      const j = Math.floor(rng.next() * (i+1));
      [allNodes[i],allNodes[j]] = [allNodes[j],allNodes[i]];
    }
    notation = allNodes.join(' > ');
  }
  switch(fmt){
    case 'arcane':  return ARC.render(name,lv,school,notation,style);
    case 'divine':  return DIV.render(name,lv,school,notation,style);
    case 'pact':    return PACT.render(name,lv,school,notation,style);
    case 'octagon': return OCT.render(name,lv,school,notation,style);
    case 'linear':  return LIN.render(name,lv,school,notation,style);
    case 'dring':   return renderDoubleRing(name,lv,school,notation,style);
    case 'spokes':  return renderSpokes(name,lv,school,notation,style);
    case 'spiral':  return renderInwardSpiral(name,lv,school,notation,style);
    case 'venn':    return renderVenn(name,lv,school,notation,style);
    default:        return ARC.render(name,lv,school,notation,style);
  }
}

l to the Hit Points of the first form into which it shape-shifts. These Temporary Hit Points vanish if any remain when the spell ends. The transformation lasts for the duration or until the target ends it as a Bonus Action.", "higher": "", "color": "#40e890"}, {"name": "Animate Dead", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "240", "classes": "Cleric, Psion, Wizard", "notation": "Ne:4 > Tr:2 > Co:3 > Ev:4 > Ne:2", "tags": "movement, undead", "duration": "Instantaneous", "cast_time": "1 Min.", "range": "10 feet", "components": "V, S, M (a drop of blood, a piece of flesh, and a pinch of bone dust)", "description": "Choose a pile of bones or a corpse of a Medium or Small Humanoid within range. The target becomes an Undead creature: a Skeleton if you chose bones or a Zombie if you chose a corpse.\n\nOn each of your turns, you can take a Bonus Action to mentally command any creature you made with this spell if the creature is within 60 feet of you (if you control multiple creatures, you can command any of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move on its next turn, or you can issue a general command, such as to guard a chamber or corridor. If you issue no commands, the creature takes the Dodge action and moves only to avoid harm. Once given an order, the creature continues to follow it until its task is complete.\n\nThe creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature again before the current 24-hour period ends. This use of the spell reasserts your control over up to four creatures you have animated with this spell rather than animating a new creature.", "higher": "Using a Higher-Level Spell Slot. You animate or reassert control over two additional Undead creatures for each spell slot level above 3. Each of the creatures must come from a different corpse or pile of bones.", "color": "#a0a0a0"}, {"name": "Animate Objects", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "240", "classes": "Artificer, Bard, Psion, Sorcerer, Wizard", "notation": "Tr:1 > Co:2 > Ab:3 > Ev:4 > Il:5 > Di:1 > Tr:3", "tags": "alter_form, aoe, concentration, damage, healing, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "Objects animate at your command. Choose a number of nonmagical objects within range that aren't being worn or carried, aren't fixed to a surface, and aren't Gargantuan. The maximum number of objects is equal to your spellcasting ability modifier; for this number, a Medium or smaller target counts as one object, a Large target counts as two, and a Huge target counts as three.\n\nEach target animates, sprouts legs, and becomes a Construct that uses the Animated Object stat block; this creature is under your control until the spell ends or until it is reduced to 0 Hit Points. Each creature you make with this spell is an ally to you and your allies. In combat, it shares your Initiative count and takes its turn immediately after yours.\n\nUntil the spell ends, you can take a Bonus Action to mentally command any creature you made with this spell if the creature is within 500 feet of you (if you control multiple creatures, you can command any of them at the same time, issuing the same command to each one). If you issue no commands, the creature takes the Dodge action and moves only to avoid harm. When the creature drops to 0 Hit Points, it reverts to its object form, and any remaining damage carries over to that form.", "higher": "Using a Higher-Level Spell Slot. The creature's Slam damage increases by 1d4 (Medium or smaller), 1d6 (Large), or 1d12 (Huge) for each spell slot level above 5.", "color": "#40e890"}, {"name": "Antagonize", "level": "Level 3", "school": "Enchantment", "ritual": "No", "source": "BMT", "page": "50", "classes": "", "notation": "En:4 > Il:2 > Ev:3 > Tr:4 > En:3", "tags": "damage, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a playing card depicting a rogue)", "description": "You whisper magical words that antagonize one creature of your choice within range. The target must make a Wisdom saving throw. On a failed save, the target takes 4d4 psychic damage and must immediately use its reaction to make a melee attack against another creature of your choice that you can see. If the target can't make this attack (for example, because there is no one within its reach or because its reaction is unavailable), the target instead has disadvantage on the next attack roll it makes before the start of your next turn. On a successful save, the target takes half as much damage only.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d4 for each slot level above 3rd.", "color": "#c040e8"}, {"name": "Antilife Shell", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "241", "classes": "Apothecary, Druid, Tamer", "notation": "Ab:1 > Ne:2 > Tr:3 > Co:4 > Ev:5 > Di:1 > Ab:5", "tags": "barrier, concentration, damage, movement, undead", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "An aura extends from you in a 10-foot Emanation for the duration. The aura prevents creatures other than Constructs and Undead from passing or reaching through it. An affected creature can cast spells or make attacks with Ranged or Reach weapons through the barrier.\n\nIf you move so that an affected creature is forced to pass through the barrier, the spell ends.", "higher": "", "color": "#40c8e0"}, {"name": "Antimagic Field", "level": "Level 8", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "241", "classes": "Apothecary, Cleric, Psion, Wizard", "notation": "Ab:4 > Co:2 > Tr:3 > Ev:4 > Di:5 > En:1 > Il:2 > Ne:3 > Co:4 > Ab:1", "tags": "aoe, barrier, concentration, movement, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (iron filings)", "description": "An aura of antimagic surrounds you in a 10-foot Emanation. No one can cast spells, take Magic actions, or create other magical effects inside the aura, and those things can't target or otherwise affect anything inside it. Magical properties of magic items don't work inside the aura or on anything inside it.\n\nAreas of effect created by spells or other magic can't extend into the aura, and no one can teleport into or out of it or use planar travel there. Portals close temporarily while in the aura.\n\nOngoing spells, except those cast by an Artifact or a deity, are suppressed in the area. While an effect is suppressed, it doesn't function, but the time it spends suppressed counts against its duration.\n\nDispel Magic has no effect on the aura, and the auras created by different Antimagic Field spells don't nullify each other.", "higher": "", "color": "#40c8e0"}, {"name": "Antipathy/Sympathy", "level": "Level 8", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "242", "classes": "Apothecary, Bard, Druid, Wizard", "notation": "En:4 > Co:2 > Tr:3 > Ab:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Co:4 > En:5", "tags": "barrier, damage, mind, movement, single_target, summon", "duration": "10 days", "cast_time": "1 Hr.", "range": "60 feet", "components": "V, S, M (a mix of vinegar and honey)", "description": "As you cast the spell, choose whether it creates antipathy or sympathy, and target one creature or object that is Huge or smaller. Then specify a kind of creature, such as red dragons, goblins, or vampires. A creature of the chosen kind makes a Wisdom saving throw when it comes within 120 feet of the target. Your choice of antipathy or sympathy determines what happens to a creature when it fails that save:\n\nAntipathy. The creature has the Frightened condition. The Frightened creature must use its movement on its turns to get as far away as possible from the target, moving by the safest route.\n\nSympathy. The creature has the Charmed condition. The Charmed creature must use its movement on its turns to get as close as possible to the target, moving by the safest route. If the creature is within 5 feet of the target, the creature can't willingly move away. If the target damages the Charmed creature, that creature can make a Wisdom saving throw to end the effect, as described below.\n\nEnding the Effect. If the Frightened or Charmed creature ends its turn more than 120 feet away from the target, the creature makes a Wisdom saving throw. On a successful save, the creature is no longer affected by the target. A creature that successfully saves against this effect is immune to it for 1 minute, after which it can be affected again.", "higher": "", "color": "#c040e8"}, {"name": "Arcane Eye", "level": "Level 4", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "242", "classes": "Artificer, Psion, Wizard", "notation": "Di:5 > Il:2 > Co:3 > Tr:4 > Ab:5 > Di:1", "tags": "barrier, concentration, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a bit of bat fur)", "description": "You create an Invisible, invulnerable eye within range that hovers for the duration. You mentally receive visual information from the eye, which can see in every direction. It also has Darkvision with a range of 30 feet.\n\nAs a Bonus Action, you can move the eye up to 30 feet in any direction. A solid barrier blocks the eye's movement, but the eye can pass through an opening as small as 1 inch in diameter.", "higher": "", "color": "#c8e040"}, {"name": "Arcane Gate", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "242", "classes": "Sorcerer, Warlock, Wizard", "notation": "Co:2 > Tr:2 > Di:3 > Ab:4 > Il:5 > Ev:1 > En:2 > Co:3", "tags": "alter_form, concentration, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "500 feet", "components": "V, S", "description": "You create linked teleportation portals. Choose two Large, unoccupied spaces on the ground that you can see, one space within range and the other one within 10 feet of you. A circular portal opens in each of those spaces and remains for the duration.\n\nThe portals are two-dimensional glowing rings filled with mist that blocks sight. They hover inches from the ground and are perpendicular to it.\n\nA portal is open on only one side (you choose which). Anything entering the open side of a portal exits from the open side of the other portal as if the two were adjacent to each other. As a Bonus Action, you can change the facing of the open sides.", "higher": "", "color": "#e8a040"}, {"name": "Arcane Lock", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "242", "classes": "Artificer, Wizard", "notation": "Ab:3 > Tr:2 > Co:3 > Ab:2", "tags": "utility", "duration": "Until dispelled", "cast_time": "Action", "range": "Touch", "components": "V, S, M (gold dust worth 25+ GP, which the spell consumes)", "description": "You touch a closed door, window, gate, container, or hatch and magically lock it for the duration. This lock can't be unlocked by any nonmagical means. You and any creatures you designate when you cast the spell can open and close the object despite the lock. You can also set a password that, when spoken within 5 feet of the object, unlocks it for 1 minute.", "higher": "", "color": "#40c8e0"}, {"name": "Arcane Vigor", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "242", "classes": "Artificer, Sorcerer, Wizard", "notation": "Ab:3 > Ev:2 > Tr:3 > Ab:4", "tags": "damage, healing", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "You tap into your life force to heal yourself. Roll one or two of your unexpended Hit Point Dice, and regain a number of Hit Points equal to the roll's total plus your spellcasting ability modifier. Those dice are then expended.", "higher": "Using a Higher-Level Spell Slot. The number of unexpended Hit Dice you can roll increases by one for each spell slot level above 2.", "color": "#40c8e0"}, {"name": "Armor of Agathys", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "243", "classes": "Warlock", "notation": "Ab:2 > Ev:2 > Ab:4", "tags": "barrier, damage, healing, single_target", "duration": "1 hour", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (a shard of blue glass)", "description": "Protective magical frost surrounds you. You gain 5 Temporary Hit Points. If a creature hits you with a melee attack roll before the spell ends, the creature takes 5 Cold damage. The spell ends early if you have no Temporary Hit Points.", "higher": "Using a Higher-Level Spell Slot. The Temporary Hit Points and the Cold damage both increase by 5 for each spell slot level above 1.", "color": "#40c8e0"}, {"name": "Arms of Hadar", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "243", "classes": "Warlock", "notation": "Co:2 > Ev:2 > Co:3", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Invoking Hadar, you cause tendrils to erupt from yourself. Each creature in a 10-foot Emanation originating from you makes a Strength saving throw. On a failed save, a target takes 2d6 Necrotic damage and can't take Reactions until the start of its next turn. On a successful save, a target takes half as much damage only.",
