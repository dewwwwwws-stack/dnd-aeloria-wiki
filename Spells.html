in for creatures other than you.The attack rolls of ranged weapon attacks have disadvantage if the attacks pass in or out of the wind.", "higher": "", "color": "#e84040"}, {"name": "Water Breathing", "level": "Level 3", "school": "Transmutation", "ritual": "Yes", "source": "PHB'24", "page": "340", "classes": "Apothecary, Artificer, Druid, Ranger, Sorcerer, Tamer, Wizard", "notation": "Tr:4 > Co:2 > Ev:3 > Di:4 > Tr:2", "tags": "utility", "duration": "24 hours", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a short reed)", "description": "This spell grants up to ten willing creatures of your choice within range the ability to breathe underwater until the spell ends. Affected creatures also retain their normal mode of respiration.", "higher": "", "color": "#40e890"}, {"name": "Water Walk", "level": "Level 3", "school": "Transmutation", "ritual": "Yes", "source": "PHB'24", "page": "340", "classes": "Artificer, Cleric, Druid, Ranger, Sorcerer, Tamer", "notation": "Tr:4 > Ev:2 > Co:3 > Di:4 > Tr:2", "tags": "damage, movement, utility", "duration": "1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a piece of cork)", "description": "This spell grants the ability to move across any liquid surface—such as water, acid, mud, snow, quicksand, or lava—as if it were harmless solid ground (creatures crossing molten lava can still take damage from the heat). Up to ten willing creatures of your choice within range gain this ability for the duration.\n\nAn affected target must take a Bonus Action to pass from the liquid's surface into the liquid itself and vice versa, but if the target falls into the liquid, the target passes through the surface into the liquid below.", "higher": "", "color": "#40e890"}, {"name": "Watery Sphere", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "170", "classes": "", "notation": "Co:5 > Tr:2 > Di:3 > Ab:4 > Ev:5 > Co:1", "tags": "aoe, concentration, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a droplet of water)", "description": "You conjure up a sphere of water with a 5-foot radius at a point you can see within range. The sphere can hover but no more than 10 feet off the ground. The sphere remains for the spell's duration.\n\nAny creature in the sphere's space must make a Strength saving throw. On a successful save, a creature is ejected from that space to the nearest unoccupied space of the creature's choice outside the sphere. A Huge or larger creature succeeds on the saving throw automatically, and a Large or smaller creature can choose to fail it. On a failed save, a creature is restrained by the sphere and is engulfed by the water. At the end of each of its turns, a restrained target can repeat the saving throw, ending the effect on itself on a success.\n\nThe sphere can restrain as many as four Medium or smaller creatures or one Large creature. If the sphere restrains a creature that causes it to exceed this capacity, a random creature that was already restrained by the sphere falls out of it and lands prone in a space within 5 feet of it.\n\nAs an action, you can move the sphere up to 30 feet in a straight line. If it moves over a pit, a cliff, or other drop-off, it safely descends until it is hovering 10 feet above the ground. Any creature restrained by the sphere moves with it. You can ram the sphere into creatures, forcing them to make the saving throw.\n\nWhen the spell ends, the sphere falls to the ground and extinguishes all normal flames within 30 feet of it. Any creature restrained by the sphere is knocked prone in the space where it falls. The water then vanishes.", "higher": "", "color": "#e8a040"}, {"name": "Web", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "340", "classes": "Apothecary, Artificer, Sorcerer, Wizard", "notation": "Co:3 > Ab:2 > Tr:3 > Co:2", "tags": "aoe, barrier, concentration, damage, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a bit of spiderweb)", "description": "You conjure a mass of sticky webbing at a point within range. The webs fill a 20-foot Cube there for the duration. The webs are Difficult Terrain, and the area within them is Lightly Obscured.\n\nIf the webs aren't anchored between two solid masses (such as walls or trees) or layered across a floor, wall, or ceiling, the web collapses on itself, and the spell ends at the start of your next turn. Webs layered over a flat surface have a depth of 5 feet.\n\nThe first time a creature enters the webs on a turn or starts its turn there, it must succeed on a Dexterity saving throw or have the Restrained condition while in the webs or until it breaks free.\n\nA creature Restrained by the webs can take an action to make a Strength (Athletics) check against your spell save DC. If it succeeds, it is no longer Restrained.\n\nThe webs are flammable. Any 5-foot Cube of webs exposed to fire burns away in 1 round, dealing 2d4 Fire damage to any creature that starts its turn in the fire.", "higher": "", "color": "#e8a040"}, {"name": "Weird", "level": "Level 9", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "341", "classes": "Psion, Warlock, Wizard", "notation": "Il:5 > Co:2 > Tr:3 > En:4 > Ev:5 > Ab:1 > Di:2 > Ne:3 > Co:4 > Tr:5 > Il:3", "tags": "aoe, concentration, damage, mind, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You try to create illusory terrors in others' minds. Each creature of your choice in a 30-foot-radius Sphere centered on a point within range makes a Wisdom saving throw. On a failed save, a target takes 10d10 Psychic damage and has the Frightened condition for the duration. On a successful save, a target takes half as much damage only.\n\nA Frightened target makes a Wisdom saving throw at the end of each of its turns. On a failed save, it takes 5d10 Psychic damage. On a successful save, the spell ends on that target.", "higher": "", "color": "#4060e8"}, {"name": "Whirlwind", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "171", "classes": "", "notation": "Ev:3 > Il:2 > Co:3 > Tr:4 > Di:5 > Ab:1 > En:2 > Ne:3 > Ev:1", "tags": "aoe, concentration, damage, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "300 feet", "components": "V, M (a piece of straw)", "description": "A whirlwind howls down to a point that you can see on the ground within range. The whirlwind is a 10-foot-radius, 30-foot-high cylinder centered on that point. Until the spell ends, you can use your action to move the whirlwind up to 30 feet in any direction along the ground. The whirlwind sucks up any Medium or smaller objects that aren't secured to anything and that aren't worn or carried by anyone.\n\nA creature must make a Dexterity saving throw the first time on a turn that it enters the whirlwind or that the whirlwind enters its space, including when the whirlwind first appears. A creature takes 10d6 bludgeoning damage on a failed save, or half as much damage on a successful one. In addition, a Large or smaller creature that fails the save must succeed on a Strength saving throw or become restrained in the whirlwind until the spell ends. When a creature starts its turn restrained by the whirlwind, the creature is pulled 5 feet higher inside it, unless the creature is at the top. A restrained creature moves with the whirlwind and falls when the spell ends, unless the creature has some means to stay aloft.\n\nA restrained creature can use an action to make a Strength or Dexterity check against your spell save DC. If successful, the creature is no longer restrained by the whirlwind and is hurled 3d6 × 10 feet away from it in a random direction.", "higher": "", "color": "#e84040"}, {"name": "Wind Walk", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "341", "classes": "Druid", "notation": "Tr:2 > Il:2 > Co:3 > Ab:4 > En:5 > Ev:1 > Di:2 > Tr:3", "tags": "alter_form, barrier, damage, illusion_tag, mind, movement, summon", "duration": "8 hours", "cast_time": "1 Min.", "range": "30 feet", "components": "V, S, M (a candle)", "description": "You and up to ten willing creatures of your choice within range assume gaseous forms for the duration, appearing as wisps of cloud. While in this cloud form, a target has a Fly Speed of 300 feet and can hover; it has Immunity to the Prone condition; and it has Resistance to Bludgeoning, Piercing, and Slashing damage. The only actions a target can take in this form are the Dash action or a Magic action to begin reverting to its normal form. Reverting takes 1 minute, during which the target has the Stunned condition. Until the spell ends, the target can revert to cloud form, which also requires a Magic action followed by a 1-minute transformation.\n\nIf a target is in cloud form and flying when the effect ends, the target descends 60 feet per round for 1 minute until it lands, which it does safely. If it can't land after 1 minute, it falls the remaining distance.", "higher": "", "color": "#40e890"}, {"name": "Wind Wall", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "341", "classes": "Druid, Ranger", "notation": "Ev:4 > Il:2 > Co:3 > Tr:4 > Ev:1", "tags": "alter_form, aoe, barrier, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a fan and a feather)", "description": "A wall of strong wind rises from the ground at a point you choose within range. You can make the wall up to 50 feet long, 15 feet high, and 1 foot thick. You can shape the wall in any way you choose so long as it makes one continuous path along the ground. The wall lasts for the duration.\n\nWhen the wall appears, each creature in its area makes a Strength saving throw, taking 4d8 Bludgeoning damage on a failed save or half as much damage on a successful one.\n\nThe strong wind keeps fog, smoke, and other gases at bay. Small or smaller flying creatures or objects can't pass through the wall. Loose, lightweight materials brought into the wall fly upward. Arrows, bolts, and other ordinary projectiles launched at targets behind the wall are deflected upward and miss automatically. Boulders hurled by Giants or siege engines, and similar projectiles, are unaffected. Creatures in gaseous form can't pass through it.", "higher": "", "color": "#e84040"}, {"name": "Wish", "level": "Level 9", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "341", "classes": "Sorcerer, Wizard", "notation": "Co:1 > Co:2 > Co:3 > Co:4 > Co:5 > Di:1 > Di:2 > Di:3 > Di:4 > Di:5 > Ab:1 > Ab:2 > Ab:3 > Ab:4 > Ab:5 > En:1 > En:2 > En:3 > En:4 > En:5 > Tr:1 > Tr:2 > Tr:3 > Tr:4 > Tr:5 > Il:1 > Il:2 > Il:3 > Il:4 > Il:5 > Ne:1 > Ne:2 > Ne:3 > Ne:4 > Ne:5 > Ev:1 > Ev:2 > Ev:3 > Ev:4 > Ev:5", "tags": "alter_form, barrier, damage, healing, illusion_tag, reveal, single_target, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V", "description": "Wish is the mightiest spell a mortal can cast. By simply speaking aloud, you can alter reality itself.\n\nThe basic use of this spell is to duplicate any other spell of level 8 or lower. If you use it this way, you don't need to meet any requirements to cast that spell, including costly components. The spell simply takes effect.\n\nAlternatively, you can create one of the following effects of your choice:\n\nObject Creation. You create one object of up to 25,000 GP in value that isn't a magic item. The object can be no more than 300 feet in any dimension, and it appears in an unoccupied space that you can see on the ground.\n\nInstant Health. You allow yourself and up to twenty creatures that you can see to regain all Hit Points, and you end all effects on them listed in the Greater Restoration spell.\n\nResistance. You grant up to ten creatures that you can see Resistance to one damage type that you choose. This Resistance is permanent.\n\nSpell Immunity. You grant up to ten creatures you can see immunity to a single spell or other magical effect for 8 hours.\n\nSudden Learning. You replace one of your feats with another feat for which you are eligible. You lose all the benefits of the old feat and gain the benefits of the new one. You can't replace a feat that is a prerequisite for any of your other feats or features.\n\nRoll Redo. You undo a single recent event by forcing a reroll of any die roll made within the last round (including your last turn). Reality reshapes itself to accommodate the new result. For example, a Wish spell could undo an ally's failed saving throw or a foe's Critical Hit. You can force the reroll to be made with Advantage or Disadvantage, and you choose whether to use the reroll or the original roll.\n\nReshape Reality. You may wish for something not included in any of the other effects. To do so, state your wish to the DM as precisely as possible. The DM has great latitude in ruling what occurs in such an instance; the greater the wish, the greater the likelihood that something goes wrong. This spell might simply fail, the effect you desire might be achieved only in part, or you might suffer an unforeseen consequence as a result of how you worded the wish. For example, wishing that a villain were dead might propel you forward in time to a period when that villain is no longer alive, effectively removing you from the game. Similarly, wishing for a Legendary magic item or an Artifact might instantly transport you to the presence of the item's current owner. If your wish is granted and its effects have consequences for a whole community, region, or world, you are likely to attract powerful foes. If your wish would affect a god, the god's divine servants might instantly intervene to prevent it or to encourage you to craft the wish in a particular way. If your wish would undo the multiverse itself, threaten the City of Sigil, or affect the Lady of Pain in any way, you see an image of her in your mind for a moment; she shakes her head, and your wish fails.\n\nThe stress of casting Wish to produce any effect other than duplicating another spell weakens you. After enduring that stress, each time you cast a spell until you finish a Long Rest, you take 1d10 Necrotic damage per level of that spell. This damage can't be reduced or prevented in any way. In addition, your Strength score becomes 3 for 2d4 days. For each of those days that you spend resting and doing nothing more than light activity, your remaining recovery time decreases by 2 days. Finally, there is a 33 percent chance that you are unable to cast Wish ever again if you suffer this stress.", "higher": "", "color": "#e8a040"}, {"name": "Witch Bolt", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "343", "classes": "Sorcerer, Warlock, Wizard", "notation": "Ev:2 > Di:2 > Ev:1", "tags": "barrier, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a twig struck by lightning)", "description": "A beam of crackling energy lances toward a creature within range, forming a sustained arc of lightning between you and the target. Make a ranged spell attack against it. On a hit, the target takes 2d12 Lightning damage.\n\nOn each of your subsequent turns, you can take a Bonus Action to deal 1d12 Lightning damage to the target automatically, even if the first attack missed.\n\nThe spell ends if the target is ever outside the spell's range or if it has Total Cover from you.", "higher": "Using a Higher-Level Spell Slot. The initial damage increases by 1d12 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Wither and Bloom", "level": "Level 2", "school": "Necromancy", "ritual": "No", "source": "SCC", "page": "38", "classes": "Druid, Sorcerer, Wizard", "notation": "Ne:3 > Ev:2 > Tr:3 > Ne:5", "tags": "aoe, damage, healing", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a withered vine twisted into a loop)", "description": "You invoke both death and life upon a 10-foot-radius sphere centered on a point within range. Each creature of your choice in that area must make a Constitution saving throw, taking 2d6 necrotic damage on a failed save, or half as much damage on a successful one. Nonmagical vegetation in that area withers.\n\nIn addition, one creature of your choice in that area can spend and roll one of its unspent Hit Dice and regain a number of hit points equal to the roll plus your spellcasting ability modifier.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d6 for each slot above the 2nd, and the number of Hit Dice that can be spent and added to the healing roll increases by one for each slot above 2nd.", "color": "#a0a0a0"}, {"name": "Word of Radiance", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "343", "classes": "Cleric", "notation": "Ev:4 > Ev:3", "tags": "aoe, damage, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, M (a sunburst token)", "description": "Burning radiance erupts from you in a 5-foot Emanation. Each creature of your choice that you can see in it must succeed on a Constitution saving throw or take 1d6 Radiant damage.", "higher": "Cantrip Upgrade. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).", "color": "#e84040"}, {"name": "Word of Recall", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "343", "classes": "Cleric", "notation": "Co:2 > Di:2 > Tr:3 > Il:4 > Ev:5 > Ab:1 > En:2 > Co:4", "tags": "illusion_tag, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "5 feet", "components": "V", "description": "You and up to five willing creatures within 5 feet of you instantly teleport to a previously designated sanctuary. You and any creatures that teleport with you appear in the nearest unoccupied space to the spot you designated when you prepared your sanctuary (see below). If you cast this spell without first preparing a sanctuary, the spell has no effect.\n\nYou must designate a location, such as a temple, as a sanctuary by casting this spell there.", "higher": "", "color": "#e8a040"}, {"name": "Wrath of Nature", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "171", "classes": "", "notation": "Ev:1 > Di:2 > Tr:3 > Co:4 > Ab:5 > En:1 > Ev:5", "tags": "aoe, concentration, damage, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You call out to the spirits of nature to rouse them against your enemies. Choose a point you can see within range. The spirits cause trees, rocks, and grasses in a 60-foot cube centered on that point to become animated until the spell ends.\n\nGrasses and Undergrowth. Any area of ground in the cube that is covered by grass or undergrowth is difficult terrain for your enemies.\n\nTrees. At the start of each of your turns, each of your enemies within 10 feet of any tree in the cube must succeed on a Dexterity saving throw or take 4d6 slashing damage from whipping branches.\n\nRoots and Vines. At the end of each of your turns, one creature of your choice that is on the ground in the cube must succeed on a Strength saving throw or become restrained until the spell ends. A restrained creature can use an action to make a Strength (Athletics) check against your spell save DC, ending the effect on itself on a success.\n\nRocks. As a bonus action on your turn, you can cause a loose rock in the cube to launch at a creature you can see in the cube. Make a ranged spell attack against the target. On a hit, the target takes 3d8 nonmagical bludgeoning damage, and it must succeed on a Strength saving throw or fall prone.", "higher": "", "color": "#e84040"}, {"name": "Wrathful Smite", "level": "Level 1", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "343", "classes": "Paladin", "notation": "Ne:2 > En:2 > Ne:1", "tags": "damage, mind, single_target", "duration": "1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "The target takes an extra 1d6 Necrotic damage from the attack, and it must succeed on a Wisdom saving throw or have the Frightened condition until the spell ends. At the end of each of its turns, the Frightened target repeats the save, ending the spell on itself on a success.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#a0a0a0"}, {"name": "Wristpocket", "level": "Level 2", "school": "Conjuration", "ritual": "Yes", "source": "EGW", "page": "190", "classes": "", "notation": "Co:3 > Il:2 > Ab:3 > Co:5", "tags": "concentration, illusion_tag, summon, utility", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "S", "description": "You flick your wrist, causing one object in your hand to vanish. The object, which only you can be holding and can weigh no more than 5 pounds, is transported to an extradimensional space, where it remains for the duration.\n\nUntil the spell ends, you can use your action to summon the object to your free hand, and you can use your action to return the object to the extradimensional space. An object still in the pocket plane when the spell ends appears in your space, at your feet.", "higher": "", "color": "#e8a040"}, {"name": "Yolande's Regal Presence", "level": "Level 5", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "343", "classes": "Bard, Wizard", "notation": "En:1 > Di:2 > Il:3 > Ev:4 > Tr:5 > Ab:1 > En:5", "tags": "concentration, damage, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a miniature tiara)", "description": "You surround yourself with unearthly majesty in a 10-foot Emanation. Whenever the Emanation enters the space of a creature you can see and whenever a creature you can see enters the Emanation or ends its turn there, you can force that creature to make a Wisdom saving throw. On a failed save, the target takes 4d6 Psychic damage and has the Prone condition, and you can push it up to 10 feet away. On a successful save, the target takes half as much damage only. A creature makes this save only once per turn.", "higher": "", "color": "#c040e8"}, {"name": "Zephyr Strike", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "171", "classes": "", "notation": "Tr:4 > Ev:2 > Tr:5", "tags": "concentration, damage, movement, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "You move like the wind. Until the spell ends, your movement doesn't provoke opportunity attacks.\n\nOnce before the spell ends, you can give yourself advantage on one weapon attack roll on your turn. That attack deals an extra 1d8 force damage on a hit. Whether you hit or miss, your walking speed increases by 30 feet until the end of that turn.", "higher": "", "color": "#40e890"}, {"name": "Zone of Truth", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "343", "classes": "Bard, Cleric, Paladin, Psion", "notation": "En:3 > Di:2 > Ev:3 > En:2", "tags": "aoe, mind, reveal, summon", "duration": "10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You create a magical zone that guards against deception in a 15-foot-radius Sphere centered on a point within range. Until the spell ends, a creature that enters the spell's area for the first time on a turn or starts its turn there makes a Charisma saving throw. On a failed save, a creature can't speak a deliberate lie while in the radius. You know whether a creature succeeds or fails on this save.\n\nAn affected creature is aware of the spell and can avoid answering questions to which it would normally respond with a lie. Such a creature can be evasive yet must be truthful.", "higher": "", "color": "#c040e8"},

  {"name": "Summon Astral Entity", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "", "classes": "Psion, Sorcerer, Warlock, Wizard", "notation": "Co:1 > Ne:2 > Tr:3 > En:4 > Co:5", "tags": "", "duration": "Conc, 1 h", "cast_time": "Action", "range": "90 feet", "components": "V,S,M", "description": "You call forth the spirit of a psionic entity. It manifests in an unoccupied space that you can see within range and uses the Psionic Spirit stat block. When you cast the spell, choose Crystal Entity, Ectoplasmic Entity, or Ghostly Entity. The creature resembles an astral entity of that kind, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\\n   The creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.\\n\\n", "higher": "", "color": "#4080e8"},

  {"name": "Psionic Blast", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "", "classes": "Psion, Wizard", "notation": "Ev:1 > Di:2 > Di:3 > Tr:4 > Co:5 > Ab:1 > Co:2 > Ev:3", "tags": "", "duration": "Instantaneous", "cast_time": "Action", "range": "S:60-feet cone", "components": "V,S,M", "description": "You unleash a concussive burst of psionic energy. Each creature in a 60-foot Cone originating from you makes an Intelligence saving throw. On a failed save, the creature takes 6d8 Psychic damage and has the Stunned condition until the start of your next turn. On a successful save, the creature takes half as much damage only.\\n\\n", "higher": "", "color": "#e84040"},
  {"name": "Thought Form", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "", "classes": "Psion", "notation": "Tr:1 > Ab:2 > En:3 > Ab:4 > Ev:5 > Il:1 > En:2 > Tr:3", "tags": "", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus Action", "range": "Self", "components": "V,M", "description": "You briefly transform into a psionic spirit. You gain the following benefits until the spell ends.\\n   Ghostly Form: You have Immunity to Poison and Psychic damage, and you have Immunity to the Exhaustion condition.\\n   Incorporeal Movement: You have a Fly Speed of 60 feet and can hover. You can move through occupied spaces as if they were Difficult Terrain. If you end your turn in such a space, you take 1d10 Force damage. If the spell ends in such a space, you are returned to the last unoccupied space you were in.\\n   Psionic Recharge: As a Magic action, you can touch a creature (which can be yourself) and roll 1d6. The creature regains one expended spell slot, the level of which equals half the number rolled (round up) or lower. Once a creature regains a spell slot from this spell, that creature can't do so again until it finishes a Long Rest.", "higher": "", "color": "#e89040"},

const STYLE_LABELS  = {"skilled": "Skilled", "novice": "Novice", "chaotic": "Chaotic", "psionic": "Psionic", "natural": "Natural", "scriptural": "Scriptural", "calligraphic": "Calligraphic", "dancing": "Dancing", "constellation": "Constellation", "pulse": "Pulse"};
const FORMATS       = ["arcane", "linear", "venn", "divine", "pact", "octagon", "dring", "spokes", "spiral"];
const FORMAT_LABELS = {"arcane": "Arcane", "linear": "Arcane (Short.)", "venn": "Arcane (Alt.)", "divine": "Divine", "pact": "Pact Magic", "octagon": "Glyphic", "dring": "Orbital", "spokes": "Planar", "spiral": "Vortex"};

let allCards = BASE_CARDS.slice();

let style='skilled', fmt='arcane', mStyle='skilled', mFmt='arcane', mCard=null;

// Cache for rendered SVGs — avoid re-rendering same spell/style/fmt
const glyphCache = new Map();
function getCacheKey(notation,s,f) { return `${notation}|${s}|${f}`; }
function getGlyph(card, s, f) {
  if(!card.notation) return null;
  const key = getCacheKey(card.notation, s, f);
  if(!glyphCache.has(key)) {
    const lv = card.level==='Cantrip'?0:parseInt(card.level.replace('Level ',''));
    glyphCache.set(key, renderGlyph(card.name, lv, card.school, card.notation, s, f));
  }
  return glyphCache.get(key);
}

function setStyle(s,btn) {
  style=s;
  document.querySelectorAll('#styleBtns .tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); _doFilter();
}
function setFmt(f,btn) {
  fmt=f;
  document.querySelectorAll('#fmtBtns .tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); _doFilter();
}

function buildControls() {
  const mc=document.getElementById('mControls');
  mc.innerHTML='';
  const sl=document.createElement('div'); sl.className='mc-section-label';
  sl.textContent='Line Style'; mc.appendChild(sl);
  const sr=document.createElement('div'); sr.className='mc-style-row';
  STYLES.forEach(s=>{
    const d=document.createElement('div');
    d.className='mbtn'+(s===mStyle?' active':'');
    d.textContent=STYLE_LABELS[s]; d.onclick=()=>setMS(s,d); sr.appendChild(d);
  }); mc.appendChild(sr);
  const fl=document.createElement('div'); fl.className='mc-section-label';
  fl.textContent='Render Style'; mc.appendChild(fl);
  const fr=document.createElement('div'); fr.className='mc-fmt-row';
  FORMATS.forEach(f=>{
    const d=document.createElement('div');
    d.className='mbtn'+(f===mFmt?' active':'');
    d.textContent=FORMAT_LABELS[f]; d.onclick=()=>setMF(f,d); fr.appendChild(d);
  }); mc.appendChild(fr);
}

function openModal(c) {
  mCard=c; mStyle=style; mFmt=fmt;
  document.getElementById('mName').textContent=c.name;
  const ritual=c.ritual==='Yes'?' · Ritual':'', page=c.page?` · p.${c.page}`:'';
  document.getElementById('mMeta').innerHTML=
    `<span><span class="school-dot" style="background:${SCHOOL_COLORS_MAP[c.school]||'#888'}"></span>${c.level} ${c.school}${ritual}</span>`+
    `<span>${c.source||''}${page}</span>`+
    (c.cast_time?`<span>⏱ ${c.cast_time}</span>`:'')+
    (c.range?`<span>◎ ${c.range}</span>`:'')+
    (c.duration?`<span>⧗ ${c.duration}</span>`:'');
  buildControls();
  // Colour each notation token by its school colour.
  // For Wish: each segment arrow uses the DESTINATION node's colour (matching line colours).
  // For all other spells: each token uses its own school colour.
  (()=>{
    const el=document.getElementById('mNotation');
    if(c.name==='Wish'){ el.innerHTML='<span style="color:#888;font-style:italic;letter-spacing:.2em">???</span>'; return; }
    const tokens=c.notation.split('>').map(t=>t.trim());
    const parsed=tokens.map(t=>{const[ab,d]=t.split(':');return{ab:ab.trim(),d:d.trim(),school:_SAR[ab.trim()]};});
    const isWish=false;
    el.innerHTML=parsed.map((p,i)=>{
      const col=isWish&&i>0?_SC[parsed[i].school]:_SC[p.school];
      const arrowCol=isWish&&i<parsed.length-1?_SC[parsed[i+1].school]:_SC[p.school];
      const arrow=i<parsed.length-1?` <span style="color:${arrowCol};opacity:.5"> &gt; </span>`:'';
      return `<span style="color:${col}">${p.ab}:${p.d}</span>${arrow}`;
    }).join('');
  })();
  document.getElementById('mDesc').textContent=c.description||'—';
  document.getElementById('mHigher').textContent=c.higher?'▲ '+c.higher:'';
  document.getElementById('mClasses').textContent=c.classes?'Classes: '+c.classes:'';
  document.getElementById('mComponents').textContent=c.components?'Components: '+c.components:'';
  document.getElementById('mTags').textContent=c.tags?'Tags: '+c.tags:'';
  updateModalGlyph();
  pinOverlay(document.getElementById('modalBg'));
}
// ── OVERLAY HELPERS ────────────────────────────────────────────────────
// Both Obsidian's plugin iframe and standard cross-origin iframes need
// position:absolute overlays pinned to the visible viewport. We read the
// scroll position from whichever container actually scrolls (body or
// documentElement varies by browser/iframe context), then lock that
// container's overflow so the background can't scroll while open.
function pinOverlay(bg) {
  const doc = document.documentElement;
  const body = document.body;
  const scrollY = window.scrollY || doc.scrollTop || body.scrollTop || 0;
  const viewH   = window.innerHeight || doc.clientHeight || 600;
  bg.style.top    = scrollY + 'px';
  bg.style.height = viewH + 'px';
  // Lock scroll on whichever element is actually scrolling
  bg.dataset.lockedDoc = doc.style.overflow;
  bg.dataset.lockedBody = body.style.overflow;
  doc.style.overflow = 'hidden';
  body.style.overflow = 'hidden';
  bg.classList.add('open');
  bg.scrollTop = 0;
}
function unpinOverlay(bg) {
  bg.classList.remove('open');
  document.documentElement.style.overflow = bg.dataset.lockedDoc || '';
  document.body.style.overflow = bg.dataset.lockedBody || '';
}
function updateModalGlyph() {
  const raw = getGlyph(mCard,mStyle,mFmt) || '';
  // The renderers embed name/level/school/style as three <text> elements at
  // y=28, y=52, y=74 inside the SVG (see labels() in renderGlyph). In the
  // modal those titles are redundant with the <h2 id="mName"> below the
  // glyph and they crowd the artwork. Strip them and crop the viewBox so
  // the glyph fills the available space cleanly.
  const stripped = raw
    .replace(/<text[^>]*y="28"[^>]*>[^<]*<\/text>\s*/, '')
    .replace(/<text[^>]*y="52"[^>]*>[^<]*<\/text>\s*/, '')
    .replace(/<text[^>]*y="74"[^>]*>[^<]*<\/text>\s*/, '');
  document.getElementById('mGlyph').innerHTML = stripped;
  // Resize modal-left based on glyph aspect ratio so it fills space properly
  _resizeModalLeft(stripped);
}

function _resizeModalLeft(svgStr) {
  const ml = document.querySelector('.modal-left');
  if(!ml) return;
  const vb = (svgStr.match(/viewBox="([^"]+)"/) || [])[1];
  if(!vb) { ml.style.width = '42%'; return; }
  const [,, w, h] = vb.split(/\s+/).map(Number);
  const ratio = w / h;
  // Landscape (linear ≈1.67): give glyph more width
  // Square (≈1.0): standard 42%
  // Portrait (div ≈0.8): less width
  const vw = window.innerWidth || 900;
  const vh = window.innerHeight || 700;
  const modalW = Math.min(960, vw - 24);
  const rightMinW = 260;
  const pad = 36 + 18; // padding + gap
  const maxGlyphW = modalW - rightMinW - pad;
  const maxGlyphH = vh - 60;
  // Fit glyph within maxGlyphW × maxGlyphH maintaining aspect ratio
  let glyphW = Math.min(maxGlyphW, maxGlyphH * ratio);
  glyphW = Math.max(120, glyphW);
  ml.style.width = Math.round(glyphW) + 'px';
}
function setMS(s,btn) {
  mStyle=s;
  document.querySelectorAll('#mControls .mc-style-row .mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); updateModalGlyph();
}
function setMF(f,btn) {
  mFmt=f;
  document.querySelectorAll('#mControls .mc-fmt-row .mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); updateModalGlyph();
}
function exportGlyph() {
  const glyphDiv = document.getElementById('mGlyph');
  const svg = glyphDiv.querySelector('svg');
  if(!svg) return;
  const btn = document.getElementById('exportBtn');
  const spellName = (mCard && mCard.name ? mCard.name : 'glyph').replace(/[^a-z0-9]/gi,'_');
  const svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + svg.outerHTML;

  const vb = svg.getAttribute('viewBox');
  const [,, vw, vh] = vb ? vb.split(/\s+/).map(Number) : [0,0,1000,1000];
  const scale = 2;
  const W = vw * scale, H = vh * scale;

  btn.textContent = '⏳ Exporting…';

  // Use base64 data URL instead of blob URL — works inside sandboxed iframes
  const svgB64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
  const img = new Image();

  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);

    // Get PNG as data URL — no blobs needed
    let pngDataUrl;
    try { pngDataUrl = canvas.toDataURL('image/png'); }
    catch(e) {
      btn.textContent = '⚠ Failed'; 
      setTimeout(()=>{ btn.textContent='⬇ Export PNG'; }, 2000);
      return;
    }

    // 1. Try <a download> with data URL
    try {
      const a = document.createElement('a');
      a.href = pngDataUrl; a.download = spellName + '_glyph.png';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      btn.textContent = '✓ Downloaded';
      setTimeout(()=>{ btn.textContent='⬇ Export PNG'; }, 2500);
      return;
    } catch(e) { /* fall through */ }

    // 2. Try clipboard (image/png via ClipboardItem)
    if(window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
      fetch(pngDataUrl).then(r=>r.blob()).then(pngBlob=>{
        const item = new ClipboardItem({'image/png': pngBlob});
        return navigator.clipboard.write([item]);
      }).then(()=>{
        btn.textContent = '✓ Copied image';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='⬇ Export PNG'; btn.classList.remove('copied'); }, 3000);
      }).catch(()=> openTab(pngDataUrl, spellName));
      return;
    }

    // 3. Open in new tab — right-click to save
    openTab(pngDataUrl, spellName);
  };

  img.onerror = function() {
    btn.textContent = '⚠ Failed';
    setTimeout(()=>{ btn.textContent='⬇ Export PNG'; }, 2000);
  };

  function openTab(dataUrl, name) {
    const w = window.open('', '_blank');
    if(w) {
      w.document.write(`<html><body style="margin:0;background:#0d0d1a">
        <img src="${dataUrl}" style="max-width:100%;display:block"/>
        <p style="color:#aaa;font-family:sans-serif;padding:8px;font-size:14px">
          Right-click the image → <b>Save Image As</b> to download as PNG</p>
        </body></html>`);
      w.document.close();
      btn.textContent = '✓ Opened in tab';
    } else {
      btn.textContent = '⚠ Popup blocked';
    }
    setTimeout(()=>{ btn.textContent='⬇ Export PNG'; }, 3000);
  }

  img.src = svgB64;
}

function closeModal() { unpinOverlay(document.getElementById('modalBg')); }
function closeOutside(e) { if(e.target===document.getElementById('modalBg')) closeModal(); }

// ── ADD SPELL ────────────────────────────────────────────────────────
function validateNotation() {
  const notation=document.getElementById('aNotation').value.trim();
  const level=document.getElementById('aLevel').value;
  const err=document.getElementById('aErr'), preview=document.getElementById('aPreview');
  if(!notation||!level) { err.textContent=''; return; }
  const lvl=level==='Cantrip'?0:parseInt(level.replace('Level ',''));
  const actual=(notation.match(/>/g)||[]).length;
  if(actual!==lvl+1) {
    err.textContent=`Level ${level} needs ${lvl+1} arrow(s). Found ${actual}.`;
    preview.textContent=notation; preview.style.color='#e86';
  } else { err.textContent=''; preview.textContent='✓ '+notation; preview.style.color='#6a9'; }
}
function addSpell() {
  const name=document.getElementById('aName').value.trim();
  const level=document.getElementById('aLevel').value;
  const school=document.getElementById('aSchool').value;
  const notation=document.getElementById('aNotation').value.trim();
  const err=document.getElementById('aErr');
  if(!name) { err.textContent='Spell name is required.'; return; }
  if(!level) { err.textContent='Please select a level.'; return; }
  if(!school) { err.textContent='Please select a school.'; return; }
  if(!notation) { err.textContent='Notation is required.'; return; }
  const lvl=level==='Cantrip'?0:parseInt(level.replace('Level ',''));
  const actual=(notation.match(/>/g)||[]).length;
  if(actual!==lvl+1) { err.textContent=`Notation needs ${lvl+1} arrow(s). Found ${actual}.`; return; }
  if(allCards.find(c=>c.name.toLowerCase()===name.toLowerCase())) {
    err.textContent='A spell with this name already exists.'; return;
  }
  const newSpell={
    name,level,school,notation,
    source:document.getElementById('aSource').value.trim()||'Homebrew',
    page:'',ritual:document.getElementById('aRitual').value,
    classes:Array.from(document.querySelectorAll('.cls-cb:checked')).map(c=>c.value).join(', '),
    cast_time:document.getElementById('aCastTime').value.trim(),
    range:document.getElementById('aRange').value.trim(),
    components:document.getElementById('aComponents').value.trim(),
    duration:document.getElementById('aDuration').value.trim(),
    description:document.getElementById('aDesc').value.trim(),
    higher:document.getElementById('aHigher').value.trim(),
    tags:'',color:SCHOOL_COLORS_MAP[school]||'#888',custom:true,
  };
  closeAddPanel(); filter();
  document.getElementById('count')?.style && (document.getElementById('count').style.color='#6a9');
  setTimeout(()=>{const c=document.getElementById('count');if(c)c.style.color='';},1800);
}

// ── INIT ─────────────────────────────────────────────────────────────
_currentCards = allCards; renderGrid(allCards);

// ── VIRTUAL SCROLL + DEBOUNCED FILTER ────────────────────────────

function filter() {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(_doFilter, 120);
}

function _doFilter() {
  const q  = document.getElementById('search').value.toLowerCase();
  const sc = document.getElementById('fSchool').value;
  const lv = document.getElementById('fLevel').value;
  const sr = document.getElementById('fSource').value;
  const cl = document.getElementById('fClass').value;
  _currentCards = allCards.filter(c =>
    (!q  || c.name.toLowerCase().includes(q)) &&
    (!sc || c.school === sc) &&
    (!lv || c.level  === lv) &&
    (!sr || c.source === sr) &&
    (!cl || (c.classes && c.classes.includes(cl)))
  );
  window.scrollTo(0, 0);
  renderGrid(_currentCards);
}

function prewarmCache(cards) {
  let i = 0;
  function step(dl) {
    while(i < cards.length && dl.timeRemaining() > 2) { getGlyph(cards[i],style,fmt); i++; }
    if(i < cards.length) requestIdleCallback(step, {timeout:3000});
  }
  if('requestIdleCallback' in window) requestIdleCallback(step, {timeout:3000});
}

function renderGrid(cards) {
  const grid = document.getElementById('grid');
  const _cnt=document.getElementById('count');if(_cnt)_cnt.textContent=cards.length+' spells';
  grid.innerHTML = '';
  grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:12px;padding:14px 18px;';
  const cls = fmt + '-card';
  const frag = document.createDocumentFragment();

  const observer = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const div = entry.target;
      if (div.dataset.rendered) continue;
      div.dataset.rendered = '1';
      const c = cards[parseInt(div.dataset.idx)];
      const svgContent = getGlyph(c, style, fmt) ||
        '<div class="glyph-placeholder">No glyph</div>';
      div.querySelector('.glyph').innerHTML = svgContent;
      observer.unobserve(div);
    }
  }, { rootMargin: '200px' });

  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    const sc = SCHOOL_COLORS_MAP[c.school] || '#888';
    const div = document.createElement('div');
    div.className = `card ${cls}`;
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="glyph">
        <div class="glyph-placeholder" style="background:radial-gradient(ellipse at center,${sc}18 0%,#0d0d1a 70%);border:1px solid ${sc}44;border-radius:5px;">
          <span style="color:${sc};opacity:0.7;font-size:13px;font-style:italic;">${c.school.slice(0,2)}</span>
        </div>
      </div>
      <div class="spell-name">${c.name}</div>
      <div class="spell-meta">
        <span class="school-dot" style="background:${sc}"></span>
        ${c.level} · ${c.school}${c.ritual==='Yes'?' ❆':''}
      </div>
      <div class="notation-small">${c.name==="Wish"?"???":c.notation}</div>`;
    div.onclick = () => openModal(c);
    observer.observe(div);
    frag.appendChild(div);
  }
  grid.appendChild(frag);
}

window.addEventListener('resize', () => {
  if(_currentCards.length) renderGrid(_currentCards);
});

</script>
