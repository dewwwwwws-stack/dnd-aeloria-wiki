r": "#a0a0a0"}, {"name": "Reality Break", "level": "Level 8", "school": "Conjuration", "ritual": "No", "source": "EGW", "page": "189", "classes": "", "notation": "Co:4 > Tr:2 > Ab:3 > Di:4 > En:5 > Il:1 > Ev:2 > Ne:3 > Tr:4 > Co:2", "tags": "aoe, barrier, concentration, damage, mind, movement, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a crystal prism)", "description": "You shatter the barriers between realities and timelines, thrusting a creature into turmoil and madness. The target must succeed on a Wisdom saving throw, or it can't take reactions until the spell ends. The affected target must also roll a d10 at the start of each of its turns; the number rolled determines what happens to the target, as shown on the Reality Break Effects table.\n\nAt the end of each of its turns, the affected target can repeat the Wisdom saving throw, ending the spell on itself on a success.\n\nReality Break Effectsd10Effect1-2Vision of the Far Realm. The target takes 6d12 psychic damage, and it is stunned until the end of the turn.3-5Rending Rift. The target must make a Dexterity saving throw, taking 8d12 force damage on a failed save, or half as much damage on a successful one.6-8Wormhole. The target is teleported, along with everything it is wearing and carrying, up to 30 feet to an unoccupied space of your choice that you can see. The target also takes 10d12 force damage and is knocked prone.9-10Chill of the Dark Void. The target takes 10d12 cold damage, and it is blinded until the end of the turn.", "higher": "", "color": "#e8a040"}, {"name": "Regenerate", "level": "Level 7", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "311", "classes": "Apothecary, Bard, Cleric, Druid", "notation": "Tr:3 > Ab:2 > Co:3 > Ev:4 > Di:5 > En:1 > Il:2 > Ne:3 > Tr:2", "tags": "healing", "duration": "1 hour", "cast_time": "1 Min.", "range": "Touch", "components": "V, S, M (a prayer wheel)", "description": "A creature you touch regains 4d8 + 15 Hit Points. For the duration, the target regains 1 Hit Point at the start of each of its turns, and any severed body parts regrow after 2 minutes.", "higher": "", "color": "#40e890"}, {"name": "Reincarnate", "level": "Level 5", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "311", "classes": "Druid", "notation": "Ne:1 > Tr:2 > Co:3 > Ev:4 > Di:5 > Ab:1 > Ne:4", "tags": "utility", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (rare oils worth 1,000+ GP, which the spell consumes)", "description": "You touch a dead Humanoid or a piece of one. If the creature has been dead no longer than 10 days, the spell forms a new body for it and calls the soul to enter that body. Roll 1d10 and consult the table below to determine the body's species, or the DM chooses another playable species.\n\n1d10Species1Aasimar2Dragonborn3Dwarf4Elf5Gnome6Goliath7Halfling8Human9Orc10TieflingThe reincarnated creature makes any choices that a species' description offers, and the creature recalls its former life. It retains the capabilities it had in its original form, except it loses the traits of its previous species and gains the traits of its new one.", "higher": "", "color": "#a0a0a0"}, {"name": "Remove Curse", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "312", "classes": "Apothecary, Cleric, Paladin, Tamer, Warlock, Wizard", "notation": "Ab:4 > Co:2 > Tr:3 > Ev:4 > Ab:1", "tags": "movement", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "At your touch, all curses affecting one creature or object end. If the object is a cursed magic item, its curse remains, but the spell breaks its owner's Attunement to the object so it can be removed or discarded.", "higher": "", "color": "#40c8e0"}, {"name": "Resistance", "level": "Cantrip", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "312", "classes": "Apothecary, Artificer, Cleric, Druid, Tamer", "notation": "Ab:1 > Ab:3", "tags": "alter_form, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You touch a willing creature and choose a damage type: Acid, Bludgeoning, Cold, Fire, Lightning, Necrotic, Piercing, Poison, Radiant, Slashing, or Thunder. When the creature takes damage of the chosen type before the spell ends, the creature reduces the total damage taken by 1d4. A creature can benefit from this spell only once per turn.", "higher": "", "color": "#40c8e0"}, {"name": "Resurrection", "level": "Level 7", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "312", "classes": "Apothecary, Bard, Cleric", "notation": "Ne:3 > Ab:2 > Co:3 > Tr:4 > Il:5 > Ev:1 > Di:2 > En:3 > Ne:5", "tags": "alter_form, damage, healing, undead", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (a diamond worth 1,000+ GP, which the spell consumes)", "description": "With a touch, you revive a dead creature that has been dead for no more than a century, didn't die of old age, and wasn't Undead when it died.\n\nThe creature returns to life with all its Hit Points. This spell also neutralizes any poisons that affected the creature at the time of death. This spell closes all mortal wounds and restores any missing body parts.\n\nComing back from the dead is an ordeal. The target takes a -4 penalty to D20 Tests. Every time the target finishes a Long Rest, the penalty is reduced by 1 until it becomes 0.\n\nCasting this spell to revive a creature that has been dead for 365 days or longer taxes you. Until you finish a Long Rest, you can't cast spells again, and you have Disadvantage on D20 Tests.", "higher": "", "color": "#a0a0a0"}, {"name": "Reverse Gravity", "level": "Level 7", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "312", "classes": "Druid, Psion, Sorcerer, Wizard", "notation": "Tr:3 > Ev:2 > Co:3 > Ab:4 > Di:5 > En:1 > Il:2 > Ne:3 > Tr:4", "tags": "aoe, barrier, concentration", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "100 feet", "components": "V, S, M (a lodestone and iron filings)", "description": "This spell reverses gravity in a 50-foot-radius, 100-foot high Cylinder centered on a point within range. All creatures and objects in that area that aren't anchored to the ground fall upward and reach the top of the Cylinder. A creature can make a Dexterity saving throw to grab a fixed object it can reach, thus avoiding the fall upward.\n\nIf a ceiling or an anchored object is encountered in this upward fall, creatures and objects strike it just as they would during a downward fall. If an affected creature or object reaches the Cylinder's top without striking anything, it hovers there for the duration. When the spell ends, affected objects and creatures fall downward.", "higher": "", "color": "#40e890"}, {"name": "Revivify", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "312", "classes": "Apothecary, Artificer, Cleric, Druid, Paladin, Ranger", "notation": "Ne:4 > Ab:2 > Co:3 > Tr:4 > Ne:1", "tags": "healing, undead", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a diamond worth 300+ GP, which the spell consumes)", "description": "You touch a creature that has died within the last minute. That creature revives with 1 Hit Point. This spell can't revive a creature that has died of old age, nor does it restore any missing body parts.", "higher": "", "color": "#a0a0a0"}, {"name": "Rime's Binding Ice", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "FTD", "page": "21", "classes": "", "notation": "Ev:3 > Tr:2 > Il:3 > Ev:1", "tags": "alter_form, aoe, damage, movement", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "S, M (a vial of meltwater)", "description": "A burst of cold energy emanates from you in a 30-foot cone. Each creature in that area must make a Constitution saving throw. On a failed save, a creature takes 3d8 cold damage and is hindered by ice formations for 1 minute, or until it or another creature within reach of it uses an action to break away the ice. A creature hindered by ice has its speed reduced to 0. On a successful save, a creature takes half as much damage and isn't hindered by ice.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, increase the cold damage by 1d8 for each slot level above 2nd.", "color": "#e84040"}, {"name": "Rope Trick", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "312", "classes": "Artificer, Wizard", "notation": "Tr:3 > Di:2 > Ab:3 > Tr:4", "tags": "barrier, illusion_tag, reveal", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a segment of rope)", "description": "You touch a rope. One end of it hovers upward until the rope hangs perpendicular to the ground or the rope reaches a ceiling. At the rope's upper end, an Invisible 3-foot-by-5-foot portal opens to an extradimensional space that lasts until the spell ends. That space can be reached by climbing the rope, which can be pulled into or dropped out of it.\n\nThe space can hold up to eight Medium or smaller creatures. Attacks, spells, and other effects can't pass into or out of the space, but creatures inside it can see through the portal. Anything inside the space drops out when the spell ends.", "higher": "", "color": "#40e890"}, {"name": "Sacred Flame", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "313", "classes": "Cleric", "notation": "Ev:3 > Ev:2", "tags": "damage, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "Flame-like radiance descends on a creature that you can see within range. The target must succeed on a Dexterity saving throw or take 1d8 Radiant damage. The target gains no benefit from Half Cover or Three-Quarters Cover for this save.", "higher": "Cantrip Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).", "color": "#e84040"}, {"name": "Sanctuary", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "313", "classes": "Artificer, Cleric, Psion, Tamer", "notation": "Ab:2 > En:2 > Ab:3", "tags": "aoe, barrier, damage, mind", "duration": "1 minute", "cast_time": "Bonus", "range": "30 feet", "components": "V, S, M (a shard of glass from a mirror)", "description": "You ward a creature within range. Until the spell ends, any creature who targets the warded creature with an attack roll or a damaging spell must succeed on a Wisdom saving throw or either choose a new target or lose the attack or spell. This spell doesn't protect the warded creature from areas of effect.\n\nThe spell ends if the warded creature makes an attack roll, casts a spell, or deals damage.", "higher": "", "color": "#40c8e0"}, {"name": "Sapping Sting", "level": "Cantrip", "school": "Necromancy", "ritual": "No", "source": "EGW", "page": "189", "classes": "", "notation": "Ne:1 > Ne:4", "tags": "damage, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You sap the vitality of one creature you can see in range. The target must succeed on a Constitution saving throw or take 1d4 necrotic damage and fall prone.\n\nThis spell's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).", "higher": "", "color": "#a0a0a0"}, {"name": "Scatter", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "164", "classes": "", "notation": "Co:2 > Tr:2 > Ab:3 > En:4 > Di:5 > Il:1 > Ev:2 > Co:3", "tags": "barrier, mind, movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V", "description": "The air quivers around up to five creatures of your choice that you can see within range. An unwilling creature must succeed on a Wisdom saving throw to resist this spell. You teleport each affected target to an unoccupied space that you can see within 120 feet of you. That space must be on the ground or on a floor.", "higher": "", "color": "#e8a040"}, {"name": "Scorching Ray", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "313", "classes": "Sorcerer, Wizard", "notation": "Ev:3 > Tr:2 > Co:3 > Ev:4", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You hurl three fiery rays. You can hurl them at one target within range or at several. Make a ranged spell attack for each ray. On a hit, the target takes 2d6 Fire damage.", "higher": "Using a Higher-Level Spell Slot. You create one additional ray for each spell slot level above 2.", "color": "#e84040"}, {"name": "Scrying", "level": "Level 5", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "313", "classes": "Apothecary, Bard, Cleric, Druid, Psion, Tamer, Warlock, Wizard", "notation": "Di:1 > Il:2 > Co:3 > Tr:4 > En:5 > Ab:1 > Di:5", "tags": "concentration, illusion_tag, mind, movement, reveal, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "10 Min.", "range": "Self", "components": "V, S, M (a focus worth 1,000+ GP, such as a crystal ball, mirror, or water-filled font)", "description": "You can see and hear a creature you choose that is on the same plane of existence as you. The target makes a Wisdom saving throw, which is modified (see the tables below) by how well you know the target and the sort of physical connection you have to it. The target doesn't know what it is making the save against, only that it feels uneasy.\n\nYour Knowledge of the Target Is...Save ModifierSecondhand (heard of the target)+5Firsthand (met the target)+0Extensive (know the target well)-5You Have the Target's...Save ModifierPicture or other likeness-2Garment or other possession-4Body part, lock of hair, or bit of nail-10On a successful save, the target isn't affected, and you can't use this spell on it again for 24 hours.\n\nOn a failed save, the spell creates an Invisible, intangible sensor within 10 feet of the target. You can see and hear through the sensor as if you were there. The sensor moves with the target, remaining within 10 feet of it for the duration. If something can see the sensor, it appears as a luminous orb about the size of your fist.\n\nInstead of targeting a creature, you can target a location you have seen. When you do so, the sensor appears at that location and doesn't move.", "higher": "", "color": "#c8e040"}, {"name": "Searing Smite", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "314", "classes": "Paladin", "notation": "Ev:2 > Co:2 > Ev:3", "tags": "damage, single_target", "duration": "1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "As you hit the target, it takes an extra 1d6 Fire damage from the attack. At the start of each of its turns until the spell ends, the target takes 1d6 Fire damage and then makes a Constitution saving throw. On a failed save, the spell continues. On a successful save, the spell ends.", "higher": "Using a Higher-Level Spell Slot. All the damage increases by 1d6 for each spell slot level above 1.", "color": "#e84040"}, {"name": "See Invisibility", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "314", "classes": "Apothecary, Artificer, Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "Di:3 > Il:2 > Co:3 > Di:1", "tags": "illusion_tag, reveal, summon", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (a pinch of talc)", "description": "For the duration, you see creatures and objects that have the Invisible condition as if they were visible, and you can see into the Ethereal Plane. Creatures and objects there appear ghostly.", "higher": "", "color": "#c8e040"}, {"name": "Seeming", "level": "Level 5", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "314", "classes": "Bard, Psion, Sorcerer, Wizard", "notation": "Il:1 > Co:2 > Tr:3 > Di:4 > En:5 > Ev:1 > Il:3", "tags": "alter_form, aoe, illusion_tag, mind, reveal, summon", "duration": "8 hours", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You give an illusory appearance to each creature of your choice that you can see within range. An unwilling target can make a Charisma saving throw, and if it succeeds, it is unaffected by this spell.\n\nYou can give the same appearance or different ones to the targets. The spell can change the appearance of the targets' bodies and equipment. You can make each creature seem 1 foot shorter or taller and appear heavier or lighter. A target's new appearance must have the same basic arrangement of limbs as the target, but the extent of the illusion is otherwise up to you. The spell lasts for the duration.\n\nThe changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to a creature's outfit, objects pass through the hat.\n\nA creature that takes the Study action to examine a target can make an Intelligence (Investigation) check against your spell save DC. If it succeeds, it becomes aware that the target is disguised.", "higher": "", "color": "#4060e8"}, {"name": "Sending", "level": "Level 3", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "314", "classes": "Apothecary, Bard, Cleric, Psion, Wizard", "notation": "Di:4 > Ev:2 > Co:3 > Ab:4 > Di:2", "tags": "reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "Unlimited", "components": "V, S, M (a copper wire)", "description": "You send a short message of 25 words or fewer to a creature you have met or a creature described to you by someone who has met it. The target hears the message in its mind, recognizes you as the sender if it knows you, and can answer in a like manner immediately. The spell enables targets to understand the meaning of your message.\n\nYou can send the message across any distance and even to other planes of existence, but if the target is on a different plane than you, there is a 5 percent chance that the message doesn't arrive. You know if the delivery fails.\n\nUpon receiving your message, a creature can block your ability to reach it again with this spell for 8 hours. If you try to send another message during that time, you learn that you are blocked, and the spell fails.", "higher": "", "color": "#c8e040"}, {"name": "Sequester", "level": "Level 7", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "315", "classes": "Wizard", "notation": "Tr:3 > Di:2 > Ev:3 > Il:4 > Co:5 > Ab:1 > En:2 > Ne:3 > Tr:5", "tags": "damage, illusion_tag, reveal", "duration": "Until dispelled", "cast_time": "Action", "range": "Touch", "components": "V, S, M (gem dust worth 5,000+ GP, which the spell consumes)", "description": "With a touch, you magically sequester an object or a willing creature. For the duration, the target has the Invisible condition and can't be targeted by Divination spells, detected by magic, or viewed remotely with magic.\n\nIf the target is a creature, it enters a state of suspended animation; it has the Unconscious condition, doesn't age, and doesn't need food, water, or air.\n\nYou can set a condition for the spell to end early. The condition can be anything you choose, but it must occur or be visible within 1 mile of the target. Examples include \"after 1,000 years\" or \"when the tarrasque awakens.\" This spell also ends if the target takes any damage.", "higher": "", "color": "#40e890"}, {"name": "Shadow Blade", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "XGE", "page": "164", "classes": "", "notation": "Il:3 > En:2 > Di:3 > Il:4", "tags": "concentration, damage, illusion_tag, mind, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "You weave together threads of shadow to create a sword of solidified gloom in your hand. This magic sword lasts until the spell ends. It counts as a simple melee weapon with which you are proficient. It deals 2d8 psychic damage on a hit and has the finesse, light, and thrown properties (range 20/60). In addition, when you use the sword to attack a target that is in dim light or darkness, you make the attack roll with advantage.\n\nIf you drop the weapon or throw it, it dissipates at the end of the turn. Thereafter, while the spell persists, you can use a bonus action to cause the sword to reappear in your hand.", "higher": "At Higher Levels. When you cast this spell using a 3rd- or 4th-level spell slot, the damage increases to 3d8. When you cast it using a 5th- or 6th-level spell slot, the damage increases to 4d8. When you cast it using a spell slot of 7th level or higher, the damage increases to 5d8.", "color": "#4060e8"}, {"name": "Shadow of Moil", "level": "Level 4", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "164", "classes": "", "notation": "Ne:5 > Ev:2 > Tr:3 > Co:4 > Ab:5 > Ne:3", "tags": "aoe, barrier, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (an undead eyeball encased in a gem worth at least 150 gp)", "description": "Flame-like shadows wreathe your body until the spell ends, causing you to become heavily obscured to others. The shadows turn dim light within 10 feet of you into darkness, and bright light in the same area to dim light.\n\nUntil the spell ends, you have resistance to radiant damage. In addition, whenever a creature within 10 feet of you hits you with an attack, the shadows lash out at that creature, dealing it 2d8 necrotic damage.", "higher": "", "color": "#a0a0a0"}, {"name": "Shape Water", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "164", "classes": "", "notation": "Tr:3 > Tr:4", "tags": "alter_form, aoe, damage, movement, reveal", "duration": "Instantaneous or 1 hour (see below)", "cast_time": "Action", "range": "30 feet", "components": "S", "description": "You choose an area of water that you can see within range and that fits within a 5-foot cube. You manipulate it in one of the following ways:\n\nYou instantaneously move or otherwise change the flow of the water as you direct, up to 5 feet in any direction. This movement doesn't have enough force to cause damage.You cause the water to form into simple shapes and animate at your direction. This change lasts for 1 hour.You change the water's color or opacity. The water must be changed in the same way throughout. This change lasts for 1 hour.You freeze the water, provided that there are no creatures in it. The water unfreezes in 1 hour.If you cast this spell multiple times, you can have no more than two of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action.", "higher": "", "color": "#40e890"}, {"name": "Shapechange", "level": "Level 9", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "315", "classes": "Druid, Psion, Wizard", "notation": "Tr:5 > Ne:2 > Ab:3 > Co:4 > Di:5 > Il:1 > Ev:2 > En:3 > Ne:4 > Ab:5 > Tr:2", "tags": "alter_form, concentration, healing, reveal, undead", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (a jade circlet worth 1,500+ GP)", "description": "You shape-shift into another creature for the duration or until you take a Magic action to shape-shift into a different eligible form. The new form must be of a creature that has a Challenge Rating no higher than your level or Challenge Rating. You must have seen the sort of creature before, and it can't be a Construct or an Undead.\n\nWhen you cast the spell, you gain a number of Temporary Hit Points equal to the Hit Points of the first form into which you shape-shift. These Temporary Hit Points vanish if any remain when the spell ends.\n\nYour game statistics are replaced by the stat block of the chosen form, but you retain your creature type; alignment; personality; Intelligence, Wisdom, and Charisma scores; Hit Points; Hit Point Dice; proficiencies; and ability to communicate. If you have the Spellcasting feature, you retain it too.\n\nUpon shape-shifting, you determine whether your equipment drops to the ground or changes in size and shape to fit the new form while you're in it.", "higher": "", "color": "#40e890"}, {"name": "Shatter", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "316", "classes": "Bard, Psion, Sorcerer, Wizard", "notation": "Ev:3 > Tr:2 > Co:3 > Ev:5", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a chip of mica)", "description": "A loud noise erupts from a point of your choice within range. Each creature in a 10-foot-radius Sphere centered there makes a Constitution saving throw, taking 3d8 Thunder damage on a failed save or half as much damage on a successful one. A Construct has Disadvantage on the save.\n\nA nonmagical object that isn't being worn or carried also takes the damage if it's in the spell's area.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 2.", "color": "#e84040"}, {"name": "Shield", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "316", "classes": "Psion, Sorcerer, Wizard", "notation": "Ab:2 > Ev:2 > Ab:3", "tags": "barrier, damage", "duration": "1 round", "cast_time": "Reaction", "range": "Self", "components": "V, S", "description": "An imperceptible barrier of magical force protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from Magic Missile.", "higher": "", "color": "#40c8e0"}, {"name": "Shield of Faith", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "316", "classes": "Cleric, Paladin, Tamer", "notation": "Ab:2 > Ev:2 > Ab:5", "tags": "concentration", "duration": "Concentration, up to 10 minutes", "cast_time": "Bonus", "range": "60 feet", "components": "V, S, M (a prayer scroll)", "description": "A shimmering field surrounds a creature of your choice within range, granting it a +2 bonus to AC for the duration.", "higher": "", "color": "#40c8e0"}, {"name": "Shillelagh", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "316", "classes": "Druid", "notation": "Tr:3 > Tr:5", "tags": "damage", "duration": "1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (mistletoe)", "description": "A Club or Quarterstaff you are holding is imbued with nature's power. For the duration, you can use your spellcasting ability instead of Strength for the attack and damage rolls of melee attacks using that weapon, and the weapon's damage die becomes a d8. If the attack deals damage, it can be Force damage or the weapon's normal damage type (your choice).\n\nThe spell ends early if you cast it again or if you let go of the weapon.", "higher": "Cantrip Upgrade. The damage die changes when you reach levels 5 (d10), 11 (d12), and 17 (2d6).", "color": "#40e890"}, {"name": "Shining Smite", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "316", "classes": "Paladin", "notation": "Tr:3 > Il:2 > Ev:3 > Tr:4", "tags": "aoe, concentration, damage, illusion_tag", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "The target hit by the strike takes an extra 2d6 Radiant damage from the attack. Until the spell ends, the target sheds Bright Light in a 5-foot radius, attack rolls against it have Advantage, and it can't benefit from the Invisible condition.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 2.", "color": "#40e890"}, {"name": "Shocking Grasp", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "316", "classes": "Apothecary, Artificer, Sorcerer, Wizard", "notation": "Ev:3 > Ev:4", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "Lightning springs from you to a creature that you try to touch. Make a melee spell attack against the target. On a hit, the target takes 1d8 Lightning damage, and it can't make Opportunity Attacks until the start of its next turn.", "higher": "Cantrip Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).", "color": "#e84040"}, {"name": "Sickening Radiance", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "164", "classes": "", "notation": "Ev:5 > Il:2 > Co:3 > Tr:4 > Ab:5 > Ev:2", "tags": "aoe, concentration, damage, illusion_tag, movement", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "Dim, greenish light spreads within a 30-foot-radius sphere centered on a point you choose within range. The light spreads around corners, and it lasts until the spell ends.\n\nWhen a creature moves into the spell's area for the first time on a turn or starts its turn there, that creature must succeed on a Constitution saving throw or take 4d10 radiant damage, and it suffers one level of exhaustion and emits a dim, greenish light in a 5-foot radius. This light makes it impossible for the creature to benefit from being invisible. The light and any levels of exhaustion caused by this spell go away when the spell ends.", "higher": "", "color": "#e84040"}, {"name": "Silence", "level": "Level 2", "school": "Illusion", "ritual": "Yes", "source": "PHB'24", "page": "316", "classes": "Apothecary, Bard, Cleric, Psion, Ranger, Tamer", "notation": "Il:3 > Tr:2 > Co:3 > Il:5", "tags": "aoe, concentration, damage, summon, utility", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "For the duration, no sound can be created within or pass through a 20-foot-radius Sphere centered on a point you choose within range. Any creature or object entirely inside the Sphere has Immunity to Thunder damage, and creatures have the Deafened condition while entirely inside it. Casting a spell that includes a Verbal component is impossible there.", "higher": "", "color": "#4060e8"}, {"name": "Silent Image", "level": "Level 1", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "317", "classes": "Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "Il:2 > Co:2 > Il:1", "tags": "alter_form, aoe, concentration, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a bit of fleece)", "description": "You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 15-foot Cube. The image appears at a spot within range and lasts for the duration. The image is purely visual; it isn't accompanied by sound, smell, or other sensory effects.\n\nAs a Magic action, you can cause the image to move to any spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking.\n\nPhysical interaction with the image reveals it to be an illusion, since things can pass through it. A creature that takes a Study action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image.", "higher": "", "color": "#4060e8"}, {"name": "Silvery Barbs", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "SCC", "page": "38", "classes": "Bard, Sorcerer, Wizard", "notation": "En:2 > Di:2 > En:4", "tags": "reveal, single_target", "duration": "Instantaneous", "cast_time": "Reaction", "range": "60 feet", "components": "V", "description": "You magically distract the triggering creature and turn its momentary uncertainty into encouragement for another creature. The triggering creature must reroll the d20 and use the lower roll.\n\nYou can then choose a different creature you can see within range (you can choose yourself). The chosen creature has advantage on the next attack roll, ability check, or saving throw it makes within 1 minute. A creature can be empowered by only one use of this spell at a time.", "higher": "", "color": "#c040e8"}, {"name": "Simbul's Synostodweomer", "level": "Level 7", "school": "Transmutation", "ritual": "No", "source": "FRHoF", "page": "145", "classes": "Sorcerer, Wizard", "notation": "Tr:3 > Ab:2 > Co:3 > Ev:4 > Di:5 > En:1 > Il:2 > Ne:3 > Tr:5", "tags": "healing", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You imbue one creature you touch with magical healing energy for the duration. Whenever the target casts a spell using a spell slot, the target can immediately roll a number of unexpended Hit Point Dice equal to the spell slot's level and regain Hit Points equal to the roll's total plus your spellcasting ability modifier; those dice are then expended.", "higher": "", "color": "#40e890"}, {"name": "Simulacrum", "level": "Level 7", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "317", "classes": "Wizard", "notation": "Il:3 > Ev:2 > Tr:3 > Ab:4 > Co:5 > Di:1 > En:2 > Ne:3 > Il:2", "tags": "damage, healing, summon", "duration": "Until dispelled", "cast_time": "12 Hr.", "range": "Touch", "components": "V, S, M (powdered ruby worth 1,500+ GP, which the spell consumes)", "description": "You create a simulacrum of one Beast or Humanoid that is within 10 feet of you for the entire casting of the spell. You finish the casting by touching both the creature and a pile of ice or snow that is the same size as that creature, and the pile turns into the simulacrum, which is a creature. It uses the game statistics of the original creature at the time of casting, except it is a Construct, its Hit Point maximum is half as much, and it can't cast this spell.\n\nThe simulacrum is Friendly to you and creatures you designate. It obeys your commands and acts on your turn in combat. The simulacrum can't gain levels, and it can't take Short or Long Rests.\n\nIf the simulacrum takes damage, the only way to restore its Hit Points is to repair it as you take a Long Rest, during which you expend components worth 100 GP per Hit Point restored. The simulacrum must stay within 5 feet of you for the repair.\n\nThe simulacrum lasts until it drops to 0 Hit Points, at which point it reverts to snow and melts away. If you cast this spell again, any simulacrum you created with this spell is instantly destroyed.", "higher": "", "color": "#4060e8"}, {"name": "Skill Empowerment", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "165", "classes": "", "notation": "Tr:1 > Ab:2 > Ev:3 > Co:4 > Di:5 > En:1 > Tr:2", "tags": "concentration", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "Your magic deepens a creature's understanding of its own talent. You touch one willing creature and give it expertise in one skill of your choice; until the spell ends, the creature doubles its proficiency bonus for ability checks it makes that use the chosen skill.\n\nYou must choose a skill in which the target is proficient and that isn't already benefiting from an effect, such as Expertise, that doubles its proficiency bonus.", "higher": "", "color": "#40e890"}, {"name": "Skywrite", "level": "Level 2", "school": "Transmutation", "ritual": "Yes", "source": "XGE", "page": "165", "classes": "", "notation": "Tr:3 > Il:2 > Co:3 > Tr:5", "tags": "concentration, illusion_tag, reveal, summon, utility", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Sight", "components": "V, S", "description": "You cause up to ten words to form in a part of the sky you can see. The words appear to be made of cloud and remain in place for the spell's duration. The words dissipate when the spell ends. A strong wind can disperse the clouds and end the spell early.", "higher": "", "color": "#40e890"}, {"name": "Sleep", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "317", "classes": "Apothecary, Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "En:2 > Il:2 > En:4", "tags": "aoe, concentration, damage, mind", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a pinch of sand or rose petals)", "description": "Each creature of your choice in a 5-foot-radius Sphere centered on a point within range must succeed on a Wisdom saving throw or have the Incapacitated condition until the end of its next turn, at which point it must repeat the save. If the target fails the second save, the target has the Unconscious condition for the duration. The spell ends on a target if it takes damage or someone within 5 feet of it takes an action to shake it out of the spell's effect.\n\nCreatures that don't sleep, such as elves, or that have Immunity to the Exhaustion condition automatically succeed on saves against this spell.", "higher": "", "color": "#c040e8"}, {"name": "Sleet Storm", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "317", "classes": "Druid, Sorcerer, Wizard", "notation": "Co:4 > Ev:2 > Ab:3 > Di:4 > Co:5", "tags": "aoe, concentration", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a miniature umbrella)", "description": "Until the spell ends, sleet falls in a 40-foot-tall, 20-foot-radius Cylinder centered on a point you choose within range. The area is Heavily Obscured, and exposed flames in the area are doused.\n\nGround in the Cylinder is Difficult Terrain. When a creature enters the Cylinder for the first time on a turn or starts its turn there, it must succeed on a Dexterity saving throw or have the Prone condition and lose Concentration.", "higher": "", "color": "#e8a040"}, {"name": "Slow", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "318", "classes": "Apothecary, Bard, Sorcerer, Wizard", "notation": "Tr:4 > Co:2 > En:3 > Il:4 > Tr:3", "tags": "alter_form, aoe, concentration, mind, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a drop of molasses)", "description": "You alter time around up to six creatures of your choice in a 40-foot Cube within range. Each target must succeed on a Wisdom saving throw or be affected by this spell for the duration.\n\nAn affected target's Speed is halved, it takes a -2 penalty to AC and Dexterity saving throws, and it can't take Reactions. On its turns, it can take either an action or a Bonus Action, not both, and it can make only one attack if it takes the Attack action. If it casts a spell with a Somatic component, there is a 25 percent chance the spell fails as a result of the target making the spell's gestures too slowly.\n\nAn affected target repeats the save at the end of each of its turns, ending the spell on itself on a success.", "higher": "", "color": "#40e890"}, {"name": "Snare", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "XGE", "page": "165", "classes": "", "notation": "Ab:2 > Il:2 > Ab:5", "tags": "alter_form, aoe, illusion_tag, movement, reveal, summon", "duration": "8 hours", "cast_time": "1 Min.", "range": "Touch", "components": "S, M (25 feet of rope, which the spell consumes)", "description": "As you cast this spell, you use the rope to create a circle with a 5-foot radius on the ground or the floor. When you finish casting, the rope disappears and the circle becomes a magic trap.\n\nThis trap is nearly invisible, requiring a successful Intelligence (Investigation) check against your spell save DC to be discerned.\n\nThe trap triggers when a Small, Medium, or Large creature moves onto the ground or the floor in the spell's radius. That creature must succeed on a Dexterity saving throw or be magically hoisted into the air, leaving it hanging upside down 3 feet above the ground or the floor. The creature is restrained there until the spell ends.\n\nA restrained creature can make a Dexterity saving throw at the end of each of its turns, ending the effect on itself on a success. Alternatively, the creature or someone else who can reach it can use an action to make an Intelligence (Arcana) check against your spell save DC. On a success, the restrained effect ends.\n\nAfter the trap is triggered, the spell ends when no creature is restrained by it.", "higher": "", "color": "#40c8e0"}, {"name": "Snilloc's Snowball Swarm", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "165", "classes": "", "notation": "Ev:3 > Tr:2 > Di:3 > Ev:1", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a piece of ice or a small white rock chip)", "description": "A flurry of magic snowballs erupts from a point you choose within range. Each creature in a 5-foot-radius sphere centered on that point must make a Dexterity saving throw. A creature takes 3d6 cold damage on a failed save, or half as much damage on a successful one.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d6 for each slot level above 2nd.", "color": "#e84040"}, {"name": "Songal's Elemental Suffusion", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "FRHoF", "page": "145", "classes": "Druid, Sorcerer, Wizard", "notation": "Tr:1 > Co:2 > Ab:3 > Ev:4 > Di:5 > En:1 > Tr:4", "tags": "aoe, barrier, concentration, damage, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a pearl worth 100+ GP)", "description": "You imbue yourself with the elemental power of genies. You gain the following benefits until the spell ends:\n\nElemental Immunity. When you cast this spell, choose one of the following damage types: Acid, Cold, Fire, Lightning, or Thunder. You have Resistance to the chosen damage type.\n\nElemental Pulse. When you cast this spell and at the start of each of your subsequent turns, you release a burst of elemental energy in a 15-foot Emanation originating from yourself. Each creature of your choice in that area makes a Dexterity saving throw. On a failed save, a creature takes 2d6 Acid, Cold, Fire, Lightning, or Thunder damage (your choice) and has the Prone condition. On a successful save, a creature takes half as much damage only.\n\nFlight. You gain a Fly Speed of 30 feet and can hover.\n\nCasting as a Circle Spell. If the spell is cast as a Circle spell, its casting time increases to 1 minute, and its duration increases to Concentration, up to 10 minutes. For each secondary caster who participates in the casting, you can choose one additional creature, to a maximum of nine additional creatures. The chosen creatures also gain the benefits of the spell for its duration.\n\nWhen the spell is cast, each secondary caster must expend a level 2+ spell slot; otherwise, the spell fails.", "higher": "", "color": "#40e890"}, {"name": "Sorcerous Burst", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "318", "classes": "Sorcerer", "notation": "Ev:3 > Ev:5", "tags": "damage, mind, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You cast sorcerous energy at one creature or object within range. Make a ranged attack roll against the target. On a hit, the target takes 1d8 damage of a type you choose: Acid, Cold, Fire, Lightning, Poison, Psychic, or Thunder.\n\nIf you roll an 8 on a d8 for this spell, you can roll another d8, and add it to the damage. When you cast this spell, the maximum number of these d8s you can add to the spell's damage equals your spellcasting ability modifier.", "higher": "Cantrip Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).", "color": "#e84040"}, {"name": "Soul Cage", "level": "Level 6", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "165", "classes": "", "notation": "Ne:2 > Il:2 > Tr:3 > Ab:4 > Co:5 > En:1 > Di:2 > Ne:4", "tags": "healing, illusion_tag, reveal, single_target, summon, undead", "duration": "8 hours", "cast_time": "Reaction", "range": "60 feet", "components": "V, S, M (a tiny silver cage worth 100 gp)", "description": "This spell snatches the soul of a humanoid as it dies and traps it inside the tiny cage you use for the material component. A stolen soul remains inside the cage until the spell ends or until you destroy the cage, which ends the spell. While you have a soul inside the cage, you can exploit it in any of the ways described below. You can use a trapped soul up to six times. Once you exploit a soul for the sixth time, it is released, and the spell ends. While a soul is trapped, the dead humanoid it came from can't be revived.\n\nSteal Life. You can use a bonus action to drain vigor from the soul and regain 2d8 hit points.\n\nQuery Soul. You ask the soul a question (no action required) and receive a brief telepathic answer, which you can understand regardless of the language used. The soul knows only what it knew in life, but it must answer you truthfully and to the best of its ability. The answer is no more than a sentence or two and might be cryptic.\n\nBorrow Experience. You can use a bonus action to bolster yourself with the soul's life experience, making your next attack roll, ability check, or saving throw with advantage. If you don't use this benefit before the start of your next turn, it is lost.\n\nEyes of the Dead. You can use an action to name a place the humanoid saw in life, which creates an invisible sensor somewhere in that place if it is on the plane of existence you're currently on. The sensor remains for as long as you concentrate, up to 10 minutes (as if you were concentrating on a spell). You receive visual and auditory information from the sensor as if you were in its space using your senses.\n\nA creature that can see the sensor (such as one using see invisibility or truesight) sees a translucent image of the tormented humanoid whose soul you caged.", "higher": "", "color": "#a0a0a0"}, {"name": "Spare the Dying", "level": "Cantrip", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "318", "classes": "Apothecary, Artificer, Cleric, Druid, Tamer", "notation": "Ne:1 > Ne:5", "tags": "healing", "duration": "Instantaneous", "cast_time": "Action", "range": "15 feet", "components": "V, S", "description": "Choose a creature within range that has 0 Hit Points and isn't dead. The creature becomes Stable.", "higher": "Cantrip Upgrade. The range doubles when you reach levels 5 (30 feet), 11 (60 feet), and 17 (120 feet).", "color": "#a0a0a0"}, {"name": "Speak with Animals", "level": "Level 1", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "318", "classes": "Bard, Druid, Psion, Ranger, Tamer, Warlock", "notation": "Di:2 > Ev:2 > Di:1", "tags": "utility", "duration": "10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "For the duration, you can comprehend and verbally communicate with Beasts, and you can use any of the Influence action's skill options with them.\n\nMost Beasts have little to say about topics that don't pertain to survival or companionship, but at minimum, a Beast can give you information about nearby locations and monsters, including whatever it has perceived within the past day.", "higher": "", "color": "#c8e040"}, {"name": "Speak with Dead", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "318", "classes": "Apothecary, Bard, Cleric, Wizard", "notation": "Ne:4 > Di:2 > Tr:3 > Ab:4 > Ne:1", "tags": "barrier, reveal, undead", "duration": "10 minutes", "cast_time": "Action", "range": "10 feet", "components": "V, S, M (burning incense)", "description": "You grant the semblance of life to a corpse of your choice within range, allowing it to answer questions you pose. The corpse must have a mouth, and this spell fails if the deceased creature was Undead when it died. The spell also fails if the corpse was the target of this spell within the past 10 days.\n\nUntil the spell ends, you can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are antagonistic toward it or it recognizes you as an enemy. This spell doesn't return the creature's soul to its body, only its animating spirit. Thus, the corpse can't learn new information, doesn't comprehend anything that has happened since it died, and can't speculate about future events.", "higher": "", "color": "#a0a0a0"}, {"name": "Speak with Plants", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "319", "classes": "Bard, Druid, Ranger", "notation": "Tr:4 > Co:2 > Ev:3 > Di:4 > Tr:5", "tags": "aoe, movement", "duration": "10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You imbue plants in an immobile 30-foot Emanation with limited sentience and animation, giving them the ability to communicate with you and follow your simple commands. You can question plants about events in the spell's area within the past day, gaining information about creatures that have passed, weather, and other circumstances.\n\nYou can also turn Difficult Terrain caused by plant growth (such as thickets and undergrowth) into ordinary terrain that lasts for the duration. Or you can turn ordinary terrain where plants are present into Difficult Terrain that lasts for the duration.\n\nThe spell doesn't enable plants to uproot themselves and move about, but they can move their branches, tendrils, and stalks for you.\n\nIf a Plant creature is in the area, you can communicate with it as if you shared a common language.", "higher": "", "color": "#40e890"}, {"name": "Spellfire Flare", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "FRHoF", "page": "146", "classes": "Sorcerer, Wizard", "notation": "Ev:2 > Di:2 > Ev:4", "tags": "damage, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You unleash a blast of brilliant fire. Make a ranged spell attack against a target within range; a target gains no benefit from Half Cover or Three-Quarters Cover for this attack roll. On a hit, the target takes 2d10 Radiant damage.", "higher": "Using a Higher-Level Spell Slot. You create an additional blast for each spell slot level above 1. You can direct the blasts at the same target or at different ones. Make a separate attack roll for each blast.", "color": "#e84040"}, {"name": "Spellfire Storm", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "FRHoF", "page": "146", "classes": "Sorcerer, Wizard", "notation": "Ev:5 > Il:2 > Co:3 > Tr:4 > Ab:5 > Ev:1", "tags": "aoe, concentration, damage, illusion_tag, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You conjure a pillar of spellfire in a 20-foot-radius, 20-foot-high Cylinder centered on a point within range. The area of the Cylinder is Bright Light, and each creature in it when it appears makes a Constitution saving throw, taking 4d10 Radiant damage on a failed save or half as much damage on a successful one. A creature also makes this save when it enters the spell's area for the first time on a turn or ends its turn there. A creature makes this save only once per turn.\n\nIn addition, whenever a creature in the Cylinder casts a spell, that creature makes a Constitution saving throw. On a failed save, the spell dissipates with no effect, and the action, Bonus Action, or Reaction used to cast it is wasted. If that spell was cast with a spell slot, the slot isn't expended.\n\nWhen you cast this spell, you can designate creatures to be unaffected by it.\n\nCasting as a Circle Spell. In addition to the spell's usual components, you must provide a special component (a blue star sapphire worth 25,000+ GP), which the spell consumes. The spell's range increases to 1 mile, and it no longer requires Concentration. When the spell is cast, each secondary caster must expend a level 3+ spell slot; otherwise, the spell fails.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for every spell slot level above 4.\n\nThe number of secondary casters determines the spell's area of effect and duration, as shown in the table below. The spell ends early if any caster who participated in this casting contributes to another casting of Spellfire Storm as a Circle spell.\n\nSecondary CastersArea of EffectDuration1-340-foot-radius, 40-foot-high Cylinder1 Hour4-660-foot-radius, 60-foot-high Cylinder8 Hours7+100-foot-radius, 100-foot-high Cylinder24 Hours", "color": "#e84040"}, {"name": "Spider Climb", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "319", "classes": "Apothecary, Artificer, Sorcerer, Tamer, Warlock, Wizard", "notation": "Tr:3 > Co:2 > Ab:3 > Tr:1", "tags": "concentration, movement", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a drop of bitumen and a spider)", "description": "Until the spell ends, one willing creature you touch gains the ability to move up, down, and across vertical surfaces and along ceilings, while leaving its hands free. The target also gains a Climb Speed equal to its Speed.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 2.", "color": "#40e890"}, {"name": "Spike Growth", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "319", "classes": "Druid, Ranger", "notation": "Tr:3 > Co:2 > Di:3 > Tr:2", "tags": "alter_form, aoe, concentration, damage, movement, reveal", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (seven thorns)", "description": "The ground in a 20-foot-radius Sphere centered on a point within range sprouts hard spikes and thorns. The area becomes Difficult Terrain for the duration. When a creature moves into or within the area, it takes 2d4 Piercing damage for every 5 feet it travels.\n\nThe transformation of the ground is camouflaged to look natural. Any creature that can't see the area when the spell is cast must take a Search action and succeed on a Wisdom (Perception or Survival) check against your spell save DC to recognize the terrain as hazardous before entering it.", "higher": "", "color": "#40e890"}, {"name": "Spirit Guardians", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "319", "classes": "Cleric", "notation": "Co:4 > Il:2 > Tr:3 > Ab:4 > Co:5", "tags": "barrier, concentration, damage, illusion_tag, mind, movement, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (a prayer scroll)", "description": "Protective spirits flit around you in a 15-foot Emanation for the duration. If you are good or neutral, their spectral form appears angelic or fey (your choice). If you are evil, they appear fiendish.\n\nWhen you cast this spell, you can designate creatures to be unaffected by it. Any other creature's Speed is halved in the Emanation, and whenever the Emanation enters a creature's space and whenever a creature enters the Emanation or ends its turn there, the creature must make a Wisdom saving throw. On a failed save, the creature takes 3d8 Radiant damage (if you are good or neutral) or 3d8 Necrotic damage (if you are evil). On a successful save, the creature takes half as much damage. A creature makes this save only once per turn.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 3.", "color": "#e8a040"}, {"name": "Spirit Shroud", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "TCE", "page": "108", "classes": "", "notation": "Ne:4 > Co:2 > Tr:3 > Ab:4 > Ne:2", "tags": "alter_form, concentration, damage, healing, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "You call forth spirits of the dead, which flit around you for the spell's duration. The spirits are intangible and invulnerable.\n\nUntil the spell ends, any attack you make deals 1d8 extra damage when you hit a creature within 10 feet of you. This damage is radiant, necrotic, or cold (your choice when you cast the spell). Any creature that takes this damage can't regain hit points until the start of your next turn.\n\nIn addition, any creature of your choice that you can see that starts its turn within 10 feet of you has its speed reduced by 10 feet until the start of your next turn.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d8 for every two slot levels above 3rd.", "color": "#a0a0a0"}, {"name": "Spirit of Death", "level": "Level 4", "school": "Necromancy", "ritual": "No", "source": "BMT", "page": "50", "classes": "", "notation": "Ne:5 > Il:2 > Co:3 > Tr:4 > Ab:5 > Ne:3", "tags": "alter_form, concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a gilded playing card worth at least 400 gp and depicting an avatar of death)", "description": "You call forth a spirit that embodies death. The spirit manifests in an unoccupied space you can see within range and uses the reaper spirit stat block. The spirit disappears when it is reduced to 0 hit points or when the spell ends.\n\nThe spirit is an ally to you and your companions. In combat, the spirit shares your initiative count and takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue the spirit any commands, it takes the Dodge action and uses its movement to avoid danger.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 5th level or higher, use the higher level wherever the spell's level appears in the reaper spirit stat block.", "color": "#a0a0a0"}, {"name": "Spiritual Weapon", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "319", "classes": "Cleric", "notation": "Ev:3 > Il:2 > Di:3 > Ev:5", "tags": "concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "60 feet", "components": "V, S", "description": "You create a floating, spectral force that resembles a weapon of your choice and lasts for the duration. The force appears within range in a space of your choice, and you can immediately make one melee spell attack against one creature within 5 feet of the force. On a hit, the target takes Force damage equal to 1d8 plus your spellcasting ability modifier.\n\nAs a Bonus Action on your later turns, you can move the force up to 20 feet and repeat the attack against a creature within 5 feet of it.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for every slot level above 2.", "color": "#e84040"}, {"name": "Spray of Cards", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "BMT", "page": "50", "classes": "", "notation": "Co:3 > Ev:2 > Tr:3 > Co:1", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a deck of cards)", "description": "You spray a 15-foot cone of spectral cards. Each creature in that area must make a Dexterity saving throw. On a failed save, a creature takes 2d10 force damage and has the blinded condition until the end of its next turn. On a successful save, a creature takes half as much damage only.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d10 for each slot level above 2nd.", "color": "#e8a040"}, {"name": "Staggering Smite", "level": "Level 4", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "320", "classes": "Paladin", "notation": "En:5 > Il:2 > Ev:3 > Tr:4 > Di:5 > En:4", "tags": "damage, mind, single_target", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "The target takes an extra 4d6 Psychic damage from the attack, and the target must succeed on a Wisdom saving throw or have the Stunned condition until the end of your next turn.", "higher": "Using a Higher-Level Spell Slot. The extra damage increases by 1d6 for each spell slot level above 4.", "color": "#c040e8"}, {"name": "Starry Wisp", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "320", "classes": "Bard, Druid", "notation": "Ev:4 > Ev:1", "tags": "aoe, damage, illusion_tag", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You launch a mote of light at one creature or object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d8 Radiant damage, and until the end of your next turn, it emits Dim Light in a 10-foot radius and can't benefit from the Invisible condition.", "higher": "Cantrip Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d8).", "color": "#e84040"}, {"name": "Steel Wind Strike", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "320", "classes": "Ranger, Wizard", "notation": "Co:1 > Di:2 > Ev:3 > Tr:4 > Ab:5 > En:1 > Co:2", "tags": "damage, movement, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "S, M (a Melee weapon worth 1+ SP)", "description": "You flourish the weapon used in the casting and then vanish to strike like the wind. Choose up to five creatures you can see within range. Make a melee spell attack against each target. On a hit, a target takes 6d10 Force damage.\n\nYou then teleport to an unoccupied space you can see within 5 feet of one of the targets.", "higher": "", "color": "#e8a040"}, {"name": "Stinking Cloud", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "321", "classes": "Apothecary, Bard, Sorcerer, Wizard", "notation": "Co:4 > Ev:2 > Tr:3 > Ab:4 > Co:3", "tags": "aoe, concentration, damage, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a rotten egg)", "description": "You create a 20-foot-radius Sphere of yellow, nauseating gas centered on a point within range. The cloud is Heavily Obscured. The cloud lingers in the air for the duration or until a strong wind (such as the one created by Gust of Wind) disperses it.\n\nEach creature that starts its turn in the Sphere must succeed on a Constitution saving throw or have the Poisoned condition until the end of the current turn. While Poisoned in this way, the creature can't take an action or a Bonus Action.", "higher": "", "color": "#e8a040"}, {"name": "Stone Shape", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "321", "classes": "Artificer, Cleric, Druid, Wizard", "notation": "Tr:5 > Il:2 > Ab:3 > Co:4 > Ev:5 > Tr:3", "tags": "alter_form, barrier, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S, M (soft clay)", "description": "You touch a stone object of Medium size or smaller or a section of stone no more than 5 feet in any dimension and form it into any shape you like. For example, you could shape a large rock into a weapon, statue, or coffer, or you could make a small passage through a wall that is 5 feet thick. You could also shape a stone door or its frame to seal the door shut. The object you create can have up to two hinges and a latch, but finer mechanical detail isn't possible.", "higher": "", "color": "#40e890"}, {"name": "Stoneskin", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "321", "classes": "Apothecary, Artificer, Druid, Ranger, Sorcerer, Tamer, Wizard", "notation": "Tr:5 > Ev:2 > Ab:3 > Co:4 > Di:5 > Tr:4", "tags": "barrier, concentration, damage", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (diamond dust worth 100+ GP, which the spell consumes)", "description": "Until the spell ends, one willing creature you touch has Resistance to Bludgeoning, Piercing, and Slashing damage.", "higher": "", "color": "#40e890"}, {"name": "Storm Sphere", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "166", "classes": "", "notation": "Ev:5 > Il:2 > Ab:3 > Co:4 > Tr:5 > Ev:4", "tags": "aoe, barrier, concentration, damage, illusion_tag, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "150 feet", "components": "V, S", "description": "A 20-foot-radius sphere of whirling air springs into existence, centered on a point you choose within range. The sphere remains for the spell's duration. Each creature in the sphere when it appears or that ends its turn there must succeed on a Strength saving throw or take 2d6 bludgeoning damage. The sphere's space is difficult terrain.\n\nUntil the spell ends, you can use a bonus action on each of your turns to cause a bolt of lightning to leap from the center of the sphere toward one creature you choose within 60 feet of the center. Make a ranged spell attack. You have advantage on the attack roll if the target is in the sphere. On a hit, the target takes 4d6 lightning damage.\n\nCreatures within 30 feet of the sphere have disadvantage on Wisdom (Perception) checks made to listen.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 5th level or higher, the damage for each of its effects increases by 1d6 for each slot level above 4th.", "color": "#e84040"}, {"name": "Storm of Vengeance", "level": "Level 9", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "321", "classes": "Druid", "notation": "Co:5 > Il:2 > Tr:3 > Ev:4 > Ab:5 > Di:1 > En:2 > Ne:3 > Il:4 > Tr:5 > Co:4", "tags": "aoe, concentration, damage, illusion_tag, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "1 mile", "components": "V, S", "description": "A churning storm cloud forms for the duration, centered on a point within range and spreading to a radius of 300 feet. Each creature under the cloud when it appears must succeed on a Constitution saving throw or take 2d6 Thunder damage and have the Deafened condition for the duration.\n\nAt the start of each of your later turns, the storm produces different effects, as detailed below.\n\nTurn 2. Acidic rain falls. Each creature and object under the cloud takes 4d6 Acid damage.\n\nTurn 3. You call six bolts of lightning from the cloud to strike six different creatures or objects beneath it. Each target makes a Dexterity saving throw, taking 10d6 Lightning damage on a failed save or half as much damage on a successful one.\n\nTurn 4. Hailstones rain down. Each creature under the cloud takes 2d6 Bludgeoning damage.\n\nTurns 5-10. Gusts and freezing rain assail the area under the cloud. Each creature there takes 1d6 Cold damage. Until the spell ends, the area is Difficult Terrain and Heavily Obscured, ranged attacks with weapons are impossible there, and strong wind blows through the area.", "higher": "", "color": "#e8a040"}, {"name": "Suggestion", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "321", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:3 > Di:2 > Il:3 > En:1", "tags": "concentration, damage, mind, reveal, single_target", "duration": "Concentration, up to 8 hours", "cast_time": "Action", "range": "30 feet", "components": "V, M (a drop of honey)", "description": "You suggest a course of activity—described in no more than 25 words—to one creature you can see within range that can hear and understand you. The suggestion must sound achievable and not involve anything that would obviously deal damage to the target or its allies. For example, you could say, \"Fetch the key to the cult's treasure vault, and give the key to me.\" Or you could say, \"Stop fighting, leave this library peacefully, and don't return.\"\n\nThe target must succeed on a Wisdom saving throw or have the Charmed condition for the duration or until you or your allies deal damage to the target. The Charmed target pursues the suggestion to the best of its ability. The suggested activity can continue for the entire duration, but if the suggested activity can be completed in a shorter time, the spell ends for the target upon completing it.", "higher": "", "color": "#c040e8"}, {"name": "Summon Aberration", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "322", "classes": "Psion, Warlock, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > Ab:4 > Di:5 > Co:1", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a pickled tentacle and an eyeball in a platinum-inlaid vial worth 400+ GP)", "description": "You call forth an aberrant spirit. It manifests in an unoccupied space that you can see within range and uses the Aberrant Spirit stat block. When you cast the spell, choose Beholderkin, Mind Flayer, or Slaad. The creature resembles an Aberration of that kind, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, it shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Beast", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "322", "classes": "Druid, Ranger", "notation": "Co:3 > Il:2 > Tr:3 > Co:4", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a feather, tuft of fur, and fish tail inside a gilded acorn worth 200+ GP)", "description": "You call forth a bestial spirit. It manifests in an unoccupied space that you can see within range and uses the Bestial Spirit stat block. When you cast the spell, choose an environment: Air, Land, or Water. The creature resembles an animal of your choice that is native to the chosen environment, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Celestial", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "323", "classes": "Cleric, Paladin", "notation": "Co:1 > Il:2 > Tr:3 > Ab:4 > Di:5 > Ev:1 > Co:2", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a reliquary worth 500+ GP)", "description": "You call forth a Celestial spirit. It manifests in an angelic form in an unoccupied space that you can see within range and uses the Celestial Spirit stat block. When you cast the spell, choose Avenger or Defender. Your choice determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Construct", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "324", "classes": "Artificer, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > Ab:4 > Di:5 > Co:4", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a lockbox worth 400+ GP)", "description": "You call forth the spirit of a Construct. It manifests in an unoccupied space that you can see within range and uses the Construct Spirit stat block. When you cast the spell, choose a material: Clay, Metal, or Stone. The creature resembles an animate statue (you determine the appearance) made of the chosen material, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Dragon", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "324", "classes": "Wizard", "notation": "Co:1 > Il:2 > Tr:3 > Ab:4 > Di:5 > Ev:1 > Co:4", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (an object with the image of a dragon engraved on it worth 500+ GP)", "description": "You call forth a Dragon spirit. It manifests in an unoccupied space that you can see within range and uses the Draconic Spirit stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Elemental", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "325", "classes": "Druid, Ranger, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > Ab:4 > Di:5 > Co:2", "tags": "concentration, damage, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (air, a pebble, ash, and water inside a gold-inlaid vial worth 400+ GP)", "description": "You call forth an Elemental spirit. It manifests in an unoccupied space that you can see within range and uses the Elemental Spirit stat block. When you cast the spell, choose an element: Air, Earth, Fire, or Water. The creature resembles a bipedal form wreathed in the chosen element, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Fey", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "326", "classes": "Druid, Ranger, Warlock, Wizard", "notation": "Co:4 > Il:2 > Tr:3 > Ab:4 > Co:1", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a gilded flower worth 300+ GP)", "description": "You call forth a Fey spirit. It manifests in an unoccupied space that you can see within range and uses the Fey Spirit stat block. When you cast the spell, choose a mood: Fuming, Mirthful, or Tricksy. The creature resembles a Fey creature of your choice marked by the chosen mood, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Fiend", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "326", "classes": "Warlock, Wizard", "notation": "Co:2 > Il:2 > Tr:3 > Ab:4 > Di:5 > Ev:1 > En:2 > Co:3", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a bloody vial worth 600+ GP)", "description": "You call forth a fiendish spirit. It manifests in an unoccupied space that you can see within range and uses the Fiendish Spirit stat block. When you cast the spell, c
