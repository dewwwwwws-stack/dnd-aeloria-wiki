hoose Demon, Devil, or Yugoloth. The creature resembles a Fiend of the chosen type, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Summon Greater Demon", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "166", "classes": "", "notation": "Co:5 > Il:2 > Ab:3 > En:4 > Di:5 > Co:3", "tags": "concentration, healing, illusion_tag, mind, reveal, single_target, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a vial of blood from a humanoid killed within the past 24 hours)", "description": "You utter foul words, summoning one demon from the chaos of the Abyss. You choose the demon's type, which must be one of challenge rating 5 or lower, such as a shadow demon or a barlgura. The demon appears in an unoccupied space you can see within range, and the demon disappears when it drops to 0 hit points or when the spell ends.\n\nRoll initiative for the demon, which has its own turns. When you summon it and on each of your turns thereafter, you can issue a verbal command to it (requiring no action on your part), telling it what it must do on its next turn. If you issue no command, it spends its turn attacking any creature within reach that has attacked it.\n\nAt the end of each of the demon's turns, it makes a Charisma saving throw. The demon has disadvantage on this saving throw if you say its true name. On a failed save, the demon continues to obey you. On a successful save, your control of the demon ends for the rest of the duration, and the demon spends its turns pursuing and attacking the nearest non-demons to the best of its ability. If you stop concentrating on the spell before it reaches its full duration, an uncontrolled demon doesn't disappear for 1d6 rounds if it still has hit points.\n\nAs part of casting the spell, you can form a circle on the ground with the blood used as a material component. The circle is large enough to encompass your space. While the spell lasts, the summoned demon can't cross the circle or harm it, and it can't target anyone within it. Using the material component in this manner consumes it when the spell ends.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 5th level or higher, the challenge rating increases by 1 for each slot level above 4th.", "color": "#e8a040"}, {"name": "Summon Lesser Demons", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "167", "classes": "", "notation": "Co:4 > Il:2 > Ab:3 > Tr:4 > Co:1", "tags": "aoe, concentration, healing, illusion_tag, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a vial of blood from a humanoid killed within the past 24 hours)", "description": "You utter foul words, summoning demons from the chaos of the Abyss. Roll on the following table to determine what appears.\n\nd6Demons Summoned1-2Two demons of challenge rating 1 or lower3-4Four demons of challenge rating 1/2 or lower5-6Eight demons of challenge rating 1/4 or lowerThe DM chooses the demons, such as manes or dretches, and you choose the unoccupied spaces you can see within range where they appear. A summoned demon disappears when it drops to 0 hit points or when the spell ends.\n\nThe demons are hostile to all creatures, including you. Roll initiative for the summoned demons as a group, which has its own turns. The demons pursue and attack the nearest non-demons to the best of their ability.\n\nAs part of casting the spell, you can form a circle on the ground with the blood used as a material component. The circle is large enough to encompass your space. While the spell lasts, the summoned demons can't cross the circle or harm it, and they can't target anyone within it. Using the material component in this manner consumes it when the spell ends.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 6th or 7th level, you summon twice as many demons. If you cast it using a spell slot of 8th or 9th level, you summon three times as many demons.", "color": "#e8a040"}, {"name": "Summon Shadowspawn", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "TCE", "page": "113", "classes": "", "notation": "Co:4 > Il:2 > Ev:3 > Ab:4 > Co:2", "tags": "alter_form, concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (tears inside a gem worth at least 300 gp)", "description": "You call forth a shadowy spirit. It manifests in an unoccupied space that you can see within range. This corporeal form uses the Shadow Spirit stat block. When you cast the spell, choose an emotion: Fury, Despair, or Fear. The creature resembles a misshapen biped marked by the chosen emotion, which determines certain traits in its stat block. The creature disappears when it drops to 0 hit points or when the spell ends.\n\nThe creature is an ally to you and your companions. In combat, the creature shares your initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its move to avoid danger.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, use the higher level wherever the spell's level appears in the stat block.", "color": "#e8a040"}, {"name": "Summon Undead", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "328", "classes": "Warlock, Wizard", "notation": "Ne:4 > Il:2 > Tr:3 > Co:4 > Ne:5", "tags": "concentration, healing, illusion_tag, movement, reveal, summon, undead", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a gilded skull worth 300+ GP)", "description": "You call forth an Undead spirit. It manifests in an unoccupied space that you can see within range and uses the Undead Spirit stat block. When you cast the spell, choose the creature's form: Ghostly, Putrid, or Skeletal. The spirit resembles an Undead creature with the chosen form, which determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#a0a0a0"}, {"name": "Sunbeam", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "329", "classes": "Cleric, Druid, Sorcerer, Wizard", "notation": "Ev:2 > Tr:2 > Ab:3 > Co:4 > Di:5 > En:1 > Il:2 > Ev:5", "tags": "aoe, concentration, damage, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a magnifying glass)", "description": "You launch a sunbeam in a 5-foot-wide, 60-foot-long Line. Each creature in the Line makes a Constitution saving throw. On a failed save, a creature takes 6d8 Radiant damage and has the Blinded condition until the start of your next turn. On a successful save, it takes half as much damage only.\n\nUntil the spell ends, you can take a Magic action to create a new Line of radiance.\n\nFor the duration, a mote of brilliant radiance shines above you. It sheds Bright Light in a 30-foot radius and Dim Light for an additional 30 feet. This light is sunlight.", "higher": "", "color": "#e84040"}, {"name": "Sunburst", "level": "Level 8", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "329", "classes": "Cleric, Druid, Sorcerer, Wizard", "notation": "Ev:4 > Tr:2 > Co:3 > Ab:4 > Di:5 > En:1 > Il:2 > Ne:3 > Tr:4 > Ev:1", "tags": "aoe, barrier, damage, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a piece of sunstone)", "description": "Brilliant sunlight flashes in a 60-foot-radius Sphere centered on a point you choose within range. Each creature in the Sphere makes a Constitution saving throw. On a failed save, a creature takes 12d6 Radiant damage and has the Blinded condition for 1 minute. On a successful save, it takes half as much damage only.\n\nA creature Blinded by this spell makes another Constitution saving throw at the end of each of its turns, ending the effect on itself on a success.\n\nThis spell dispels Darkness in its area that was created by any spell.", "higher": "", "color": "#e84040"}, {"name": "Swift Quiver", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "329", "classes": "Ranger", "notation": "Tr:1 > Ev:2 > Ab:3 > Co:4 > Di:5 > En:1 > Tr:5", "tags": "concentration, damage, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (a Quiver worth 1+ GP)", "description": "When you cast the spell and as a Bonus Action until it ends, you can make two attacks with a weapon that fires Arrows or Bolts, such as a Longbow or a Light Crossbow. The spell magically creates the ammunition needed for each attack. Each Arrow or Bolt created by the spell deals damage like a nonmagical piece of ammunition of its kind and disintegrates immediately after it hits or misses.", "higher": "", "color": "#40e890"}, {"name": "Sword Burst", "level": "Cantrip", "school": "Conjuration", "ritual": "No", "source": "TCE", "page": "115", "classes": "Artificer, Sorcerer, Warlock, Wizard", "notation": "Co:2 > Co:1", "tags": "damage, single_target, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V", "description": "You create a momentary circle of spectral blades that sweep around you. All other creatures within 5 feet of you must succeed on a Dexterity saving throw or take 1d6 force damage.\n\nThis spell's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).", "higher": "", "color": "#e8a040"}, {"name": "Syluné's Viper", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "FRHoF", "page": "147", "classes": "Druid, Wizard", "notation": "Co:4 > En:2 > Il:3 > Ev:4 > Co:2", "tags": "damage, healing, mind, movement", "duration": "1 hour", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (a snake fang)", "description": "A shimmering, spectral snake encircles your body for the duration. You gain 15 Temporary Hit Points; the spell ends early if you have no Temporary Hit Points left.\n\nWhile the spell is active, you gain the following benefits:\n\nClimbing. You gain a Climb Speed equal to your Speed.\n\nVenomous Bite. As a Magic action, you can make a ranged spell attack using the snake against one creature within 50 feet. On a hit, the target takes 1d6 Force damage and has the Poisoned condition until the start of your next turn. While Poisoned, the target has the Incapacitated condition.", "higher": "Using a Higher-Level Spell Slot. For each spell slot level above 3, the number of Temporary Hit Points you gain from this spell increases by 5, and the damage of Venomous Bite increases by 1d6.", "color": "#e8a040"}, {"name": "Symbol", "level": "Level 7", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "329", "classes": "Bard, Cleric, Druid, Wizard", "notation": "Ab:3 > Co:2 > Tr:3 > Di:4 > En:5 > Il:1 > Ev:2 > Ne:3 > Ab:1", "tags": "aoe, barrier, damage, mind, movement, reveal", "duration": "Until dispelled or triggered", "cast_time": "1 Min.", "range": "Touch", "components": "V, S, M (powdered diamond worth 1,000+ GP, which the spell consumes)", "description": "You inscribe a harmful glyph either on a surface (such as a section of floor or wall) or within an object that can be closed (such as a book or chest). The glyph can cover an area no larger than 10 feet in diameter. If you choose an object, it must remain in place; if it is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered.\n\nThe glyph is nearly imperceptible and requires a successful Wisdom (Perception) check against your spell save DC to notice.\n\nWhen you inscribe the glyph, you set its trigger and choose which effect the symbol bears: Death, Discord, Fear, Pain, Sleep, or Stunning. Each one is explained below.\n\nSet the Trigger. You decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, common triggers include touching or stepping on the glyph, removing another object covering it, or approaching within a certain distance of it. For glyphs inscribed within an object, common triggers include opening that object or seeing the glyph.\n\nYou can refine the trigger so that only creatures of certain types activate it (for example, the glyph could be set to affect Aberrations). You can also set conditions for creatures that don't trigger the glyph, such as those who say a certain password.\n\nOnce triggered, the glyph glows, filling a 60-foot-radius Sphere with Dim Light for 10 minutes, after which time the spell ends. Each creature in the Sphere when the glyph activates is targeted by its effect, as is a creature that enters the Sphere for the first time on a turn or ends its turn there. A creature is targeted only once per turn.\n\nDeath. Each target makes a Constitution saving throw, taking 10d10 Necrotic damage on a failed save or half as much damage on a successful save.\n\nDiscord. Each target makes a Wisdom saving throw. On a failed save, a target argues with other creatures for 1 minute. During this time, it is incapable of meaningful communication and has Disadvantage on attack rolls and ability checks.\n\nFear. Each target must succeed on a Wisdom saving throw or have the Frightened condition for 1 minute. While Frightened, the target must move at least 30 feet away from the glyph on each of its turns, if able.\n\nPain. Each target must succeed on a Constitution saving throw or have the Incapacitated condition for 1 minute.\n\nSleep. Each target must succeed on a Wisdom saving throw or have the Unconscious condition for 10 minutes. A creature awakens if it takes damage or if someone takes an action to shake it awake.\n\nStunning. Each target must succeed on a Wisdom saving throw or have the Stunned condition for 1 minute.", "higher": "", "color": "#40c8e0"}, {"name": "Synaptic Static", "level": "Level 5", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "330", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:1 > Il:2 > Ev:3 > Tr:4 > Co:5 > Di:1 > En:2", "tags": "aoe, damage, mind", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You cause psychic energy to erupt at a point within range. Each creature in a 20-foot-radius Sphere centered on that point makes an Intelligence saving throw, taking 8d6 Psychic damage on a failed save or half as much damage on a successful one.\n\nOn a failed save, a target also has muddled thoughts for 1 minute. During that time, it subtracts 1d6 from all its attack rolls and ability checks, as well as any Constitution saving throws to maintain Concentration. The target makes an Intelligence saving throw at the end of each of its turns, ending the effect on itself on a success.", "higher": "", "color": "#c040e8"}, {"name": "Tasha's Bubbling Cauldron", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "330", "classes": "Warlock, Wizard", "notation": "Co:2 > Il:2 > Ab:3 > Tr:4 > Ev:5 > Di:1 > En:2 > Co:3", "tags": "healing, illusion_tag, movement, summon", "duration": "10 minutes", "cast_time": "Action", "range": "5 feet", "components": "V, S, M (a gilded ladle worth 500 + GP)", "description": "You conjure a claw-footed cauldron filled with bubbling liquid. The cauldron appears in an unoccupied space on the ground within 5 feet of you and lasts for the duration. The cauldron can't be moved and disappears when the spell ends, along with the bubbling liquid inside it.\n\nThe liquid in the cauldron duplicates the properties of a Common or an Uncommon potion of your choice (such as a Potion of Healing). As a Bonus Action, you or an ally can reach into the cauldron and withdraw one potion of that kind. The potion is contained in a vial that disappears when the potion is consumed. The cauldron can produce a number of these potions equal to your spellcasting ability modifier (minimum 1). When the last of these potions is withdrawn from the cauldron, the cauldron disappears, and the spell ends.\n\nPotions obtained from the cauldron that aren't consumed disappear when you cast this spell again.", "higher": "", "color": "#e8a040"}, {"name": "Tasha's Caustic Brew", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "TCE", "page": "115", "classes": "Artificer", "notation": "Ev:4 > Di:2 > Ev:1", "tags": "aoe, concentration, damage", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a bit of rotten food)", "description": "A stream of acid emanates from you in a line 30 feet long and 5 feet wide in a direction you choose. Each creature in the line must succeed on a Dexterity saving throw or be covered in acid for the spell's duration or until a creature uses its action to scrape or wash the acid off itself or another creature. A creature covered in the acid takes 2d4 acid damage at start of each of its turns.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 2d4 for each slot level above 1st.", "color": "#e84040"}, {"name": "Tasha's Hideous Laughter", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "331", "classes": "Apothecary, Bard, Psion, Warlock, Wizard", "notation": "En:2 > Ev:2 > En:1", "tags": "concentration, damage, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a tart and a feather)", "description": "One creature of your choice that you can see within range makes a Wisdom saving throw. On a failed save, it has the Prone and Incapacitated conditions for the duration. During that time, it laughs uncontrollably if it's capable of laughter, and it can't end the Prone condition on itself.\n\nAt the end of each of its turns and each time it takes damage, it makes another Wisdom saving throw. The target has Advantage on the save if the save is triggered by damage. On a successful save, the spell ends.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Tasha's Mind Whip", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "TCE", "page": "115", "classes": "", "notation": "En:3 > Co:2 > Tr:3 > En:4", "tags": "damage, mind, movement, reveal, single_target", "duration": "1 round", "cast_time": "Action", "range": "90 feet", "components": "V", "description": "You psychically lash out at one creature you can see within range. The target must make an Intelligence saving throw. On a failed save, the target takes 3d6 psychic damage, and it can't take a reaction until the end of its next turn. Moreover, on its next turn, it must choose whether it gets a move, an action, or a bonus action; it gets only one of the three. On a successful save, the target takes half as much damage and suffers none of the spell's other effects.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd. The creatures must be within 30 feet of each other when you target them.", "color": "#c040e8"}, {"name": "Tasha's Otherworldly Guise", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "TCE", "page": "116", "classes": "", "notation": "Tr:2 > Il:2 > Co:3 > Ab:4 > En:5 > Ev:1 > Di:2 > Tr:1", "tags": "alter_form, barrier, concentration, damage, illusion_tag, mind, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (an object engraved with a symbol of the Outer Planes, worth at least 500 gp)", "description": "Uttering an incantation, you draw on the magic of the Lower Planes or Upper Planes (your choice) to transform yourself. You gain the following benefits until the spell ends:\n\nYou are immune to fire and poison damage (Lower Planes) or radiant and necrotic damage (Upper Planes).You are immune to the poisoned condition (Lower Planes) or the charmed condition (Upper Planes).Spectral wings appear on your back, giving you a flying speed of 40 feet.You have a +2 bonus to AC.All your weapon attacks are magical, and when you make a weapon attack, you can use your spellcasting ability modifier, instead of Strength or Dexterity, for the attack and damage rolls.You can attack twice, instead of once, when you take the Attack action on your turn. You ignore this benefit if you already have a feature, like Extra Attack, that lets you attack more than once when you take the Attack action on your turn.", "higher": "", "color": "#40e890"}, {"name": "Telekinesis", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "331", "classes": "Psion, Sorcerer, Wizard", "notation": "Tr:1 > Di:2 > Co:3 > En:4 > Ab:5 > Ev:1 > Tr:2", "tags": "concentration, movement, reveal, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You gain the ability to move or manipulate creatures or objects by thought. When you cast the spell and as a Magic action on your later turns before the spell ends, you can exert your will on one creature or object that you can see within range, causing the appropriate effect below. You can affect the same target round after round or choose a new one at any time. If you switch targets, the prior target is no longer affected by the spell.\n\nCreature. You can try to move a Huge or smaller creature. The target must succeed on a Strength saving throw, or you move it up to 30 feet in any direction within the spell's range. Until the end of your next turn, the creature has the Restrained condition, and if you lift it into the air, it is suspended there. It falls at the end of your next turn unless you use this option on it again and it fails the save.\n\nObject. You can try to move a Huge or smaller object. If the object isn't being worn or carried, you automatically move it up to 30 feet in any direction within the spell's range.\n\nIf the object is worn or carried by a creature, that creature must succeed on a Strength saving throw, or you pull the object away and move it up to 30 feet in any direction within the spell's range.\n\nYou can exert fine control on objects with your telekinetic grip, such as manipulating a simple tool, opening a door or a container, stowing or retrieving an item from an open container, or pouring the contents from a vial.", "higher": "", "color": "#40e890"}, {"name": "Telepathy", "level": "Level 8", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "331", "classes": "Psion, Wizard", "notation": "Di:4 > Il:2 > Co:3 > Tr:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Il:4 > Di:5", "tags": "illusion_tag, summon", "duration": "24 hours", "cast_time": "Action", "range": "Unlimited", "components": "V, S, M (a pair of linked silver rings)", "description": "You create a telepathic link between yourself and a willing creature with which you are familiar. The creature can be anywhere on the same plane of existence as you. The spell ends if you or the target are no longer on the same plane.\n\nUntil the spell ends, you and the target can instantly share words, images, sounds, and other sensory messages with each other through the link, and the target recognizes you as the creature it is communicating with. The spell enables a creature to understand the meaning of your words and any sensory messages you send to it.", "higher": "", "color": "#c8e040"}, {"name": "Teleport", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "331", "classes": "Bard, Psion, Sorcerer, Wizard", "notation": "Co:3 > Il:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Co:1", "tags": "aoe, damage, illusion_tag, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "10 feet", "components": "V", "description": "This spell instantly transports you and up to eight willing creatures that you can see within range, or a single object that you can see within range, to a destination you select. If you target an object, it must be Large or smaller, and it can't be held or carried by an unwilling creature.\n\nThe destination you choose must be known to you, and it must be on the same plane of existence as you. Your familiarity with the destination determines whether you arrive there successfully. The DM rolls 1d100 and consults the Teleportation Outcome table and the explanations after it.\n\nTeleportation OutcomeFamiliarityMishapSimilar AreaOff TargetOn TargetPermanent circle———01-00Linked object———01-00Very familiar01-0506-1314-2425-00Seen casually01-3334-4344-5354-00Viewed once or described01-4344-5354-7374-00False destination01-5051-00—— Familiarity. Here are the meanings of the terms in the table's Familiarity column:\n\n\"Permanent circle\" means a permanent teleportation circle whose sigil sequence you know.\"Linked object\" means you possess an object taken from the desired destination within the last six months, such as a book from a wizard's library.\"Very familiar\" is a place you have visited often, a place you have carefully studied, or a place you can see when you cast the spell.\"Seen casually\" is a place you have seen more than once but with which you aren't very familiar.\"Viewed once or described\" is a place you have seen once, possibly using magic, or a place you know through someone else's description, perhaps from a map.\"False destination\" is a place that doesn't exist. Perhaps you tried to scry an enemy's sanctum but instead viewed an illusion, or you are attempting to teleport to a location that no longer exists. Mishap. The spell's unpredictable magic results in a difficult journey. Each teleporting creature (or the target object) takes 3d10 Force damage, and the DM rerolls on the table to see where you wind up (multiple mishaps can occur, dealing damage each time).\n\nSimilar Area. You and your group (or the target object) appear in a different area that's visually or thematically similar to the target area. You appear in the closest similar place. If you are heading for your home laboratory, for example, you might appear in another person's laboratory in the same city.\n\nOff Target. You and your group (or the target object) appear 2d12 miles away from the destination in a random direction. Roll 1d8 for the direction: 1, east; 2, southeast; 3, south; 4, southwest; 5, west; 6, northwest; 7, north; or 8, northeast.\n\nOn Target. You and your group (or the target object) appear where you intended.", "higher": "", "color": "#e8a040"}, {"name": "Teleportation Circle", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "332", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Co:1 > Il:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > Co:5", "tags": "aoe, illusion_tag, movement, reveal, summon", "duration": "1 round", "cast_time": "1 Min.", "range": "10 feet", "components": "V, M (rare inks worth 50+ GP, which the spell consumes)", "description": "As you cast the spell, you draw a 5-foot-radius circle on the ground inscribed with sigils that link your location to a permanent teleportation circle of your choice whose sigil sequence you know and that is on the same plane of existence as you. A shimmering portal opens within the circle you drew and remains open until the end of your next turn. Any creature that enters the portal instantly appears within 5 feet of the destination circle or in the nearest unoccupied space if that space is occupied.\n\nMany major temples, guildhalls, and other important places have permanent teleportation circles. Each circle includes a unique sigil sequence—a string of runes arranged in a particular pattern.\n\nWhen you first gain the ability to cast this spell, you learn the sigil sequences for two destinations on the Material Plane, determined by the DM. You might learn additional sigil sequences during your adventures. You can commit a new sigil sequence to memory after studying it for 1 minute.\n\nYou can create a permanent teleportation circle by casting this spell in the same location every day for 365 days.", "higher": "", "color": "#e8a040"}, {"name": "Temple of the Gods", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "167", "classes": "", "notation": "Co:3 > Il:2 > Ne:3 > Tr:4 > Ab:5 > Di:1 > En:2 > Ev:3 > Co:1", "tags": "aoe, barrier, damage, healing, illusion_tag, mind, movement, reveal, summon, undead", "duration": "24 hours", "cast_time": "1 Hr.", "range": "120 feet", "components": "V, S, M (a holy symbol worth at least 5 gp)", "description": "You cause a temple to shimmer into existence on ground you can see within range. The temple must fit within an unoccupied cube of space, up to 120 feet on each side. The temple remains until the spell ends. It is dedicated to whatever god, pantheon, or philosophy is represented by the holy symbol used in the casting.\n\nYou make all decisions about the temple's appearance. The interior is enclosed by a floor, walls, and a roof, with one door granting access to the interior and as many windows as you wish. Only you and any creatures you designate when you cast the spell can open or close the door.\n\nThe temple's interior is an open space with an idol or altar at one end. You decide whether the temple is illuminated and whether that illumination is bright light or dim light. The smell of burning incense fills the air within, and the temperature is mild.\n\nThe temple opposes types of creatures you choose when you cast this spell. Choose one or more of the following: celestials, elementals, fey, fiends, or undead. If a creature of the chosen type attempts to enter the temple, that creature must make a Charisma saving throw. On a failed save, it can't enter the temple for 24 hours. Even if the creature can enter the temple, the magic there hinders it; whenever it makes an attack roll, an ability check, or a saving throw inside the temple, it must roll a d4 and subtract the number rolled from the d20 roll.\n\nIn addition, the sensors created by divination spells can't appear inside the temple, and creatures within can't be targeted by divination spells.\n\nFinally, whenever any creature in the temple regains hit points from a spell of 1st level or higher, the creature regains additional hit points equal to your Wisdom modifier (minimum 1 hit point).\n\nThe temple is made from opaque magical force that extends into the Ethereal Plane, thus blocking ethereal travel into the temple's interior. Nothing can physically pass through the temple's exterior. It can't be dispelled by dispel magic, and antimagic field has no effect on it. A disintegrate spell destroys the temple instantly.\n\nCasting this spell on the same spot every day for a year makes this effect permanent.", "higher": "", "color": "#e8a040"}, {"name": "Temporal Shunt", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "EGW", "page": "189", "classes": "", "notation": "Tr:1 > Il:2 > En:3 > Di:4 > Co:5 > Ev:1 > Tr:3", "tags": "illusion_tag, mind, single_target, summon", "duration": "1 round", "cast_time": "Reaction", "range": "120 feet", "components": "V, S", "description": "You target the triggering creature, which must succeed on a Wisdom saving throw or vanish, being thrown to another point in time and causing the attack to miss or the spell to be wasted. At the start of its next turn, the target reappears where it was or in the closest unoccupied space. The target doesn't remember you casting the spell or being affected by it.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 6th level or higher, you can target one additional creature for each slot level above 5th. All targets must be within 30 feet of each other.", "color": "#40e890"}, {"name": "Tenser's Floating Disk", "level": "Level 1", "school": "Conjuration", "ritual": "Yes", "source": "PHB'24", "page": "332", "classes": "Apothecary, Psion, Wizard", "notation": "Co:2 > Tr:2 > Co:3", "tags": "alter_form, damage, movement, reveal, summon, utility", "duration": "1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a drop of mercury)", "description": "This spell creates a circular, horizontal plane of force, 3 feet in diameter and 1 inch thick, that floats 3 feet above the ground in an unoccupied space of your choice that you can see within range. The disk remains for the duration and can hold up to 500 pounds. If more weight is placed on it, the spell ends, and everything on the disk falls to the ground.\n\nThe disk is immobile while you are within 20 feet of it. If you move more than 20 feet away from it, the disk follows you so that it remains within 20 feet of you. It can move across uneven terrain, up or down stairs, slopes and the like, but it can't cross an elevation change of 10 feet or more. For example, the disk can't move across a 10-foot-deep pit, nor could it leave such a pit if it was created at the bottom.\n\nIf you move more than 100 feet from the disk (typically because it can't move around an obstacle to follow you), the spell ends.", "higher": "", "color": "#e8a040"}, {"name": "Tenser's Transformation", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "168", "classes": "", "notation": "Tr:2 > Ab:2 > Co:3 > En:4 > Di:5 > Ev:1 > Il:2 > Tr:4", "tags": "barrier, concentration, damage, healing, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (a few hairs from a bull)", "description": "You endow yourself with endurance and martial prowess fueled by magic. Until the spell ends, you can't cast spells, and you gain the following benefits:\n\nYou gain 50 temporary hit points. If any of these remain when the spell ends, they are lost.You have advantage on attack rolls that you make with simple and martial weapons.When you hit a target with a weapon attack, that target takes an extra 2d12 force damage.You have proficiency with all armor, shields, simple weapons, and martial weapons.You have proficiency in Strength and Constitution saving throws.You can attack twice, instead of once, when you take the Attack action on your turn. You ignore this benefit if you already have a feature, like Extra Attack, that gives you extra attacks.Immediately after the spell ends, you must succeed on a DC 15 Constitution saving throw or suffer one level of exhaustion.", "higher": "", "color": "#40e890"}, {"name": "Tether Essence", "level": "Level 7", "school": "Necromancy", "ritual": "No", "source": "EGW", "page": "189", "classes": "", "notation": "Ne:3 > Ab:2 > Co:3 > En:4 > Di:5 > Ev:1 > Tr:2 > Il:3 > Ne:5", "tags": "alter_form, concentration, damage, healing, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a spool of platinum cord worth at least 250 gp, which the spell consumes)", "description": "Two creatures you can see within range must make a Constitution saving throw, with disadvantage if they are within 30 feet of each other. Either creature can willingly fail the save. If either save succeeds, the spell has no effect. If both saves fail, the creatures are magically linked for the duration, regardless of the distance between them. When damage is dealt to one of them, the same damage is dealt to the other one. If hit points are restored to one of them, the same number of hit points are restored to the other one. If either of the tethered creatures is reduced to 0 hit points, the spell ends on both. If the spell ends on one creature, it ends on both.", "higher": "", "color": "#a0a0a0"}, {"name": "Thaumaturgy", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "333", "classes": "Apothecary, Cleric", "notation": "Tr:4 > Tr:1", "tags": "alter_form, damage, illusion_tag, movement, summon", "duration": "1 minute", "cast_time": "Action", "range": "30 feet", "components": "V", "description": "You manifest a minor wonder within range. You create one of the effects below within range. If you cast this spell multiple times, you can have up to three of its 1-minute effects active at a time.\n\nAltered Eyes. You alter the appearance of your eyes for 1 minute.\n\nBooming Voice. Your voice booms up to three times as loud as normal for 1 minute. For the duration, you have Advantage on Charisma (Intimidation) checks.\n\nFire Play. You cause flames to flicker, brighten, dim, or change color for 1 minute.\n\nInvisible Hand. You instantaneously cause an unlocked door or window to fly open or slam shut.\n\nPhantom Sound. You create an instantaneous sound that originates from a point of your choice within range, such as a rumble of thunder, the cry of a raven, or ominous whispers.\n\nTremors. You cause harmless tremors in the ground for 1 minute.", "higher": "", "color": "#40e890"}, {"name": "Thorn Whip", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "333", "classes": "Artificer, Druid", "notation": "Tr:4 > Tr:2", "tags": "barrier, damage, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (the stem of a plant with thorns)", "description": "You create a vine-like whip covered in thorns that lashes out at your command toward a creature in range. Make a melee spell attack against the target. On a hit, the target takes 1d6 Piercing damage, and if it is Large or smaller, you can pull it up to 10 feet closer to you.", "higher": "Cantrip Upgrade. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).", "color": "#40e890"}, {"name": "Thunder Step", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "168", "classes": "", "notation": "Co:4 > Il:2 > Tr:3 > Di:4 > Co:3", "tags": "aoe, damage, illusion_tag, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "V", "description": "You teleport yourself to an unoccupied space you can see within range. Immediately after you disappear, a thunderous boom sounds, and each creature within 10 feet of the space you left must make a Constitution saving throw, taking 3d10 thunder damage on a failed save, or half as much damage on a successful one. The thunder can be heard from up to 300 feet away.\n\nYou can bring along objects as long as their weight doesn't exceed what you can carry. You can also teleport one willing creature of your size or smaller who is carrying gear up to its carrying capacity. The creature must be within 5 feet of you when you cast this spell, and there must be an unoccupied space within 5 feet of your destination space for the creature to appear in; otherwise, the creature is left behind.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d10 for each slot level above 3rd.", "color": "#e8a040"}, {"name": "Thunderclap", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "333", "classes": "Artificer, Bard, Druid, Sorcerer, Warlock, Wizard", "notation": "Ev:4 > Ev:2", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "S", "description": "Each creature in a 5-foot Emanation originating from you must succeed on a Constitution saving throw or take 1d6 Thunder damage. The spell's thunderous sound can be heard up to 100 feet away.", "higher": "Cantrip Upgrade. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).", "color": "#e84040"}, {"name": "Thunderous Smite", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "334", "classes": "Paladin", "notation": "Ev:2 > Co:2 > Ev:4", "tags": "damage, single_target", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "Your strike rings with thunder that is audible within 300 feet of you, and the target takes an extra 2d6 Thunder damage from the attack. Additionally, if the target is a creature, it must succeed on a Strength saving throw or be pushed 10 feet away from you and have the Prone condition.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Thunderwave", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "334", "classes": "Bard, Druid, Psion, Sorcerer, Wizard", "notation": "Ev:1 > Di:2 > Ev:2", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You unleash a wave of thunderous energy. Each creature in a 15-foot Cube originating from you makes a Constitution saving throw. On a failed save, a creature takes 2d8 Thunder damage and is pushed 10 feet away from you. On a successful save, a creature takes half as much damage only.\n\nIn addition, unsecured objects that are entirely within the Cube are pushed 10 feet away from you, and a thunderous boom is audible within 300 feet.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Tidal Wave", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "168", "classes": "", "notation": "Co:4 > Ev:2 > Tr:3 > Ab:4 > Co:5", "tags": "aoe, barrier, damage, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a drop of water)", "description": "You conjure up a wave of water that crashes down on an area within range. The area can be up to 30 feet long, up to 10 feet wide, and up to 10 feet tall. Each creature in that area must make a Dexterity saving throw. On a failed save, a creature takes 4d8 bludgeoning damage and is knocked prone. On a successful save, a creature takes half as much damage and isn't knocked prone. The water then spreads out across the ground in all directions, extinguishing unprotected flames in its area and within 30 feet of it, and then it vanishes.", "higher": "", "color": "#e8a040"}, {"name": "Time Ravage", "level": "Level 9", "school": "Necromancy", "ritual": "No", "source": "EGW", "page": "189", "classes": "", "notation": "Ne:5 > Co:2 > Tr:3 > Ab:4 > En:5 > Di:1 > Ev:2 > Il:3 > Co:4 > Tr:5 > Ne:1", "tags": "damage, healing, movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (an hourglass filled with diamond dust worth at least 5,000 gp, which the spell consumes)", "description": "You target a creature you can see within range, putting its physical form through the devastation of rapid aging. The target must make a Constitution saving throw, taking 10d12 necrotic damage on a failed save, or half as much damage on a successful one. If the save fails, the target also ages to the point where it has only 30 days left before it dies of old age. In this aged state, the target has disadvantage on attack rolls, ability checks, and saving throws, and its walking speed is halved. Only the wish spell or the greater restoration cast with a 9th-level spell slot can end these effects and restore the target to its previous age.", "higher": "", "color": "#a0a0a0"}, {"name": "Time Stop", "level": "Level 9", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "334", "classes": "Apothecary, Psion, Sorcerer, Wizard", "notation": "Tr:5 > Co:2 > Ev:3 > Di:4 > Ab:5 > En:1 > Il:2 > Ne:3 > Co:4 > Ev:5 > Tr:2", "tags": "movement, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V", "description": "You briefly stop the flow of time for everyone but yourself. No time passes for other creatures, while you take 1d4 + 1 turns in a row, during which you can use actions and move as normal.\n\nThis spell ends if one of the actions you use during this period, or any effects that you create during it, affects a creature other than you or an object being worn or carried by someone other than you. In addition, the spell ends if you move to a place more than 1,000 feet from the location where you cast it.", "higher": "", "color": "#40e890"}, {"name": "Tiny Servant", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "168", "classes": "", "notation": "Tr:4 > Di:2 > Ev:3 > Ab:4 > Tr:3", "tags": "damage, healing, movement, reveal", "duration": "8 hours", "cast_time": "1 Min.", "range": "Touch", "components": "V, S", "description": "You touch one Tiny, nonmagical object that isn't attached to another object or a surface and isn't being carried by another creature. The target animates and sprouts little arms and legs, becoming a creature under your control until the spell ends or the creature drops to 0 hit points. See the stat block for its statistics.\n\nAs a bonus action, you can mentally command the creature if it is within 120 feet of you. (If you control multiple creatures with this spell, you can command any or all of them at the same time, issuing the same command to each one.) You decide what action the creature will take and where it will move during its next turn, or you can issue a simple, general command, such as to fetch a key, stand watch, or stack some books. If you issue no commands, the servant does nothing other than defend itself against hostile creatures. Once given an order, the servant continues to follow that order until its task is complete.\n\nWhen the creature drops to 0 hit points, it reverts to its original form, and any remaining damage carries over to that form.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, you can animate two additional objects for each slot level above 3rd.", "color": "#40e890"}, {"name": "Toll the Dead", "level": "Cantrip", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "334", "classes": "Cleric, Warlock, Wizard", "notation": "Ne:2 > Ne:1", "tags": "damage, healing, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You point at one creature you can see within range, and the single chime of a dolorous bell is audible within 10 feet of the target. The target must succeed on a Wisdom saving throw or take 1d8 Necrotic damage. If the target is missing any of its Hit Points, it instead takes 1d12 Necrotic damage.", "higher": "Cantrip Upgrade. The damage increases by one die when you reach levels 5 (2d8 or 2d12), 11 (3d8 or 3d12), and 17 (4d8 or 4d12).", "color": "#a0a0a0"}, {"name": "Tongues", "level": "Level 3", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "334", "classes": "Bard, Cleric, Psion, Sorcerer, Tamer, Warlock, Wizard", "notation": "Di:4 > Ev:2 > Co:3 > Ab:4 > Di:5", "tags": "reveal", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, M (a miniature ziggurat)", "description": "This spell grants the creature you touch the ability to understand any spoken or signed language that it hears or sees. Moreover, when the target communicates by speaking or signing, any creature that knows at least one language can understand it if that creature can hear the speech or see the signing.", "higher": "", "color": "#c8e040"}, {"name": "Transmute Rock", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "169", "classes": "", "notation": "Tr:1 > Co:2 > Ab:3 > Di:4 > En:5 > Il:1 > Tr:4", "tags": "alter_form, aoe, barrier, damage, healing, mind, movement, reveal", "duration": "Until dispelled", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (clay and water)", "description": "You choose an area of stone or mud that you can see that fits within a 40-foot cube and is within range, and choose one of the following effects.\n\nTransmute Rock to Mud. Nonmagical rock of any sort in the area becomes an equal volume of thick, flowing mud that remains for the spell's duration.\n\nThe ground in the spell's area becomes muddy enough that creatures can sink into it. Each foot that a creature moves through the mud costs 4 feet of movement, and any creature on the ground when you cast the spell must make a Strength saving throw. A creature must also make the saving throw when it moves into the area for the first time on a turn or ends its turn there. On a failed save, a creature sinks into the mud and is restrained, though it can use an action to end the restrained condition on itself by pulling itself free of the mud.\n\nIf you cast the spell on a ceiling, the mud falls. Any creature under the mud when it falls must make a Dexterity saving throw. A creature takes 4d8 bludgeoning damage on a failed save, or half as much damage on a successful one.\n\nTransmute Mud to Rock. Nonmagical mud or quicksand in the area no more than 10 feet deep transforms into soft stone for the spell's duration. Any creature in the mud when it transforms must make a Dexterity saving throw. On a successful save, a creature is shunted safely to the surface in an unoccupied space. On a failed save, a creature becomes restrained by the rock. A restrained creature, or another creature within reach, can use an action to try to break the rock by succeeding on a DC 20 Strength check or by dealing damage to it. The rock has AC 15 and 25 hit points, and it is immune to poison and psychic damage.", "higher": "", "color": "#40e890"}, {"name": "Transport via Plants", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "334", "classes": "Druid", "notation": "Co:2 > Di:2 > Tr:3 > Ev:4 > Ab:5 > En:1 > Il:2 > Co:5", "tags": "movement, reveal, summon", "duration": "10 minutes", "cast_time": "Action", "range": "10 feet", "components": "V, S", "description": "This spell creates a magical link between a Large or larger inanimate plant within range and another plant, at any distance, on the same plane of existence. You must have seen or touched the destination plant at least once before. For the duration, any creature can step into the target plant and exit from the destination plant by using 5 feet of movement.", "higher": "", "color": "#e8a040"}, {"name": "Tree Stride", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "335", "classes": "Druid, Ranger", "notation": "Co:1 > Il:2 > Tr:3 > Di:4 > Ab:5 > Ev:1 > Co:2", "tags": "concentration, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You gain the ability to enter a tree and move from inside it to inside another tree of the same kind within 500 feet. Both trees must be living and at least the same size as you. You must use 5 feet of movement to enter a tree. You instantly know the location of all other trees of the same kind within 500 feet and, as part of the move used to enter the tree, can either pass into one of those trees or step out of the tree you're in. You appear in a spot of your choice within 5 feet of the destination tree, using another 5 feet of movement. If you have no movement left, you appear within 5 feet of the tree you entered.\n\nYou can use this transportation ability only once on each of your turns. You must end each turn outside a tree.", "higher": "", "color": "#e8a040"}, {"name": "True Polymorph", "level": "Level 9", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "335", "classes": "Apothecary, Bard, Warlock, Wizard", "notation": "Tr:5 > Ab:2 > Co:3 > En:4 > Di:5 > Il:1 > Ev:2 > Ne:3 > Ab:4 > Co:5 > Tr:1", "tags": "alter_form, barrier, concentration, healing, mind, reveal, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a drop of mercury, a dollop of gum arabic, and a wisp of smoke)", "description": "Choose one creature or nonmagical object that you can see within range. The creature shape-shifts into a different creature or a nonmagical object, or the object shape-shifts into a creature (the object must be neither worn nor carried). The transformation lasts for the duration or until the target dies or is destroyed, but if you maintain Concentration on this spell for the full duration, the spell lasts until dispelled.\n\nAn unwilling creature can make a Wisdom saving throw, and if it succeeds, it isn't affected by this spell.\n\nCreature into Creature. If you turn a creature into another kind of creature, the new form can be any kind you choose that has a Challenge Rating equal to or less than the target's Challenge Rating or level. The target's game statistics are replaced by the stat block of the new form, but it retains its Hit Points, Hit Point Dice, alignment, and personality.\n\nThe target gains a number of Temporary Hit Points equal to the Hit Points of the new form. These Temporary Hit Points vanish if any remain when the spell ends.\n\nThe target is limited in the actions it can perform by the anatomy of its new form, and it can't speak or cast spells.\n\nThe target's gear melds into the new form. The creature can't use or otherwise benefit from any of that equipment.\n\nObject into Creature. You can turn an object into any kind of creature, as long as the creature's size is no larger than the object's size and the creature has a Challenge Rating of 9 or lower. The creature is Friendly to you and your allies. In combat, it takes its turns immediately after yours, and it obeys your commands.\n\nIf the spell lasts more than an hour, you no longer control the creature. It might remain Friendly to you, depending on how you have treated it.\n\nCreature into Object. If you turn a creature into an object, it transforms along with whatever it is wearing and carrying into that form, as long as the object's size is no larger than the creature's size. The creature's statistics become those of the object, and the creature has no memory of time spent in this form after the spell ends and it returns to normal.", "higher": "", "color": "#40e890"}, {"name": "True Resurrection", "level": "Level 9", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "336", "classes": "Apothecary, Cleric, Druid", "notation": "Ne:5 > Il:2 > Tr:3 > Ab:4 > Co:5 > Ev:1 > Di:2 > En:3 > Il:4 > Tr:5 > Ne:3", "tags": "damage, healing, illusion_tag, summon, undead", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (diamonds worth 25,000+ GP, which the spell consumes)", "description": "You touch a creature that has been dead for no longer than 200 years and that died for any reason except old age. The creature is revived with all its Hit Points.\n\nThis spell closes all wounds, neutralizes any poison, cures all magical contagions, and lifts any curses affecting the creature when it died. The spell replaces damaged or missing organs and limbs. If the creature was Undead, it is restored to its non-Undead form.\n\nThe spell can provide a new body if the original no longer exists, in which case you must speak the creature's name. The creature then appears in an unoccupied space you choose within 10 feet of you.", "higher": "", "color": "#a0a0a0"}, {"name": "True Seeing", "level": "Level 6", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "336", "classes": "Apothecary, Bard, Cleric, Psion, Sorcerer, Warlock, Wizard", "notation": "Di:2 > Ev:2 > Co:3 > Ab:4 > En:5 > Tr:1 > Il:2 > Di:1", "tags": "reveal", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (mushroom powder worth 25+ GP, which the spell consumes)", "description": "For the duration, the willing creature you touch has Truesight with a range of 120 feet.", "higher": "", "color": "#c8e040"}, {"name": "True Strike", "level": "Cantrip", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "336", "classes": "Artificer, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Di:1 > Di:3", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "S, M (a weapon with which you have proficiency and that is worth 1+ CP)", "description": "Guided by a flash of magical insight, you make one attack with the weapon used in the spell's casting. The attack uses your spellcasting ability for the attack and damage rolls instead of using Strength or Dexterity. If the attack deals damage, it can be Radiant damage or the weapon's normal damage type (your choice).", "higher": "Cantrip Upgrade. Whether you deal Radiant damage or the weapon's normal damage type, the attack deals extra Radiant damage when you reach levels 5 (1d6), 11 (2d6), and 17 (3d6).", "color": "#c8e040"}, {"name": "Tsunami", "level": "Level 8", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "336", "classes": "Druid", "notation": "Co:4 > Il:2 > Tr:3 > Ab:4 > Ev:5 > Di:1 > En:2 > Ne:3 > Il:4 > Co:2", "tags": "alter_form, aoe, barrier, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 6 rounds", "cast_time": "1 Min.", "range": "1 mile", "components": "V, S", "description": "A wall of water springs into existence at a point you choose within range. You can make the wall up to 300 feet long, 300 feet high, and 50 feet thick. The wall lasts for the duration.\n\nWhen the wall appears, each creature in its area makes a Strength saving throw, taking 6d10 Bludgeoning damage on a failed save or half as much damage on a successful one.\n\nAt the start of each of your turns after the wall appears, the wall, along with any creatures in it, moves 50 feet away from you. Any Huge or smaller creature inside the wall or whose space the wall enters when it moves must succeed on a Strength saving throw or take 5d10 Bludgeoning damage. A creature can take this damage only once per round. At the end of the turn, the wall's height is reduced by 50 feet, and the damage the wall deals on later rounds is reduced by 1d10. When the wall reaches 0 feet in height, the spell ends.\n\nA creature caught in the wall can move by swimming. Because of the wave's force, though, the creature must succeed on a Strength (Athletics) check against your spell save DC to move at all. If it fails the check, it can't move. A creature that moves out of the wall falls to the ground.", "higher": "", "color": "#e8a040"}, {"name": "Unseen Servant", "level": "Level 1", "school": "Conjuration", "ritual": "Yes", "source": "PHB'24", "page": "336", "classes": "Apothecary, Bard, Warlock, Wizard", "notation": "Co:2 > Di:2 > Co:4", "tags": "alter_form, damage, healing, illusion_tag, movement, summon, utility", "duration": "1 hour", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a bit of string and of wood)", "description": "This spell creates an Invisible, mindless, shapeless, Medium force that performs simple tasks at your command until the spell ends. The servant springs into existence in an unoccupied space on the ground within range. It has AC 10, 1 Hit Point, and a Strength of 2, and it can't attack. If it drops to 0 Hit Points, the spell ends.\n\nOnce on each of your turns as a Bonus Action, you can mentally command the servant to move up to 15 feet and interact with an object. The servant can perform simple tasks that a human could do, such as fetching things, cleaning, mending, folding clothes, lighting fires, serving food, and pouring drinks. Once you give the command, the servant performs the task to the best of its ability until it completes the task, then waits for your next command.\n\nIf you command the servant to perform a task that would move it more than 60 feet away from you, the spell ends.", "higher": "", "color": "#e8a040"}, {"name": "Vampiric Touch", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "337", "classes": "Apothecary, Sorcerer, Warlock, Wizard", "notation": "Ne:4 > Ev:2 > Tr:3 > Ab:4 > Ne:5", "tags": "concentration, damage, healing", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "The touch of your shadow-wreathed hand can siphon life force from others to heal your wounds. Make a melee spell attack against one creature within reach. On a hit, the target takes 3d6 Necrotic damage, and you regain Hit Points equal to half the amount of Necrotic damage dealt.\n\nUntil the spell ends, you can make the attack again on each of your turns as a Magic action, targeting the same creature or a different one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 3.", "color": "#a0a0a0"}, {"name": "Vicious Mockery", "level": "Cantrip", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "337", "classes": "Bard, Tamer", "notation": "En:1 > En:4", "tags": "damage, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You unleash a string of insults laced with subtle enchantments at one creature you can see or hear within range. The target must succeed on a Wisdom saving throw or take 1d6 Psychic damage and have Disadvantage on the next attack roll it makes before the end of its next turn.", "higher": "Cantrip Upgrade. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).", "color": "#c040e8"}, {"name": "Vitriolic Sphere", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "337", "classes": "Sorcerer, Wizard", "notation": "Ev:5 > Tr:2 > Co:3 > Di:4 > Ab:5 > Ev:2", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a drop of bile)", "description": "You point at a location within range, and a glowing, 1-foot-diameter ball of acid streaks there and explodes in a 20-foot-radius Sphere. Each creature in that area makes a Dexterity saving throw. On a failed save, a creature takes 10d4 Acid damage and another 5d4 Acid damage at the end of its next turn. On a successful save, a creature takes half the initial damage only.", "higher": "Using a Higher-Level Spell Slot. The initial damage increases by 2d4 for each spell slot level above 4.", "color": "#e84040"}, {"name": "Vortex Warp", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "SCC", "page": "38", "classes": "Artificer, Sorcerer, Wizard", "notation": "Co:3 > Di:2 > Tr:3 > Co:4", "tags": "movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "V, S", "description": "You magically twist space around another creature you can see within range. The target must succeed on a Constitution saving throw (the target can choose to fail), or the target is teleported to an unoccupied space of your choice that you can see within range. The chosen space must be on a surface or in a liquid that can support the target without the target having to squeeze.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, the range of the spell increases by 30 feet for each slot level above 2nd.", "color": "#e8a040"}, {"name": "Wall of Fire", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "338", "classes": "Druid, Sorcerer, Wizard", "notation": "Ev:5 > Il:2 > Ab:3 > Co:4 > Tr:5 > Ev:2", "tags": "aoe, barrier, concentration, damage, illusion_tag, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a piece of charcoal)", "description": "You create a wall of fire on a solid surface within range. You can make the wall up to 60 feet long, 20 feet high, and 1 foot thick, or a ringed wall up to 20 feet in diameter, 20 feet high, and 1 foot thick. The wall is opaque and lasts for the duration.\n\nWhen the wall appears, each creature in its area makes a Dexterity saving throw, taking 5d8 Fire damage on a failed save or half as much damage on a successful one.\n\nOne side of the wall, selected by you when you cast this spell, deals 5d8 Fire damage to each creature that ends its turn within 10 feet of that side or inside the wall. A creature takes the same damage when it enters the wall for the first time on a turn or ends its turn there. The other side of the wall deals no damage.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 4.", "color": "#e84040"}, {"name": "Wall of Force", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "338", "classes": "Wizard", "notation": "Ev:1 > Il:2 > Co:3 > Tr:4 > Ab:5 > Di:1 > Ev:4", "tags": "alter_form, aoe, barrier, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a shard of glass)", "description": "An Invisible wall of force springs into existence at a point you choose within range. The wall appears in any orientation you choose, as a horizontal or vertical barrier or at an angle. It can be free floating or resting on a solid surface. You can form it into a hemispherical dome or a globe with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-by-10-foot panels. Each panel must be contiguous with another panel. In any form, the wall is 1/4 inch thick and lasts for the duration. If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (you choose which side).\n\nNothing can physically pass through the wall. It is immune to all damage and can't be dispelled by Dispel Magic. A Disintegrate spell destroys the wall instantly, however. The wall also extends into the Ethereal Plane and blocks ethereal travel through the wall.", "higher": "", "color": "#e84040"}, {"name": "Wall of Ice", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "339", "classes": "Wizard", "notation": "Ev:2 > Il:2 > Ab:3 > Co:4 > Tr:5 > En:1 > Di:2 > Ev:4", "tags": "alter_form, aoe, barrier, concentration, damage, healing, illusion_tag, mind, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a piece of quartz)", "description": "You create a wall of ice on a solid surface within range. You can form it into a hemispherical dome or a globe with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-square panels. Each panel must be contiguous with another panel. In any form, the wall is 1 foot thick and lasts for the duration.\n\nIf the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (you choose which side) and makes a Dexterity saving throw, taking 10d6 Cold damage on a failed save or half as much damage on a successful one.\n\nThe wall is an object that can be damaged and thus breached. It has AC 12 and 30 Hit Points per 10-foot section, and it has Immunity to Cold, Poison, and Psychic damage and Vulnerability to Fire damage. Reducing a 10-foot section of wall to 0 Hit Points destroys it and leaves behind a sheet of frigid air in the space the wall occupied.\n\nA creature moving through the sheet of frigid air for the first time on a turn makes a Constitution saving throw, taking 5d6 Cold damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage the wall deals when it appears increases by 2d6 and the damage from passing through the sheet of frigid air increases by 1d6 for each spell slot level above 6.", "color": "#e84040"}, {"name": "Wall of Light", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "170", "classes": "", "notation": "Ev:1 > Il:2 > Ab:3 > Co:4 > Tr:5 > Di:1 > Ev:5", "tags": "alter_form, aoe, barrier, concentration, damage, illusion_tag, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a hand mirror)", "description": "A shimmering wall of bright light appears at a point you choose within range. The wall appears in any orientation you choose: horizontally, vertically, or diagonally. It can be free floating, or it can rest on a solid surface. The wall can be up to 60 feet long, 10 feet high, and 5 feet thick. The wall blocks line of sight, but creatures and objects can pass through it. It emits bright light out to 120 feet and dim light for an additional 120 feet.\n\nWhen the wall appears, each creature in its area must make a Constitution saving throw. On a failed save, a creature takes 4d8 radiant damage, and it is blinded for 1 minute. On a successful save, it takes half as much damage and isn't blinded. A blinded creature can make a Constitution saving throw at the end of each of its turns, ending the effect on itself on a success.\n\nA creature that ends its turn in the wall's area takes 4d8 radiant damage.\n\nUntil the spell ends, you can use an action to launch a beam of radiance from the wall at one creature you can see within 60 feet of it. Make a ranged spell attack. On a hit, the target takes 4d8 radiant damage. Whether you hit or miss, reduce the length of the wall by 10 feet. If the wall's length drops to 0 feet, the spell ends.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.", "color": "#e84040"}, {"name": "Wall of Sand", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "170", "classes": "", "notation": "Ev:4 > Co:2 > Tr:3 > Ab:4 > Ev:1", "tags": "aoe, barrier, concentration, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a handful of sand)", "description": "You create a wall of swirling sand on the ground at a point you can see within range. You can make the wall up to 30 feet long, 10 feet high, and 10 feet thick, and it vanishes when the spell ends. It blocks line of sight but not movement. A creature is blinded while in the wall's space and must spend 3 feet of movement for every 1 foot it moves there.", "higher": "", "color": "#e84040"}, {"name": "Wall of Stone", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "339", "classes": "Artificer, Druid, Sorcerer, Wizard", "notation": "Ev:1 > Il:2 > Co:3 > Tr:4 > Ab:5 > En:1 > Ev:2", "tags": "alter_form, barrier, concentration, damage, healing, illusion_tag, mind, movement, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a cube of granite)", "description": "A nonmagical wall of solid stone springs into existence at a point you choose within range. The wall is 6 inches thick and is composed of ten 10-foot-by-10-foot panels. Each panel must be contiguous with another panel. Alternatively, you can create 10-foot-by-20-foot panels that are only 3 inches thick.\n\nIf the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (you choose which side). If a creature would be surrounded on all sides by the wall (or the wall and another solid surface), that creature can make a Dexterity saving throw. On a success, it can use its Reaction to move up to its Speed so that it is no longer enclosed by the wall.\n\nThe wall can have any shape you desire, though it can't occupy the same space as a creature or object. The wall doesn't need to be vertical or rest on a firm foundation. It must, however, merge with and be solidly supported by existing stone. Thus, you can use this spell to bridge a chasm or create a ramp.\n\nIf you create a span greater than 20 feet in length, you must halve the size of each panel to create supports. You can crudely shape the wall to create battlements and the like.\n\nThe wall is an object made of stone that can be damaged and thus breached. Each panel has AC 15 and 30 Hit Points per inch of thickness, and it has Immunity to Poison and Psychic damage. Reducing a panel to 0 Hit Points destroys it and might cause connected panels to collapse at the DM's discretion.\n\nIf you maintain your Concentration on this spell for its full duration, the wall becomes permanent and can't be dispelled. Otherwise, the wall disappears when the spell ends.", "higher": "", "color": "#e84040"}, {"name": "Wall of Thorns", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "339", "classes": "Druid", "notation": "Co:2 > Il:2 > Tr:3 > Ab:4 > Ev:5 > Di:1 > En:2 > Co:5", "tags": "aoe, barrier, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a handful of thorns)", "description": "You create a wall of tangled brush bristling with needle-sharp thorns. The wall appears within range on a solid surface and lasts for the duration. You choose to make the wall up to 60 feet long, 10 feet high, and 5 feet thick or a circle that has a 20-foot diameter and is up to 20 feet high and 5 feet thick. The wall blocks line of sight.\n\nWhen the wall appears, each creature in its area makes a Dexterity saving throw, taking 7d8 Piercing damage on a failed save or half as much damage on a successful one.\n\nA creature can move through the wall, albeit slowly and painfully. For every 1 foot a creature moves through the wall, it must spend 4 feet of movement. Furthermore, the first time a creature enters a space in the wall on a turn or ends its turn there, the creature makes a Dexterity saving throw, taking 7d8 Slashing damage on a failed save or half as much damage on a successful one. A creature makes this save only once per turn.", "higher": "Using a Higher-Level Spell Slot. Both types of damage increase by 1d8 for each spell slot level above 6.", "color": "#e8a040"}, {"name": "Wall of Water", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "170", "classes": "", "notation": "Ev:4 > Ab:2 > Co:3 > Tr:4 > Ev:3", "tags": "aoe, barrier, concentration, damage, healing, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a drop of water)", "description": "You create a wall of water on the ground at a point you can see within range. You can make the wall up to 30 feet long, 10 feet high, and 1 foot thick, or you can make a ringed wall up to 20 feet in diameter, 20 feet high, and 1 foot thick. The wall vanishes when the spell ends. The wall's space is difficult terrain.\n\nAny ranged weapon attack that enters the wall's space has disadvantage on the attack roll, and fire damage is halved if the fire effect passes through the wall to reach its target. Spells that deal cold damage that pass through the wall cause the area of the wall they pass through to freeze solid (at least a 5-foot-square section is frozen). Each 5-foot-square frozen section has AC 5 and 15 hit points. Reducing a frozen section to 0 hit points destroys it. When a section is destroyed, the wall's water doesn't fill it.", "higher": "", "color": "#e84040"}, {"name": "Wardaway", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "FRHoF", "page": "147", "classes": "Bard, Cleric, Paladin, Wizard", "notation": "Ab:2 > Ne:2 > Ab:5", "tags": "barrier, damage, movement, single_target, undead", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a miniature clay hand)", "description": "You hurl a disorienting magical force toward one creature within range. The target makes a Constitution saving throw; Constructs and Undead automatically succeed on this save.\n\nOn a failed save, the target takes 2d4 Force damage, its Speed is halved until the start of your next turn, and on its next turn, it can take only an action or a Bonus Action (but not both). On a successful save, the target takes half as much damage only.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 2d4 for every spell slot level above 1.", "color": "#40c8e0"}, {"name": "Warding Bond", "level": "Level 2", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "340", "classes": "Cleric, Paladin, Tamer", "notation": "Ab:3 > Co:2 > En:3 > Ab:4", "tags": "barrier, damage, healing, single_target, summon", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a pair of platinum rings worth 50+ GP each, which you and the target must wear for the duration)", "description": "You touch another creature that is willing and create a mystic connection between you and the target until the spell ends. While the target is within 60 feet of you, it gains a +1 bonus to AC and saving throws, and it has Resistance to all damage. Also, each time it takes damage, you take the same amount of damage.\n\nThe spell ends if you drop to 0 Hit Points or if you and the target become separated by more than 60 feet. It also ends if the spell is cast again on either of the connected creatures.", "higher": "", "color": "#40c8e0"}, {"name": "Warding Wind", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "170", "classes": "", "notation": "Ev:3 > Co:2 > Tr:3 > Ev:5", "tags": "aoe, barrier, concentration, movement", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V", "description": "A strong wind (20 miles per hour) blows around you in a 10-foot radius and moves with you, remaining centered on you. The wind lasts for the spell's duration.\n\nThe wind has the following effects:\n\nIt deafens you and other creatures in its area.It extinguishes unprotected flames in its area that are torch-sized or smaller.It hedges out vapor, gas, and fog that can be dispersed by strong wind.The area is difficult terra
