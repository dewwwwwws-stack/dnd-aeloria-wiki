n": "Co:2 > Il:2 > Co:4", "tags": "aoe, concentration, illusion_tag, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S", "description": "Grasping plants sprout from the ground in a 20-foot square within range. For the duration, these plants turn the ground in the area into Difficult Terrain. They disappear when the spell ends.\n\nEach creature (other than you) in the area when you cast the spell must succeed on a Strength saving throw or have the Restrained condition until the spell ends. A Restrained creature can take an action to make a Strength (Athletics) check against your spell save DC. On a success, it frees itself from the grasping plants and is no longer Restrained by them.", "higher": "", "color": "#e8a040"}, {"name": "Enthrall", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "269", "classes": "Bard, Psion, Warlock", "notation": "En:3 > Di:2 > Il:3 > En:4", "tags": "mind, reveal, single_target", "duration": "1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You weave a distracting string of words, causing creatures of your choice that you can see within range to make a Wisdom saving throw. Any creature you or your companions are fighting automatically succeeds on this save. On a failed save, a target has a -10 penalty to Wisdom (Perception) checks and Passive Perception until the spell ends.", "higher": "", "color": "#c040e8"}, {"name": "Erupting Earth", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "155", "classes": "", "notation": "Tr:4 > Di:2 > Ev:3 > Co:4 > Tr:2", "tags": "aoe, damage, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a piece of obsidian)", "description": "Choose a point you can see on the ground within range. A fountain of churned earth and stone erupts in a 20-foot cube centered on that point. Each creature in that area must make a Dexterity saving throw. A creature takes 3d12 bludgeoning damage on a failed save, or half as much damage on a successful one. Additionally, the ground in that area becomes difficult terrain until cleared. Each 5-foot-square portion of the area requires at least 1 minute to clear by hand.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d12 for each slot level above 3rd.", "color": "#40e890"}, {"name": "Etherealness", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "269", "classes": "Apothecary, Bard, Cleric, Psion, Sorcerer, Warlock, Wizard", "notation": "Co:3 > Il:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > En:2 > Ne:3 > Co:4", "tags": "damage, illusion_tag, movement, reveal, summon", "duration": "8 hours", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You step into the border regions of the Ethereal Plane, where it overlaps with your current plane. You remain in the Border Ethereal for the duration. During this time, you can move in any direction. If you move up or down, every foot of movement costs an extra foot. You can perceive the plane you left, which looks gray, and you can't see anything there more than 60 feet away.\n\nWhile on the Ethereal Plane, you can affect and be affected only by creatures, objects, and effects on that plane. Creatures that aren't on the Ethereal Plane can't perceive or interact with you unless a feature gives them the ability to do so.\n\nWhen the spell ends, you return to the plane you left in the spot that corresponds to your space in the Border Ethereal. If you appear in an occupied space, you are shunted to the nearest unoccupied space and take Force damage equal to twice the number of feet you are moved.\n\nThis spell ends instantly if you cast it while you are on the Ethereal Plane or a plane that doesn't border it, such as one of the Outer Planes.", "higher": "Using a Higher-Level Spell Slot. You can target up to three willing creatures (including yourself) for each spell slot level above 7. The creatures must be within 10 feet of you when you cast the spell.", "color": "#e8a040"}, {"name": "Evard's Black Tentacles", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "270", "classes": "Apothecary, Wizard", "notation": "Co:5 > Di:2 > Ev:3 > Tr:4 > Ab:5 > Co:1", "tags": "aoe, concentration, damage, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a tentacle)", "description": "Squirming, ebony tentacles fill a 20-foot square on ground that you can see within range. For the duration, these tentacles turn the ground in that area into Difficult Terrain.\n\nEach creature in that area makes a Strength saving throw. On a failed save, it takes 3d6 Bludgeoning damage, and it has the Restrained condition until the spell ends. A creature also makes that save if it enters the area or ends it turn there. A creature makes that save only once per turn.\n\nA Restrained creature can take an action to make a Strength (Athletics) check against your spell save DC, ending the condition on itself on a success.", "higher": "", "color": "#e8a040"}, {"name": "Expeditious Retreat", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "270", "classes": "Artificer, Sorcerer, Tamer, Warlock, Wizard", "notation": "Tr:2 > Co:2 > Tr:3", "tags": "concentration, movement", "duration": "Concentration, up to 10 minutes", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "You take the Dash action, and until the spell ends, you can take that action again as a Bonus Action.", "higher": "", "color": "#40e890"}, {"name": "Eyebite", "level": "Level 6", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "270", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Ne:2 > Co:2 > Tr:3 > En:4 > Di:5 > Il:1 > Ev:2 > Ne:5", "tags": "concentration, damage, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "For the duration, your eyes become an inky void. One creature of your choice within 60 feet of you that you can see must succeed on a Wisdom saving throw or be affected by one of the following effects of your choice for the duration.\n\nOn each of your turns until the spell ends, you can take a Magic action to target another creature but can't target a creature again if it has succeeded on a save against this casting of the spell.\n\nAsleep. The target has the Unconscious condition. It wakes up if it takes any damage or if another creature takes an action to shake it awake.\n\nPanicked. The target has the Frightened condition. On each of its turns, the Frightened target must take the Dash action and move away from you by the safest and shortest route available. If the target moves to a space at least 60 feet away from you where it can't see you, this effect ends.\n\nSickened. The target has the Poisoned condition.", "higher": "", "color": "#a0a0a0"}, {"name": "Fabricate", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "271", "classes": "Artificer, Wizard", "notation": "Tr:5 > Di:2 > Ev:3 > Co:4 > Ab:5 > Tr:4", "tags": "aoe, reveal, summon", "duration": "Instantaneous", "cast_time": "10 Min.", "range": "120 feet", "components": "V, S", "description": "You convert raw materials into products of the same material. For example, you can fabricate a wooden bridge from a clump of trees, a rope from a patch of hemp, or clothes from flax or wool.\n\nChoose raw materials that you can see within range. You can fabricate a Large or smaller object (contained within a 10-foot Cube or eight connected 5-foot Cubes) given a sufficient quantity of material. If you're working with metal, stone, or another mineral substance, however, the fabricated object can be no larger than Medium (contained within a 5-foot Cube). The quality of any fabricated objects is based on the quality of the raw materials.\n\nCreatures and magic items can't be created by this spell. You also can't use it to create items that require a high degree of skill—such as weapons and armor—unless you have proficiency with the type of Artisan's Tools used to craft such objects.", "higher": "", "color": "#40e890"}, {"name": "Faerie Fire", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "271", "classes": "Artificer, Bard, Druid, Tamer", "notation": "Ev:2 > Di:2 > Ev:3", "tags": "aoe, concentration, illusion_tag, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "Objects in a 20-foot Cube within range are outlined in blue, green, or violet light (your choice). Each creature in the Cube is also outlined if it fails a Dexterity saving throw. For the duration, objects and affected creatures shed Dim Light in a 10-foot radius and can't benefit from the Invisible condition.\n\nAttack rolls against an affected creature or object have Advantage if the attacker can see it.", "higher": "", "color": "#e84040"}, {"name": "False Life", "level": "Level 1", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "271", "classes": "Apothecary, Artificer, Sorcerer, Tamer, Wizard", "notation": "Ne:2 > Ab:2 > Ne:1", "tags": "healing", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a drop of alcohol)", "description": "You gain 2d4 + 4 Temporary Hit Points.", "higher": "Using a Higher-Level Spell Slot. You gain 5 additional Temporary Hit Points for each spell slot level above 1.", "color": "#a0a0a0"}, {"name": "Far Step", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "155", "classes": "", "notation": "Co:1 > Di:2 > Tr:3 > Ab:4 > Ev:5 > En:1 > Co:2", "tags": "concentration, movement, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "You teleport up to 60 feet to an unoccupied space you can see. On each of your turns before the spell ends, you can use a bonus action to teleport in this way again.", "higher": "", "color": "#e8a040"}, {"name": "Fear", "level": "Level 3", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "271", "classes": "Apothecary, Bard, Psion, Sorcerer, Tamer, Warlock, Wizard", "notation": "Il:4 > En:2 > Co:3 > Tr:4 > Il:2", "tags": "aoe, concentration, mind, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a white feather)", "description": "Each creature in a 30-foot Cone must succeed on a Wisdom saving throw or drop whatever it is holding and have the Frightened condition for the duration.\n\nA Frightened creature takes the Dash action and moves away from you by the safest route on each of its turns unless there is nowhere to move. If the creature ends its turn in a space where it doesn't have line of sight to you, the creature makes a Wisdom saving throw. On a successful save, the spell ends on that creature.", "higher": "", "color": "#4060e8"}, {"name": "Feather Fall", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "271", "classes": "Apothecary, Artificer, Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "Tr:2 > Ev:2 > Tr:4", "tags": "damage", "duration": "1 minute", "cast_time": "Reaction", "range": "60 feet", "components": "V, M (a small feather or piece of down)", "description": "Choose up to five falling creatures within range. A falling creature's rate of descent slows to 60 feet per round until the spell ends. If a creature lands before the spell ends, the creature takes no damage from the fall, and the spell ends for that creature.", "higher": "", "color": "#40e890"}, {"name": "Feign Death", "level": "Level 3", "school": "Necromancy", "ritual": "Yes", "source": "PHB'24", "page": "271", "classes": "Bard, Cleric, Druid, Wizard", "notation": "Ne:4 > Il:2 > Co:3 > Tr:4 > Ne:2", "tags": "barrier, damage, illusion_tag, mind, movement, summon, utility", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a pinch of graveyard dirt)", "description": "You touch a willing creature and put it into a cataleptic state that is indistinguishable from death.\n\nFor the duration, the target appears dead to outward inspection and to spells used to determine the target's status. The target has the Blinded and Incapacitated conditions, and its Speed is 0.\n\nThe target also has Resistance to all damage except Psychic damage, and it has Immunity to the Poisoned condition.", "higher": "", "color": "#a0a0a0"}, {"name": "Find Familiar", "level": "Level 1", "school": "Conjuration", "ritual": "Yes", "source": "PHB'24", "page": "272", "classes": "Wizard", "notation": "Co:2 > Il:2 > Co:5", "tags": "alter_form, healing, illusion_tag, reveal, summon, utility", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "10 feet", "components": "V, S, M (burning incense worth 10+ GP, which the spell consumes)", "description": "You gain the service of a familiar, a spirit that takes an animal form you choose: Bat, Cat, Frog, Hawk, Lizard, Octopus, Owl, Rat, Raven, Spider, Weasel, or another Beast that has a Challenge Rating of 0. Appearing in an unoccupied space within range, the familiar has the statistics of the chosen form, though it is a Celestial, Fey, or Fiend (your choice) instead of a Beast. Your familiar acts independently of you, but it obeys your commands.\n\nTelepathic Connection. While your familiar is within 100 feet of you, you can communicate with it telepathically. Additionally, as a Bonus Action, you can see through the familiar's eyes and hear what it hears until the start of your next turn, gaining the benefits of any special senses it has.\n\nFinally, when you cast a spell with a range of touch, your familiar can deliver the touch. Your familiar must be within 100 feet of you, and it must take a Reaction to deliver the touch when you cast the spell.\n\nCombat. The familiar is an ally to you and your allies. It rolls its own Initiative and acts on its own turn. A familiar can't attack, but it can take other actions as normal.\n\nDisappearance of the Familiar. When the familiar drops to 0 Hit Points, it disappears. It reappears after you cast this spell again. As a Magic action, you can temporarily dismiss the familiar to a pocket dimension. Alternatively, you can dismiss it forever. As a Magic action while it is temporarily dismissed, you can cause it to reappear in an unoccupied space within 30 feet of you. Whenever the familiar drops to 0 Hit Points or disappears into the pocket dimension, it leaves behind in its space anything it was wearing or carrying.\n\nOne Familiar Only. You can't have more than one familiar at a time. If you cast this spell while you have a familiar, you instead cause it to adopt a new eligible form.", "higher": "", "color": "#e8a040"}, {"name": "Find Greater Steed", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "156", "classes": "", "notation": "Co:5 > Il:2 > Ab:3 > Tr:4 > Ev:5 > Co:3", "tags": "healing, illusion_tag, movement, summon", "duration": "Instantaneous", "cast_time": "10 Min.", "range": "30 feet", "components": "V, S", "description": "You summon a spirit that assumes the form of a loyal, majestic mount. Appearing in an unoccupied space within range, the spirit takes on a form you choose: a griffon, a pegasus, a peryton, a dire wolf, a rhinoceros, or a saber-toothed tiger. The creature has the statistics provided in the Monster Manual for the chosen form, though it is a celestial, a fey, or a fiend (your choice) instead of its normal creature type. Additionally, if it has an Intelligence score of 5 or lower, its Intelligence becomes 6, and it gains the ability to understand one language of your choice that you speak.\n\nYou control the mount in combat. While the mount is within 1 mile of you, you can communicate with it telepathically. While mounted on it, you can make any spell you cast that targets only you also target the mount.\n\nThe mount disappears temporarily when it drops to 0 hit points or when you dismiss it as an action. Casting this spell again re-summons the bonded mount, with all its hit points restored and any conditions removed.\n\nYou can't have more than one mount bonded by this spell or find steed at the same time. As an action, you can release a mount from its bond, causing it to disappear permanently.\n\nWhenever the mount disappears, it leaves behind any objects it was wearing or carrying.\n\nDragonnel Steeds FTD p190[–] With the DM's permission, a paladin can summon a spirit in the form of a dragonnel using the find greater steed spell, which appears in Xanathar's Guide to Everything.", "higher": "", "color": "#e8a040"}, {"name": "Find Steed", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "272", "classes": "Paladin", "notation": "Co:3 > Il:2 > Ab:3 > Co:4", "tags": "barrier, healing, illusion_tag, mind, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You summon an otherworldly being that appears as a loyal steed in an unoccupied space of your choice within range. This creature uses the Otherworldly Steed stat block. If you already have a steed from this spell, the steed is replaced by the new one.\n\nThe steed resembles a Large, rideable animal of your choice, such as a horse, a camel, a dire wolf, or an elk. Whenever you cast the spell, choose the steed's creature type—Celestial, Fey, or Fiend—which determines certain traits in the stat block.\n\nCombat. The steed is an ally to you and your allies. In combat, it shares your Initiative count, and it functions as a controlled mount while you ride it (as defined in the rules on mounted combat). If you have the Incapacitated condition, the steed takes its turn immediately after yours and acts independently, focusing on protecting you.\n\nDisappearance of the Steed. The steed disappears if it drops to 0 Hit Points or if you die. When it disappears, it leaves behind anything it was wearing or carrying. If you cast this spell again, you decide whether you summon the steed that disappeared or a different one.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Find Traps", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "273", "classes": "Cleric, Druid, Ranger", "notation": "Di:3 > Ab:2 > Co:3 > Di:1", "tags": "aoe, barrier, damage, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You sense any trap within range that is within line of sight. A trap, for the purpose of this spell, includes any object or mechanism that was created to cause damage or other danger. Thus, the spell would sense the Alarm or Glyph of Warding spell or a mechanical pit trap, but it wouldn't reveal a natural weakness in the floor, an unstable ceiling, or a hidden sinkhole.\n\nThis spell reveals that a trap is present but not its location. You do learn the general nature of the danger posed by a trap you sense.", "higher": "", "color": "#c8e040"}, {"name": "Find the Path", "level": "Level 6", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "273", "classes": "Bard, Cleric, Druid, Psion", "notation": "Di:2 > Ab:2 > Ev:3 > Co:4 > En:5 > Tr:1 > Il:2 > Di:3", "tags": "concentration, reveal", "duration": "Concentration, up to 1 day", "cast_time": "1 Min.", "range": "Self", "components": "V, S, M (a set of divination tools—such as cards or runes—worth 100+ GP)", "description": "You magically sense the most direct physical route to a location you name. You must be familiar with the location, and the spell fails if you name a destination on another plane of existence, a moving destination (such as a mobile fortress), or an unspecific destination (such as \"a green dragon's lair\").\n\nFor the duration, as long as you are on the same plane of existence as the destination, you know how far it is and in what direction it lies. Whenever you face a choice of paths along the way there, you know which path is the most direct.", "higher": "", "color": "#c8e040"}, {"name": "Finger of Death", "level": "Level 7", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "273", "classes": "Apothecary, Sorcerer, Warlock, Wizard", "notation": "Ne:3 > Tr:2 > Ab:3 > Co:4 > En:5 > Di:1 > Ev:2 > Il:3 > Ne:4", "tags": "barrier, damage, reveal, single_target, undead", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You unleash negative energy toward a creature you can see within range. The target makes a Constitution saving throw, taking 7d8 + 30 Necrotic damage on a failed save or half as much damage on a successful one.\n\nA Humanoid killed by this spell rises at the start of your next turn as a Zombie that follows your verbal orders.", "higher": "", "color": "#a0a0a0"}, {"name": "Fire Bolt", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "274", "classes": "Artificer, Sorcerer, Wizard", "notation": "Ev:1 > Ev:5", "tags": "damage", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You hurl a mote of fire at a creature or an object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 Fire damage. A flammable object hit by this spell starts burning if it isn't being worn or carried.", "higher": "Cantrip Upgrade. The damage increases by 1d10 when you reach levels 5 (2d10), 11 (3d10), and 17 (4d10).", "color": "#e84040"}, {"name": "Fire Shield", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "274", "classes": "Druid, Sorcerer, Tamer, Wizard", "notation": "Ev:5 > Tr:2 > Co:3 > Ab:4 > Di:5 > Ev:4", "tags": "aoe, barrier, damage", "duration": "10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S, M (a bit of phosphorus or a firefly)", "description": "Wispy flames wreathe your body for the duration, shedding Bright Light in a 10-foot radius and Dim Light for an additional 10 feet.\n\nThe flames provide you with a warm shield or a chill shield, as you choose. The warm shield grants you Resistance to Cold damage, and the chill shield grants you Resistance to Fire damage.\n\nIn addition, whenever a creature within 5 feet of you hits you with a melee attack roll, the shield erupts with flame. The attacker takes 2d8 Fire damage from a warm shield or 2d8 Cold damage from a chill shield.", "higher": "", "color": "#e84040"}, {"name": "Fire Storm", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "275", "classes": "Cleric, Druid, Sorcerer", "notation": "Ev:3 > Il:2 > Tr:3 > Co:4 > Di:5 > Ab:1 > En:2 > Ne:3 > Ev:5", "tags": "aoe, damage, illusion_tag, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S", "description": "A storm of fire appears within range. The area of the storm consists of up to ten 10-foot Cubes, which you arrange as you like. Each Cube must be contiguous with at least one other Cube. Each creature in the area makes a Dexterity saving throw, taking 7d10 Fire damage on a failed save or half as much damage on a successful one.\n\nFlammable objects in the area that aren't being worn or carried start burning.", "higher": "", "color": "#e84040"}, {"name": "Fireball", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "274", "classes": "Sorcerer, Wizard", "notation": "Ev:4 > Tr:2 > Co:3 > Di:4 > Ev:1", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a ball of bat guano and sulfur)", "description": "A bright streak flashes from you to a point you choose within range and then blossoms with a low roar into a fiery explosion. Each creature in a 20-foot-radius Sphere centered on that point makes a Dexterity saving throw, taking 8d6 Fire damage on a failed save or half as much damage on a successful one.\n\nFlammable objects in the area that aren't being worn or carried start burning.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 3.", "color": "#e84040"}, {"name": "Fizban's Platinum Shield", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "FTD", "page": "20", "classes": "", "notation": "Ab:2 > Co:2 > Tr:3 > En:4 > Di:5 > Ev:1 > Il:2 > Ab:3", "tags": "barrier, concentration, damage, movement, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "60 feet", "components": "V, S, M (a platinum-plated dragon scale, worth at least 500 gp)", "description": "You create a field of silvery light that surrounds a creature of your choice within range (you can choose yourself). The field sheds dim light out to 5 feet. While surrounded by the field, a creature gains the following benefits:\n\nCover. The creature has half cover.\n\nDamage Resistance. The creature has resistance to acid, cold, fire, lightning, and poison damage.\n\nEvasion. If the creature is subjected to an effect that allows it to make a Dexterity saving throw to take only half damage, the creature instead takes no damage if it succeeds on the saving throw, and only half damage if it fails.\n\nAs a bonus action on subsequent turns, you can move the field to another creature within 60 feet of the field.", "higher": "", "color": "#40c8e0"}, {"name": "Flame Arrows", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "156", "classes": "", "notation": "Tr:4 > Ev:2 > Ab:3 > Co:4 > Tr:1", "tags": "concentration, damage", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You touch a quiver containing arrows or bolts. When a target is hit by a ranged weapon attack using a piece of ammunition drawn from the quiver, the target takes an extra 1d6 fire damage. The spell's magic ends on a piece of ammunition when it hits or misses, and the spell ends when twelve pieces of ammunition have been drawn from the quiver.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, the number of pieces of ammunition you can affect with this spell increases by two for each slot level above 3rd.", "color": "#40e890"}, {"name": "Flame Blade", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "275", "classes": "Druid, Sorcerer", "notation": "Ev:3 > Il:2 > Co:3 > Ev:2", "tags": "alter_form, aoe, concentration, damage, illusion_tag, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Bonus", "range": "Self", "components": "V, S, M (a sumac leaf)", "description": "You evoke a fiery blade in your free hand. The blade is similar in size and shape to a scimitar, and it lasts for the duration. If you let go of the blade, it disappears, but you can evoke it again as a Bonus Action.\n\nAs a Magic action, you can make a melee spell attack with the fiery blade. On a hit, the target takes Fire damage equal to 3d6 plus your spellcasting ability modifier.\n\nThe flaming blade sheds Bright Light in a 10-foot radius and Dim Light for an additional 10 feet.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 2.", "color": "#e84040"}, {"name": "Flame Strike", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "275", "classes": "Cleric", "notation": "Ev:1 > Tr:2 > Co:3 > Di:4 > Ab:5 > En:1 > Ev:3", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a pinch of sulfur)", "description": "A vertical column of brilliant fire roars down from above. Each creature in a 10-foot-radius, 40-foot-high Cylinder centered on a point within range makes a Dexterity saving throw, taking 5d6 Fire damage and 5d6 Radiant damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The Fire damage and the Radiant damage increase by 1d6 for each spell slot level above 5.", "color": "#e84040"}, {"name": "Flaming Sphere", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "275", "classes": "Druid, Sorcerer, Wizard", "notation": "Co:3 > Tr:2 > Ab:3 > Co:5", "tags": "aoe, barrier, concentration, damage, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a ball of wax)", "description": "You create a 5-foot-diameter sphere of fire in an unoccupied space on the ground within range. It lasts for the duration. Any creature that ends its turn within 5 feet of the sphere makes a Dexterity saving throw, taking 2d6 Fire damage on a failed save or half as much damage on a successful one.\n\nAs a Bonus Action, you can move the sphere up to 30 feet, rolling it along the ground. If you move the sphere into a creature's space, that creature makes the save against the sphere, and the sphere stops moving for the turn.\n\nWhen you move the sphere, you can direct it over barriers up to 5 feet tall and jump it across pits up to 10 feet wide. Flammable objects that aren't being worn or carried start burning if touched by the sphere, and it sheds Bright Light in a 20-foot radius and Dim Light for an additional 20 feet.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 2.", "color": "#e8a040"}, {"name": "Flesh to Stone", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "275", "classes": "Apothecary, Druid, Sorcerer, Wizard", "notation": "Tr:2 > Co:2 > En:3 > Di:4 > Ab:5 > Il:1 > Ev:2 > Tr:3", "tags": "alter_form, concentration, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a cockatrice feather)", "description": "You attempt to turn one creature that you can see within range into stone. The target makes a Constitution saving throw. On a failed save, it has the Restrained condition for the duration. On a successful save, its Speed is 0 until the start of your next turn. Constructs automatically succeed on the save.\n\nA Restrained target makes another Constitution saving throw at the end of each of its turns. If it successfully saves against this spell three times, the spell ends. If it fails its saves three times, it is turned to stone and has the Petrified condition for the duration. The successes and failures needn't be consecutive; keep track of both until the target collects three of a kind.\n\nIf you maintain your Concentration on this spell for the entire possible duration, the target is Petrified until the condition is ended by Greater Restoration or similar magic.", "higher": "", "color": "#40e890"}, {"name": "Fly", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "276", "classes": "Artificer, Psion, Sorcerer, Tamer, Warlock, Wizard", "notation": "Tr:4 > Co:2 > Ab:3 > Ev:4 > Tr:3", "tags": "concentration, movement", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a feather)", "description": "You touch a willing creature. For the duration, the target gains a Fly Speed of 60 feet and can hover. When the spell ends, the target falls if it is still aloft unless it can stop the fall.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 3.", "color": "#40e890"}, {"name": "Fog Cloud", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "276", "classes": "Apothecary, Druid, Ranger, Sorcerer, Wizard", "notation": "Co:2 > Ab:2 > Co:1", "tags": "aoe, concentration, summon", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You create a 20-foot-radius Sphere of fog centered on a point within range. The Sphere is Heavily Obscured. It lasts for the duration or until a strong wind (such as one created by Gust of Wind) disperses it.", "higher": "Using a Higher-Level Spell Slot. The fog's radius increases by 20 feet for each spell slot level above 1.", "color": "#e8a040"}, {"name": "Forbiddance", "level": "Level 6", "school": "Abjuration", "ritual": "Yes", "source": "PHB'24", "page": "276", "classes": "Cleric", "notation": "Ab:2 > Ne:2 > Tr:3 > Co:4 > Ev:5 > Di:1 > En:2 > Ab:3", "tags": "aoe, barrier, damage, movement, summon, undead, utility", "duration": "1 day", "cast_time": "10 Min.", "range": "Touch", "components": "V, S, M (ruby dust worth 1,000+ GP)", "description": "You create a ward against magical travel that protects up to 40,000 square feet of floor space to a height of 30 feet above the floor. For the duration, creatures can't teleport into the area or use portals, such as those created by the Gate spell, to enter the area. The spell proofs the area against planar travel, and therefore prevents creatures from accessing the area by way of the Astral Plane, the Ethereal Plane, the Feywild, the Shadowfell, or the Plane Shift spell.\n\nIn addition, the spell damages types of creatures that you choose when you cast it. Choose one or more of the following: Aberrations, Celestials, Elementals, Fey, Fiends, and Undead. When a creature of a chosen type enters the spell's area for the first time on a turn or ends its turn there, the creature takes 5d10 Radiant or Necrotic damage (your choice when you cast this spell).\n\nYou can designate a password when you cast the spell. A creature that speaks the password as it enters the area takes no damage from the spell.\n\nThe spell's area can't overlap with the area of another Forbiddance spell. If you cast Forbiddance every day for 30 days in the same location, the spell lasts until it is dispelled, and the Material components are consumed on the last casting.", "higher": "", "color": "#40c8e0"}, {"name": "Forcecage", "level": "Level 7", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "276", "classes": "Apothecary, Bard, Psion, Warlock, Wizard", "notation": "Ev:3 > Il:2 > Co:3 > Tr:4 > Ab:5 > En:1 > Di:2 > Ne:3 > Ev:4", "tags": "alter_form, aoe, barrier, concentration, damage, illusion_tag, mind, movement", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "100 feet", "components": "V, S, M (ruby dust worth 1,500+ GP, which the spell consumes)", "description": "An immobile, Invisible, Cube-shaped prison composed of magical force springs into existence around an area you choose within range. The prison can be a cage or a solid box, as you choose.\n\nA prison in the shape of a cage can be up to 20 feet on a side and is made from 1/2-inch diameter bars spaced 1/2 inch apart. A prison in the shape of a box can be up to 10 feet on a side, creating a solid barrier that prevents any matter from passing through it and blocking any spells cast into or out from the area.\n\nWhen you cast the spell, any creature that is completely inside the cage's area is trapped. Creatures only partially within the area, or those too large to fit inside it, are pushed away from the center of the area until they are completely outside it.\n\nA creature inside the cage can't leave it by nonmagical means. If the creature tries to use teleportation or interplanar travel to leave, it must first make a Charisma saving throw. On a successful save, the creature can use that magic to exit the cage. On a failed save, the creature doesn't exit the cage and wastes the spell or effect. The cage also extends into the Ethereal Plane, blocking ethereal travel.\n\nThis spell can't be dispelled by Dispel Magic.", "higher": "", "color": "#e84040"}, {"name": "Foresight", "level": "Level 9", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "276", "classes": "Apothecary, Bard, Druid, Psion, Warlock, Wizard", "notation": "Di:5 > En:2 > Ev:3 > Co:4 > Ab:5 > Tr:1 > Il:2 > Ne:3 > En:4 > Ev:5 > Di:3", "tags": "reveal, single_target", "duration": "8 hours", "cast_time": "1 Min.", "range": "Touch", "components": "V, S, M (a hummingbird feather)", "description": "You touch a willing creature and bestow a limited ability to see into the immediate future. For the duration, the target has Advantage on D20 Tests, and other creatures have Disadvantage on attack rolls against it. The spell ends early if you cast it again.", "higher": "", "color": "#c8e040"}, {"name": "Fortune's Favor", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "EGW", "page": "186", "classes": "", "notation": "Di:3 > Tr:2 > Il:3 > Di:4", "tags": "alter_form, reveal, single_target", "duration": "1 hour", "cast_time": "1 Min.", "range": "60 feet", "components": "V, S, M (a white pearl worth at least 100 gp, which the spell consumes)", "description": "You impart latent luck to yourself or one willing creature you can see within range. When the chosen creature makes an attack roll, an ability check, or a saving throw before the spell ends, it can dismiss this spell on itself to roll an additional d20 and choose which of the d20s to use. Alternatively, when an attack roll is made against the chosen creature, it can dismiss this spell on itself to roll a d20 and choose which of the d20s to use, the one it rolled or the one the attacker rolled.\n\nIf the original d20 roll has advantage or disadvantage, the creature rolls the additional d20 after advantage or disadvantage has been applied to the original roll.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.", "color": "#c8e040"}, {"name": "Fount of Moonlight", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "277", "classes": "Bard, Druid", "notation": "Ev:5 > Ab:2 > Co:3 > Di:4 > Tr:5 > Ev:1", "tags": "aoe, barrier, concentration, damage, reveal", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "A cool light wreathes your body for the duration, emitting Bright Light in a 20-foot radius and Dim Light for an additional 20 feet.\n\nUntil the spell ends, you have Resistance to Radiant damage, and your melee attacks deal an extra 2d6 Radiant damage on a hit.\n\nIn addition, immediately after you take damage from a creature you can see within 60 feet of yourself, you can take a Reaction to force the creature to make a Constitution saving throw. On a failed save, the creature has the Blinded condition until the end of your next turn.", "higher": "", "color": "#e84040"}, {"name": "Freedom of Movement", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "277", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Psion, Ranger, Tamer", "notation": "Ab:5 > Tr:2 > Il:3 > Co:4 > Ev:5 > Ab:4", "tags": "alter_form, movement", "duration": "1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a leather strap)", "description": "You touch a willing creature. For the duration, the target's movement is unaffected by Difficult Terrain, and spells and other magical effects can neither reduce the target's Speed nor cause the target to have the Paralyzed or Restrained conditions. The target also has a Swim Speed equal to its Speed.\n\nIn addition, the target can spend 5 feet of movement to automatically escape from nonmagical restraints, such as manacles or a creature imposing the Grappled condition on it.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 4.", "color": "#40c8e0"}, {"name": "Friends", "level": "Cantrip", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "277", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "En:1 > En:2", "tags": "barrier, concentration, damage, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "10 feet", "components": "S, M (some makeup)", "description": "You magically emanate a sense of friendship toward one creature you can see within range. The target must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The target succeeds automatically if it isn't a Humanoid, if you're fighting it, or if you have cast this spell on it within the past 24 hours.\n\nThe spell ends early if the target takes damage or if you make an attack roll, deal damage, or force anyone to make a saving throw. When the spell ends, the target knows it was Charmed by you.", "higher": "", "color": "#c040e8"}, {"name": "Frostbite", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "156", "classes": "", "notation": "Ev:2 > Ev:1", "tags": "damage, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You cause numbing frost to form on one creature that you can see within range. The target must make a Constitution saving throw. On a failed save, the target takes 1d6 cold damage, and it has disadvantage on the next weapon attack roll it makes before the end of its next turn.\n\nThe spell's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).", "higher": "", "color": "#e84040"}, {"name": "Gaseous Form", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "277", "classes": "Apothecary, Sorcerer, Warlock, Wizard", "notation": "Tr:4 > Co:2 > Ab:3 > En:4 > Tr:5", "tags": "alter_form, barrier, concentration, damage, healing, movement, single_target", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a bit of gauze)", "description": "A willing creature you touch shape-shifts, along with everything it's wearing and carrying, into a misty cloud for the duration. The spell ends on the target if it drops to 0 Hit Points or if it takes a Magic action to end the spell on itself.\n\nWhile in this form, the target's only method of movement is a Fly Speed of 10 feet, and it can hover. The target can enter and occupy the space of another creature. The target has Resistance to Bludgeoning, Piercing, and Slashing damage; it has Immunity to the Prone condition; and it has Advantage on Strength, Dexterity, and Constitution saving throws. The target can pass through narrow openings, but it treats liquids as though they were solid surfaces.\n\nThe target can't talk or manipulate objects, and any objects it was carrying or holding can't be dropped, used, or otherwise interacted with. Finally, the target can't attack or cast spells.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 3.", "color": "#40e890"}, {"name": "Gate", "level": "Level 9", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "277", "classes": "Cleric, Sorcerer, Warlock, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > Di:4 > Ab:5 > Ev:1 > En:2 > Ne:3 > Il:4 > Tr:5 > Co:2", "tags": "concentration, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a diamond worth 5,000+ GP)", "description": "You conjure a portal linking an unoccupied space you can see within range to a precise location on a different plane of existence. The portal is a circular opening, which you can make 5 to 20 feet in diameter. You can orient the portal in any direction you choose. The portal lasts for the duration, and the portal's destination is visible through it.\n\nThe portal has a front and a back on each plane where it appears. Travel through the portal is possible only by moving through its front. Anything that does so is instantly transported to the other plane, appearing in the unoccupied space nearest to the portal.\n\nDeities and other planar rulers can prevent portals created by this spell from opening in their presence or anywhere within their domains.\n\nWhen you cast this spell, you can speak the name of a specific creature (a pseudonym, title, or nickname doesn't work). If that creature is on a plane other than the one you are on, the portal opens next to the named creature and transports it to the nearest unoccupied space on your side of the portal. You gain no special power over the creature, and it is free to act as the DM deems appropriate. It might leave, attack you, or help you.", "higher": "", "color": "#e8a040"}, {"name": "Geas", "level": "Level 5", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "278", "classes": "Bard, Cleric, Druid, Paladin, Psion, Tamer, Wizard", "notation": "En:1 > Co:2 > Tr:3 > Di:4 > Il:5 > Ev:1 > En:5", "tags": "damage, mind, movement, reveal, single_target", "duration": "30 days", "cast_time": "1 Min.", "range": "60 feet", "components": "V", "description": "You give a verbal command to a creature that you can see within range, ordering it to carry out some service or refrain from an action or a course of activity as you decide. The target must succeed on a Wisdom saving throw or have the Charmed condition for the duration. The target automatically succeeds if it can't understand your command.\n\nWhile Charmed, the creature takes 5d10 Psychic damage if it acts in a manner directly counter to your command. It takes this damage no more than once each day.\n\nYou can issue any command you choose, short of an activity that would result in certain death. Should you issue a suicidal command, the spell ends.\n\nA Remove Curse, Greater Restoration, or Wish spell ends this spell.", "higher": "Using a Higher-Level Spell Slot. If you use a level 7 or 8 spell slot, the duration is 365 days. If you use a level 9 spell slot, the spell lasts until it is ended by one of the spells mentioned above.", "color": "#c040e8"}, {"name": "Gentle Repose", "level": "Level 2", "school": "Necromancy", "ritual": "Yes", "source": "PHB'24", "page": "278", "classes": "Apothecary, Cleric, Paladin, Wizard", "notation": "Ne:3 > Tr:2 > Ab:3 > Ne:4", "tags": "barrier, undead, utility", "duration": "10 days", "cast_time": "Action", "range": "Touch", "components": "V, S, M (2 Copper Pieces, which the spell consumes)", "description": "You touch a corpse or other remains. For the duration, the target is protected from decay and can't become Undead.\n\nThe spell also effectively extends the time limit on raising the target from the dead, since days spent under the influence of this spell don't count against the time limit of spells such as Raise Dead.", "higher": "", "color": "#a0a0a0"}, {"name": "Giant Insect", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "279", "classes": "Druid", "notation": "Co:5 > Il:2 > Tr:3 > Ab:4 > Di:5 > Co:3", "tags": "concentration, healing, illusion_tag, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You summon a giant centipede, spider, or wasp (chosen when you cast the spell). It manifests in an unoccupied space you can see within range and uses the Giant Insect stat block. The form you choose determines certain details in its stat block. The creature disappears when it drops to 0 Hit Points or when the spell ends.\n\nThe creature is an ally to you and your allies. In combat, the creature shares your Initiative count, but it takes its turn immediately after yours. It obeys your verbal commands (no action required by you). If you don't issue any, it takes the Dodge action and uses its movement to avoid danger.", "higher": "Using a Higher-Level Spell Slot. Use the spell slot's level for the spell's level in the stat block.", "color": "#e8a040"}, {"name": "Gift of Alacrity", "level": "Level 1", "school": "Divination", "ritual": "No", "source": "EGW", "page": "186", "classes": "", "notation": "Di:2 > Tr:2 > Di:5", "tags": "utility", "duration": "8 hours", "cast_time": "1 Min.", "range": "Touch", "components": "V, S", "description": "You touch a willing creature. For the duration, the target can add 1d8 to its initiative rolls.", "higher": "", "color": "#c8e040"}, {"name": "Glibness", "level": "Level 8", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "279", "classes": "Bard, Psion, Warlock", "notation": "En:4 > Tr:2 > Co:3 > Ev:4 > Di:5 > Ab:1 > Il:2 > Ne:3 > Tr:4 > En:1", "tags": "utility", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V", "description": "Until the spell ends, when you make a Charisma check, you can replace the number you roll with a 15. Additionally, no matter what you say, magic that would determine if you are telling the truth indicates that you are being truthful.", "higher": "", "color": "#c040e8"}, {"name": "Globe of Invulnerability", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "279", "classes": "Apothecary, Sorcerer, Wizard", "notation": "Ab:2 > Il:2 > Co:3 > Tr:4 > Ev:5 > Di:1 > En:2 > Ab:1", "tags": "aoe, barrier, concentration, illusion_tag, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a glass bead)", "description": "An immobile, shimmering barrier appears in a 10-foot Emanation around you and remains for the duration.\n\nAny spell of level 5 or lower cast from outside the barrier can't affect anything within it. Such a spell can target creatures and objects within the barrier, but the spell has no effect on them. Similarly, the area within the barrier is excluded from areas of effect created by such spells.", "higher": "Using a Higher-Level Spell Slot. The barrier blocks spells of 1 level higher for each spell slot level above 6.", "color": "#40c8e0"}, {"name": "Glyph of Warding", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "279", "classes": "Apothecary, Artificer, Bard, Cleric, Wizard", "notation": "Ab:4 > Il:2 > Co:3 > Tr:4 > Ab:1", "tags": "aoe, damage, illusion_tag, movement, reveal, summon", "duration": "Until dispelled or triggered", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (powdered diamond worth 200+ GP, which the spell consumes)", "description": "You inscribe a glyph that later unleashes a magical effect. You inscribe it either on a surface (such as a table or a section of floor) or within an object that can be closed (such as a book or chest) to conceal the glyph. The glyph can cover an area no larger than 10 feet in diameter. If the surface or object is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered.\n\nThe glyph is nearly imperceptible and requires a successful Wisdom (Perception) check against your spell save DC to notice.\n\nWhen you inscribe the glyph, you set its trigger and choose whether it's an explosive rune or a spell glyph, as explained below.\n\nSet the Trigger. You decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, common triggers include touching or stepping on the glyph, removing another object covering it, or approaching within a certain distance of it. For glyphs inscribed within an object, common triggers include opening that object or seeing the glyph. Once a glyph is triggered, this spell ends.\n\nYou can refine the trigger so that only creatures of certain types activate it (for example, the glyph could be set to affect Aberrations). You can also set conditions for creatures that don't trigger the glyph, such as those who say a certain password.\n\nExplosive Rune. When triggered, the glyph erupts with magical energy in a 20-foot-radius Sphere centered on the glyph. Each creature in the area makes a Dexterity saving throw. A creature takes 5d8 Acid, Cold, Fire, Lightning, or Thunder damage (your choice when you create the glyph) on a failed save or half as much damage on a successful one.\n\nSpell Glyph. You can store a prepared spell of level 3 or lower in the glyph by casting it as part of creating the glyph. The spell must target a single creature or an area. The spell being stored has no immediate effect when cast in this way.\n\nWhen the glyph is triggered, the stored spell takes effect. If the spell has a target, it targets the creature that triggered the glyph. If the spell affects an area, the area is centered on that creature. If the spell summons Hostile creatures or creates harmful objects or traps, they appear as close as possible to the intruder and attack it. If the spell requires Concentration, it lasts until the end of its full duration.", "higher": "Using a Higher-Level Spell Slot. The damage of an explosive rune increases by 1d8 for each spell slot level above 3. If you create a spell glyph, you can store any spell of up to the same level as the spell slot you use for the Glyph of Warding.", "color": "#40c8e0"}, {"name": "Goodberry", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "280", "classes": "Druid, Ranger", "notation": "Co:2 > Ev:2 > Co:5", "tags": "healing, illusion_tag, summon", "duration": "24 hours", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a sprig of mistletoe)", "description": "Ten berries appear in your hand and are infused with magic for the duration. A creature can take a Bonus Action to eat one berry. Eating a berry restores 1 Hit Point, and the berry provides enough nourishment to sustain a creature for one day.\n\nUneaten berries disappear when the spell ends.", "higher": "", "color": "#e8a040"}, {"name": "Grasping Vine", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "280", "classes": "Druid, Ranger", "notation": "Co:5 > Ab:2 > Tr:3 > Di:4 > Ev:5 > Co:1", "tags": "barrier, concentration, damage, reveal, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "60 feet", "components": "V, S", "description": "You conjure a vine that sprouts from a surface in an unoccupied space that you can see within range. The vine lasts for the duration.\n\nMake a melee spell attack against a creature within 30 feet of the vine. On a hit, the target takes 4d8 Bludgeoning damage and is pulled up to 30 feet toward the vine; if the target is Huge or smaller, it has the Grappled condition (escape DC equal to your spell save DC). The vine can grapple only one creature at a time, and you can cause the vine to release a Grappled creature (no action required).\n\nAs a Bonus Action on your later turns, you can repeat the attack against a creature within 30 feet of the vine.", "higher": "Using a Higher-Level Spell Slot. The number of creatures the vine can grapple increases by one for each spell slot level above 4.", "color": "#e8a040"}, {"name": "Gravity Fissure", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "EGW", "page": "187", "classes": "", "notation": "Ev:2 > Tr:2 > Co:3 > Ab:4 > Di:5 > En:1 > Il:2 > Ev:3", "tags": "aoe, barrier, damage, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a fistful of iron filings)", "description": "You manifest a ravine of gravitational energy in a line originating from you that is 100 feet long and 5 feet wide. Each creature in that line must make a Constitution saving throw, taking 8d8 force damage on a failed save, or half as much damage on a successful one.\n\nEach creature within 10 feet of the line but not in it must succeed on a Constitution saving throw or take 8d8 force damage and be pulled toward the line until the creature is in its area.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 7th level or higher, the damage increases by 1d8 for each slot level above 6th.", "color": "#e84040"}, {"name": "Gravity Sinkhole", "level": "Level 4", "school": "Evocation", "ritual": "No", "source": "EGW", "page": "187", "classes": "", "notation": "Ev:5 > Di:2 > Tr:3 > Co:4 > Ab:5 > Ev:3", "tags": "aoe, barrier, damage, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (a black marble)", "description": "A 20-foot-radius sphere of crushing force forms at a point you can see within range and tugs at the creatures there. Each creature in the sphere must make a Constitution saving throw. On a failed save, the creature takes 5d10 force damage and is pulled in a straight line toward the center of the sphere, ending in an unoccupied space as close to the center as possible (even if that space is in the air). On a successful save, the creature takes half as much damage and isn't pulled.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 5th level or higher, the damage increases by 1d10 for each slot level above 4th.", "color": "#e84040"}, {"name": "Grease", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "280", "classes": "Apothecary, Artificer, Sorcerer, Tamer, Wizard", "notation": "Co:2 > Il:2 > Co:1", "tags": "aoe, illusion_tag, summon", "duration": "1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a bit of pork rind or butter)", "description": "Nonflammable grease covers the ground in a 10-foot square centered on a point within range and turns it into Difficult Terrain for the duration.\n\nWhen the grease appears, each creature standing in its area must succeed on a Dexterity saving throw or have the Prone condition. A creature that enters the area or ends its turn there must also succeed on that save or fall Prone.", "higher": "", "color": "#e8a040"}, {"name": "Greater Invisibility", "level": "Level 4", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "281", "classes": "Bard, Psion, Sorcerer, Tamer, Wizard", "notation": "Il:5 > Ab:2 > Ev:3 > Co:4 > Di:5 > Il:3", "tags": "concentration, illusion_tag", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "A creature you touch has the Invisible condition until the spell ends.", "higher": "", "color": "#4060e8"}, {"name": "Greater Restoration", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "281", "classes": "Apothecary, Artificer, Bard, Cleric, Druid, Paladin, Ranger, Tamer", "notation": "Ab:1 > Tr:2 > Il:3 > En:4 > Co:5 > Ev:1 > Ab:2", "tags": "alter_form, mind, movement", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S, M (diamond dust worth 100+ GP, which the spell consumes)", "description": "You touch a creature and magically remove one of the following effects from it:\n\n1 Exhaustion levelThe Charmed or Petrified conditionA curse, including the target's Attunement to a cursed magic itemAny reduction to one of the target's ability scoresAny reduction to the target's Hit Point maximum", "higher": "", "color": "#40c8e0"}, {"name": "Green-Flame Blade", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "TCE", "page": "107", "classes": "Artificer, Sorcerer, Warlock, Wizard", "notation": "Ev:2 > Ev:3", "tags": "damage, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "S, M (a melee weapon worth at least 1 sp)", "description": "You brandish the weapon used in the spell's casting and make a melee attack with it against one creature within 5 feet of you. On a hit, the target suffers the weapon attack's normal effects, and you can cause green fire to leap from the target to a different creature of your choice that you can see within 5 feet of it. The second creature takes fire damage equal to your spellcasting ability modifier.\n\nThis spell's damage increases when you reach certain levels. At 5th level, the melee attack deals an extra 1d8 fire damage to the target on a hit, and the fire damage to the second creature increases to 1d8 + your spellcasting ability modifier. Both damage rolls increase by 1d8 at 11th level (2d8 and 2d8) and 17th level (3d8 and 3d8).", "higher": "", "color": "#e84040"}, {"name": "Guardian of Faith", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "281", "classes": "Cleric", "notation": "Co:5 > Il:2 > Tr:3 > En:4 > Di:5 > Co:2", "tags": "damage, illusion_tag, movement, reveal, single_target, summon", "duration": "8 hours", "cast_time": "Action", "range": "30 feet", "components": "V", "description": "A Large spectral guardian appears and hovers for the duration in an unoccupied space that you can see within range. The guardian occupies that space and is invulnerable, and it appears in a form appropriate for your deity or pantheon.\n\nAny enemy that moves to a space within 10 feet of the guardian for the first time on a turn or starts its turn there makes a Dexterity saving throw, taking 20 Radiant damage on a failed save or half as much damage on a successful one. The guardian vanishes when it has dealt a total of 60 damage.", "higher": "", "color": "#e8a040"}, {"name": "Guardian of Nature", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "157", "classes": "", "notation": "Tr:5 > Il:2 > Co:3 > Ab:4 > En:5 > Tr:1", "tags": "alter_form, concentration, damage, healing, illusion_tag, movement, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "A nature spirit answers your call and transforms you into a powerful guardian. The transformation lasts until the spell ends. You choose one of the following forms to assume: Primal Beast or Great Tree.\n\nPrimal Beast. Bestial fur covers your body, your facial features become feral, and you gain the following benefits:\n\nYour walking speed increases by 10 feet.You gain darkvision with a range of 120 feet.You make Strength-based attack rolls with advantage.Your melee weapon attacks deal an extra 1d6 force damage on a hit. Great Tree. Your skin appears barky, leaves sprout from your hair, and you gain the following benefits:\n\nYou gain 10 temporary hit points.You make Constitution saving throws with advantage.You make Dexterity- and Wisdom-based attack rolls with advantage.While you are on the ground, the ground within 15 feet of you is difficult terrain for your enemies.", "higher": "", "color": "#40e890"}, {"name": "Guards and Wards", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "282", "classes": "Bard, Wizard", "notation": "Ab:2 > Il:2 > Co:3 > Tr:4 > En:5 > Ev:1 > Di:2 > Ab:3", "tags": "alter_form, aoe, barrier, illusion_tag, mind, summon", "duration": "24 hours", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (a silver rod worth 10+ GP)", "description": "You create a ward that protects up to 2,500 square feet of floor space. The warded area can be up to 20 feet tall, and you shape it as one 50-foot square, one hundred 5-foot squares that are contiguous, or twenty-five 10-foot squares that are contiguous.\n\nWhen you cast this spell, you can specify individuals that are unaffected by the spell's effects. You can also specify a password that, when spoken aloud within 5 feet of the warded area, makes the speaker immune to its effects.\n\nThe spell creates the effects below within the warded area. Dispel Magic has no effect on Guards and Wards itself, but each of the following effects can be dispelled. If all four are dispelled, Guards and Wards ends. If you cast the spell every day for 365 days on the same area, the spell thereafter lasts until all its effects are dispelled.\n\nCorridors. Fog fills all the warded corridors, making them Heavily Obscured. In addition, at each intersection or branching passage offering a choice of direction, there is a 50 percent chance that a creature other than you believes it is going in the opposite direction from the one it chooses.\n\nDoors. All doors in the warded area are magically locked, as if sealed by the Arcane Lock spell. In addition, you can cover up to ten doors with an illusion to make them appear as plain sections of wall.\n\nStairs. Webs fill all stairs in the warded area from top to bottom, as in the Web spell. These strands regrow in 10 minutes if they are destroyed while Guards and Wards lasts.\n\nOther Spell Effect. Place one of the following magical effects within the warded area:\n\nDancing Lights in four corridors, with a simple program that the lights repeat as long as Guards and Wards lastsMagic Mouth in two locationsStinking Cloud in two locations (the vapors return within 10 minutes if dispersed while Guards and Wards lasts)Gust of Wind in one corridor or room (the wind blows continuously while the spell lasts)Suggestion in one 5-foot square; any creature that enters that square receives the suggestion mentally", "higher": "", "color": "#40c8e0"}, {"name": "Guidance", "level": "Cantrip", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "282", "classes": "Apothecary, Artificer, Cleric, Druid, Tamer", "notation": "Di:1 > Di:2", "tags": "concentration", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You touch a willing creature and choose a skill. Until the spell ends, the creature adds 1d4 to any ability check using the chosen skill.", "higher": "", "color": "#c8e040"}, {"name": "Guiding Bolt", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "282", "classes": "Cleric", "notation": "Ev:2 > Tr:2 > Ev:5", "tags": "barrier, damage, single_target", "duration": "1 round", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You hurl a bolt of light toward a creature within range. Make a ranged spell attack against the target. On a hit, it takes 4d6 Radiant damage, and the next attack roll made against it before the end of your next turn has Advantage.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Gust", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "157", "classes": "", "notation": "Tr:1 > Tr:5", "tags": "damage, reveal, single_target, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "You seize the air and compel it to create one of the following effects at a point you can see within range:\n\nOne Medium or smaller creature that you choose must succeed on a Strength saving throw or be pushed up to 5 feet away from you.You create a small blast of air capable of moving one object that is neither held nor carried and that weighs no more than 5 pounds. The object is pushed up to 10 feet away from you. It isn't pushed with enough force to cause damage.You create a harmless sensory effect using air, such as causing leaves to rustle, wind to slam shutters closed, or your clothing to ripple in a breeze.", "higher": "", "color": "#40e890"}, {"name": "Gust of Wind", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "282", "classes": "Druid, Ranger, Sorcerer, Wizard", "notation": "Ev:3 > Co:2 > Tr:3 > Ev:1", "tags": "alter_form, aoe, barrier, concentration, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S, M (a legume seed)", "description": "A Line of strong wind 60 feet long and 10 feet wide blasts from you in a direction you choose for the duration. Each creature in the Line must succeed on a Strength saving throw or be pushed 15 feet away from you in a direction following the Line. A creature that ends its turn in the Line must make the same save.\n\nAny creature in the Line must spend 2 feet of movement for every 1 foot it moves when moving closer to you.\n\nThe gust disperses gas or vapor, and it extinguishes candles and similar unprotected flames in the area. It causes protected flames, such as those of lanterns, to dance wildly and has a 50 percent chance to extinguish them.\n\nAs a Bonus Action on your later turns, you can change the direction in which the Line blasts from you.", "higher": "", "color": "#e84040"}, {"name": "Hail of Thorns", "level": "Level 1", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "283", "classes": "Ranger", "notation": "Co:2 > Ev:2 > Co:4", "tags": "aoe, damage, summon", "duration": "Instantaneous", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "As you hit the creature, this spell creates a rain of thorns that sprouts from your Ranged weapon or ammunition. The target of the attack and each creature within 5 feet of it make a Dexterity saving throw, taking 1d10 Piercing damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 1.", "color": "#e8a040"}, {"name": "Hallow", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "283", "classes": "Cleric", "notation": "Ab:1 > Ne:2 > Tr:3 > Co:4 > En:5 > Il:1 > Ab:4", "tags": "aoe, barrier, damage, mind, movement, summon, undead", "duration": "Until dispelled", "cast_time": "24 Hr.", "range": "Touch", "components": "V, S, M (incense worth 1,000+ GP, which the spell consumes)", "description": "You touch a point and infuse an area around it with holy or unholy power. The area can have a radius up to 60 feet, and the spell fails if the radius includes an area already under the effect of Hallow. The affected area has the following effects.\n\nHallowed Ward. Choose any of these creature types: Aberration, Celestial, Elemental, Fey, Fiend, or Undead. Creatures of the chosen types can't willingly enter the area, and any creature that is possessed by or that has the Charmed or Frightened condition from such creatures isn't possessed, Charmed, or Frightened by them while in the area.\n\nExtra Effect. You bind an extra effect to the area from the list below:\n\nCourage. Creatures of any types you choose can't gain the Frightened condition while in the area.\n\nDarkness. Darkness fills the area. Normal light, as well as magical light created by spells of a level lower than this spell, can't illuminate the area.\n\nDaylight. Bright light fills the area. Magical Darkness created by spells of a level lower than this spell can't extinguish the light.\n\nPeaceful Rest. Dead bodies interred in the area can't be turned into Undead.\n\nExtradimensional Interference. Creatures of any types you choose can't enter or exit the area using teleportation or interplanar travel.\n\nFear. Creatures of any types you choose have the Frightened condition while in the area.\n\nResistance. Creatures of any types you choose have Resistance to one damage type of your choice while in the area.\n\nSilence. No sound can emanate from within the area, and no sound can reach into it.\n\nTongues. Creatures of any types you choose can communicate with any other creature in the area even if they don't share a common language.\n\nVulnerability. Creatures of any types you choose have Vulnerability to one damage type of your choice while in the area.", "higher": "", "color": "#40c8e0"}, {"name": "Hallucinatory Terrain", "level": "Level 4", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "283", "classes": "Bard, Druid, Psion, Warlock, Wizard", "notation": "Il:5 > Tr:2 > Di:3 > Ev:4 > Co:5 > Il:4", "tags": "alter_form, aoe, illusion_tag, reveal", "duration": "24 hours", "cast_time": "10 Min.", "range": "300 feet", "components": "V, S, M (a mushroom)", "description": "You make natural terrain in a 150-foot Cube in range look, sound, and smell like another sort of natural terrain. Thus, open fields or a road can be made to resemble a swamp, hill, crevasse, or some other difficult or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a rock-strewn gully like a wide and smooth road. Manufactured structures, equipment, and creatures within the area aren't changed.\n\nThe tactile characteristics of the terrain are unchanged, so creatures entering the area are likely to notice the illusion. If the difference isn't obvious by touch, a creature examining the illusion can take the Study action to make an Intelligence (Investigation) check against your spell save DC to disbelieve it. If a creature discerns that the terrain is illusory, the creature sees a vague image superimposed on the real terrain.", "higher": "", "color": "#4060e8"}, {"name": "Harm", "level": "Level 6", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "283", "classes": "Apothecary, Cleric", "notation": "Ne:2 > Tr:2 > Il:3 > Di:4 > Ev:5 > En:1 > Co:2 > Ne:5", "tags": "alter_form, damage, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You unleash virulent magic on a creature you can see within range. The target makes a Constitution saving throw. On a failed save, it takes 14d6 Necrotic damage, and its Hit Point maximum is reduced by an amount equal to the Necrotic damage it took. On a successful save, it takes half as much damage only. This spell can't reduce a target's Hit Point maximum below 1.", "higher": "", "color": "#a0a0a0"}, {"name": "Haste", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "284", "classes": "Apothecary, Artificer, Sorcerer, Tamer, Wizard", "notation": "Tr:4 > Co:2 > En:3 > Di:4 > Tr:2", "tags": "concentration, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a shaving of licorice root)", "description": "Choose a willing creature that you can see within range. Until the spell ends, the target's Speed is doubled, it gains a +2 bonus to Armor Class, it has Advantage on Dexterity saving throws, and it gains an additional action on each of its turns. That action can be used to take only the Attack (one attack only), Dash, Disengage, Hide, or Utilize action.\n\nWhen the spell ends, the target is Incapacitated and has a Speed of 0 until the end of its next turn, as a wave of lethargy washes over it.", "higher": "", "color": "#40e890"}, {"name": "Heal", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "284", "classes": "Apothecary, Cleric, Druid", "notation": "Ab:2 > Di:2 > Ev:3 > Tr:4 > Co:5 > En:1 > Il:2 > Ab:5", "tags": "damage, healing, reveal", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "Choose a creature that you can see within range. Positive energy washes through the target, restoring 70 Hit Points. This spell also ends the Blinded, Deafened, and Poisoned conditions on the target.", "higher": "Using a Higher-Level Spell Slot. The healing increases by 10 for each spell slot level above 6.", "color": "#40c8e0"}, {"name": "Healing Spirit", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "XGE", "page": "157", "classes": "", "notation": "Co:3 > Il:2 > Ne:3 > Co:4", "tags": "aoe, concentration, healing, illusion_tag, movement, reveal, summon, undead", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "60 feet", "components": "V, S", "description": "You call forth a nature spirit to soothe the wounded. The intangible spirit appears in a space that is a 5-foot cube you can see within range. The spirit looks like a transparent beast or fey (your choice).\n\nUntil the spell ends, whenever you or a creature you can see moves into the spirit's space for the first time on a turn or starts its turn there, you can cause the spirit to restore 1d6 hit points to that creature (no action required). The spirit can't heal constructs or undead. The spirit can heal a number of times equal to 1 + your spellcasting ability modifier (minimum of twice). After healing that number of times, the spirit disappears.\n\nAs a bonus action on your turn, you can move the spirit up to 30 feet to a space you can see.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 3rd level or higher, the healing increases by 1d6 for each slot level above 2nd.", "color": "#e8a040"}, {"name": "Healing Word", "level": "Level 1", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "284", "classes": "Apothecary, Bard, Cleric, Druid, Tamer", "notation": "Ab:2 > Di:2 > Ab:1", "tags": "healing, reveal", "duration": "Instantaneous", "cast_time": "Bonus", "range": "60 feet", "components": "V", "description": "A creature of your choice that you can see within range regains Hit Points equal to 2d4 plus your spellcasting ability modifier.", "higher": "Using a Higher-Level Spell Slot. The healing increases by 2d4 for each spell slot level above 1.", "color": "#40c8e0"}, {"name": "Heat Metal", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "284", "classes": "Artificer, Bard, Druid, Psion", "notation": "Tr:3 > Di:2 > Ev:3 > Tr:4", "tags": "concentration, damage, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a piece of iron and a flame)", "description": "Choose a manufactured metal object, such as a metal weapon or a suit of Heavy or Medium metal armor, that you can see within range. You cause the object to glow red-hot. Any creature in physical contact with the object takes 2d8 Fire damage when you cast the spell. Until the spell ends, you can take a Bonus Action on each of your later turns to deal this damage again if the object is within range.\n\nIf a creature is holding or wearing the object and takes the damage from it, the creature must succeed on a Constitution saving throw or drop the object if it can. If it doesn't drop the object, it has Disadvantage on attack rolls and ability checks until the start of your next turn.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 2.", "color": "#40e890"}, {"name": "Hellish Rebuke", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "284", "classes": "Warlock", "notation": "Ev:2 > Co:2 > Ev:1", "tags": "damage, single_target", "duration": "Instantaneous", "cast_time": "Reaction", "range": "60 feet", "components": "V, S", "description": "The creature that damaged you is momentarily surrounded by green flames. It makes a Dexterity saving throw, taking 2d10 Fire damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Heroes' Feast", "level": "Level 6", "school": "
