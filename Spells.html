"higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#e8a040"}, {"name": "Ashardalon's Stride", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "FTD", "page": "19", "classes": "", "notation": "Tr:4 > Ev:2 > Co:3 > Ab:4 > Tr:5", "tags": "concentration, damage, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V, S", "description": "The billowing flames of a dragon blast from your feet, granting you explosive speed. For the duration, your speed increases by 20 feet and moving doesn't provoke opportunity attacks.\n\nWhen you move within 5 feet of a creature or an object that isn't being worn or carried, it takes 1d6 fire damage from your trail of heat. A creature or object can take this damage only once during a turn.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, increase your speed by 5 feet for each spell slot level above 3rd. The spell deals an additional 1d6 fire damage for each slot level above 3rd.", "color": "#40e890"}, {"name": "Astral Projection", "level": "Level 9", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "243", "classes": "Apothecary, Cleric, Psion, Warlock, Wizard", "notation": "Ne:5 > Il:2 > Co:3 > Tr:4 > Ab:5 > Ev:1 > Di:2 > En:3 > Il:4 > Co:5 > Ne:3", "tags": "damage, healing, illusion_tag, movement, summon", "duration": "Until dispelled", "cast_time": "1 Hr.", "range": "10 feet", "components": "V, S, M (for each of the spell's targets, one jacinth worth 1,000+ GP and one silver bar worth 100+ GP, all of which the spell consumes)", "description": "You and up to eight willing creatures within range project your astral bodies into the Astral Plane (the spell ends instantly if you are already on that plane). Each target's body is left behind in a state of suspended animation; it has the Unconscious condition, doesn't need food or air, and doesn't age.\n\nA target's astral form resembles its body in almost every way, replicating its game statistics and possessions. The principal difference is the addition of a silvery cord that trails from between the shoulder blades of the astral form. The cord fades from view after 1 foot. If the cord is cut—which happens only when an effect states that it does so—the target's body and astral form both die.\n\nA target's astral form can travel through the Astral Plane. The moment an astral form leaves that plane, the target's body and possessions travel along the silver cord, causing the target to re-enter its body on the new plane.\n\nAny damage or other effects that apply to an astral form have no effect on the target's body and vice versa. If a target's body or astral form drops to 0 Hit Points, the spell ends for that target. The spell ends for all the targets if you take a Magic action to dismiss it.\n\nWhen the spell ends for a target who isn't dead, the target reappears in its body and exits the state of suspended animation.", "higher": "", "color": "#a0a0a0"}, {"name": "Augury", "level": "Level 2", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "244", "classes": "Cleric, Druid, Wizard", "notation": "Di:3 > Tr:2 > Il:3 > Di:2", "tags": "alter_form, utility", "duration": "Instantaneous", "cast_time": "1 Min.", "range": "Self", "components": "V, S, M (specially marked sticks, bones, cards, or other divinatory tokens worth 25+ GP)", "description": "You receive an omen from an otherworldly entity about the results of a course of action that you plan to take within the next 30 minutes. The DM chooses the omen from the Omens table.\n\nOmensOmenFor Results That Will Be...WealGoodWoeBadWeal and woeGood and badIndifferenceNeither good nor badThe spell doesn't account for circumstances, such as other spells, that might change the results.\n\nIf you cast the spell more than once before finishing a Long Rest, there is a cumulative 25 percent chance for each casting after the first that you get no answer.", "higher": "", "color": "#c8e040"}, {"name": "Aura of Life", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "244", "classes": "Cleric, Paladin", "notation": "Ab:5 > Co:2 > Ev:3 > Tr:4 > Il:5 > Ab:1", "tags": "alter_form, barrier, concentration, damage, healing", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V", "description": "An aura radiates from you in a 30-foot Emanation for the duration. While in the aura, you and your allies have Resistance to Necrotic damage, and your Hit Point maximums can't be reduced. If an ally with 0 Hit Points starts its turn in the aura, that ally regains 1 Hit Point.", "higher": "", "color": "#40c8e0"}, {"name": "Aura of Purity", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "244", "classes": "Cleric, Paladin", "notation": "Ab:5 > Co:2 > En:3 > Di:4 > Il:5 > Ab:1", "tags": "barrier, concentration, damage, mind, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V", "description": "An aura radiates from you in a 30-foot Emanation for the duration. While in the aura, you and your allies have Resistance to Poison damage and Advantage on saving throws to avoid or end effects that include the Blinded, Charmed, Deafened, Frightened, Paralyzed, Poisoned, or Stunned condition.", "higher": "", "color": "#40c8e0"}, {"name": "Aura of Vitality", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "244", "classes": "Cleric, Druid, Paladin", "notation": "Ab:4 > Co:2 > Tr:3 > Ev:4 > Ab:2", "tags": "concentration, healing, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V", "description": "An aura radiates from you in a 30-foot Emanation for the duration. When you create the aura and at the start of each of your turns while it persists, you can restore 2d6 Hit Points to one creature in it.", "higher": "", "color": "#40c8e0"}, {"name": "Awaken", "level": "Level 5", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "244", "classes": "Bard, Druid, Psion, Tamer", "notation": "Tr:1 > Co:2 > Ab:3 > Di:4 > En:5 > Il:1 > Tr:5", "tags": "barrier, damage, mind, movement, reveal", "duration": "Instantaneous", "cast_time": "8 Hr.", "range": "Touch", "components": "V, S, M (an agate worth 1,000+ GP, which the spell consumes)", "description": "You spend the casting time tracing magical pathways within a precious gemstone, and then touch the target. The target must be either a Beast or Plant creature with an Intelligence of 3 or less or a natural plant that isn't a creature. The target gains an Intelligence of 10 and the ability to speak one language you know. If the target is a natural plant, it becomes a Plant creature and gains the ability to move its limbs, roots, vines, creepers, and so forth, and it gains senses similar to a human's. The DM chooses statistics appropriate for the awakened Plant, such as the statistics for the Awakened Shrub or Awakened Tree in the Monster Manual.\n\nThe awakened target has the Charmed condition for 30 days or until you or your allies deal damage to it. When that condition ends, the awakened creature chooses its attitude toward you.", "higher": "", "color": "#40e890"}, {"name": "Backlash", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "FRHoF", "page": "142", "classes": "Bard, Sorcerer, Warlock, Wizard", "notation": "Ab:5 > Ev:2 > Tr:3 > En:4 > Di:5 > Ab:3", "tags": "barrier, damage, single_target", "duration": "Instantaneous", "cast_time": "Reaction", "range": "60 feet", "components": "V", "description": "You ward yourself against destructive energy, reducing the damage taken by 4d6 plus your spellcasting ability modifier.\n\nIf the triggering damage was from a creature within range, you can force the creature to make a Constitution saving throw. The creature takes 4d6 Force damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage reduction and Force damage from this spell both increase by 1d6 for every spell slot level above 4.", "color": "#40c8e0"}, {"name": "Bane", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "245", "classes": "Bard, Cleric, Warlock", "notation": "En:2 > Di:2 > En:5", "tags": "concentration, mind, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a drop of blood)", "description": "Up to three creatures of your choice that you can see within range must each make a Charisma saving throw. Whenever a target that fails this save makes an attack roll or a saving throw before the spell ends, the target must subtract 1d4 from the attack roll or save.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Banishing Smite", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "245", "classes": "Paladin", "notation": "Co:1 > Il:2 > Ab:3 > En:4 > Di:5 > Tr:1 > Co:4", "tags": "alter_form, concentration, damage, healing, illusion_tag, mind, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "The target hit by the attack roll takes an extra 5d10 Force damage from the attack. If the attack reduces the target to 50 Hit Points or fewer, the target must succeed on a Charisma saving throw or be transported to a harmless demiplane for the duration. While there, the target has the Incapacitated condition. When the spell ends, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied.", "higher": "", "color": "#e8a040"}, {"name": "Banishment", "level": "Level 4", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "245", "classes": "Cleric, Paladin, Psion, Sorcerer, Warlock, Wizard", "notation": "Ab:5 > Il:2 > En:3 > Di:4 > Co:5 > Ab:4", "tags": "concentration, illusion_tag, mind, reveal, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a pentacle)", "description": "One creature that you can see within range must succeed on a Charisma saving throw or be transported to a harmless demiplane for the duration. While there, the target has the Incapacitated condition. When the spell ends, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied.\n\nIf the target is an Aberration, a Celestial, an Elemental, a Fey, or a Fiend, the target doesn't return if the spell lasts for 1 minute. The target is instead transported to a random location on a plane (DM's choice) associated with its creature type.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 4.", "color": "#40c8e0"}, {"name": "Barkskin", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "245", "classes": "Druid, Ranger, Tamer", "notation": "Tr:3 > Il:2 > Co:3 > Tr:2", "tags": "illusion_tag, summon", "duration": "1 hour", "cast_time": "Bonus", "range": "Touch", "components": "V, S, M (a handful of oak bark)", "description": "You touch a willing creature. Until the spell ends, the target's skin assumes a bark-like appearance, and the target has an Armor Class of 17 if its AC is lower than that.", "higher": "", "color": "#40e890"}, {"name": "Beacon of Hope", "level": "Level 3", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "245", "classes": "Cleric", "notation": "Ab:4 > En:2 > Il:3 > Co:4 > Ab:5", "tags": "concentration, healing, mind, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "Choose any number of creatures within range. For the duration, each target has Advantage on Wisdom saving throws and Death Saving Throws and regains the maximum number of Hit Points possible from any healing.", "higher": "", "color": "#40c8e0"}, {"name": "Beast Bond", "level": "Level 1", "school": "Divination", "ritual": "No", "source": "XGE", "page": "150", "classes": "", "notation": "Di:2 > En:2 > Di:3", "tags": "aoe, concentration, mind, reveal", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Touch", "components": "V, S, M (a bit of fur wrapped in a cloth)", "description": "You establish a telepathic link with one beast you touch that is friendly to you or charmed by you. The spell fails if the beast's Intelligence score is 4 or higher. Until the spell ends, the link is active while you and the beast are within line of sight of each other. Through the link, the beast can understand your telepathic messages to it, and it can telepathically communicate simple emotions and concepts back to you. While the link is active, the beast gains advantage on attack rolls against any creature within 5 feet of you that you can see.", "higher": "", "color": "#c8e040"}, {"name": "Beast Sense", "level": "Level 2", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "245", "classes": "Druid, Ranger", "notation": "Di:3 > Tr:2 > Co:3 > Di:4", "tags": "concentration, reveal, utility", "duration": "Concentration, up to 1 hour", "cast_time": "Action", "range": "Touch", "components": "S", "description": "You touch a willing Beast. For the duration, you can perceive through the Beast's senses as well as your own. When perceiving through the Beast's senses, you benefit from any special senses it has.", "higher": "", "color": "#c8e040"}, {"name": "Befuddlement", "level": "Level 8", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "245", "classes": "Apothecary, Bard, Druid, Psion, Warlock, Wizard", "notation": "En:4 > Ab:2 > Co:3 > Di:4 > Il:5 > Ev:1 > Tr:2 > Ne:3 > Ab:4 > En:1", "tags": "damage, healing, mind, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a key ring with no keys)", "description": "You blast the mind of a creature that you can see within range. The target makes an Intelligence saving throw.\n\nOn a failed save, the target takes 10d12 Psychic damage and can't cast spells or take the Magic action. At the end of every 30 days, the target repeats the save, ending the effect on a success. The effect can also be ended by the Greater Restoration, Heal, or Wish spell.\n\nOn a successful save, the target takes half as much damage only.", "higher": "", "color": "#c040e8"}, {"name": "Bestow Curse", "level": "Level 3", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "246", "classes": "Apothecary, Bard, Cleric, Psion, Wizard", "notation": "Ne:4 > En:2 > Il:3 > Ev:4 > Ne:5", "tags": "concentration, damage, mind, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "You touch a creature, which must succeed on a Wisdom saving throw or become cursed for the duration. Until the curse ends, the target suffers one of the following effects of your choice:\n\nChoose one ability. The target has Disadvantage on ability checks and saving throws made with that ability.The target has Disadvantage on attack rolls against you.In combat, the target must succeed on a Wisdom saving throw at the start of each of its turns or be forced to take the Dodge action on that turn.If you deal damage to the target with an attack roll or a spell, the target takes an extra 1d8 Necrotic damage.", "higher": "Using a Higher-Level Spell Slot. If you cast this spell using a level 4 spell slot, you can maintain Concentration on it for up to 10 minutes. If you use a level 5+ spell slot, the spell doesn't require Concentration, and the duration becomes 8 hours (level 5-6 slot) or 24 hours (level 7-8 slot). If you use a level 9 spell slot, the spell lasts until dispelled.", "color": "#a0a0a0"}, {"name": "Bigby's Hand", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "246", "classes": "Artificer, Sorcerer, Wizard", "notation": "Ev:1 > Co:2 > Tr:3 > Ab:4 > En:5 > Di:1 > Ev:3", "tags": "concentration, damage, healing, movement, reveal, single_target, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "120 feet", "components": "V, S, M (an eggshell and a glove)", "description": "You create a Large hand of shimmering magical energy in an unoccupied space that you can see within range. The hand lasts for the duration, and it moves at your command, mimicking the movements of your own hand.\n\nThe hand is an object that has AC 20 and Hit Points equal to your Hit Point maximum. If it drops to 0 Hit Points, the spell ends. The hand doesn't occupy its space.\n\nWhen you cast the spell and as a Bonus Action on your later turns, you can move the hand up to 60 feet and then cause one of the following effects:\n\nClenched Fist. The hand strikes a target within 5 feet of it. Make a melee spell attack. On a hit, the target takes 5d8 Force damage.\n\nForceful Hand. The hand attempts to push a Huge or smaller creature within 5 feet of it. The target must succeed on a Strength saving throw, or the hand pushes the target up to 5 feet plus a number of feet equal to five times your spellcasting ability modifier. The hand moves with the target, remaining within 5 feet of it.\n\nGrasping Hand. The hand attempts to grapple a Huge or smaller creature within 5 feet of it. The target must succeed on a Dexterity saving throw, or the target has the Grappled condition, with an escape DC equal to your spell save DC. While the hand grapples the target, you can take a Bonus Action to cause the hand to crush it, dealing Bludgeoning damage to the target equal to 4d6 plus your spellcasting ability modifier.\n\nInterposing Hand. The hand grants you Half Cover against attacks and other effects that originate from its space or that pass through it. In addition, its space counts as Difficult Terrain for your enemies.", "higher": "Using a Higher-Level Spell Slot. The damage of the Clenched Fist increases by 2d8 and the damage of the Grasping Hand increases by 2d6 for each spell slot level above 5.", "color": "#e84040"}, {"name": "Blade Barrier", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "247", "classes": "Cleric, Psion", "notation": "Ev:2 > Il:2 > Ab:3 > Co:4 > En:5 > Di:1 > Tr:2 > Ev:4", "tags": "barrier, concentration, damage, illusion_tag, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "90 feet", "components": "V, S", "description": "You create a wall of whirling blades made of magical energy. The wall appears within range and lasts for the duration. You make a straight wall up to 100 feet long, 20 feet high, and 5 feet thick, or a ringed wall up to 60 feet in diameter, 20 feet high, and 5 feet thick. The wall provides Three-Quarters Cover, and its space is Difficult Terrain.\n\nAny creature in the wall's space makes a Dexterity saving throw, taking 6d10 Force damage on a failed save or half as much damage on a successful one. A creature also makes that save if it enters the wall's space or ends it turn there. A creature makes that save only once per turn.", "higher": "", "color": "#e84040"}, {"name": "Blade Ward", "level": "Cantrip", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "247", "classes": "Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Ab:1 > Ab:2", "tags": "concentration, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Whenever a creature makes an attack roll against you before the spell ends, the attacker subtracts 1d4 from the attack roll.", "higher": "", "color": "#40c8e0"}, {"name": "Blade of Disaster", "level": "Level 9", "school": "Conjuration", "ritual": "No", "source": "FRHoF", "page": "143", "classes": "Sorcerer, Warlock, Wizard", "notation": "Co:5 > Il:2 > Tr:3 > Ab:4 > Ev:5 > Di:1 > En:2 > Ne:3 > Il:4 > Tr:5 > Co:1", "tags": "alter_form, barrier, concentration, damage, illusion_tag, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "60 feet", "components": "V, S", "description": "You create a 3-foot-long blade-shaped planar rift that lasts for the duration. The rift appears within range in a space of your choice, and you can immediately make up to two melee spell attacks, each one against a creature or object within 5 feet of the rift. On a hit, the target takes 10d6 Force damage. This attack scores a Critical Hit if the number on the d20 is 18 or higher.\n\nAs a Bonus Action on your later turns, you can move the rift up to 60 feet and repeat the two attacks against a creature or an object within 5 feet of it. You can direct the attacks at the same target or at different ones.\n\nThe blade can harmlessly pass through any barrier, including ones created by spells like Wall of Force.", "higher": "", "color": "#e8a040"}, {"name": "Bless", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "247", "classes": "Cleric, Paladin", "notation": "En:2 > Di:2 > En:3", "tags": "concentration, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S, M (a Holy Symbol worth 5+ GP)", "description": "You bless up to three creatures within range. Whenever a target makes an attack roll or a saving throw before the spell ends, the target adds 1d4 to the attack roll or save.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Blight", "level": "Level 4", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "247", "classes": "Apothecary, Druid, Sorcerer, Warlock, Wizard", "notation": "Ne:5 > Tr:2 > Il:3 > Di:4 > Ev:5 > Ne:1", "tags": "alter_form, damage, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "A creature that you can see within range makes a Constitution saving throw, taking 8d8 Necrotic damage on a failed save or half as much damage on a successful one. A Plant creature automatically fails the save.\n\nAlternatively, target a nonmagical plant that isn't a creature, such as a tree or shrub. It doesn't make a save; it simply withers and dies.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 4.", "color": "#a0a0a0"}, {"name": "Blinding Smite", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "247", "classes": "Paladin", "notation": "Ev:4 > Tr:2 > En:3 > Di:4 > Ev:5", "tags": "damage, single_target", "duration": "1 minute", "cast_time": "Bonus", "range": "Self", "components": "V", "description": "The target hit by the strike takes an extra 3d8 Radiant damage from the attack, and the target has the Blinded condition until the spell ends. At the end of each of its turns, the Blinded target makes a Constitution saving throw, ending the spell on itself on a success.", "higher": "Using a Higher-Level Spell Slot. The extra damage increases by 1d8 for each spell slot level above 3.", "color": "#e84040"}, {"name": "Blindness/Deafness", "level": "Level 2", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "248", "classes": "Apothecary, Bard, Cleric, Sorcerer, Wizard", "notation": "Tr:3 > Di:2 > En:3 > Tr:2", "tags": "reveal, single_target", "duration": "1 minute", "cast_time": "Action", "range": "120 feet", "components": "V", "description": "One creature that you can see within range must succeed on a Constitution saving throw, or it has the Blinded or Deafened condition (your choice) for the duration. At the end of each of its turns, the target repeats the save, ending the spell on itself on a success.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 2.", "color": "#40e890"}, {"name": "Blink", "level": "Level 3", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "248", "classes": "Artificer, Sorcerer, Tamer, Wizard", "notation": "Tr:4 > Di:2 > Il:3 > Co:4 > Tr:3", "tags": "illusion_tag, reveal, summon", "duration": "1 minute", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Roll 1d6 at the end of each of your turns for the duration. On a roll of 4-6, you vanish from your current plane of existence and appear in the Ethereal Plane (the spell ends instantly if you are already on that plane). While on the Ethereal Plane, you can perceive the plane you left, which is cast in shades of gray, but you can't see anything there more than 60 feet away. You can affect and be affected only by other creatures on the Ethereal Plane, and creatures on the other plane can't perceive you unless they have a special ability that lets them perceive things on the Ethereal Plane.\n\nYou return to the other plane at the start of your next turn and when the spell ends if you are on the Ethereal Plane. You return to an unoccupied space of your choice that you can see within 10 feet of the space you left. If no unoccupied space is available within that range, you appear in the nearest unoccupied space.", "higher": "", "color": "#40e890"}, {"name": "Blur", "level": "Level 2", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "248", "classes": "Artificer, Sorcerer, Tamer, Wizard", "notation": "Il:3 > Di:2 > En:3 > Il:1", "tags": "barrier, concentration, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "Self", "components": "V", "description": "Your body becomes blurred. For the duration, any creature has Disadvantage on attack rolls against you. An attacker is immune to this effect if it perceives you with Blindsight or Truesight.", "higher": "", "color": "#4060e8"}, {"name": "Bones of the Earth", "level": "Level 6", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "150", "classes": "", "notation": "Tr:2 > Il:2 > Co:3 > Ab:4 > Di:5 > Ev:1 > En:2 > Tr:4", "tags": "alter_form, aoe, damage, healing, illusion_tag, movement, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You cause up to six pillars of stone to burst from places on the ground that you can see within range. Each pillar is a cylinder that has a diameter of 5 feet and a height of up to 30 feet. The ground where a pillar appears must be wide enough for its diameter, and you can target the ground under a creature if that creature is Medium or smaller. Each pillar has AC 5 and 30 hit points. When reduced to 0 hit points, a pillar crumbles into rubble, which creates an area of difficult terrain with a 10-foot radius that lasts until the rubble is cleared. Each 5-foot-diameter portion of the area requires at least 1 minute to clear by hand.\n\nIf a pillar is created under a creature, that creature must succeed on a Dexterity saving throw or be lifted by the pillar. A creature can choose to fail the save.\n\nIf a pillar is prevented from reaching its full height because of a ceiling or other obstacle, a creature on the pillar takes 6d6 bludgeoning damage and is restrained, pinched between the pillar and the obstacle. The restrained creature can use an action to make a Strength or Dexterity check (the creature's choice) against the spell's save DC. On a success, the creature is no longer restrained and must either move off the pillar or fall off it.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 7th level or higher, you can create two additional pillars for each slot level above 6th.", "color": "#40e890"}, {"name": "Booming Blade", "level": "Cantrip", "school": "Evocation", "ritual": "No", "source": "TCE", "page": "106", "classes": "Artificer, Sorcerer, Warlock, Wizard", "notation": "Ev:1 > Ev:3", "tags": "damage, movement", "duration": "1 round", "cast_time": "Action", "range": "Self", "components": "S, M (a melee weapon worth at least 1 sp)", "description": "You brandish the weapon used in the spell's casting and make a melee attack with it against one creature within 5 feet of you. On a hit, the target suffers the weapon attack's normal effects and then becomes sheathed in booming energy until the start of your next turn. If the target willingly moves 5 feet or more before then, the target takes 1d8 thunder damage, and the spell ends.\n\nThis spell's damage increases when you reach certain levels. At 5th level, the melee attack deals an extra 1d8 thunder damage to the target on a hit, and the damage the target takes for moving increases to 2d8. Both damage rolls increase by 1d8 at 11th level (2d8 and 3d8) and again at 17th level (3d8 and 4d8).", "higher": "", "color": "#e84040"}, {"name": "Borrowed Knowledge", "level": "Level 2", "school": "Divination", "ritual": "No", "source": "SCC", "page": "37", "classes": "Bard, Cleric, Warlock, Wizard", "notation": "Di:3 > Ev:2 > Co:3 > Di:5", "tags": "reveal", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (a book worth at least 25 gp)", "description": "You draw on knowledge from spirits of the past. Choose one skill in which you lack proficiency. For the spell's duration, you have proficiency in the chosen skill. The spell ends early if you cast it again.", "higher": "", "color": "#c8e040"}, {"name": "Burning Hands", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "248", "classes": "Sorcerer, Wizard", "notation": "Ev:2 > Tr:2 > Ev:3", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "A thin sheet of flames shoots forth from you. Each creature in a 15-foot Cone makes a Dexterity saving throw, taking 3d6 Fire damage on a failed save or half as much damage on a successful one.\n\nFlammable objects in the Cone that aren't being worn or carried start burning.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 1.", "color": "#e84040"}, {"name": "Cacophonic Shield", "level": "Level 3", "school": "Evocation", "ritual": "No", "source": "FRHoF", "page": "143", "classes": "Bard, Sorcerer, Wizard", "notation": "Ev:4 > Tr:2 > En:3 > Di:4 > Ev:3", "tags": "barrier, concentration, damage, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "Thunderous reverberations fill a 10-foot Emanation originating from you for the duration. Whenever the Emanation enters a creature's space and whenever a creature enters the Emanation or ends its turn there, the creature makes a Constitution saving throw. On a failed save, the creature takes 3d6 Thunder damage and has the Deafened condition until the start of your next turn. On a successful save, the creature takes half as much damage only. A creature makes this save only once per turn. When you cast this spell, you can designate creatures to be unaffected by it.\n\nIn addition, you have Resistance to Thunder damage, and ranged attack rolls against you are made with Disadvantage.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d6 for each spell slot level above 3.", "color": "#e84040"}, {"name": "Call Lightning", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "248", "classes": "Druid", "notation": "Co:4 > Il:2 > Tr:3 > Di:4 > Co:1", "tags": "alter_form, aoe, concentration, damage, illusion_tag, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "A storm cloud appears at a point within range that you can see above yourself. It takes the shape of a Cylinder that is 10 feet tall with a 60-foot radius.\n\nWhen you cast the spell, choose a point you can see under the cloud. A lightning bolt shoots from the cloud to that point. Each creature within 5 feet of that point makes a Dexterity saving throw, taking 3d10 Lightning damage on a failed save or half as much damage on a successful one.\n\nUntil the spell ends, you can take a Magic action to call down lightning in that way again, targeting the same point or a different one.\n\nIf you're outdoors in a storm when you cast this spell, the spell gives you control over that storm instead of creating a new one. Under such conditions, the spell's damage increases by 1d10.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 3.", "color": "#e8a040"}, {"name": "Calm Emotions", "level": "Level 2", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "249", "classes": "Bard, Cleric, Psion, Tamer", "notation": "En:3 > Ab:2 > Co:3 > En:4", "tags": "aoe, barrier, concentration, damage, mind", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "Each Humanoid in a 20-foot-radius Sphere centered on a point you choose within range must succeed on a Charisma saving throw or be affected by one of the following effects (choose for each creature):\n\nThe creature has Immunity to the Charmed and Frightened conditions until the spell ends. If the creature was already Charmed or Frightened, those conditions are suppressed for the duration.The creature becomes Indifferent about creatures of your choice that it's Hostile toward. This indifference ends if the target takes damage or witnesses its allies taking damage. When the spell ends, the creature's attitude returns to normal.", "higher": "", "color": "#c040e8"}, {"name": "Catapult", "level": "Level 1", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "150", "classes": "", "notation": "Tr:2 > Ev:2 > Tr:5", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "S", "description": "Choose one object weighing 1 to 5 pounds within range that isn't being worn or carried. The object flies in a straight line up to 90 feet in a direction you choose before falling to the ground, stopping early if it impacts against a solid surface. If the object would strike a creature, that creature must make a Dexterity saving throw. On a failed save, the object strikes the target and stops moving. When the object strikes something, the object and what it strikes each take 3d8 bludgeoning damage.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 2nd level or higher, the maximum weight of objects that you can target with this spell increases by 5 pounds, and the damage increases by 1d8, for each slot level above 1st.", "color": "#40e890"}, {"name": "Catnap", "level": "Level 3", "school": "Enchantment", "ritual": "No", "source": "XGE", "page": "151", "classes": "", "notation": "En:4 > Di:2 > Ev:3 > Tr:4 > En:5", "tags": "damage, reveal", "duration": "10 minutes", "cast_time": "Action", "range": "30 feet", "components": "S, M (a pinch of sand)", "description": "You make a calming gesture, and up to three willing creatures of your choice that you can see within range fall unconscious for the spell's duration. The spell ends on a target early if it takes damage or someone uses an action to shake or slap it awake. If a target remains unconscious for the full duration, that target gains the benefit of a short rest, and it can't be affected by this spell again until it finishes a long rest.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 4th level or higher, you can target one additional willing creature for each slot level above 3rd.", "color": "#c040e8"}, {"name": "Cause Fear", "level": "Level 1", "school": "Necromancy", "ritual": "No", "source": "XGE", "page": "151", "classes": "", "notation": "Ne:2 > Tr:2 > Ne:1", "tags": "barrier, concentration, mind, reveal, single_target, undead", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You awaken the sense of mortality in one creature you can see within range. A construct or an undead is immune to this effect. The target must succeed on a Wisdom saving throw or become frightened of you until the spell ends. The frightened target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them.", "color": "#a0a0a0"}, {"name": "Ceremony", "level": "Level 1", "school": "Abjuration", "ritual": "Yes", "source": "XGE", "page": "151", "classes": "", "notation": "Ab:2 > Ne:2 > Ab:3", "tags": "alter_form, healing, single_target, undead, utility", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (25 gp worth of powdered silver, which the spell consumes)", "description": "You perform a special religious ceremony that is infused with magic. When you cast the spell, choose one of the following rites, the target of which must be within 10 feet of you throughout the casting.\n\nAtonement. You touch one willing creature whose alignment has changed, and you make a DC 20 Wisdom (Insight) check. On a successful check, you restore the target to its original alignment.\n\nBless Water. You touch one vial of water and cause it to become holy water.\n\nComing of Age. You touch one humanoid who is a young adult. For the next 24 hours, whenever the target makes an ability check, it can roll a d4 and add the number rolled to the ability check. A creature can benefit from this rite only once.\n\nDedication. You touch one humanoid who wishes to be dedicated to your god's service. For the next 24 hours, whenever the target makes a saving throw, it can roll a d4 and add the number rolled to the save. A creature can benefit from this rite only once.\n\nFuneral Rite. You touch one corpse, and for the next 7 days, the target can't become undead by any means short of a wish spell.\n\nWedding. You touch adult humanoids willing to be bonded together in marriage. For the next 7 days, each target gains a +2 bonus to AC while they are within 30 feet of each other. A creature can benefit from this rite again only if widowed.", "higher": "", "color": "#40c8e0"}, {"name": "Chain Lightning", "level": "Level 6", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "249", "classes": "Apothecary, Sorcerer, Wizard", "notation": "Ev:2 > Di:2 > Tr:3 > En:4 > Ab:5 > Co:1 > Il:2 > Ev:4", "tags": "barrier, damage, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (three silver pins)", "description": "You launch a lightning bolt toward a target you can see within range. Three bolts then leap from that target to as many as three other targets of your choice, each of which must be within 30 feet of the first target. A target can be a creature or an object and can be targeted by only one of the bolts.\n\nEach target makes a Dexterity saving throw, taking 10d8 Lightning damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. One additional bolt leaps from the first target to another target for each spell slot level above 6.", "color": "#e84040"}, {"name": "Chaos Bolt", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "XGE", "page": "151", "classes": "", "notation": "Ev:2 > En:2 > Ev:5", "tags": "damage, mind, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You hurl an undulating, warbling mass of chaotic energy at one creature in range. Make a ranged spell attack against the target. On a hit, the target takes 2d8 + 1d6 damage. Choose one of the d8s. The number rolled on that die determines the attack's damage type, as shown below.\n\nChaos Boltd8Damage Type1Acid2Cold3Fire4Force5Lightning6Poison7Psychic8ThunderIf you roll the same number on both d8s, the chaotic energy leaps from the target to a different creature of your choice within 30 feet of it. Make a new attack roll against the new target, and make a new damage roll, which could cause the chaotic energy to leap again.\n\nA creature can be targeted only once by each casting of this spell.", "higher": "At Higher Levels. When you cast this spell using a spell slot of 2nd level or higher, each target takes 1d6 extra damage of the type rolled for each slot level above 1st.", "color": "#e84040"}, {"name": "Charm Monster", "level": "Level 4", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "249", "classes": "Bard, Druid, Psion, Sorcerer, Warlock, Wizard", "notation": "En:5 > Il:2 > Ev:3 > Tr:4 > Di:5 > En:1", "tags": "damage, mind, reveal, single_target", "duration": "1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "One creature you can see within range makes a Wisdom saving throw. It does so with Advantage if you or your allies are fighting it. On a failed save, the target has the Charmed condition until the spell ends or until you or your allies damage it. The Charmed creature is Friendly to you. When the spell ends, the target knows it was Charmed by you.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 4.", "color": "#c040e8"}, {"name": "Charm Person", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "249", "classes": "Bard, Druid, Psion, Sorcerer, Warlock, Wizard", "notation": "En:2 > Il:2 > En:3", "tags": "damage, mind, reveal, single_target", "duration": "1 hour", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "One Humanoid you can see within range makes a Wisdom saving throw. It does so with Advantage if you or your allies are fighting it. On a failed save, the target has the Charmed condition until the spell ends or until you or your allies damage it. The Charmed creature is Friendly to you. When the spell ends, the target knows it was Charmed by you.", "higher": "Using a Higher-Level Spell Slot. You can target one additional creature for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Chill Touch", "level": "Cantrip", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "249", "classes": "Apothecary, Sorcerer, Warlock, Wizard", "notation": "Ne:1 > Ne:2", "tags": "damage, healing", "duration": "Instantaneous", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "Channeling the chill of the grave, make a melee spell attack against a target within reach. On a hit, the target takes 1d10 Necrotic damage, and it can't regain Hit Points until the end of your next turn.", "higher": "Cantrip Upgrade. The damage increases by 1d10 when you reach levels 5 (2d10), 11 (3d10), and 17 (4d10).", "color": "#a0a0a0"}, {"name": "Chromatic Orb", "level": "Level 1", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "249", "classes": "Sorcerer, Wizard", "notation": "Ev:2 > Tr:2 > Ev:1", "tags": "damage, single_target, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (a diamond worth 50+ GP)", "description": "You hurl an orb of energy at a target within range. Choose Acid, Cold, Fire, Lightning, Poison, or Thunder for the type of orb you create, and then make a ranged spell attack against the target. On a hit, the target takes 3d8 damage of the chosen type.\n\nIf you roll the same number on two or more of the d8s, the orb leaps to a different target of your choice within 30 feet of the target. Make an attack roll against the new target, and make a new damage roll. The orb can't leap again unless you cast the spell with a level 2+ spell slot.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 1. The orb can leap a maximum number of times equal to the level of the slot expended, and a creature can be targeted only once by each casting of this spell.", "color": "#e84040"}, {"name": "Circle of Death", "level": "Level 6", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "250", "classes": "Apothecary, Sorcerer, Warlock, Wizard", "notation": "Ne:2 > Ev:2 > Tr:3 > Co:4 > Di:5 > Ab:1 > En:2 > Ne:3", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (the powder of a crushed black pearl worth 500+ GP)", "description": "Negative energy ripples out in a 60-foot-radius Sphere from a point you choose within range. Each creature in that area makes a Constitution saving throw, taking 8d8 Necrotic damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 2d8 for each spell slot level above 6.", "color": "#a0a0a0"}, {"name": "Circle of Power", "level": "Level 5", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "250", "classes": "Artificer, Cleric, Paladin, Wizard", "notation": "Ab:1 > Ev:2 > Tr:3 > En:4 > Di:5 > Co:1 > Ab:3", "tags": "concentration, damage, single_target", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V", "description": "An aura radiates from you in a 30-foot Emanation for the duration. While in the aura, you and your allies have Advantage on saving throws against spells and other magical effects. When an affected creature makes a saving throw against a spell or magical effect that allows a save to take only half damage, it takes no damage if it succeeds on the save.", "higher": "", "color": "#40c8e0"}, {"name": "Clairvoyance", "level": "Level 3", "school": "Divination", "ritual": "No", "source": "PHB'24", "page": "250", "classes": "Bard, Cleric, Psion, Sorcerer, Wizard", "notation": "Di:4 > Ab:2 > Il:3 > Co:4 > Di:1", "tags": "concentration, illusion_tag, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "10 Min.", "range": "1 mile", "components": "V, S, M (a focus worth 100+ GP, either a jeweled horn for hearing or a glass eye for seeing)", "description": "You create an Invisible sensor within range in a location familiar to you (a place you have visited or seen before) or in an obvious location that is unfamiliar to you (such as behind a door, around a corner, or in a grove of trees). The intangible, invulnerable sensor remains in place for the duration.\n\nWhen you cast the spell, choose seeing or hearing. You can use the chosen sense through the sensor as if you were in its space. As a Bonus Action, you can switch between seeing and hearing.\n\nA creature that sees the sensor (such as a creature benefiting from See Invisibility or Truesight) sees a luminous orb about the size of your fist.", "higher": "", "color": "#c8e040"}, {"name": "Clone", "level": "Level 8", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "251", "classes": "Apothecary, Wizard", "notation": "Ne:4 > Tr:2 > Ev:3 > Co:4 > Di:5 > Ab:1 > En:2 > Il:3 > Tr:4 > Ne:5", "tags": "undead", "duration": "Instantaneous", "cast_time": "1 Hr.", "range": "Touch", "components": "V, S, M (a diamond worth 1,000+ GP, which the spell consumes, and a sealable vessel worth 2,000+ GP that is large enough to hold the creature being cloned)", "description": "You touch a creature or at least 1 cubic inch of its flesh. An inert duplicate of that creature forms inside the vessel used in the spell's casting and finishes growing after 120 days; you choose whether the finished clone is the same age as the creature or younger. The clone remains inert and endures indefinitely while its vessel remains undisturbed.\n\nIf the original creature dies after the clone finishes forming, the creature's soul transfers to the clone if the soul is free and willing to return. The clone is physically identical to the original and has the same personality, memories, and abilities, but none of the original's equipment. The creature's original remains, if any, become inert and can't be revived, since the creature's soul is elsewhere.", "higher": "", "color": "#a0a0a0"}, {"name": "Cloud of Daggers", "level": "Level 2", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "251", "classes": "Bard, Sorcerer, Warlock, Wizard", "notation": "Co:3 > Tr:2 > Ev:3 > Co:2", "tags": "aoe, concentration, damage, movement, summon", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a sliver of glass)", "description": "You conjure spinning daggers in a 5-foot Cube centered on a point within range. Each creature in that area takes 4d4 Slashing damage. A creature also takes this damage if it enters the Cube or ends its turn there or if the Cube moves into its space. A creature takes this damage only once per turn.\n\nOn your later turns, you can take a Magic action to teleport the Cube up to 30 feet.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 2d4 for each spell slot level above 2.", "color": "#e8a040"}, {"name": "Cloudkill", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "251", "classes": "Apothecary, Sorcerer, Wizard", "notation": "Co:1 > Tr:2 > Ev:3 > Ab:4 > Di:5 > En:1 > Co:3", "tags": "aoe, concentration, damage, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "120 feet", "components": "V, S", "description": "You create a 20-foot-radius Sphere of yellow-green fog centered on a point within range. The fog lasts for the duration or until strong wind (such as the one created by Gust of Wind) disperses it, ending the spell. Its area is Heavily Obscured.\n\nEach creature in the Sphere makes a Constitution saving throw, taking 5d8 Poison damage on a failed save or half as much damage on a successful one. A creature must also make this save when the Sphere moves into its space and when it enters the Sphere or ends its turn there. A creature makes this save only once per turn.\n\nThe Sphere moves 10 feet away from you at the start of each of your turns.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 5.", "color": "#e8a040"}, {"name": "Color Spray", "level": "Level 1", "school": "Illusion", "ritual": "No", "source": "PHB'24", "page": "251", "classes": "Bard, Sorcerer, Wizard", "notation": "Il:2 > Ev:2 > Il:3", "tags": "aoe", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a pinch of colorful sand)", "description": "You launch a dazzling array of flashing, colorful light. Each creature in a 15-foot Cone originating from you must succeed on a Constitution saving throw or have the Blinded condition until the end of your next turn.", "higher": "", "color": "#4060e8"}, {"name": "Command", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "251", "classes": "Bard, Cleric, Paladin, Psion", "notation": "En:2 > Co:2 > En:3", "tags": "barrier, mind, movement, reveal, single_target", "duration": "Instantaneous", "cast_time": "Action", "range": "60 feet", "components": "V", "description": "You speak a one-word command to a creature you can see within range. The target must succeed on a Wisdom saving throw or follow the command on its next turn. Choose the command from these options:\n\nApproach. The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you.\n\nDrop. The target drops whatever it is holding and then ends its turn.\n\nFlee. The target spends its turn moving away from you by the fastest available means.\n\nGrovel. The target has the Prone condition and then ends its turn.\n\nHalt. On its turn, the target doesn't move and takes no action or Bonus Action.", "higher": "Using a Higher-Level Spell Slot. You can affect one additional creature for each spell slot level above 1.", "color": "#c040e8"}, {"name": "Commune", "level": "Level 5", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "251", "classes": "Cleric", "notation": "Di:1 > Tr:2 > Co:3 > Ev:4 > Ab:5 > En:1 > Di:2", "tags": "reveal, utility", "duration": "1 minute", "cast_time": "1 Min.", "range": "Self", "components": "V, S, M (incense)", "description": "You contact a deity or a divine proxy and ask up to three questions that can be answered with yes or no. You must ask your questions before the spell ends. You receive a correct answer for each question.\n\nDivine beings aren't necessarily omniscient, so you might receive \"unclear\" as an answer if a question pertains to information that lies beyond the deity's knowledge. In a case where a one-word answer could be misleading or contrary to the deity's interests, the DM might offer a short phrase as an answer instead.\n\nIf you cast the spell more than once before finishing a Long Rest, there is a cumulative 25 percent chance for each casting after the first that you get no answer.", "higher": "", "color": "#c8e040"}, {"name": "Commune with Nature", "level": "Level 5", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "252", "classes": "Druid, Ranger", "notation": "Di:1 > Ne:2 > Tr:3 > Ev:4 > Co:5 > Ab:1 > Di:3", "tags": "aoe, reveal, undead, utility", "duration": "1 minute", "cast_time": "1 Min.", "range": "Self", "components": "V, S", "description": "You commune with nature spirits and gain knowledge of the surrounding area. In the outdoors, the spell gives you knowledge of the area within 3 miles of you. In caves and other natural underground settings, the radius is limited to 300 feet. The spell doesn't function where nature has been replaced by construction, such as in castles and settlements.\n\nChoose three of the following facts; you learn those facts as they pertain to the spell's area:\n\nLocations of settlementsLocations of portals to other planes of existenceLocation of one Challenge Rating 10+ creature (DM's choice) that is a Celestial, an Elemental, a Fey, a Fiend, or an UndeadThe most prevalent kind of plant, mineral, or Beast (you choose which to learn)Locations of bodies of waterFor example, you could determine the location of a powerful monster in the area, the locations of bodies of water, and the locations of any towns.", "higher": "", "color": "#c8e040"}, {"name": "Compelled Duel", "level": "Level 1", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "252", "classes": "Paladin", "notation": "En:2 > Co:2 > En:4", "tags": "concentration, damage, mind, movement, reveal, single_target", "duration": "Concentration, up to 1 minute", "cast_time": "Bonus", "range": "30 feet", "components": "V", "description": "You try to compel a creature into a duel. One creature that you can see within range makes a Wisdom saving throw. On a failed save, the target has Disadvantage on attack rolls against creatures other than you, and it can't willingly move to a space that is more than 30 feet away from you.\n\nThe spell ends if you make an attack roll against a creature other than the target, if you cast a spell on an enemy other than the target, if an ally of yours damages the target, or if you end your turn more than 30 feet away from the target.", "higher": "", "color": "#c040e8"}, {"name": "Comprehend Languages", "level": "Level 1", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "252", "classes": "Apothecary, Bard, Psion, Sorcerer, Warlock, Wizard", "notation": "Di:2 > Tr:2 > Di:4", "tags": "reveal, utility", "duration": "1 hour", "cast_time": "Action", "range": "Self", "components": "V, S, M (a pinch of soot and salt)", "description": "For the duration, you understand the literal meaning of any language that you hear or see signed. You also understand any written language that you see, but you must be touching the surface on which the words are written. It takes about 1 minute to read one page of text. This spell doesn't decode symbols or secret messages.", "higher": "", "color": "#c8e040"}, {"name": "Compulsion", "level": "Level 4", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "252", "classes": "Bard, Psion", "notation": "En:5 > Co:2 > Tr:3 > Di:4 > Il:5 > En:4", "tags": "aoe, concentration, mind, movement, reveal", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "30 feet", "components": "V, S", "description": "Each creature of your choice that you can see within range must succeed on a Wisdom saving throw or have the Charmed condition until the spell ends.\n\nFor the duration, you can take a Bonus Action to designate a direction that is horizontal to you. Each Charmed target must use as much of its movement as possible to move in that direction on its next turn, taking the safest route. After moving in this way, a target repeats the save, ending the spell on itself on a success.", "higher": "", "color": "#c040e8"}, {"name": "Cone of Cold", "level": "Level 5", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "253", "classes": "Druid, Sorcerer, Wizard", "notation": "Ev:1 > Tr:2 > Co:3 > Di:4 > Ab:5 > En:1 > Ev:2", "tags": "aoe, damage", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a small crystal or glass cone)", "description": "You unleash a blast of cold air. Each creature in a 60-foot Cone originating from you makes a Constitution saving throw, taking 8d8 Cold damage on a failed save or half as much damage on a successful one. A creature killed by this spell becomes a frozen statue until it thaws.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 5.", "color": "#e84040"}, {"name": "Confusion", "level": "Level 4", "school": "Enchantment", "ritual": "No", "source": "PHB'24", "page": "253", "classes": "Bard, Druid, Psion, Sorcerer, Wizard", "notation": "En:5 > Il:2 > Co:3 > Tr:4 > Ev:5 > En:1", "tags": "aoe, concentration, mind, movement", "duration": "Concentration, up to 1 minute", "cast_time": "Action", "range": "90 feet", "components": "V, S, M (three nut shells)", "description": "Each creature in a 10-foot-radius Sphere centered on a point you choose within range must succeed on a Wisdom saving throw, or that target can't take Bonus Actions or Reactions and must roll 1d10 at the start of each of its turns to determine its behavior for that turn, consulting the table below.\n\n1d10Behavior for the Turn1The target doesn't take an action, and it uses all its movement to move. Roll 1d4 for the direction: 1, north; 2, east; 3, south; or 4, west.2-6The target doesn't move or take actions.7-8The target doesn't move, and it takes the Attack action to make one melee attack against a random creature within reach. If none are within reach, the target takes no action.9-10The target chooses its behavior.At the end of each of its turns, an affected target repeats the save, ending the spell on itself on a success.", "higher": "Using a Higher-Level Spell Slot. The Sphere's radius increases by 5 feet for each spell slot level above 4.", "color": "#c040e8"}, {"name": "Conjure Animals", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "254", "classes": "Druid, Ranger", "notation": "Co:4 > Il:2 > Tr:3 > En:4 > Co:5", "tags": "concentration, damage, illusion_tag, movement, reveal, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You conjure nature spirits that appear as a Large pack of spectral, intangible animals in an unoccupied space you can see within range. The pack lasts for the duration, and you choose the spirits' animal form, such as wolves, serpents, or birds.\n\nYou have Advantage on Strength saving throws while you're within 5 feet of the pack, and when you move on your turn, you can also move the pack up to 30 feet to an unoccupied space you can see.\n\nWhenever the pack moves within 10 feet of a creature you can see and whenever a creature you can see enters a space within 10 feet of the pack or ends its turn there, you can force that creature to make a Dexterity saving throw. On a failed save, the creature takes 3d10 Slashing damage. A creature makes this save only once per turn.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d10 for each spell slot level above 3.", "color": "#e8a040"}, {"name": "Conjure Barrage", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "254", "classes": "Ranger", "notation": "Co:4 > Il:2 > Ab:3 > Tr:4 > Co:5", "tags": "aoe, barrier, damage, illusion_tag, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "Self", "components": "V, S, M (a Melee or Ranged weapon worth at least 1 CP)", "description": "You brandish the weapon used to cast the spell and conjure similar spectral weapons (or ammunition appropriate to the weapon) that launch forward and then disappear. Each creature of your choice that you can see in a 60-foot Cone makes a Dexterity saving throw, taking 5d8 Force damage on a failed save or half as much damage on a successful one.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 3.", "color": "#e8a040"}, {"name": "Conjure Celestial", "level": "Level 7", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "254", "classes": "Cleric", "notation": "Co:3 > Tr:2 > Ab:3 > Di:4 > Ev:5 > En:1 > Il:2 > Ne:3 > Co:1", "tags": "aoe, concentration, damage, healing, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "90 feet", "components": "V, S", "description": "You conjure a spirit from the Upper Planes, which manifests as a pillar of light in a 10-foot-radius, 40-foot-high Cylinder centered on a point within range. For each creature you can see in the Cylinder, choose which of these lights shines on it:\n\nHealing Light. The target regains Hit Points equal to 4d12 plus your spellcasting ability modifier.\n\nSearing Light. The target makes a Dexterity saving throw, taking 6d12 Radiant damage on a failed save or half as much damage on a successful one.\n\nUntil the spell ends, Bright Light fills the Cylinder, and when you move on your turn, you can also move the Cylinder up to 30 feet.\n\nWhenever the Cylinder moves into the space of a creature you can see and whenever a creature you can see enters the Cylinder or ends its turn there, you can bathe it in one of the lights. A creature can be affected by this spell only once per turn.", "higher": "Using a Higher-Level Spell Slot. The healing and damage increase by 1d12 for each spell slot level above 7.", "color": "#e8a040"}, {"name": "Conjure Constructs", "level": "Level 3", "school": "Conjuration", "ritual": "No", "source": "FRHoF", "page": "143", "classes": "Wizard", "notation": "Co:4 > Il:2 > Tr:3 > Ab:4 > Co:2", "tags": "barrier, concentration, damage, healing, illusion_tag, movement, reveal, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S, M (a brass cog)", "description": "You conjure a group of intangible, orderly spirits that appear as a Medium group of modrons or other Constructs in an unoccupied space you can see within range. The spirits last for the duration. When you cast this spell and as a Magic action on subsequent turns, you can command the spirits to target one creature or object you can see within 5 feet of the spirits and create one of the following effects:\n\nClockwork Force. The target makes a Dexterity saving throw, taking 3d6 Force damage on a failed save or half as much damage on a successful one.\n\nOrderly Ward. The target gains Temporary Hit Points equal to 1d6 plus your spellcasting ability modifier.\n\nWhen you move on your turn, you can also move the spirits up to 30 feet to an unoccupied space you can see.", "higher": "Using a Higher-Level Spell Slot. The damage and Temporary Hit Points both increase by 1d6 for each spell slot level above 3.", "color": "#e8a040"}, {"name": "Conjure Elemental", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "254", "classes": "Druid, Wizard", "notation": "Co:1 > Il:2 > En:3 > Di:4 > Tr:5 > Ev:1 > Co:3", "tags": "concentration, damage, illusion_tag, reveal, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You conjure a Large, intangible spirit from the Elemental Planes that appears in an unoccupied space within range. Choose the spirit's element, which determines its damage type: air (Lightning), earth (Thunder), fire (Fire), or water (Cold). The spirit lasts for the duration.\n\nWhenever a creature you can see enters the spirit's space or starts its turn within 5 feet of the spirit, you can force that creature to make a Dexterity saving throw if the spirit has no creature Restrained. On failed save, the target takes 8d8 damage of the spirit's type, and the target has the Restrained condition until the spell ends. At the start of each of its turns, the Restrained target repeats the save. On a failed save, the target takes 4d8 damage of the spirit's type. On a successful save, the target isn't Restrained by the spirit.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 5.", "color": "#e8a040"}, {"name": "Conjure Fey", "level": "Level 6", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "255", "classes": "Druid", "notation": "Co:2 > Il:2 > Tr:3 > Di:4 > En:5 > Ev:1 > Ab:2 > Co:4", "tags": "concentration, damage, illusion_tag, mind, movement, reveal, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "60 feet", "components": "V, S", "description": "You conjure a Medium spirit from the Feywild in an unoccupied space you can see within range. The spirit lasts for the duration, and it looks like a Fey creature of your choice. When the spirit appears, you can make one melee spell attack against a creature within 5 feet of it. On a hit, the target takes Psychic damage equal to 3d12 plus your spellcasting ability modifier, and the target has the Frightened condition until the start of your next turn, with both you and the spirit as the source of the fear.\n\nAs a Bonus Action on your later turns, you can teleport the spirit to an unoccupied space you can see within 30 feet of the space it left and make the attack against a creature within 5 feet of it.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d12 for each spell slot level above 6.", "color": "#e8a040"}, {"name": "Conjure Minor Elementals", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "255", "classes": "Druid, Wizard", "notation": "Co:5 > Ev:2 > Tr:3 > Ab:4 > Di:5 > Co:1", "tags": "concentration, damage, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You conjure spirits from the Elemental Planes that flit around you in a 15-foot Emanation for the duration. Until the spell ends, any attack you make deals an extra 2d8 damage when you hit a creature in the Emanation. This damage is Acid, Cold, Fire, or Lightning (your choice when you make the attack).\n\nIn addition, the ground in the Emanation is Difficult Terrain for your enemies.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 4.", "color": "#e8a040"}, {"name": "Conjure Volley", "level": "Level 5", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "255", "classes": "Ranger", "notation": "Co:1 > Il:2 > Tr:3 > Di:4 > Ev:5 > Ab:1 > Co:2", "tags": "aoe, damage, illusion_tag, reveal, summon", "duration": "Instantaneous", "cast_time": "Action", "range": "150 feet", "components": "V, S, M (a Melee or Ranged weapon worth at least 1 CP)", "description": "You brandish the weapon used to cast the spell and choose a point within range. Hundreds of similar spectral weapons (or ammunition appropriate to the weapon) fall in a volley and then disappear. Each creature of your choice that you can see in a 40-foot-radius, 20-foot-high Cylinder centered on that point makes a Dexterity saving throw. A creature takes 8d8 Force damage on a failed save or half as much damage on a successful one.", "higher": "", "color": "#e8a040"}, {"name": "Conjure Woodland Beings", "level": "Level 4", "school": "Conjuration", "ritual": "No", "source": "PHB'24", "page": "255", "classes": "Druid, Ranger", "notation": "Co:5 > En:2 > Di:3 > Tr:4 > Il:5 > Co:2", "tags": "concentration, damage, mind, reveal, single_target, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "Self", "components": "V, S", "description": "You conjure nature spirits that flit around you in a 10-foot Emanation for the duration. Whenever the Emanation enters the space of a creature you can see and whenever a creature you can see enters the Emanation or ends its turn there, you can force that creature to make a Wisdom saving throw. The creature takes 5d8 Force damage on a failed save or half as much damage on a successful one. A creature makes this save only once per turn.\n\nIn addition, you can take the Disengage action as a Bonus Action for the spell's duration.", "higher": "Using a Higher-Level Spell Slot. The damage increases by 1d8 for each spell slot level above 4.", "color": "#e8a040"}, {"name": "Contact Other Plane", "level": "Level 5", "school": "Divination", "ritual": "Yes", "source": "PHB'24", "page": "255", "classes": "Apothecary, Psion, Warlock, Wizard", "notation": "Di:1 > En:2 > Tr:3 > Co:4 > Il:5 > Ev:1 > Di:5", "tags": "damage, mind, reveal, single_target, utility", "duration": "1 minute", "cast_time": "1 Min.", "range": "Self", "components": "V", "description": "You mentally contact a demigod, the spirit of a long-dead sage, or some other knowledgeable entity from another plane. Contacting this otherworldly intelligence can break your mind. When you cast this spell, make a DC 15 Intelligence saving throw. On a successful save, you can ask the entity up to five questions. You must ask your questions before the spell ends. The DM answers each question with one word, such as \"yes,\" \"no,\" \"maybe,\" \"never,\" \"irrelevant,\" or \"unclear\" (if the entity doesn't know the answer to the question). If a one-word answer would be misleading, the DM might instead offer a short phrase as an answer.\n\nOn a failed save, you take 6d6 Psychic damage and have the Incapacitated condition until you finish a Long Rest. A Greater Restoration spell cast on you ends this effect.", "higher": "", "color": "#c8e040"}, {"name": "Contagion", "level": "Level 5", "school": "Necromancy", "ritual": "No", "source": "PHB'24", "page": "256", "classes": "Cleric, Druid", "notation": "Ne:1 > Ev:2 > Tr:3 > En:4 > Di:5 > Co:1 > Ne:5", "tags": "damage, single_target", "duration": "7 days", "cast_time": "Action", "range": "Touch", "components": "V, S", "description": "Your touch inflicts a magical contagion. The target must succeed on a Constitution saving throw or take 11d8 Necrotic damage and have the Poisoned condition. Also, choose one ability when you cast the spell. While Poisoned, the target has Disadvantage on saving throws made with the chosen ability.\n\nThe target must repeat the saving throw at the end of each of its turns until it gets three successes or failures. If the target succeeds on three of these saves, the spell ends on the target. If the target fails three of the saves, the spell lasts for 7 days on it.\n\nWhenever the Poisoned target receives an effect that would end the Poisoned condition, the target must succeed on a Constitution saving throw, or the Poisoned condition doesn't end on it.", "higher": "", "color": "#a0a0a0"}, {"name": "Contingency", "level": "Level 6", "school": "Abjuration", "ritual": "No", "source": "PHB'24", "page": "256", "classes": "Wizard", "notation": "Ab:2 > Tr:2 > Co:3 > Ev:4 > Di:5 > En:1 > Il:2 > Ab:4", "tags": "utility", "duration": "10 days", "cast_time": "10 Min.", "range": "Self", "components": "V, S, M (a gem-encrusted statuette of yourself worth 1,500+ GP)", "description": "Choose a spell of level 5 or lower that you can cast, that has a casting time of an action, and that can target you. You cast that spell—called the contingent spell—as part of casting Contingency, expending spell slots for both, but the contingent spell doesn't come into effect. Instead, it takes effect when a certain trigger occurs. You describe that trigger when you cast the two spells. For example, a Contingency cast with Water Breathing might stipulate that Water Breathing comes into effect when you are engulfed in water or a similar liquid.\n\nThe contingent spell takes effect immediately after the trigger occurs for the first time, whether or not you want it to, and then Contingency ends.\n\nThe contingent spell takes effect only on you, even if it can normally target others. You can use only one Contingency spell at a time. If you cast this spell again, the effect of another Contingency spell on you ends. Also, Contingency ends on you if its material component is ever not on your person.", "higher": "", "color": "#40c8e0"}, {"name": "Continual Flame", "level": "Level 2", "school": "Evocation", "ritual": "No", "source": "PHB'24", "page": "256", "classes": "Artificer, Cleric, Druid, Wizard", "notation": "Ev:3 > Co:2 > Tr:3 > Ev:4", "tags": "aoe, summon", "duration": "Until dispelled", "cast_time": "Action", "range": "Touch", "components": "V, S, M (ruby dust worth 50+ GP, which the spell consumes)", "description": "A flame springs from an object that you touch. The effect casts Bright Light in a 20-foot radius and Dim Light for an additional 20 feet. It looks like a regular flame, but it creates no heat and consumes no fuel. The flame can be covered or hidden but not smothered or quenched.", "higher": "", "color": "#e84040"}, {"name": "Control Flames", "level": "Cantrip", "school": "Transmutation", "ritual": "No", "source": "XGE", "page": "152", "classes": "", "notation": "Tr:1 > Tr:2", "tags": "alter_form, aoe, illusion_tag, reveal, summon", "duration": "Instantaneous or 1 hour (see below)", "cast_time": "Action", "range": "60 feet", "components": "S", "description": "You choose nonmagical flame that you can see within range and that fits within a 5-foot cube. You affect it in one of the following ways:\n\nYou instantaneously expand the flame 5 feet in one direction, provided that wood or other fuel is present in the new location.You instantaneously extinguish the flames within the cube.You double or halve the area of bright light and dim light cast by the flame, change its color, or both. The change lasts for 1 hour.You cause simple shapes—such as the vague form of a creature, an inanimate object, or a location—to appear within the flames and animate as you like. The shapes last for 1 hour.If you cast this spell multiple times, you can have up to three non-instantaneous effects created by it active at a time, and you can dismiss such an effect as an action.", "higher": "", "color": "#40e890"}, {"name": "Control Water", "level": "Level 4", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "256", "classes": "Cleric, Druid, Tamer, Wizard", "notation": "Tr:5 > Co:2 > Ab:3 > Ev:4 > Di:5 > Tr:2", "tags": "aoe, barrier, concentration, damage, healing, movement, summon", "duration": "Concentration, up to 10 minutes", "cast_time": "Action", "range": "300 feet", "components": "V, S, M (a mixture of water and dust)", "description": "Until the spell ends, you control any water inside an area you choose that is a Cube up to 100 feet on a side, using one of the following effects. As a Magic action on your later turns, you can repeat the same effect or choose a different one.\n\nFlood. You cause the water level of all standing water in the area to rise by as much as 20 feet. If you choose an area in a large body of water, you instead create a 20-foot tall wave that travels from one side of the area to the other and then crashes. Any Huge or smaller vehicles in the wave's path are carried with it to the other side. Any Huge or smaller vehicles struck by the wave have a 25 percent chance of capsizing.\n\nThe water level remains elevated until the spell ends or you choose a different effect. If this effect produced a wave, the wave repeats on the start of your next turn while the flood effect lasts.\n\nPart Water. You part water in the area and create a trench. The trench extends across the spell's area, and the separated water forms a wall to either side. The trench remains until the spell ends or you choose a different effect. The water then slowly fills in the trench over the course of the next round until the normal water level is restored.\n\nRedirect Flow. You cause flowing water in the area to move in a direction you choose, even if the water has to flow over obstacles, up walls, or in other unlikely directions. The water in the area moves as you direct it, but once it moves beyond the spell's area, it resumes its flow based on the terrain. The water continues to move in the direction you chose until the spell ends or you choose a different effect.\n\nWhirlpool. You cause a whirlpool to form in the center of the area, which must be at least 50 feet square and 25 feet deep. The whirlpool lasts until you choose a different effect or the spell ends. The whirlpool is 5 feet wide at the base, up to 50 feet wide at the top, and 25 feet tall. Any creature in the water and within 25 feet of the whirlpool is pulled 10 feet toward it. When a creature enters the whirlpool for the first time on a turn or ends its turn there, it makes a Strength saving throw. On a failed save, the creature takes 2d8 Bludgeoning damage. On a successful save, the creature takes half as much damage. A creature can swim away from the whirlpool only if it first takes an action to pull away and succeeds on a Strength (Athletics) check against your spell save DC.", "higher": "", "color": "#40e890"}, {"name": "Control Weather", "level": "Level 8", "school": "Transmutation", "ritual": "No", "source": "PHB'24", "page": "257", "classes": "Cleric, Druid, Wizard", "notation": "Tr:4 > Il:2 > Ev:3 > Ab:4 > Co:5 > Di:1 > En:2 > Ne:3 > Il:4 > Tr:3", "tags": "alter_form, concentration, damage", "duration": "Concentration, up to 8 hours", "cast_time": "10 Min.", "range": "Self", "components": "V, S, M (burning incense)", "description": "You take control of the weather within 5 miles of you for the duration. You must be outdoors to cast this spell, and it ends early if you go indoors.\n\nWhen you cast the spell, you change the current weather conditions, which are determined by the DM. You can change precipitation, temper
