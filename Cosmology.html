<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cosmos of Dorenia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --gold-bright: #e8c97a;
    --parchment: #f0e6c8;
    --void: #05040f;
    --deep: #080618;
    --inner: #0d0b24;
    --outer: #060412;
    --divide-color: #c9a84c;
    --text-glow: rgba(201,168,76,0.4);
  }

  body {
    background: var(--void);
    font-family: 'Cinzel', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    user-select: none;
  }

  body.dragging { cursor: grabbing; }

  #canvas-wrap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #world {
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: 0 0;
  }

  svg#cosmos {
    position: absolute;
    top: 0; left: 0;
    overflow: visible;
    pointer-events: none;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
    max-width: 280px;
  }

  #tooltip.visible { opacity: 1; }

  .tt-inner {
    background: rgba(5,4,15,0.95);
    border: 1px solid var(--gold-dim);
    padding: 14px 18px;
    position: relative;
  }

  .tt-inner::before, .tt-inner::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--gold);
    border-style: solid;
  }
  .tt-inner::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .tt-inner::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .tt-title {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold-bright);
    font-size: 11px;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .tt-ruler {
    font-family: 'Cinzel', serif;
    color: var(--gold-dim);
    font-size: 9px;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    font-style: italic;
  }

  .tt-body {
    font-family: 'Crimson Text', serif;
    color: #d4c9a8;
    font-size: 12px;
    line-height: 1.6;
  }

  /* ── Title overlay ── */
  #title-overlay {
    position: fixed;
    top: 32px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 50;
  }

  #title-overlay h1 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold-bright);
    font-size: 22px;
    letter-spacing: 0.25em;
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 0 60px rgba(201,168,76,0.2);
  }

  #title-overlay p {
    font-family: 'Crimson Text', serif;
    color: var(--gold-dim);
    font-size: 12px;
    letter-spacing: 0.3em;
    margin-top: 4px;
  }

  /* ── Zoom controls ── */
  #controls {
    position: fixed;
    bottom: 32px; right: 32px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }

  .ctrl-btn {
    width: 36px; height: 36px;
    background: rgba(5,4,15,0.9);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    transition: border-color 0.2s, color 0.2s;
  }

  .ctrl-btn:hover { border-color: var(--gold-bright); color: var(--gold-bright); }

  #hint {
    position: fixed;
    bottom: 32px; left: 32px;
    font-family: 'Crimson Text', serif;
    color: var(--gold-dim);
    font-size: 11px;
    letter-spacing: 0.1em;
    z-index: 50;
    opacity: 0.7;
  }

  /* ── Date Panel ── */
  #date-panel {
    position: fixed;
    top: 100px; left: 32px;
    z-index: 50;
    background: rgba(5,4,15,0.92);

    content: '';

    border-color: var(--gold);

    align-items: center;

    font-family: 'Cinzel', serif;
    color: var(--gold-dim);
    font-size: 8px;
    letter-spacing: 0.12em;

// ═══════════════════════════════════════════════
//  AELORIAN CALENDAR & ORBITAL DATE SYSTEM
// ═══════════════════════════════════════════════

const MONTH_NAMES = ['Iquaris','Shantaris','Datharis','Bosith','Zanath','Kralth',
                'Shirin','Dorin','Suldin','Thomar','Lockhar','Hosar'];
const TODAY = { day: 17, month: 9, year: 1189 };

// The Dividing: 120-day intercalary, every 238 years, offset -1 → first at year 237
const DIVIDING_INTERVAL = 238;
const DIVIDING_OFFSET   = -1;  // (interval + offset) % interval = first year
const DIVIDING_LENGTH   = 120;

function isDividingYear(year) {
  return year % DIVIDING_INTERVAL === ((DIVIDING_INTERVAL + DIVIDING_OFFSET) % DIVIDING_INTERVAL);
}

// Returns true if the current absDay falls inside a Dividing period
// Month 13 = The Dividing (days 1–120 after the 12 regular months of a dividing year)
function isInDividing(day, month, year) {
  return month === 13 && isDividingYear(year);
}

// Convert Aelorian date to absolute day count, matching Calendar.html logic.
// month is 1-indexed (1=Iquaris … 12=Hosar, 13=The Dividing)
function aelorianToAbsDay(day, month, year) {
  const dpy = 360; // 12 months × 30 days
  let abs = (year - 1) * dpy;
  // Add Dividing days for all completed dividing years before this one
  const firstDiv = DIVIDING_INTERVAL + DIVIDING_OFFSET; // = 237
  for (let y = firstDiv; y < year; y += DIVIDING_INTERVAL) abs += DIVIDING_LENGTH;
  if (month === 13) {
    // Inside The Dividing — after the 12 regular months
    abs += dpy + (day - 1);
  } else {
    abs += (month - 1) * 30 + (day - 1);
  }
  return abs;
}

// Reverse: absolute day → Aelorian date
function absToAelorian(absDay) {
  const dpy = 360; // 12 months × 30 days
  const firstDiv = DIVIDING_INTERVAL + DIVIDING_OFFSET; // 237
  let year = 1;
  let rem  = absDay;
  // Step through years, accounting for Dividing years
  while (true) {
    const yearLen = dpy + (isDividingYear(year) ? DIVIDING_LENGTH : 0);
    if (rem < yearLen) break;
    rem -= yearLen;
    year++;
  }
  // rem is now 0-indexed days within this year
  let month, day;
  if (rem >= dpy && isDividingYear(year)) {
    // In The Dividing intercalary period
    month = 13;
    day   = rem - dpy + 1;
  } else {
    month = Math.floor(rem / 30) + 1;
    day   = (rem % 30) + 1;
  }
  return { day, month, year };
}

// Orbital day: strips Dividing-period days from absDay so orbits don't
// accumulate extra angle during The Dividing intercalary period.
function orbitalAngle(totalDays, cycle, offset) {
  return ((totalDays / cycle) * 360 + offset) % 360;
}

// Quantum Moon visibility hash — copied exactly as specified
function quantumVisible(absDay, moon) {
  var h = 0, s = moon.id || '';
  for (var i = 0; i < s.length; i++) h = ((h * 31) + s.charCodeAt(i)) & 0xFFFFFFFF;
  h = (absDay ^ h) & 0xFFFFFFFF;
  h = (((h ^ (h >>> 16)) * 0x45d9f3b) & 0xFFFFFFFF);
  h = (((h ^ (h >>> 16)) * 0x45d9f3b) & 0xFFFFFFFF);
  h = ((h ^ (h >>> 16)) >>> 0);
  var dice = moon.quantumDice || 100;
  return (h % dice) === 0;
}

// Orbital data keyed by plane id
const ORBITAL_DATA = {
  aeloria:     { cycle: 360,     offset: 0       },
  mun:         { cycle: 30,      offset: 0       },
  interoculus: { cycle: 30,      offset: 180     }, // opposite Mun by default, position from quantumVisible
  comet:       { cycle: 1800,    offset: 11.843123 },
  heavens:     { cycle: 360,     offset: 90      },
  hells:       { cycle: 360,     offset: 270     },
  feywild:     { cycle: 360,     offset: 123.456 },
  forge:       { cycle: 3600,    offset: 336     },
  vertaei:     { cycle: 565.49,  offset: 9.87654321 },
  mechanus:    { cycle: Math.PI * 100 * 360, offset: Math.PI },  // hour hand: 1 rev per PI*100 years; midnight = Great Modron March
  wayfarer:       { cycle: 348,   offset: 38  },
  'positive-ring':{ cycle: 400,   offset: 0   },  // always opposing negative ring
  'negative-ring':{ cycle: 400,   offset: 180 },  // same cycle as positive, 180° offset = always opposing
};

// State
let currentAbsDay = aelorianToAbsDay(TODAY.day, TODAY.month, TODAY.year);
let astrumVisible = false;
let animating = false;
let animRaf = null;
let animSpeed = 1; // days per frame

// ── Comet: parametric position on tilted ellipse ──
// The ellipse is centred at COMET_CX,COMET_CY, semi-axes A×B, tilted by COMET_ANGLE.
// angle 0 → perihelion side (t=0), angle 180 → aphelion side (t=PI)
function cometPosFromAngle(angleDeg) {
  // Map 0–360 orbital angle to parametric t (0–2PI)
  const t = (angleDeg % 360) * Math.PI / 180;
  const lx = COMET_A * Math.cos(t);
  const ly = COMET_B * Math.sin(t);
  return {
    x: COMET_CX + lx * Math.cos(COMET_ANGLE) - ly * Math.sin(COMET_ANGLE),
    y: COMET_CY + lx * Math.sin(COMET_ANGLE) + ly * Math.cos(COMET_ANGLE),
  };
}

// Compute all plane positions for a given absolute day
function computePositions(absDay) {
  const toRad = d => d * Math.PI / 180;

  // ── Aeloria's orbital angle ──
  // Aeloria's year is 360 days. Using orbitalAngle with cycle=360 from ORBITAL_DATA.
  const aelAngle = orbitalAngle(absDay, ORBITAL_DATA.aeloria.cycle, ORBITAL_DATA.aeloria.offset);

  const ael = PLANES.find(p => p.id === 'aeloria');
  ael.orbitAngle = aelAngle;
  ael.x = Math.cos(toRad(aelAngle)) * ael.orbitR;
  ael.y = Math.sin(toRad(aelAngle)) * ael.orbitR;
  AEL_X_live = ael.x;
  AEL_Y_live = ael.y;

  // Mun orbits Aeloria — uses absDay directly so it keeps moving during The Dividing
  const munAngle = orbitalAngle(absDay, ORBITAL_DATA.mun.cycle, ORBITAL_DATA.mun.offset);
  const mun = PLANES.find(p => p.id === 'mun');
  mun.x = ael.x + MUN_R * Math.cos(toRad(munAngle));
  mun.y = ael.y + MUN_R * Math.sin(toRad(munAngle));

  // Astrum Inter-Oculus orbits Aeloria — same
  const io = PLANES.find(p => p.id === 'interoculus');
  astrumVisible = quantumVisible(Math.floor(absDay), io);
  io._visible = astrumVisible;
  const ioAngle = orbitalAngle(absDay, ORBITAL_DATA.mun.cycle, ORBITAL_DATA.mun.offset + 137.5);
  io.x = ael.x + MUN_R * Math.cos(toRad(ioAngle));
  io.y = ael.y + MUN_R * Math.sin(toRad(ioAngle));

  // Comet orbits on ellipse — also uses absDay
  const cometAngle = orbitalAngle(absDay, ORBITAL_DATA.comet.cycle, ORBITAL_DATA.comet.offset);
  const comet = PLANES.find(p => p.id === 'comet');
  const cp = cometPosFromAngle(cometAngle);
  comet.x = cp.x;
  comet.y = cp.y;

  // Sol-orbiting planes — also absDay
  ['heavens','hells','feywild','forge','vertaei','mechanus','wayfarer','positive-ring','negative-ring'].forEach(id => {
    const p = PLANES.find(pl => pl.id === id);
    if (!p || !ORBITAL_DATA[id]) return;
    const ang = orbitalAngle(absDay, ORBITAL_DATA[id].cycle, ORBITAL_DATA[id].offset);
    p.orbitAngle = ang;
    p.x = Math.cos(toRad(ang)) * p.orbitR;
    p.y = Math.sin(toRad(ang)) * p.orbitR;
  });
}

let AEL_X_live = 0;

const R_OUTER_OUTER = 950;
const R_COSMOS_DIVIDE = 820; // boundary between inner astral sea (all planes) and Far Realm

// Elemental Ring — concentric band close to Sol, divided into 8 segments
const ELEM_R_INNER = 58;   // inner radius of ring
const ELEM_R_OUTER = 78;  // outer radius of ring
// 8 segments: Fire, Magma, Earth, Ooze, Water, Ice, Air, Ash (clockwise from bottom)
// Elemental ring: 16 segments in classical cosmological order.
// Main planes (fire/earth/water/air) + para-elemental (magma/ooze/ice/smoke)
// + quasi-elemental (lightning/vacuum/salt/dust/steam/minerals/radiance/ash).
// Segments alternate: main(30°) → quasi(15°) → para(30°) → quasi(15°) → ...
// Total: 4×(30+15+30+15) = 4×90 = 360°. Starting angle: Fire at top-ish.
//
// Classical layout (clockwise from Fire):
// Fire(30) → Lightning(15) → Air(30) → Vacuum(15) →
// Air done; next pair: Air→Water via Ice side
// Actually standard layout:
// Fire(30°) → Lightning(15°) → Air(30°) → Vacuum(15°) →
// [wrap to next quadrant]
// We use the classic wheel: Fire-top, Earth-right, Water-bottom, Air-left
// Para: Magma(Fire+Earth), Ooze(Earth+Water), Ice(Water+Air), Smoke/Ash(Air+Fire)
// Quasi (between para and main):
//   Lightning(Fire+Air side), Vacuum(Air+Water side... no)
// Classical quasi order: Radiance(near+Fire), Lightning(Fire+Air), Static(Air)
// Let's use the standard D&D arrangement:
// Starting at 247.5° (fire position), going clockwise in 22.5° steps:
// Fire, Magma, Earth, Ooze, Water, Ice, Air, Smoke(Ash)  — these are the 8 we had
// For 16: insert quasi between each pair:
// Fire(22.5) → Lightning(11.25) → Smoke/Ash(22.5) → Vacuum(11.25) →
// Air(22.5) → Ice(11.25) → Water(22.5) → Steam(11.25) →
// ...etc
// Standard D&D cosmological wheel (clockwise):
// FIRE → [Lightning] → AIR → [Vacuum] → [Negative] → AIR side
// Proper: Fire-Magma-Earth-Ooze-Water-Ice-Air-Lightning back to Fire
// With quasi inserted: Fire→Lightning→Air→Vacuum→(gap)→Air→Minerals→Earth→...
// Let's just use the clean standard arrangement:
// 8 half-segments (22.5° each) with quasi filling the 11.25° gaps

const ELEM_MAIN_DEG  = 22.5;  // main plane segment width
const ELEM_QUASI_DEG = 11.25; // quasi-elemental segment width (half of main)
// Total: 8 × (22.5 + 11.25) = 8 × 33.75 = 270° — doesn't add up.
// Better: 4 main (30°) + 4 para (22.5°) + 8 quasi (11.25°) = 120+90+90 = 300°. Still off.
// Simplest clean approach: 16 equal segments of 22.5° each.
// Alternate main(opaque) / quasi(subtle) for visual distinction.

const SEG = 22.5; // degrees per segment
const ELEM_SEGMENTS = (() => {
  // Classical D&D cosmological wheel (clockwise):
  // Each major plane is flanked by its para-elemental neighbours,
  // with quasi-elemental planes filling the gaps between para and major.
  //
  // FIRE → [Smoke] → AIR → [Vacuum] → [Ice] → WATER → [Steam] → [Ooze] → EARTH → [Dust] → [Magma] → FIRE
  // Quasi between: Radiance(Fire/Positive), Lightning(Fire/Air)
  //
  // Full 16-step clockwise wheel starting at Fire:
  // Fire, Lightning, Air, Vacuum, Ice, Water, Steam, Ooze, Earth, Dust, Magma, Ash/Smoke, [+4 quasi]
  // Classical exact order (16 segments × 22.5°):
  const segs = [
    { name:'Plane of Fire',      color1:'#c84010', color2:'#ff8030', label:'FIRE',      major:true  }, // major
    { name:'Plane of Magma',     color1:'#8a2800', color2:'#c85020', label:'MAGMA',     major:false }, // para: Fire+Earth
    { name:'Plane of Earth',     color1:'#5a3a18', color2:'#8a6030', label:'EARTH',     major:true  }, // major
    { name:'Plane of Dust',      color1:'#706050', color2:'#a09070', label:'DUST',      major:false }, // quasi: Earth→Negative
    { name:'Plane of Ash',       color1:'#404040', color2:'#707070', label:'ASH',       major:false }, // quasi: Earth→Air
    { name:'Plane of Salt',      color1:'#c0b898', color2:'#e0d8c8', label:'SALT',      major:false }, // quasi: Earth→Water
    { name:'Plane of Ooze',      color1:'#3a4a18', color2:'#6a7828', label:'OOZE',      major:false }, // para: Earth+Water
    { name:'Plane of Water',     color1:'#104878', color2:'#2880c0', label:'WATER',     major:true  }, // major
    { name:'Plane of Ice',       color1:'#285878', color2:'#80c8e8', label:'ICE',       major:false }, // para: Water+Air
    { name:'Plane of Steam',     color1:'#507068', color2:'#90c0b8', label:'STEAM',     major:false }, // quasi: Water→Fire
    { name:'Plane of Minerals',  color1:'#508050', color2:'#80c080', label:'MINERALS',  major:false }, // quasi: Water→Earth
    { name:'Plane of Air',       color1:'#304858', color2:'#a0c8e0', label:'AIR',       major:true  }, // major
    { name:'Plane of Vacuum',    color1:'#080812', color2:'#141830', label:'VACUUM',    major:false }, // quasi: Air→Negative
    { name:'Plane of Lightning', color1:'#6060e0', color2:'#b0c0ff', label:'LIGHTNING', major:false }, // quasi: Air+Fire
    { name:'Plane of Smoke',     color1:'#282830', color2:'#505060', label:'SMOKE',     major:false }, // para: Air+Fire
    { name:'Plane of Radiance',  color1:'#d8c840', color2:'#fff8a0', label:'RADIANCE',  major:false }, // quasi: Fire→Positive
  ];
  segs.forEach((s, i) => { s.startDeg = 247.5 + i * 22.5; });
  return segs;
})();


// ── Static orbital constants ──
const R_AELORIA_ORBIT = 310; // matches aeloria orbitR
const MUN_R = 62;

// Comet orbit — Aeloria sits at one FOCUS of the ellipse.
const COMET_A     = 530;
const COMET_B     = 495;
const COMET_C     = Math.sqrt(COMET_A*COMET_A - COMET_B*COMET_B); // ~300
const COMET_ANGLE = 55 * Math.PI / 180;

// Comet ellipse centre is offset from Aeloria's default position (angle 0)
// We keep this relative to the Aeloria reference position for perihelion/aphelion markers
const AEL_REF_X = Math.cos(0) * R_AELORIA_ORBIT;
const AEL_REF_Y = Math.sin(0) * R_AELORIA_ORBIT;

const COMET_CX = AEL_REF_X - COMET_C * Math.cos(COMET_ANGLE);
const COMET_CY = AEL_REF_Y - COMET_C * Math.sin(COMET_ANGLE);

const PERIHELION = {
  x: COMET_CX + COMET_A * Math.cos(COMET_ANGLE),
  y: COMET_CY + COMET_A * Math.sin(COMET_ANGLE),
};
const APHELION = {
  x: COMET_CX - COMET_A * Math.cos(COMET_ANGLE),
  y: COMET_CY - COMET_A * Math.sin(COMET_ANGLE),
};

// AEL_X / AEL_Y — convenience aliases into the live globals (used in draw functions)

function getAelY() { return PLANES.find(p=>p.id==='aeloria').y; }

const svg = document.getElementById('cosmos');
const NS  = 'http://www.w3.org/2000/svg';

function el(tag, attrs={}, parent=null) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}

function makeNoise(id, freq=0.65, oct=4) {
  const f = el('feTurbulence', { type:'fractalNoise', baseFrequency:freq, numOctaves:oct, result:'noise' });
  const d = el('feDiffuseLighting', { in:'noise', lightingColor:'white', surfaceScale:'1.5', result:'light' });
  const p = el('fePointLight', { x:'50%', y:'50%', z:'200' });
  d.appendChild(p);
  const b = el('feBlend', { in:'SourceGraphic', in2:'light', mode:'multiply' });
  const filt = el('filter', { id, x:'-20%', y:'-20%', width:'140%', height:'140%' });
  filt.append(f,d,b);
  return filt;
}

//  BUILD SCENE

function buildScene() {
  // Update all plane positions for the current date before drawing
  computePositions(currentAbsDay);
  // Always hide tooltip on redraw — animation destroys old elements mid-hover
  hideTooltip();

  svg.innerHTML = '';

  const defs = el('defs', {}, svg);

  // Radial background gradient
  const bgGrad = el('radialGradient', { id:'bgGrad', cx:'50%', cy:'50%', r:'60%', gradientUnits:'userSpaceOnUse',
    cx: '0', cy: '0', r: '700' }, defs);
  [ ['0%','#0d0b24'], ['40%','#080618'], ['75%','#060412'], ['100%','#030209'] ]
    .forEach(([o,c]) => el('stop', {offset:o,'stop-color':c}, bgGrad));

  // Glow filters
  const glowFilt = el('filter', {id:'glow', x:'-50%',y:'-50%',width:'200%',height:'200%'}, defs);
  const fe1 = el('feGaussianBlur', {stdDeviation:'6', result:'blur'}, glowFilt);
  const fe2 = el('feMerge', {}, glowFilt);
  el('feMergeNode', {in:'blur'}, fe2);
  el('feMergeNode', {in:'SourceGraphic'}, fe2);

  const softGlow = el('filter', {id:'softGlow', x:'-100%',y:'-100%',width:'300%',height:'300%'}, defs);
  el('feGaussianBlur', {stdDeviation:'18', result:'blur'}, softGlow);
  const sm2 = el('feMerge', {}, softGlow);
  el('feMergeNode', {in:'blur'}, sm2);
  el('feMergeNode', {in:'SourceGraphic'}, sm2);

  const divideGlow = el('filter', {id:'divideGlow', x:'-20%',y:'-20%',width:'140%',height:'140%'}, defs);
  el('feGaussianBlur', {stdDeviation:'3', result:'blur'}, divideGlow);
  const dg2 = el('feMerge', {}, divideGlow);
  el('feMergeNode', {in:'blur'}, dg2);
  el('feMergeNode', {in:'SourceGraphic'}, dg2);

  const solGlow = el('filter', {id:'solGlow', x:'-200%',y:'-200%',width:'500%',height:'500%'}, defs);
  el('feGaussianBlur', {stdDeviation:'22'}, solGlow);

  // ── Background rect ──
  el('rect', {x:'-5000',y:'-5000',width:'10000',height:'10000', fill:'url(#bgGrad)'}, svg);

  // ── Stars (procedural) ──
  const starsG = el('g', {opacity:'0.85'}, svg);
  const rng = mulberry32(42);
  for (let i=0; i<520; i++) {
    const sx = (rng()-0.5)*1600;
    const sy = (rng()-0.5)*1400;
    const sr = rng()*1.3+0.2;
    const so = rng()*0.6+0.3;
    // colour: mostly white, some warm, some purple-ish
    const col = rng() < 0.15 ? '#c9a84c' : rng() < 0.2 ? '#d0a0e8' : '#e8e4f0';
    el('circle', {cx:sx,cy:sy,r:sr,fill:col,opacity:so}, starsG);
  }
  // Scattered larger pink dots (like sketch)
  for (let i=0; i<55; i++) {
    const sx = (rng()-0.5)*1600;
    const sy = (rng()-0.5)*1400;
    el('rect', {x:sx-2.5,y:sy-5,width:5,height:10,rx:2,fill:'#c884c8',opacity:rng()*0.5+0.25,
      transform:`rotate(${rng()*30-15} ${sx} ${sy})`}, starsG);
  }

  // ── The Far Realm — fills the entire outer astral sea ──
  (function drawFarRealmField() {
    const rngFR = mulberry32(77);
    const R_INNER_BOUNDARY = R_COSMOS_DIVIDE; // where Far Realm begins — beyond all planes
    const R_OUTER_BOUNDARY = R_OUTER_OUTER;
    const frG = el('g', {cursor:'pointer','pointer-events':'all'}, svg);

    // Dark tinted annular wash over the outer astral sea
    // Use a donut clip: outer circle minus inner circle
    const clipId = 'farRealmClip';
    const clipPath = el('clipPath', {id: clipId}, defs);
    // SVG donut clip using even-odd fill rule
    const clipRect = el('path', {
      d: `M 0,${-R_OUTER_BOUNDARY} A ${R_OUTER_BOUNDARY},${R_OUTER_BOUNDARY} 0 1,0 0.01,${-R_OUTER_BOUNDARY} Z M 0,${-R_INNER_BOUNDARY} A ${R_INNER_BOUNDARY},${R_INNER_BOUNDARY} 0 1,0 0.01,${-R_INNER_BOUNDARY} Z`,
      'clip-rule': 'evenodd',
      'fill-rule': 'evenodd',
    }, clipPath);

    // Background tint
    el('circle', {cx:0,cy:0,r:R_OUTER_BOUNDARY,fill:'rgba(15,0,25,0.35)',
      'clip-path':`url(#${clipId})`}, frG);

    // 120 scattered aberrant shapes across the full outer ring
    for (let i = 0; i < 120; i++) {
      // Random point in annulus: uniform in area
      const t = rngFR();
      const r2 = Math.sqrt(t * (R_OUTER_BOUNDARY*R_OUTER_BOUNDARY - R_INNER_BOUNDARY*R_INNER_BOUNDARY) + R_INNER_BOUNDARY*R_INNER_BOUNDARY);
      const ang = rngFR() * Math.PI * 2;
      const sx = Math.cos(ang) * r2;
      const sy = Math.sin(ang) * r2;
      const shapeType = Math.floor(rngFR() * 4);
      const sz = rngFR() * 9 + 2;
      const pur = Math.floor(80 + rngFR() * 130);
      const col = `rgba(${Math.floor(rngFR()*50)},0,${pur},${0.3 + rngFR()*0.45})`;

      if (shapeType === 0) {
        // Irregular blob
        const pts = [];
        const n = Math.floor(rngFR() * 3) + 4;
        for (let j = 0; j < n; j++) {
          const a = (j/n)*Math.PI*2;
          const rv = sz * (0.5 + rngFR()*0.7);
          pts.push(`${sx+Math.cos(a)*rv},${sy+Math.sin(a)*rv}`);
        }
        el('polygon', {points:pts.join(' '), fill:col,
          stroke:`rgba(120,0,180,0.25)`, strokeWidth:'0.4'}, frG);

      } else if (shapeType === 1) {
        // Eye
        const ew = sz * (0.9 + rngFR()*0.5);
        const eh = sz * (0.25 + rngFR()*0.25);
        const rot = rngFR() * 180;
        el('ellipse', {cx:sx,cy:sy,rx:ew,ry:eh,fill:col,
          transform:`rotate(${rot},${sx},${sy})`}, frG);
        el('ellipse', {cx:sx,cy:sy,rx:ew*0.3,ry:eh*0.55,fill:'rgba(0,0,0,0.85)',
          transform:`rotate(${rot},${sx},${sy})`}, frG);

      } else if (shapeType === 2) {
        // Tendril
        const len = sz * (1.5 + rngFR());
        const ang2 = rngFR() * Math.PI * 2;
        const mx = sx + Math.cos(ang2+0.5)*len*0.5;
        const my = sy + Math.sin(ang2+0.5)*len*0.5;
        el('path', {
          d:`M ${sx},${sy} Q ${mx},${my} ${sx+Math.cos(ang2)*len},${sy+Math.sin(ang2)*len}`,
          fill:'none', stroke:col, strokeWidth: rngFR()*1.2+0.3
        }, frG);

      } else {
        // Void dots
        for (let k = 0; k < 3; k++) {
          el('circle', {cx:sx+(rngFR()-0.5)*sz, cy:sy+(rngFR()-0.5)*sz,
            r:rngFR()*2.5+0.5, fill:col}, frG);
        }
      }
    }

    // ~8 larger anchor aberrations with eyes
    for (let i = 0; i < 8; i++) {
      const t2 = rngFR();
      const r2 = Math.sqrt(t2*(R_OUTER_BOUNDARY*R_OUTER_BOUNDARY - R_INNER_BOUNDARY*R_INNER_BOUNDARY) + R_INNER_BOUNDARY*R_INNER_BOUNDARY);
      const ang = rngFR() * Math.PI * 2;
      const ox = Math.cos(ang) * r2;
      const oy = Math.sin(ang) * r2;
      const er = 10 + rngFR() * 14;
      const pts = [];
      for (let j = 0; j < 10; j++) {
        const a = (j/10)*Math.PI*2;
        pts.push(`${ox+Math.cos(a)*er*(0.7+rngFR()*0.5)},${oy+Math.sin(a)*er*(0.7+rngFR()*0.5)}`);
      }
      el('polygon', {points:pts.join(' '),fill:'#0a0015',stroke:'rgba(120,0,180,0.45)',strokeWidth:'0.7'}, frG);
      el('ellipse', {cx:ox,cy:oy,rx:er*0.45,ry:er*0.22,fill:'#160025'}, frG);
      el('ellipse', {cx:ox,cy:oy,rx:er*0.18,ry:er*0.18,fill:`rgba(160,0,240,0.85)`}, frG);
      el('ellipse', {cx:ox,cy:oy,rx:er*0.05,ry:er*0.17,fill:'#000'}, frG);
    }

    // Hover for tooltip
    frG.addEventListener('mouseenter', e => {
      ttTitle.textContent = 'THE FAR REALM';
      ttRuler.textContent = '';
      ttBody.textContent  = 'Beyond the outermost edge of the Cosmos lies something that should not exist. The Far Realm is not a plane so much as a wound in reality — utterly alien to mortal comprehension, where the laws of existence do not apply. Aberrations such as Mind Flayers and Beholders are said to originate here. Some whisper that Illisenax, The Banished One, did not stop at the Outer Astral Sea.';
      tooltip.classList.add('visible');
      moveTooltip(e);
    });
    frG.addEventListener('mousemove', moveTooltip);
    frG.addEventListener('mouseleave', hideTooltip);

    // Label
    el('text', {x: R_COSMOS_DIVIDE * 0.75, y: -R_COSMOS_DIVIDE * 0.75,
      'text-anchor':'middle', 'dominant-baseline':'middle',
      'font-family':'Cinzel', 'font-size':'9.5', 'letter-spacing':'0.14em',
      fill:'rgba(140,0,200,0.5)',
      'paint-order':'stroke', stroke:'rgba(5,4,15,0.7)', 'stroke-width':'3'
    }, frG).textContent = 'THE FAR REALM';
  })();

  // ── Zone labels ──
  const labG = el('g', {'font-family':'Cinzel','font-size':'9','letter-spacing':'0.18em',
    fill:'rgba(201,168,76,0.38)', 'text-anchor':'middle'}, svg);
  el('text', {x:0,y:-200}, labG).textContent = 'INNER ASTRAL SEA';
  el('text', {x:0,y:-(R_COSMOS_DIVIDE + 24)}, labG).textContent = 'THE FAR REALM';

  // ── Cosmos boundary ring (edge of inner astral sea / start of Far Realm) ──
  el('circle', {cx:0,cy:0,r:R_COSMOS_DIVIDE,fill:'none',
    stroke:'rgba(120,0,180,0.25)',strokeWidth:'18'}, svg);
  el('circle', {cx:0,cy:0,r:R_COSMOS_DIVIDE,fill:'none',
    stroke:'rgba(140,0,200,0.4)',strokeWidth:'0.8',strokeDasharray:'5 4'}, svg);

  // ── Orbit rings around Sol (one per plane with orbitR) ──
  const orbitColors = {
    aeloria:  'rgba(201,168,76,0.18)',
    feywild:  'rgba(120,180,120,0.12)',
    heavens:  'rgba(220,210,130,0.10)',
    hells:    'rgba(180,70,50,0.10)',
    forge:    'rgba(220,140,40,0.10)',
    vertaei:  'rgba(160,170,190,0.10)',
    mechanus: 'rgba(100,130,160,0.10)',

  PLANES.forEach(p => {
    if (!p.orbitR) return;

  // ── Comet orbit ellipse — tilted around its own centre ──
  el('ellipse', {cx:COMET_CX,cy:COMET_CY,rx:COMET_A,ry:COMET_B,fill:'none',
    stroke:'rgba(192,132,232,0.22)',strokeWidth:'0.8',strokeDasharray:'4 6',
    transform:`rotate(${55},${COMET_CX},${COMET_CY})`}, svg);

  // Perihelion / Aphelion markers
  [
    {pos: PERIHELION, label: 'Perihelion', anchor:'middle', dy:-10},
    {pos: APHELION,   label: 'Aphelion',   anchor:'middle', dy:-10},
  ].forEach(({pos,label,anchor,dy}) => {
    el('circle', {cx:pos.x,cy:pos.y,r:3.5,fill:'rgba(192,132,232,0.9)'}, svg);
    el('text', {x:pos.x,y:pos.y+dy,'text-anchor':anchor,'font-family':'Cinzel','font-size':'8.5',
      'letter-spacing':'0.1em',fill:'rgba(210,160,255,0.9)',
      'paint-order':'stroke',stroke:'rgba(5,4,15,0.8)','stroke-width':'3'
    }, svg).textContent = label.toUpperCase();
  });

  // ── Mun orbit ring (centred on Aeloria) — same as The Divide ──
  // The Divide was erected on Day 18, Lockhar (month 11), Year 362 — end of the War of the Banishment.
  // Hidden before that date, hidden during The Dividing intercalary period.
  const aelNow = PLANES.find(p => p.id === 'aeloria');
  const { month: curMonth, year: curYear, day: curDay } = absToAelorian(Math.floor(currentAbsDay));
  const duringDividing = (curMonth === 13 && isDividingYear(curYear));
  const DIVIDE_ERECTED = aelorianToAbsDay(18, 11, 362);
  const divideExists = Math.floor(currentAbsDay) >= DIVIDE_ERECTED;

  if (!duringDividing && divideExists) {
    el('circle', {cx:aelNow.x,cy:aelNow.y,r:MUN_R,fill:'none',
      stroke:'rgba(200,191,160,0.18)',strokeWidth:'0.6',strokeDasharray:'2 4'}, svg);
    el('circle', {cx:aelNow.x,cy:aelNow.y,r:MUN_R,fill:'none',
      stroke:'rgba(201,168,76,0.6)',strokeWidth:'1.2',
      filter:'url(#divideGlow)',strokeDasharray:'6 4'}, svg);
    const divLab = el('g', {transform:`translate(${aelNow.x + MUN_R + 10},${aelNow.y - MUN_R * 0.5})`,
      cursor:'pointer', 'data-id':'divide', 'pointer-events':'all'}, svg);
    el('rect', {x:-2,y:-9,width:100,height:16,rx:2,
      fill:'rgba(5,4,15,0.85)',stroke:'#c9a84c',strokeWidth:'1'}, divLab);
    const divText = el('text', {x:48,y:0,'text-anchor':'middle','dominant-baseline':'middle',
      'font-family':'Cinzel','font-size':'8.5','letter-spacing':'0.14em',fill:'#e8c97a'}, divLab);
    divText.textContent = 'THE DIVIDE';
    addHover(divLab, 'divide');
  } else if (duringDividing) {
    const dividingLab = el('g', {transform:`translate(${aelNow.x},${aelNow.y - MUN_R - 18})`}, svg);
    el('rect', {x:-68,y:-10,width:136,height:20,rx:2,
      fill:'rgba(15,5,25,0.9)',stroke:'#c87ac8',strokeWidth:'1'}, dividingLab);
    el('text', {x:0,y:0,'text-anchor':'middle','dominant-baseline':'middle',
      'font-family':'Cinzel Decorative','font-size':'8','letter-spacing':'0.18em',
      fill:'#d890d8'}, dividingLab).textContent = '✦ THE DIVIDING ✦';
  }
  // Before Year 362 Day 18 Lockhar — The Divide simply doesn't exist, nothing drawn

  // ── Draw all planes ──
  PLANES.forEach(p => drawPlane(p));
}

// ═══════════════════════════════════════════════
//  DRAW INDIVIDUAL PLANES
// ═══════════════════════════════════════════════
function drawPlane(p) {
  if (p.type === 'label') return;
  // Astrum Inter-Oculus only drawn when visible for current date
  if (p.type === 'quantum-moon' && !p._visible) return;

  const g = el('g', {
    transform: `translate(${p.x},${p.y})`,
    cursor: 'pointer',
    'data-id': p.id,
    'pointer-events': 'all',
  }, svg);

  if (p.type === 'star') drawSol(g, p);
  else if (p.type === 'planet') drawPlanet(g, p);
  else if (p.type === 'moon') drawMoon(g, p);
  else if (p.type === 'quantum-moon') drawQuantumMoon(g, p);
  else if (p.type === 'dual-planet') drawDualPlanet(g, p);
  else if (p.type === 'triad') drawTriad(g, p);
  else if (p.type === 'nine-hells') drawNineHells(g, p);
  else if (p.type === 'forge') drawForge(g, p);
  else if (p.type === 'mountain') drawMountain(g, p);
  else if (p.type === 'mechanus') drawMechanus(g, p);
  else if (p.type === 'comet') drawComet(g, p);
  else if (p.type === 'wayfarer')       drawWayfarer(g, p);
  else if (p.type === 'elemental-ring') drawElementalRingBody(g, p);

  drawLabel(g, p);
  addHover(g, p.id);
}

function drawLabel(g, p) {
  const offset = p.labelOffset || { x: p.size + 10, y: 0 };
  const anchor = p.labelAnchor || 'start';

  const lname = p.subtitle
    ? [p.name, p.subtitle]
    : [p.name];

  lname.forEach((line, i) => {
    el('text', {
      x: offset.x, y: offset.y + i*12,
      'text-anchor': anchor,
      'dominant-baseline': 'middle',
      'font-family': 'Cinzel',
      'font-size': i === 0 ? '9.5' : '7.5',
      'letter-spacing': '0.12em',
      fill: i === 0 ? '#c9a84c' : '#8a6f2e',
      'paint-order': 'stroke',
      stroke: 'rgba(5,4,15,0.8)',
      'stroke-width': '3',
    }, g).textContent = line;
  });
}

function drawSol(g, p) {
  // Outer corona glow
  el('circle', {cx:0,cy:0,r:p.glowSize*1.8,fill:'rgba(255,240,100,0.04)'}, g);
  el('circle', {cx:0,cy:0,r:p.glowSize,fill:'rgba(255,240,100,0.12)'}, g);
  // Rays
  for (let i=0; i<12; i++) {
    const ang = i * 30;
    el('line', {
      x1:0,y1:0, x2:0, y2:-(p.size+18),
      stroke:'rgba(255,240,150,0.25)',strokeWidth:'1.5',
      transform:`rotate(${ang})`
    }, g);
  }
  el('circle', {cx:0,cy:0,r:p.size+8,fill:'rgba(255,240,100,0.15)'}, g);
  el('circle', {cx:0,cy:0,r:p.size,fill:'#fff5c0'}, g);
  el('circle', {cx:0,cy:0,r:p.size*0.7,fill:'#fffde0'}, g);
  el('circle', {cx:0,cy:0,r:p.size*0.3,fill:'#ffffff'}, g);
  // name below
  p.labelOffset = {x:0, y: p.size+14};
  p.labelAnchor = 'middle';
}

function drawPlanet(g, p) {
  const r = p.size;

  // For Aeloria: tilt the planet so poles (±Y axis) point toward Sol (world 0,0)
  // Angle from planet toward Sol, then rotate so +Y points that way
  const isAeloria = p.id === 'aeloria';
  const tiltDeg = isAeloria
    ? Math.atan2(-p.y, -p.x) * 180 / Math.PI - 90  // -90 so +Y (north pole) faces Sol
    : 0;
  const pg = isAeloria ? el('g', {transform:'rotate('+tiltDeg.toFixed(2)+')'}, g) : g;

  // Atmosphere glow
  el('circle', {cx:0,cy:0,r:r*1.35,fill:'rgba(100,160,220,0.10)'}, pg);
  el('circle', {cx:0,cy:0,r:r*1.18,fill:'rgba(100,160,220,0.13)'}, pg);

  // Ocean base
  el('circle', {cx:0,cy:0,r:r,fill:'#1a6090'}, pg);

  // Continent shapes — rough polygon blobs
  // Main large continent (like Eurasia-ish)
  el('ellipse', {cx:-r*0.15,cy:-r*0.18,rx:r*0.55,ry:r*0.38,
    fill:'#4a7a38',transform:`rotate(-20,${-r*0.15},${-r*0.18})`}, pg);
  el('ellipse', {cx: r*0.28,cy:-r*0.08,rx:r*0.28,ry:r*0.22,
    fill:'#5a8840',transform:`rotate(15,${r*0.28},${-r*0.08})`}, pg);
  // Southern continent
  el('ellipse', {cx:-r*0.1,cy:r*0.38,rx:r*0.28,ry:r*0.24,
    fill:'#4a7a38',transform:`rotate(10,${-r*0.1},${r*0.38})`}, pg);
  // Small island continent
  el('ellipse', {cx:r*0.42,cy:r*0.28,rx:r*0.16,ry:r*0.12,
    fill:'#558840',transform:`rotate(-10,${r*0.42},${r*0.28})`}, pg);
  // Desert patch on main continent
  el('ellipse', {cx:r*0.05,cy:r*0.04,rx:r*0.14,ry:r*0.09,
    fill:'#c8a84a',opacity:'0.7',transform:'rotate(25,0,0)'}, pg);

  // Ice caps
  el('ellipse', {cx:0,cy:-r*0.88,rx:r*0.42,ry:r*0.16,fill:'#dceef8',opacity:'0.9'}, pg);
  el('ellipse', {cx:0,cy: r*0.88,rx:r*0.32,ry:r*0.12,fill:'#dceef8',opacity:'0.8'}, pg);

  // Cloud wisps
  el('ellipse', {cx:-r*0.3,cy:-r*0.52,rx:r*0.32,ry:r*0.06,
    fill:'rgba(255,255,255,0.25)',transform:'rotate(-15,0,0)'}, pg);
  el('ellipse', {cx: r*0.2,cy: r*0.42,rx:r*0.28,ry:r*0.05,
    fill:'rgba(255,255,255,0.2)',transform:'rotate(10,0,0)'}, pg);
  el('ellipse', {cx: r*0.5,cy:-r*0.25,rx:r*0.2,ry:r*0.04,
    fill:'rgba(255,255,255,0.18)'}, pg);

  // Atmosphere rim
  el('circle', {cx:0,cy:0,r:r,fill:'none',
    stroke:'rgba(120,180,240,0.5)',strokeWidth:'2.5'}, pg);
  el('circle', {cx:0,cy:0,r:r*1.06,fill:'none',
    stroke:'rgba(100,160,220,0.2)',strokeWidth:'1.5'}, pg);

  // Specular highlight
  el('ellipse', {cx:-r*0.3,cy:-r*0.3,rx:r*0.22,ry:r*0.14,
    fill:'rgba(255,255,255,0.08)',transform:'rotate(-30,0,0)'}, pg);

  p.labelOffset = {x: r + 8, y: 0};
}

function drawMoon(g, p) {
  el('circle', {cx:0,cy:0,r:p.size+4,fill:'rgba(200,191,160,0.15)'}, g);
  el('circle', {cx:0,cy:0,r:p.size,fill:'#a09878'}, g);
  // craters
  [{cx:2,cy:-2,r:2.5},{cx:-3,cy:3,r:1.5},{cx:3,cy:4,r:1}].forEach(c =>
    el('circle', {...c,fill:'rgba(0,0,0,0.25)'}, g));
  el('circle', {cx:0,cy:0,r:p.size,fill:'none',stroke:'#c8bfa0',strokeWidth:'0.5'}, g);
  p.labelOffset = {x: p.size+7, y:0};
}

function drawQuantumMoon(g, p) {
  const r = p.size;

  // Soft purple-grey aura — slightly ethereal
  el('circle', {cx:0,cy:0,r:r*2.2,fill:'rgba(160,140,200,0.08)'}, g);
  el('circle', {cx:0,cy:0,r:r*1.5,fill:'rgba(160,140,200,0.10)'}, g);

  // Main body — light purple-grey
  el('circle', {cx:0,cy:0,r:r,fill:'#9a90b8'}, g);

  // Subtle surface variation
  el('ellipse', {cx:-r*0.2,cy:-r*0.15,rx:r*0.4,ry:r*0.3,fill:'#b0a8cc',opacity:'0.6'}, g);
  el('circle', {cx:r*0.25,cy:r*0.2,r:r*0.18,fill:'#7a7098',opacity:'0.5'}, g);

  // Ghostly rim — suggests it's not quite real
  el('circle', {cx:0,cy:0,r:r,fill:'none',
    stroke:'rgba(200,180,240,0.6)',strokeWidth:'0.8'}, g);
  el('circle', {cx:0,cy:0,r:r*1.12,fill:'none',
    stroke:'rgba(180,160,220,0.2)',strokeWidth:'0.5',strokeDasharray:'2 3'}, g);

  // Specular
  el('ellipse', {cx:-r*0.28,cy:-r*0.28,rx:r*0.18,ry:r*0.1,
    fill:'rgba(255,255,255,0.15)',transform:'rotate(-30,0,0)'}, g);

  p.labelOffset = {x: r + 7, y: 0};
}

function drawDualPlanet(g, p) {
  // Phase rendering — like moon phases but for the Feywild/Shadowfell split.
  //
  // Phase angle: angle FROM Sol (0,0) TO the plane, 0°=right.
  // At phase 0°   (plane between Sol & Aeloria): Feywild full, Shadowfell dark (new)
  // At phase 90°  (plane to the side):           half & half, Feywild waning
  // At phase 180° (Sol behind plane):            Shadowfell full, Feywild dark (new)
  // At phase 270° (plane to the other side):     half & half, Feywild waxing
  //
  // Implementation: draw a dark Shadowfell sphere, then overlay the Feywild
  // using a moon-phase clip built from two arcs — a half-circle on the lit side
  // and an ellipse that waxes/wanes the exposed area.

  const r = p.size;
  el('circle', {cx:0,cy:0,r:p.glowSize,fill:'rgba(100,180,120,0.10)'}, g);

  // Phase: angle of plane from Sol
  const phaseAngle  = Math.atan2(p.y, p.x) * 180 / Math.PI; // 0° = right
  // t: 0=Feywild full, 0.5=Shadowfell full, wraps 0–1
  const t = ((phaseAngle % 360) + 360) % 360 / 360; // 0–1

  // Build a moon-phase SVG path in local space.
  // The illuminated side (Feywild) faces Sol: direction toward Sol = phaseAngle + 180°
  const toSolRad = (phaseAngle + 180) * Math.PI / 180;
  // Rotate everything so "lit side" is always on the left in our construction,
  // then apply a rotation transform to orient toward Sol.
  // Moon phase lit fraction: cos(phaseAngle from Sol) maps -1→1
  // cosPhase = 1: fully lit (Feywild); -1: fully dark (Shadowfell)
  const cosPhase = Math.cos(phaseAngle * Math.PI / 180); // 1=fey full, -1=shadow full

  // The phase clip uses two curves:
  //   - Outer half-circle on the lit side (always)
  //   - Inner ellipse that goes from full-circle (full moon) to line (half) to full-circle-other-side (new)
  //     rx = r (constant), ry = |cosPhase| * r (waxes/wanes), convex/concave depending on phase
  // Standard moon-phase path construction:
  //   Top of sphere is (0, -r), bottom is (0, r) in our frame before rotation.
  //   Left half = dark (Shadowfell), right half = lit (Feywild) before rotation.
  //   Then rotate the whole clip by (phaseAngle + 180)° so lit side faces Sol.

  const clipId = 'clip-fey-' + p.id;
  const defsEl = svg.querySelector('defs') || el('defs',{},svg);
  const oldClip = defsEl.querySelector('#' + clipId);
  if (oldClip) oldClip.remove();
  const clip = el('clipPath', {id: clipId}, defsEl);

  // Ellipse x-radius for the inner curve: r when full/new, 0 at half
  const ex = Math.abs(cosPhase) * r;
  // Which side does the ellipse bulge? 
  //   cosPhase > 0: Feywild dominant — inner curve bulges LEFT (into dark side) → gibbous Feywild
  //   cosPhase < 0: Shadowfell dominant — inner curve bulges RIGHT (into lit side) → crescent Feywild
  //   cosPhase = 0: straight line (exactly half and half)
  const bulgeRight = cosPhase < 0; // ellipse sweeps into the lit side = crescent

  // Path: right half-circle (lit side) + inner ellipse arc back
  // All in local space where lit = right (+x), then rotated.
  // Right semicircle: from (0,-r) clockwise to (0,r)  [large-arc=1, sweep=1]
  // Inner ellipse: from (0,r) back to (0,-r)
  //   If bulgeRight (crescent): ellipse bulges right  [sweep=1 = clockwise = right bulge]
  //   If gibbous:               ellipse bulges left   [sweep=0 = counter-clockwise = left bulge]
  const sweepInner = bulgeRight ? 1 : 0;
  const phasePathD = ex < 0.5
    ? `M 0,${-r} A ${r},${r} 0 1,1 0,${r} L 0,${r} L 0,${-r} Z`  // exactly half — straight line
    : `M 0,${-r} A ${r},${r} 0 1,1 0,${r} A ${ex},${r} 0 1,${sweepInner} 0,${-r} Z`;

  const rotDeg = phaseAngle + 180; // rotate so lit side faces Sol
  el('path', {d: phasePathD, transform: `rotate(${rotDeg})`}, clip);

  // ── Draw the sphere ──

  // Shadowfell base — full dark sphere
  el('circle', {cx:0,cy:0,r,fill:'#1a1228'}, g);
  // Shadowfell surface detail (only visible when it's exposed)
  el('ellipse', {cx:3,cy:-2,rx:r*0.35,ry:r*0.25,fill:'#2a1a40',opacity:'0.7'}, g);
  el('circle', {cx:-r*0.2,cy:r*0.25,r:r*0.18,fill:'#120d20',opacity:'0.6'}, g);

  // Feywild overlay — clipped to phase shape
  const feyG = el('g', {'clip-path':`url(#${clipId})`}, g);
  el('circle', {cx:0,cy:0,r,fill:p.color}, feyG);                          // green base
  el('ellipse', {cx:-r*0.15,cy:-r*0.1,rx:r*0.45,ry:r*0.3,fill:'#c8f0a0',opacity:'0.5'}, feyG); // bright patch
  el('ellipse', {cx:r*0.2,cy:r*0.25,rx:r*0.3,ry:r*0.2,fill:'#f0a8c8',opacity:'0.45'}, feyG);  // pink wisp
  el('ellipse', {cx:-r*0.3,cy:r*0.15,rx:r*0.2,ry:r*0.15,fill:'#a8e0a8',opacity:'0.4'}, feyG); // green wisp

  // Rim glow — colour reflects dominant half
  const rimCol = cosPhase > 0.3 ? 'rgba(150,220,150,0.5)'
               : cosPhase < -0.3 ? 'rgba(80,40,120,0.5)'
               : 'rgba(120,130,140,0.4)';
  el('circle', {cx:0,cy:0,r,fill:'none',stroke:rimCol,strokeWidth:'1'}, g);

  p.labelOffset = {x: r + 10, y: 0};
}

function drawTriad(g, p) {
  const r = p.size;

  // Cluster spin: 97-day period — prime number so it never freezes at any preset step size
  const clusterRotDeg = (currentAbsDay / 97) * 360;

  // Three worlds in a tight cluster — Purity (top), Mercy (bottom-left), Law (bottom-right)
  const cr = r * 1.05;
  const basePositions = [
    { angle: -90, name: 'Purity' },
    { angle: 150, name: 'Mercy'  },
    { angle:  30, name: 'Law'    },
  ].map(({angle, name}) => ({
    dx: Math.cos((angle + clusterRotDeg) * Math.PI/180) * cr,
    dy: Math.sin((angle + clusterRotDeg) * Math.PI/180) * cr,
    name,
  }));

  const wr = r * 0.58;

  // Shared outer glow
  el('circle', {cx:0,cy:0,r:r*2.1,fill:'rgba(220,210,160,0.05)'}, g);
  el('circle', {cx:0,cy:0,r:r*1.6,fill:'rgba(240,230,180,0.07)'}, g);

  // Connecting glow between worlds — drawn first so worlds sit on top
  basePositions.forEach((a, i) => {
    const b = basePositions[(i+1) % 3];
    el('line', {
      x1:a.dx.toFixed(2),y1:a.dy.toFixed(2),
      x2:b.dx.toFixed(2),y2:b.dy.toFixed(2),
      stroke:'rgba(220,200,140,0.12)',strokeWidth:'3'
    }, g);
  });

  // ── Purity ── blazing white, intense
  {
    const {dx, dy} = basePositions[0];
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr*1.5,fill:'rgba(255,255,240,0.12)'}, g);
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr*1.15,fill:'rgba(255,255,240,0.18)'}, g);
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr,fill:'#f0f0e8'}, g);
    el('ellipse', {cx:(dx-wr*0.2).toFixed(2),cy:(dy-wr*0.2).toFixed(2),
      rx:wr*0.5,ry:wr*0.35,fill:'#ffffff',opacity:'0.7'}, g);
    for (let i=0; i<6; i++) {
      const a = (i/6)*Math.PI*2;
      const r1 = wr*1.1, r2 = wr*1.55;
      el('line', {
        x1:(dx+Math.cos(a)*r1).toFixed(2), y1:(dy+Math.sin(a)*r1).toFixed(2),
        x2:(dx+Math.cos(a)*r2).toFixed(2), y2:(dy+Math.sin(a)*r2).toFixed(2),
        stroke:'rgba(255,255,220,0.4)', strokeWidth:'0.7', 'stroke-linecap':'round'
      }, g);
    }
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr,fill:'none',
      stroke:'rgba(255,255,200,0.7)',strokeWidth:'0.8'}, g);
  }

  // ── Mercy ── warm gold and ivory
  {
    const {dx, dy} = basePositions[1];
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr*1.3,fill:'rgba(220,180,80,0.10)'}, g);
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr,fill:'#c8a840'}, g);
    el('ellipse', {cx:(dx-wr*0.15).toFixed(2),cy:(dy-wr*0.15).toFixed(2),
      rx:wr*0.55,ry:wr*0.4,fill:'#e8cc70',opacity:'0.6'}, g);
    el('ellipse', {cx:(dx+wr*0.2).toFixed(2),cy:(dy+wr*0.2).toFixed(2),
      rx:wr*0.3,ry:wr*0.22,fill:'#f0e0a0',opacity:'0.35'}, g);
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr,fill:'none',
      stroke:'rgba(240,210,120,0.6)',strokeWidth:'0.8'}, g);
  }

  // ── Law ── silver-blue, geometric and cold
  {
    const {dx, dy} = basePositions[2];
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr*1.3,fill:'rgba(140,170,210,0.10)'}, g);
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr,fill:'#3a5878'}, g);
    el('ellipse', {cx:dx.toFixed(2),cy:dy.toFixed(2),rx:wr,ry:wr*0.35,fill:'none',
      stroke:'rgba(160,200,240,0.35)',strokeWidth:'0.7'}, g);
    el('ellipse', {cx:dx.toFixed(2),cy:dy.toFixed(2),rx:wr*0.5,ry:wr,fill:'none',
      stroke:'rgba(160,200,240,0.25)',strokeWidth:'0.6'}, g);
    el('ellipse', {cx:(dx-wr*0.18).toFixed(2),cy:(dy-wr*0.18).toFixed(2),
      rx:wr*0.45,ry:wr*0.32,fill:'#6888aa',opacity:'0.5'}, g);
    el('circle', {cx:dx.toFixed(2),cy:dy.toFixed(2),r:wr,fill:'none',
      stroke:'rgba(160,200,240,0.65)',strokeWidth:'0.8'}, g);
  }

  p.labelOffset = {x: r*1.5 + 8, y: 0};
}

function drawNineHells(g, p) {
  // Unified funnel body — one shape, not stacked discs.
  // Limbo (wide) faces Sol, Treachery (narrow) points away.
  const toSolDeg    = Math.atan2(-p.y, -p.x) * 180 / Math.PI;
  const funnelRotDeg = toSolDeg - 90 + 180;

  const n      = 9;
  const topR   = p.size * 1.2;   // Limbo half-width
  const botR   = p.size * 0.18;  // Treachery half-width
  const totalH = p.size * 2.6;   // total height of funnel
  const startY = -totalH * 0.5;
  const ry     = p.size * 0.18;  // ellipse Y-radius for each band face

  const layerColors = [
    '#2a1a14','#222028','#3a1418','#6a4a06',
    '#0e2030','#c0bab0','#580606','#140c1c','#050306'
  ];
  const rimColors = [
    'rgba(160,80,50,0.7)','rgba(100,90,140,0.6)','rgba(140,50,55,0.6)',
    'rgba(180,140,30,0.6)','rgba(40,90,130,0.6)','rgba(190,185,175,0.7)',
    'rgba(150,20,20,0.7)','rgba(70,35,90,0.6)','rgba(25,10,35,0.7)'
  ];

  // Compute band positions
  const bands = Array.from({length:n}, (_,i) => {
    const t  = i / (n-1);
    const rx = topR + (botR - topR) * t;
    const cy = startY + (totalH / (n-1)) * i;
    return {rx, cy, t};
  });

  // Ambient glow
  el('circle', {cx:'0',cy:'0',r:(topR*1.2).toFixed(1),fill:'rgba(120,30,10,0.09)'}, g);

  const funnelG = el('g', {transform:'rotate('+funnelRotDeg.toFixed(2)+')'}, g);

  // ── 1. Unified silhouette fill ──
  // Build a single path: left tapered edge top→bottom, bottom cap arc, right edge bottom→top, top cap arc
  const topBand = bands[0], botBand = bands[n-1];
  const silPath = [
    // Start at top-left of Limbo
    'M ' + (-topBand.rx).toFixed(2) + ',' + topBand.cy.toFixed(2),
    // Top cap ellipse arc (left to right, sweeping clockwise)
    'A ' + topBand.rx.toFixed(2) + ',' + ry.toFixed(2) + ' 0 0,1 ' + topBand.rx.toFixed(2) + ',' + topBand.cy.toFixed(2),
    // Right edge: straight line down to Treachery right
    'L ' + botBand.rx.toFixed(2) + ',' + botBand.cy.toFixed(2),
    // Bottom cap arc (right to left, sweeping clockwise = bottom of ellipse)
    'A ' + botBand.rx.toFixed(2) + ',' + ry.toFixed(2) + ' 0 0,1 ' + (-botBand.rx).toFixed(2) + ',' + botBand.cy.toFixed(2),
    // Left edge: straight line back up to Limbo left
    'Z'
  ].join(' ');

  // Dark base fill — this is the unified body
  el('path', {d:silPath, fill:'#150a08'}, funnelG);

  // ── 2. Colour bands clipped inside the silhouette ──
  // Each band is a horizontal stripe between two adjacent layer positions.
  // Clip to the silhouette so edges are never outside the cone shape.
  const clipId = 'hells-sil-' + p.id;
  const defsEl = svg.querySelector('defs') || el('defs',{},svg);
  const oldClip = defsEl.querySelector('#'+clipId);
  if (oldClip) oldClip.remove();
  const clipEl = el('clipPath', {id:clipId}, defsEl);
  el('path', {d:silPath}, clipEl);

  const bandG = el('g', {'clip-path':'url(#'+clipId+')'}, funnelG);

  bands.forEach(({rx, cy}, i) => {
    // Fill the band with a rect from this cy to next cy (or +ry for last)
    const nextCy = i < n-1 ? bands[i+1].cy : cy + ry*2;
    const h = nextCy - cy;
    el('rect', {
      x:(-topR*1.1).toFixed(2), y:cy.toFixed(2),
      width:(topR*2.2).toFixed(2), height:h.toFixed(2),
      fill:layerColors[i]
    }, bandG);

    // Per-layer surface detail
    if (i===2){
      el('ellipse',{cx:(rx*0.2).toFixed(2),cy:(cy+h*0.4).toFixed(2),rx:(rx*0.3).toFixed(2),ry:(h*0.3).toFixed(2),fill:'rgba(110,35,45,0.5)'},bandG);
    }
    if (i===3){
      el('rect',{x:(-topR*1.1).toFixed(2),y:(cy+h*0.25).toFixed(2),width:(topR*2.2).toFixed(2),height:(h*0.25).toFixed(2),fill:'rgba(200,160,30,0.2)'},bandG);
    }
    if (i===4){
      el('ellipse',{cx:'0',cy:(cy+h*0.5).toFixed(2),rx:(topR*0.7).toFixed(2),ry:(h*0.25).toFixed(2),fill:'none',stroke:'rgba(40,110,150,0.3)',strokeWidth:'1'},bandG);
    }
    if (i===5){
      el('line',{x1:(-topR*0.6).toFixed(2),y1:(cy+h*0.3).toFixed(2),x2:(topR*0.5).toFixed(2),y2:(cy+h*0.7).toFixed(2),stroke:'rgba(140,130,120,0.4)',strokeWidth:'0.8'},bandG);
    }
    if (i===6){
      el('ellipse',{cx:'0',cy:(cy+h*0.5).toFixed(2),rx:(topR*0.5).toFixed(2),ry:(h*0.35).toFixed(2),fill:'rgba(90,0,0,0.35)'},bandG);
    }
    if (i===7){
      el('ellipse',{cx:'0',cy:(cy+h*0.5).toFixed(2),rx:(topR*0.45).toFixed(2),ry:(h*0.35).toFixed(2),fill:'rgba(70,35,110,0.3)'},bandG);
    }

    // Band separator line — very subtle, just enough to distinguish layers
    if (i < n-1) {
      el('line',{
        x1:(-topR*1.1).toFixed(2), y1:nextCy.toFixed(2),
        x2:(topR*1.1).toFixed(2),  y2:nextCy.toFixed(2),
        stroke:'rgba(0,0,0,0.3)', strokeWidth:'0.5'
      }, bandG);
    }
  });

  // ── 3. Vortex holes — one per layer, centred on the band ──
  bands.forEach(({rx, cy}, i) => {
    const nextCy = i < n-1 ? bands[i+1].cy : cy + ry*2;
    const vcx = 0, vcy = (cy + nextCy) * 0.5;
    const vx = rx * 0.15, vy = ry * 0.55;
    el('ellipse',{cx:vcx,cy:vcy.toFixed(2),rx:(vx*1.8).toFixed(2),ry:(vy*1.2).toFixed(2),fill:'rgba(180,50,15,0.2)'},funnelG);
    el('ellipse',{cx:vcx,cy:vcy.toFixed(2),rx:vx.toFixed(2),ry:vy.toFixed(2),fill:'#080404'},funnelG);
    el('ellipse',{cx:vcx,cy:vcy.toFixed(2),rx:vx.toFixed(2),ry:vy.toFixed(2),fill:'none',stroke:'rgba(210,65,18,0.8)',strokeWidth:'0.8'},funnelG);
    el('ellipse',{cx:vcx,cy:vcy.toFixed(2),rx:(vx*0.4).toFixed(2),ry:(vy*0.45).toFixed(2),fill:'rgba(0,0,0,0.95)'},funnelG);
  });

  // ── 4. Unified outer silhouette rim — drawn OVER everything ──
  el('path', {d:silPath, fill:'none',
    stroke:'rgba(160,60,20,0.6)', strokeWidth:'1.2'}, funnelG);
  // Atmospheric haze just inside rim
  el('path', {d:silPath, fill:'none',
    stroke:'rgba(200,70,20,0.15)', strokeWidth:'5'}, funnelG);

  p.labelOffset = {x: topR+8, y: 0};
}
function drawForge(g, p) {
  const r = p.size;
  const rng = mulberry32(0xF04631); // stable seed so chunks never change shape

  // ── Outer heat haze ──
  el('circle', {cx:0,cy:0,r:r*3.2,fill:'rgba(200,80,20,0.04)'}, g);
  el('circle', {cx:0,cy:0,r:r*2.4,fill:'rgba(210,90,20,0.07)'}, g);
  el('circle', {cx:0,cy:0,r:r*1.7,fill:'rgba(220,100,25,0.11)'}, g);

  // ── Core forge-star ──
  // Deep orange-red heart with bright centre
  el('circle', {cx:0,cy:0,r:r*0.55,fill:'#c03010'}, g);
  el('circle', {cx:0,cy:0,r:r*0.38,fill:'#e05020'}, g);
  el('circle', {cx:0,cy:0,r:r*0.22,fill:'#f08030'}, g);
  el('circle', {cx:0,cy:0,r:r*0.10,fill:'#ffc060'}, g);
  // Corona rays — short spikes around star
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const len = r * (0.7 + rng() * 0.25);
    const x2 = Math.cos(a) * len, y2 = Math.sin(a) * len;
    el('line', {x1:0,y1:0,x2,y2,
      stroke:'rgba(220,100,30,0.18)',strokeWidth:(r*0.28).toFixed(1)+'',
      'stroke-linecap':'round'}, g);
  }

  // ── Orbiting rock fragments ──
  // Each chunk: a jagged polygon of dark basalt/obsidian,
  // placed at a radius and angle with glowing fracture edges
  const chunks = [
    // [orbitR, angleDeg, scale, rotDeg]
    [r*0.85, 15,   0.38, 20],
    [r*0.90, 78,   0.28, 140],
    [r*0.88, 138,  0.42, 70],
    [r*0.82, 195,  0.30, 210],
    [r*0.92, 248,  0.35, 330],
    [r*0.86, 305,  0.25, 90],
    [r*1.15, 40,   0.22, 55],
    [r*1.18, 100,  0.32, 180],
    [r*1.20, 165,  0.26, 10],
    [r*1.12, 220,  0.38, 260],
    [r*1.16, 278,  0.20, 130],
    [r*1.22, 340,  0.30, 300],
    [r*1.45, 60,   0.18, 45],
    [r*1.50, 150,  0.22, 120],
    [r*1.42, 240,  0.16, 200],
    [r*1.48, 320,  0.20, 80],
  ];

  chunks.forEach(([cr, angleDeg, scale, rotDeg]) => {
    const cx = Math.cos(angleDeg * Math.PI/180) * cr;
    const cy = Math.sin(angleDeg * Math.PI/180) * cr;
    const cs = r * scale;

    // Jagged polygon — 6–8 points around a rough circle
    const nPts = 6 + Math.floor(rng() * 3);
    const pts = [];
    for (let i = 0; i < nPts; i++) {
      const a = (i / nPts) * Math.PI * 2 + (rng() - 0.5) * 0.4;
      const dist = cs * (0.65 + rng() * 0.45);
      pts.push([Math.cos(a)*dist, Math.sin(a)*dist]);
    }
    const pointsStr = pts.map(([x,y])=>`${x.toFixed(2)},${y.toFixed(2)}`).join(' ');

    const chunkG = el('g', {transform:`translate(${cx.toFixed(2)},${cy.toFixed(2)}) rotate(${rotDeg})`}, g);

    // Glow behind chunk (forge light leaking around edges)
    el('polygon', {points:pointsStr,
      fill:'rgba(200,80,20,0.25)',
      transform:`scale(1.25)`}, chunkG);

    // Dark obsidian body
    el('polygon', {points:pointsStr, fill:'#1a1a1e'}, chunkG);

    // Surface variation — slightly lighter facets
    const facetPts = pts.slice(0, Math.ceil(nPts*0.5))
      .map(([x,y])=>`${(x*0.7).toFixed(2)},${(y*0.7).toFixed(2)}`).join(' ');
    el('polygon', {points:facetPts, fill:'#2a2a30', opacity:'0.7'}, chunkG);

    // Glowing fracture edge — hot crack seam along bottom/inner face
    el('polygon', {points:pointsStr, fill:'none',
      stroke:'rgba(200,70,15,0.6)', strokeWidth:'0.7'}, chunkG);

    // Occasional bright fracture line across chunk face
    if (rng() > 0.45) {
      const [x1,y1] = pts[0], [x2,y2] = pts[Math.floor(nPts/2)];
      el('line', {
        x1:x1.toFixed(2),y1:y1.toFixed(2),
        x2:x2.toFixed(2),y2:y2.toFixed(2),
        stroke:'rgba(220,90,20,0.5)', strokeWidth:'0.5'
      }, chunkG);
    }
  });

  // ── Rim of the whole system ──
  el('circle', {cx:0,cy:0,r:r*1.65,fill:'none',
    stroke:'rgba(180,60,10,0.12)',strokeWidth:'1.5',strokeDasharray:'3 5'}, g);

  p.labelOffset = {x: r*1.7, y: 0};
}

function drawMechanus(g, p) {
  const r = p.size * 2.0;
  // Full clock = PI*100 years. Hour hand: 1 rev per PI*100*360 days. Minute hand: 12x faster.
  const hourCycle   = Math.PI * 100 * 360;  // days per hour-hand revolution
  const hourPhase   = (currentAbsDay / hourCycle) % 1;
  const minutePhase = (currentAbsDay / (hourCycle / 12)) % 1;
  const hAng = -Math.PI/2 + hourPhase   * Math.PI * 2;
  const mAng = -Math.PI/2 + minutePhase * Math.PI * 2;

  // Outer glow
  el('circle', {cx:0,cy:0,r:r*1.15,fill:'rgba(100,130,160,0.08)'}, g);
  // Clock face
  el('circle', {cx:0,cy:0,r:r,fill:'#1a2230'}, g);
  el('circle', {cx:0,cy:0,r:r*0.92,fill:'none',stroke:'#4a6070',strokeWidth:'1.5'}, g);
  // Hour tick marks
  for (let i=0; i<12; i++) {
    const ang = (i/12)*Math.PI*2 - Math.PI/2;
    const isMajor = i % 3 === 0;
    const r1 = r * (isMajor ? 0.76 : 0.80);
    const r2 = r * 0.88;
    el('line', {
      x1: Math.cos(ang)*r1, y1: Math.sin(ang)*r1,
      x2: Math.cos(ang)*r2, y2: Math.sin(ang)*r2,
      stroke: isMajor ? '#8aaacc' : '#4a6070',
      strokeWidth: isMajor ? '1.5' : '0.8'
    }, g);
  }
  // Inner gear ring
  el('circle', {cx:0,cy:0,r:r*0.55,fill:'none',stroke:'#3a5060',strokeWidth:'2'}, g);
  // Hour hand
  el('line', {x1:0,y1:0, x2:Math.cos(hAng)*r*0.45, y2:Math.sin(hAng)*r*0.45,
    stroke:'#8aaacc',strokeWidth:'2',strokeLinecap:'round'}, g);
  // Minute hand
  el('line', {x1:0,y1:0, x2:Math.cos(mAng)*r*0.65, y2:Math.sin(mAng)*r*0.65,
    stroke:'#aaccee',strokeWidth:'1.2',strokeLinecap:'round'}, g);
  // Centre pin
  el('circle', {cx:0,cy:0,r:r*0.06,fill:'#6688aa'}, g);
  // Outer bezel
  el('circle', {cx:0,cy:0,r:r,fill:'none',stroke:'#6688aa',strokeWidth:'1'}, g);
  p.labelOffset = {x: r + 8, y: 0};
}

function drawComet(g, p) {
  // Comet tail always streams AWAY from Sol (Sol is at world origin 0,0).
  // p.x, p.y = comet world position = vector from Sol to comet.
  const dx = p.x;
  const dy = p.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const nx = dx / dist;  // unit vector pointing away from Sol
  const ny = dy / dist;

  // Rotate so local +Y axis aligns with the away-from-Sol direction.
  // SVG rotate is clockwise. atan2(ny, nx) gives the angle of (nx,ny) from +X.
  // We want local +Y → (nx,ny), which means rotating by (angle_of_away_vec - 90°).
  const angleDeg = Math.atan2(ny, nx) * 180 / Math.PI - 90;

  // Draw tail BEFORE nucleus so nucleus sits on top
  // Tail ellipses anchored at nucleus (cy=0) and extending in +Y (away from Sol after rotation)
  const tailG = el('g', {transform:`rotate(${angleDeg})`}, g);

  // Outer broad glow — starts at nucleus, extends outward
  el('ellipse', {cx:0, cy: p.size*3.0, rx:p.size*1.4, ry:p.size*3.5,
    fill:'rgba(160,80,220,0.08)'}, tailG);
  // Mid glow
  el('ellipse', {cx:0, cy: p.size*2.2, rx:p.size*0.75, ry:p.size*2.5,
    fill:'rgba(200,130,245,0.15)'}, tailG);
  // Core bright streak
  el('ellipse', {cx:0, cy: p.size*1.4, rx:p.size*0.32, ry:p.size*1.6,
    fill:'rgba(225,175,255,0.30)'}, tailG);

  // Nucleus drawn after tail so it sits on top
  el('circle', {cx:0,cy:0,r:p.glowSize*0.9,fill:'rgba(180,100,230,0.12)'}, g);
  el('circle', {cx:0,cy:0,r:p.size,fill:'#9060c8'}, g);
  el('circle', {cx:0,cy:0,r:p.size*0.55,fill:'#c084e8'}, g);
  el('circle', {cx:0,cy:0,r:p.size*0.2,fill:'#e8d0ff'}, g);
  p.labelOffset = {x: p.size+10, y:0};
}

function drawFarRealm(g, p) {
  // Rendered as a wide scattered field — the group is already translated to p.x,p.y
  // but we spread shapes across a large radius around that centre point
  const rng2 = mulberry32(99);
  const fieldR = 200; // spread radius of the cluster

  // Dim background stain
  el('ellipse', {cx:0,cy:0,rx:fieldR*1.1,ry:fieldR*0.75,
    fill:'rgba(20,0,35,0.18)'}, g);

  // 40 aberrant shapes scattered across the field
  for (let i = 0; i < 40; i++) {
    // Cluster more densely toward centre using sqrt for distribution
    const dist  = Math.sqrt(rng2()) * fieldR;
    const ang   = rng2() * Math.PI * 2;
    const sx    = Math.cos(ang) * dist;
    const sy    = Math.sin(ang) * dist;
    const shapeType = Math.floor(rng2() * 4);
    const sz    = rng2() * 10 + 3;
    const pur   = Math.floor(80 + rng2() * 120);
    const col   = `rgba(${Math.floor(rng2()*60)},0,${pur},${0.4 + rng2()*0.5})`;
    const col2  = `rgba(${Math.floor(rng2()*40)},0,${pur+30},0.25)`;

    if (shapeType === 0) {
      // Irregular blob
      const pts = [];
      const n = Math.floor(rng2() * 4) + 5;
      for (let j = 0; j < n; j++) {
        const a = (j/n)*Math.PI*2;
        const r2 = sz * (0.5 + rng2()*0.7);
        pts.push(`${sx+Math.cos(a)*r2},${sy+Math.sin(a)*r2}`);
      }
      el('polygon', {points:pts.join(' '), fill:col, stroke:`rgba(150,0,200,0.3)`, strokeWidth:'0.5'}, g);

    } else if (shapeType === 1) {
      // Eye shape
      const ew = sz * (0.8 + rng2()*0.6);
      const eh = sz * (0.3 + rng2()*0.3);
      const rot = rng2() * 180;
      el('ellipse', {cx:sx,cy:sy,rx:ew,ry:eh,fill:col,
        transform:`rotate(${rot},${sx},${sy})`}, g);
      el('ellipse', {cx:sx,cy:sy,rx:ew*0.35,ry:eh*0.6,fill:`rgba(0,0,0,0.8)`,
        transform:`rotate(${rot},${sx},${sy})`}, g);

    } else if (shapeType === 2) {
      // Tendril / curved line
      const len = sz * (1.5 + rng2());
      const ang2 = rng2() * Math.PI * 2;
      const mx = sx + Math.cos(ang2 + 0.5) * len * 0.5;
      const my = sy + Math.sin(ang2 + 0.5) * len * 0.5;
      el('path', {
        d:`M ${sx},${sy} Q ${mx},${my} ${sx+Math.cos(ang2)*len},${sy+Math.sin(ang2)*len}`,
        fill:'none', stroke:col, strokeWidth: rng2()*1.5+0.3
      }, g);

    } else {
      // Void dot cluster — 3 dots near each other
      for (let k = 0; k < 3; k++) {
        const ox = sx + (rng2()-0.5)*sz;
        const oy = sy + (rng2()-0.5)*sz;
        el('circle', {cx:ox,cy:oy,r:rng2()*3+0.8,fill:col}, g);
      }
    }
  }

  // A few larger "anchor" aberrations to give focal points
  const anchors = [
    {ox:-60, oy:-40, er:14, eyeRx:0.45, eyeRy:0.28},
    {ox: 80, oy: 30, er:10, eyeRx:0.4,  eyeRy:0.22},
    {ox: 10, oy: 70, er:8,  eyeRx:0.5,  eyeRy:0.2 },
  ];
  anchors.forEach(({ox,oy,er,eyeRx,eyeRy}) => {
    const blobPts = [];
    for (let j = 0; j < 10; j++) {
      const a = (j/10)*Math.PI*2;
      const r2 = er * (0.7 + rng2()*0.5);
      blobPts.push(`${ox+Math.cos(a)*r2},${oy+Math.sin(a)*r2}`);
    }
    el('polygon', {points:blobPts.join(' '),fill:'#0d0018',stroke:'rgba(120,0,180,0.5)',strokeWidth:'0.8'}, g);
    el('ellipse', {cx:ox,cy:oy,rx:er*eyeRx,ry:er*eyeRy,fill:'#1a0030'}, g);
    el('ellipse', {cx:ox,cy:oy,rx:er*eyeRx*0.45,ry:er*eyeRy*0.5,fill:'rgba(180,0,255,0.8)'}, g);
    el('ellipse', {cx:ox,cy:oy,rx:er*0.06,ry:er*eyeRy*0.45,fill:'#000'}, g);
  });

  // Label offset — place it at edge of field
  p.labelOffset = {x: fieldR * 0.7, y: -fieldR * 0.6};
  p.labelAnchor = 'start';
}

function drawWayfarer(g, p) {
  const r = p.size * 0.7;

  // Soft glow
  el('circle', {cx:0,cy:0,r:r*2.2,fill:'rgba(200,168,60,0.06)'}, g);

  // Starburst / leaf badge shape — alternating long and short points
  const points = [];
  const numPts = 16;
  for (let i = 0; i < numPts; i++) {
    const ang = (i / numPts) * Math.PI * 2 - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.62;
    points.push(`${Math.cos(ang)*rad},${Math.sin(ang)*rad}`);
  }
  // Badge body
  el('polygon', {points:points.join(' '), fill:'#606878', stroke:'#c9a84c', strokeWidth:'1.2'}, g);
  // Inner silver fill
  el('circle', {cx:0,cy:0,r:r*0.55,fill:'#808898'}, g);

  // Tankard — simplified SVG icon
  const ts = r * 0.28; // tankard scale
  // Body
  el('rect', {x:-ts*0.8,y:-ts*1.0,width:ts*1.6,height:ts*1.8,rx:ts*0.15,fill:'#d0d8e0'}, g);
  // Handle
  el('path', {d:`M ${ts*0.8},${-ts*0.5} Q ${ts*1.5},${-ts*0.5} ${ts*1.5},${ts*0.2} Q ${ts*1.5},${ts*0.7} ${ts*0.8},${ts*0.7}`,
    fill:'none',stroke:'#c0c8d0',strokeWidth:ts*0.35,strokeLinecap:'round'}, g);
  // Lid
  el('rect', {x:-ts*0.9,y:-ts*1.15,width:ts*1.8,height:ts*0.22,rx:ts*0.08,fill:'#b0b8c0'}, g);
  // Rim highlight
  el('rect', {x:-ts*0.75,y:-ts*0.95,width:ts*0.18,height:ts*1.55,rx:ts*0.06,
    fill:'rgba(255,255,255,0.25)'}, g);

  // Gold rim on badge
  el('polygon', {points:points.join(' '), fill:'none', stroke:'#e8c97a', strokeWidth:'0.5'}, g);

  p.labelOffset = {x: r + 6, y: 0};
}

function drawPositiveEnergy(g, p) {
  const r = p.size;
  // Blazing sphere of white-gold life energy — pulsing, overwhelming light
  el('circle', {cx:0,cy:0,r:r*2.8,fill:'rgba(255,240,80,0.06)'}, g);
  el('circle', {cx:0,cy:0,r:r*2.0,fill:'rgba(255,240,100,0.10)'}, g);
  el('circle', {cx:0,cy:0,r:r*1.45,fill:'rgba(255,245,140,0.18)'}, g);
  // Core — blinding white-gold
  el('circle', {cx:0,cy:0,r:r,fill:'#fff8c0'}, g);
  el('circle', {cx:0,cy:0,r:r*0.7,fill:'#ffffff'}, g);
  el('circle', {cx:0,cy:0,r:r*0.35,fill:'#fffce0'}, g);
  // Radiating spikes — 12 rays of light
  for (let i=0; i<12; i++) {
    const a = (i/12)*Math.PI*2;
    const r1 = r*1.1, r2 = r*(1.8 + (i%3 === 0 ? 0.5 : 0));
    el('line', {
      x1:(Math.cos(a)*r1).toFixed(2), y1:(Math.sin(a)*r1).toFixed(2),
      x2:(Math.cos(a)*r2).toFixed(2), y2:(Math.sin(a)*r2).toFixed(2),
      stroke:'rgba(255,250,180,0.6)', strokeWidth: i%3===0?'0.9':'0.5',
      'stroke-linecap':'round'
    }, g);
  }
  el('circle', {cx:0,cy:0,r:r,fill:'none',stroke:'rgba(255,255,200,0.8)',strokeWidth:'0.8'}, g);
  p.labelOffset = {x: r*2.1, y: 0};
}

function drawNegativeEnergy(g, p) {
  const r = p.size;
  // Absolute void — a perfect darkness that devours all light around it
  el('circle', {cx:0,cy:0,r:r*2.8,fill:'rgba(20,5,30,0.25)'}, g);
  el('circle', {cx:0,cy:0,r:r*2.0,fill:'rgba(30,8,40,0.30)'}, g);
  el('circle', {cx:0,cy:0,r:r*1.45,fill:'rgba(40,10,55,0.35)'}, g);
  // Core — absolute black void with a faint purple rim
  el('circle', {cx:0,cy:0,r:r,fill:'#060408'}, g);
  el('circle', {cx:0,cy:0,r:r*0.65,fill:'#020204'}, g);
  // Draining tendrils — wisps of negative energy bleeding outward
  for (let i=0; i<8; i++) {
    const a = (i/8)*Math.PI*2;
    const r1 = r*0.9, r2 = r*(1.6 + (i%2===0 ? 0.3 : 0));
    el('line', {
      x1:(Math.cos(a)*r1).toFixed(2), y1:(Math.sin(a)*r1).toFixed(2),
      x2:(Math.cos(a)*r2).toFixed(2), y2:(Math.sin(a)*r2).toFixed(2),
      stroke:'rgba(80,20,100,0.5)', strokeWidth:'0.7',
      'stroke-linecap':'round', strokeDasharray:'2 3'
    }, g);
  }
  // Faint purple event horizon
  el('circle', {cx:0,cy:0,r:r,fill:'none',stroke:'rgba(80,20,120,0.6)',strokeWidth:'1.0'}, g);
  el('circle', {cx:0,cy:0,r:r*1.1,fill:'none',stroke:'rgba(60,10,90,0.25)',strokeWidth:'0.8',strokeDasharray:'3 4'}, g);
  p.labelOffset = {x: r*2.1, y: 0};
}

function drawElementalRingBody(g, p) {
  const isPos  = p.energyType === 'positive';
  const r      = p.size;          // energy sphere radius
  const rInner = r * 1.4;         // inner edge of segment ring
  const rOuter = r * 2.5;         // outer edge of segment ring

  // 12 segments clockwise from top — same layout for both rings.
  // Major planes (Earth, Fire, Water, Air) are wider (40°).
  // Para-elemental (Magma, Ooze, Ice, Smoke) are medium (30°).
  // Quasi-elemental (inner 4) are narrower (20°) and differ per ring.
  // Total: 4×40 + 4×30 + 4×20 = 160+120+80 = 360°. ✓
  //
  // Layout (clockwise from top = 270°):
  // Earth(40) → para1(30) → Fire(40) → quasi-fire(20) → Air(40) → quasi-air(20) → Ice-para(30) → Water(40) → quasi-water(20) → Ooze-para(30) → [close]
  // Hmm — let's use 12 equal segments of 30° each for simplicity, matching the image:
  // Earth, Magma, Fire, [quasi-fire-side], Air, [quasi-air-side], Ice, Water, [quasi-water-side], Ooze, [quasi-earth-side], [back]
  //
  // From the image (clockwise from top):
  // Earth(top), Mineral/Magma, Ooze/Fire, Steam/Radiance, Water, Ice, Air, Lightning/Vacuum, Smoke, Radiance/Ash, Fire/Dust, Magma/Salt
  //
  // Cleanest read: 12 equal segments × 30° clockwise from top (270°):
  //   Pos: Earth, Mineral, Ooze, Steam, Water, Ice, Air, Lightning, Smoke, Radiance, Fire, Magma
  //   Neg: Earth, Magma, Fire, Ash, Air, Vacuum, Ice, Water, Salt, Dust, Ooze, [Ooze cont]
  // But image shows neg as: Earth, Magma, Fire, Smoke, Air, Vacuum, Ice, Water, Salt, Dust, Ooze, Ash

  const posSegs = [
    {label:'Earth',   color1:'#5a3a18',color2:'#8a6030', w:40},
    {label:'Mineral', color1:'#508050',color2:'#80c080', w:20},
    {label:'Ooze',    color1:'#3a4a18',color2:'#6a7828', w:30},
    {label:'Steam',   color1:'#507068',color2:'#90c0b8', w:20},
    {label:'Water',   color1:'#104878',color2:'#2880c0', w:40},
    {label:'Ice',     color1:'#285878',color2:'#80c8e8', w:30},
    {label:'Air',     color1:'#304858',color2:'#a0c8e0', w:40},
    {label:'Lightning',color1:'#5050d0',color2:'#b0c0ff',w:20},
    {label:'Smoke',   color1:'#282830',color2:'#505060', w:30},
    {label:'Radiance',color1:'#d8c840',color2:'#fff8a0', w:20},
    {label:'Fire',    color1:'#c84010',color2:'#ff8030', w:40},
    {label:'Magma',   color1:'#8a2800',color2:'#c85020', w:30},
  ];
  const negSegs = [
    {label:'Earth',   color1:'#5a3a18',color2:'#8a6030', w:40},
    {label:'Magma',   color1:'#8a2800',color2:'#c85020', w:30},
    {label:'Fire',    color1:'#c84010',color2:'#ff8030', w:40},
    {label:'Ash',     color1:'#404040',color2:'#707070', w:20},
    {label:'Air',     color1:'#304858',color2:'#a0c8e0', w:40},
    {label:'Vacuum',  color1:'#080812',color2:'#141830', w:20},
    {label:'Ice',     color1:'#285878',color2:'#80c8e8', w:30},
    {label:'Water',   color1:'#104878',color2:'#2880c0', w:40},
    {label:'Salt',    color1:'#c0b898',color2:'#e0d8c8', w:20},
    {label:'Ooze',    color1:'#3a4a18',color2:'#6a7828', w:30},
    {label:'Dust',    color1:'#706050',color2:'#a09070', w:20},
    {label:'Smoke',   color1:'#282830',color2:'#505060', w:30},
  ];

  const segs = isPos ? posSegs : negSegs;
  const totalW = segs.reduce((s,sg)=>s+sg.w, 0); // should be 360

  // Independent slow rotation
  const rotDeg = (currentAbsDay / (isPos ? 400 : 400)) * 360;

  // Outer glow
  el('circle',{cx:0,cy:0,r:rOuter*1.2,
    fill:isPos?'rgba(255,240,80,0.05)':'rgba(20,5,40,0.10)'},g);

  // Segment ring (rotates)
  const ringG = el('g',{transform:'rotate('+rotDeg.toFixed(2)+')'},g);
  const defsEl = svg.querySelector('defs') || el('defs',{},svg);

  // Build segments from startAngle 270° (top) clockwise
  let angle = 270;
  segs.forEach((seg, i) => {
    const startRad = angle * Math.PI / 180;
    const endRad   = (angle + seg.w) * Math.PI / 180;
    const midDeg   = angle + seg.w / 2;
    const midRad   = midDeg * Math.PI / 180;

    const x1o = Math.cos(startRad)*rOuter, y1o = Math.sin(startRad)*rOuter;
    const x2o = Math.cos(endRad)  *rOuter, y2o = Math.sin(endRad)  *rOuter;
    const x1i = Math.cos(endRad)  *rInner, y1i = Math.sin(endRad)  *rInner;
    const x2i = Math.cos(startRad)*rInner, y2i = Math.sin(startRad)*rInner;
    const d = 'M '+x1o.toFixed(2)+','+y1o.toFixed(2)+
              ' A '+rOuter.toFixed(2)+','+rOuter.toFixed(2)+' 0 0,1 '+x2o.toFixed(2)+','+y2o.toFixed(2)+
              ' L '+x1i.toFixed(2)+','+y1i.toFixed(2)+
              ' A '+rInner.toFixed(2)+','+rInner.toFixed(2)+' 0 0,0 '+x2i.toFixed(2)+','+y2i.toFixed(2)+' Z';

    const gid = 'er-'+p.id+'-'+i;
    const oldGr = defsEl.querySelector('#'+gid); if(oldGr) oldGr.remove();
    const grad = el('radialGradient',{id:gid,gradientUnits:'userSpaceOnUse',cx:'0',cy:'0',r:rOuter.toFixed(2)},defsEl);
    el('stop',{offset:'25%','stop-color':seg.color1,'stop-opacity':seg.w>=40?'0.95':'0.80'},grad);
    el('stop',{offset:'100%','stop-color':seg.color2,'stop-opacity':seg.w>=40?'0.75':'0.60'},grad);

    const isMajor = seg.w >= 40;
    el('path',{d,fill:'url(#'+gid+')',stroke:'rgba(5,4,15,0.65)',strokeWidth:isMajor?'1.0':'0.5'},ringG);

    // Label — stays upright by counter-rotating against the ring rotation
    if (seg.w >= 20) {
      const lx = Math.cos(midRad)*(rInner+rOuter)/2;
      const ly = Math.sin(midRad)*(rInner+rOuter)/2;
      // Text angle: follow the arc tangent so text reads outward from centre
      // midDeg is the angle of the segment centre in the ring's local space
      // We want text to read left-to-right, so flip if it would be upside-down
      let ta = midDeg + 90; // perpendicular to radius = tangent
      const normAngle = (midDeg % 360 + 360) % 360;
      if (normAngle > 180) ta += 180; // flip bottom half so text reads correctly
      el('text',{x:lx.toFixed(2),y:ly.toFixed(2),
        'text-anchor':'middle','dominant-baseline':'middle',
        'font-family':'Cinzel','font-size':seg.w>=40?'4.0':'2.8',
        'letter-spacing':'0.03em','fill':'rgba(255,255,255,0.80)',
        transform:'rotate('+ta.toFixed(2)+','+lx.toFixed(2)+','+ly.toFixed(2)+')'
      },ringG).textContent = seg.label;
    }

    angle += seg.w;
  });

  // Ring rims
  el('circle',{cx:0,cy:0,r:rOuter,fill:'none',
    stroke:isPos?'rgba(220,200,100,0.5)':'rgba(80,20,120,0.5)',strokeWidth:'1.2'},ringG);
  el('circle',{cx:0,cy:0,r:rInner,fill:'none',
    stroke:isPos?'rgba(220,200,100,0.35)':'rgba(60,10,90,0.35)',strokeWidth:'0.7'},ringG);

  // ── Energy sphere core ──
  if (isPos) {
    el('circle',{cx:0,cy:0,r:r*1.15,fill:'rgba(255,248,200,0.18)'},g);
    el('circle',{cx:0,cy:0,r:r,     fill:'#fff8e0'},g);
    el('circle',{cx:0,cy:0,r:r*0.72,fill:'#ffffff'},g);
    el('circle',{cx:0,cy:0,r:r*0.38,fill:'#fffef8'},g);
    // Corona rays
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2, r1=r*1.02, r2=r*(1.28+(i%3===0?0.18:0.06));
      el('line',{x1:(Math.cos(a)*r1).toFixed(2),y1:(Math.sin(a)*r1).toFixed(2),
        x2:(Math.cos(a)*r2).toFixed(2),y2:(Math.sin(a)*r2).toFixed(2),
        stroke:'rgba(255,252,200,0.7)',strokeWidth:i%3===0?'1.0':'0.5','stroke-linecap':'round'},g);
    }
    el('circle',{cx:0,cy:0,r:r,fill:'none',stroke:'rgba(255,255,210,0.7)',strokeWidth:'0.9'},g);
  } else {
    el('circle',{cx:0,cy:0,r:r*1.15,fill:'rgba(20,5,35,0.40)'},g);
    el('circle',{cx:0,cy:0,r:r,     fill:'#050308'},g);
    el('circle',{cx:0,cy:0,r:r*0.68,fill:'#020204'},g);
    // Draining tendrils
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, r1=r*0.88, r2=r*(1.18+(i%2===0?0.12:0.04));
      el('line',{x1:(Math.cos(a)*r1).toFixed(2),y1:(Math.sin(a)*r1).toFixed(2),
        x2:(Math.cos(a)*r2).toFixed(2),y2:(Math.sin(a)*r2).toFixed(2),
        stroke:'rgba(80,20,110,0.55)',strokeWidth:'0.7','stroke-linecap':'round',strokeDasharray:'2 3'},g);
    }
    el('circle',{cx:0,cy:0,r:r,     fill:'none',stroke:'rgba(80,20,130,0.65)',strokeWidth:'1.1'},g);
    el('circle',{cx:0,cy:0,r:r*1.1, fill:'none',stroke:'rgba(50,8,80,0.25)', strokeWidth:'0.8',strokeDasharray:'3 4'},g);
  }

  p.labelOffset = {x: rOuter + 8, y: 0};
}

let tooltipTimer = null;

function addHover(el, id) {
  el.addEventListener('mouseenter', e => {
    clearTimeout(tooltipTimer);
    tooltipTimer = setTimeout(() => showTooltip(e, id), animating ? 400 : 120);
  });
