  el.addEventListener('mouseleave', () => {
    clearTimeout(tooltipTimer);
    hideTooltip();
  });
}

function planeById(id) {
  if (id === 'divide') return {
    name:'The Divide',
    ruler:'Erected by the Greater Deities',
    desc:'A great barrier sealing The Banished One, Illisenax, beyond reach of the Material Realm. It marks the boundary between the Inner and Outer Astral Sea. Mun\'s orbit crosses it. No word of Illisenax has reached beyond The Divide in many ages — yet The Obsidian Dragon, Phaelanx flew into the Outer Astral Sea and has not returned.'
  };
  return PLANES.find(p => p.id === id);
}

function showTooltip(e, id) {
  const p = planeById(id);
  if (!p) return;
  ttTitle.textContent = (p.subtitle ? `${p.name} — ${p.subtitle}` : p.name).toUpperCase();
  ttRuler.textContent = p.ruler ? `Ruler: ${p.ruler}` : '';
  ttBody.textContent  = p.desc || '';
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 16;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + 290 > window.innerWidth)  x = e.clientX - 290 - pad;
  if (y + 200 > window.innerHeight) y = e.clientY - 200 - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ═══════════════════════════════════════════════
//  PAN & ZOOM
// ═══════════════════════════════════════════════
let scale = 0.72, tx = 0, ty = 0;
let dragging = false, lastX = 0, lastY = 0;

function applyTransform() {
  svg.style.transform = `translate(${window.innerWidth/2 + tx}px, ${window.innerHeight/2 + ty}px) scale(${scale})`;
}

document.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const newScale = Math.min(Math.max(scale * factor, 0.15), 3.5);

  // World point under cursor before zoom
  // Screen space: cursor is at (e.clientX, e.clientY)
  // World origin is at (innerWidth/2 + tx, innerHeight/2 + ty) in screen space
  // So cursor in world space = (e.clientX - (innerWidth/2 + tx)) / scale
  const wx = (e.clientX - (window.innerWidth  / 2 + tx)) / scale;
  const wy = (e.clientY - (window.innerHeight / 2 + ty)) / scale;

  // After zoom, adjust tx/ty so that same world point stays under cursor
  tx = e.clientX - window.innerWidth  / 2 - wx * newScale;
  ty = e.clientY - window.innerHeight / 2 - wy * newScale;

  scale = newScale;
  applyTransform();
}, {passive:false});

document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('dragging');
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX;
  ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});

document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.classList.remove('dragging');
});

document.getElementById('btn-in').addEventListener('click', () => {
  scale = Math.min(scale*1.2, 3.5); applyTransform();
});
document.getElementById('btn-out').addEventListener('click', () => {
  scale = Math.max(scale*0.83, 0.15); applyTransform();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  scale=0.72; tx=0; ty=0; applyTransform();
});

// ═══════════════════════════════════════════════
//  MULBERRY32 RNG (seeded)
// ═══════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════
//  DATE UI WIRING
// ═══════════════════════════════════════════════

function updateDateDisplay() {
  const { day, month, year } = absToAelorian(Math.floor(currentAbsDay));
  const mname = month === 13 ? 'The Dividing' : (MONTH_NAMES[month - 1] || '?');
  const fracDay = currentAbsDay - Math.floor(currentAbsDay);
  const hourStr = SPEED_STEPS[speedIdx] < 1
    ? `, ${Math.floor(fracDay * 24).toString().padStart(2,'0')}:00`
    : '';
  const dispEl = document.getElementById('date-display');
  if (dispEl) dispEl.textContent = `Day ${day}${hourStr}, ${mname}, Year ${year}`;

  // Sync the day max to 120 during The Dividing
  const dpDay = document.getElementById('dp-day');
  if (dpDay) dpDay.max = month === 13 ? 120 : 30;

  // Astrum Inter-Oculus status
  const io   = PLANES.find(p => p.id === 'interoculus');
  const stat = document.getElementById('astrum-status');
  if (stat) {
    stat.textContent = io._visible
      ? '✦ Astrum Inter-Oculus is visible'
      : '· Astrum Inter-Oculus is hidden';
    stat.className = 'visible-' + io._visible;
  }
}

function applyDateFromUI() {
  const day   = parseInt(document.getElementById('dp-day').value)   || 1;
  const month = parseInt(document.getElementById('dp-month').value) || 1;
  const year  = parseInt(document.getElementById('dp-year').value)  || 1;
  // Month 13 = The Dividing — only valid in dividing years, up to 120 days
  const maxDay = month === 13 ? 120 : 30;
  const safeDay = Math.max(1, Math.min(maxDay, day));
  // If user picked The Dividing but it's not a dividing year, clamp to month 12
  const safeMonth = (month === 13 && !isDividingYear(year)) ? 12 : month;
  currentAbsDay = aelorianToAbsDay(safeDay, safeMonth, year);
  buildScene();
  updateDateDisplay();
}

function setUIToAbsDay(absDay) {
  const { day, month, year } = absToAelorian(Math.floor(absDay));
  document.getElementById('dp-day').value   = day;
  document.getElementById('dp-day').max     = month === 13 ? 120 : 30;
  document.getElementById('dp-month').value = month;
  document.getElementById('dp-year').value  = year;
}

// Input change handlers — use 'change' only (fires on blur/Enter, not every keystroke)
// Also pause animation while user is editing so setUIToAbsDay doesn't overwrite their input
let userEditing = false;

['dp-day','dp-month','dp-year'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('focus', () => { userEditing = true; });
  el.addEventListener('blur',  () => { userEditing = false; applyDateFromUI(); });
  el.addEventListener('change', applyDateFromUI);
  // Allow Enter key to apply immediately
  el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.target.blur(); } });
});

// Today button
document.getElementById('btn-today').addEventListener('click', () => {
  currentAbsDay = aelorianToAbsDay(TODAY.day, TODAY.month, TODAY.year);
  setUIToAbsDay(currentAbsDay);
  buildScene();
  updateDateDisplay();
});

// Speed control: steps per animation tick. Fractional days for hour-level granularity.
const SPEED_STEPS  = [1/24, 6/24, 1, 7, 30, 90, 180, 360];
const SPEED_LABELS = ['1 hr/step', '6 hrs/step', '1 day/step', '1 week/step', '1 month/step', '1 season/step', '½ year/step', '1 year/step'];
let speedIdx = 2; // start at 1 day/step

function updateSpeedLabel() {
  document.getElementById('speed-label').textContent = SPEED_LABELS[speedIdx];
}

document.getElementById('btn-slower').addEventListener('click', () => {
  speedIdx = Math.max(0, speedIdx - 1);
  updateSpeedLabel();
});
document.getElementById('btn-faster').addEventListener('click', () => {
  speedIdx = Math.min(SPEED_STEPS.length - 1, speedIdx + 1);
  updateSpeedLabel();
});

// Animate button
document.getElementById('btn-animate').addEventListener('click', function() {
  animating = !animating;
  this.textContent = animating ? '⏹ Stop' : '▶ Animate';
  this.classList.toggle('active', animating);
  if (animating) runAnimation();
  else if (animRaf) { cancelAnimationFrame(animRaf); animRaf = null; }
});

let animFrameCount = 0;
function runAnimation() {
  if (!animating) return;
  animFrameCount++;
  // Redraw every 4 frames (~15 updates/second at 60fps)
  if (animFrameCount % 4 === 0) {
    currentAbsDay += SPEED_STEPS[speedIdx];
    if (!userEditing) setUIToAbsDay(currentAbsDay);
    buildScene();
    updateDateDisplay();
  }
  animRaf = requestAnimationFrame(runAnimation);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildScene();
applyTransform();
updateDateDisplay();
updateSpeedLabel();
</script>
